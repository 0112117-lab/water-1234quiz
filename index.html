{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:37,q:"먹는물 수질감시항목 운영 등에 관한 고시상 먹는샘물의 폼알데하이드, 안티몬, 몰리브덴의 검사주기로 옳은 것은?",c:["1회/2년","1회/년","2회/년","3회/년"],a:3,e:"③ 먹는샘물의 폼알데하이드·안티몬·몰리브덴 감시항목 검사주기는 2회/년이다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:38,q:"수도법령상 바이러스 분포실태 조사방법에 관한 설명이다. 빈칸에 들어갈 내용으로 옳은 것은?(원수 중 바이러스가 (ㄱ) 이상 검출 확인 시 정수 수질조사를 실시하며, 확인된 분기 및 그다음 분기에 분기별 (ㄴ) 검사할 것)",c:["ㄱ:100개체/100L, ㄴ:1회","ㄱ:50개체/100L, ㄴ:1회","ㄱ:100개체/100L, ㄴ:2회","ㄱ:50개체/100L, ㄴ:2회"],a:1,e:"① 원수 중 바이러스가 100개체/100L 이상 검출되면 정수 수질조사를 실시하며, 해당·다음 분기에 분기별 1회 검사한다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:39,q:"수도법령상 시설규모 50만m³ 이상의 정수장에 배치해야 할 정수시설운영관리사의 배치기준으로 옳은 것은?",c:["1급 2명 이상, 2급 3명 이상, 3급 5명 이상","1급 1명 이상, 2급 3명 이상, 3급 4명 이상","1급 1명 이상, 2급 2명 이상, 3급 3명 이상","1급 1명 이상, 2급 1명 이상, 3급 2명 이상"],a:1,e:"① 대규모(50만m³ 이상) 정수장은 1급 2명 이상, 2급 3명 이상, 3급 5명 이상을 배치한다(교재 정답표 기준 ①, 현행 시행규칙 별표 확인 권장)."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:40,q:"먹는물관리법상 다음 용어에 해당하는 것은?(암반대수층 안의 지하수 또는 용천수 등 수질의 안정성을 계속 유지할 수 있는 자연 상태의 깨끗한 물을 먹는 용도로 사용할 원수)",c:["염지하수","샘물","먹는염지하수","먹는샘물"],a:2,e:"② '샘물'은 암반대수층 안의 지하수 또는 용천수 등 수질 안정성을 유지할 수 있는 자연 상태의 깨끗한 물로서 먹는 용도로 사용할 원수를 말한다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:41,q:"약품주입설비에 관한 설명으로 옳은 것은?",c:["고형황산알루미늄은 중량비로 5~10% 용액으로 사용하는 것이 편리하다.","pH조정제의 주입지점은 응집제 주입지점의 하류측이 일반적이다.","pH조정제의 주입률은 알칼리도와는 상관없다.","응집제 주입량은 처리수량에 응집제 주입률을 나누어 산정한다."],a:1,e:"① 고형황산알루미늄은 5~10% 용액으로 녹여 사용하는 것이 편리하다. (②pH조정제는 응집제 상류측, ③알칼리도와 관련됨, ④주입량=처리수량×주입률)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:42,q:"상수도설계기준상 막여과설비의 주요 감시항목으로 옳지 않은 것은?",c:["유량","압력","교반","온도"],a:3,e:"③ 막여과설비 주요 감시항목은 유량·압력(막간차압)·온도 등이며, '교반'은 응집·혼화공정의 항목이다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:43,q:"염소 소독 시 생성되는 염소성분 중 살균력이 가장 강한 것은?",c:["차아염소산이온(OCl⁻)","차아염소산(HOCl)","다이클로라민(NHCl₂)","모노클로라민(NH₂Cl)"],a:2,e:"② 살균력은 HOCl > OCl⁻ > NH₂Cl > NHCl₂ 순이며, 차아염소산(HOCl)이 가장 강하다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:44,q:"중간염소처리에 관한 설명으로 옳지 않은 것은?",c:["침전지와 여과지 사이에 염소제를 주입하는 방식이다.","트라이할로메탄의 생성을 최소화하기 위하여 채택한다.","곰팡이냄새의 생성을 최소화하기 위하여 채택한다.","염소제 주입지점은 착수정, 혼화지 등으로 교반이 잘 일어나는 지점으로 한다."],a:4,e:"④ 착수정·혼화지 등 교반이 잘되는 지점에 주입하는 것은 전염소처리(원수 단계) 설명이다. 중간염소처리는 침전지~여과지 사이에 주입한다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:45,q:"여과지 성능평가 방법에 관한 설명으로 옳은 것은?",c:["단위면적당의 여과수량(UFRV)은 여과속도를 여과지속시간으로 나눈 값이다.","여과지 성능평가 시 역세척수량의 여과수량에 대한 비율과는 상관없다.","단위면적당의 여과수량(UFRV) 값이 410m³/m² 이하이면 여과지 성능이 양호하다고 본다.","단위면적당의 여과수량(UFRV) 값이 610m³/m² 이상이면 재래식 정수공정에서는 여과 성능이 좋다고 본다."],a:4,e:"④ UFRV가 610m³/m² 이상이면 재래식 정수공정에서 여과 성능이 좋다고 평가한다. (①UFRV=여과속도×여과지속시간, ②역세척수량 비율도 평가지표)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:46,q:"활성탄흡착설비에 관한 설명으로 옳지 않은 것은?",c:["비상시 또는 단기간 사용할 경우에는 입상활성탄처리가 유리하다.","저장조 등의 밀폐용기 내에서는 산소가 고갈될 우려가 있으므로 점검 시 주의가 필요하다.","일반적으로 소수성이 강하고 분자량이 큰 물질일수록 활성탄에 흡착되기 쉽다.","분말활성탄은 수증기 활성화법으로 제조되며 입도는 200mesh 체로 통과하지 않은 양이 10% 이하인 것이 좋다."],a:1,e:"① 비상시·단기간 사용에는 분말활성탄(PAC) 처리가 유리하다. 입상활성탄(GAC)은 장기간 연속 사용에 유리하다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:47,q:"슬러지 배출설비의 설계원칙으로 옳지 않은 것은?",c:["슬러지 배출이 원활할 것","슬러지 양에 알맞은 배출능력을 가질 것","슬러지 성상을 고려하지 않을 것","고농도로 소량의 슬러지를 배출할 수 있을 것"],a:3,e:"③ 슬러지 배출설비는 슬러지의 성상(농도·점성 등)을 고려하여 설계해야 한다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:48,q:"펌프의 비속도에 관한 설명으로 옳은 것은?",c:["비속도가 작아짐에 따라 임펠러 외경에 대한 임펠러의 폭은 커진다.","비속도는 유량의 1/2승에 반비례한다.","비속도가 크면 토출량이 많은 저양정의 펌프로 된다.","토출량과 전양정이 동일하면 회전속도가 클수록 비속도는 작아진다."],a:3,e:"③ 비속도가 크면 저양정·대유량(축류) 펌프가 된다. (①비속도 클수록 폭 커짐, ②유량의 1/2승에 비례, ④회전속도 클수록 비속도 커짐)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:49,q:"펌프의 조건이 다음과 같을 때 전양정(m)은 약 얼마인가?(실양정 ha:10m, 관로마찰손실수두 hl:0.3m, 토출관 유출속도 vd:12m/s, 중력가속도 g:9.8m/s²)",c:["12.6","15.6","17.6","20.6"],a:3,e:"전양정=실양정+손실수두+토출속도수두=10+0.3+vd²/2g=10+0.3+12²/19.6=10+0.3+7.35=17.6m"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:50,q:"펌프의 분해 점검 시 점검 항목으로 옳은 것은?",c:["축봉부 누수 및 온도","베어링 온도","진동","임펠러의 마모, 부식"],a:4,e:"④ 분해 점검 시에는 임펠러의 마모·부식 등 내부 부품 상태를 점검한다. (①②③은 운전 중 일상 점검 항목)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:51,q:"공장별 일부하곡선이 그림과 같을 경우 각 공장 상호 간의 부등률은?",c:["1.1","1.2","1.3","1.4"],a:2,e:"부등률=각 공장 개별 최대전력의 합/합성 최대전력. 교재 정답표 기준 ② 1.2. (그래프 수치 기준 계산 — 그림 대조 권장)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:52,q:"그림에서 A-B 간의 합성 커패시턴스(μF)는?(10μF 커패시터 2개가 병렬 연결)",c:["10","20","30","40"],a:2,e:"병렬 연결 합성정전용량=C₁+C₂=10+10=20μF"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:53,q:"전압 변동률(%)의 정의로 옳은 것은?",c:["(무부하 시 수전단전압-전부하 시 수전단전압)/전부하 시 수전단전압 ×100","(무부하 시 수전단전압-전부하 시 수전단전압)/무부하 시 수전단전압 ×100","(송전단전압-수전단전압)/수전단전압 ×100","(송전단전압-수전단전압)/송전단전압 ×100"],a:1,e:"① 전압변동률=(무부하 수전단전압-전부하 수전단전압)/전부하 수전단전압 ×100"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:54,q:"다음의 영문 약자에 관한 설명 중 옳지 않은 것은?",c:["OCR : 과전류계전기","ZCT : 영상변류기","OCB : 유입차단기","MOF : 몰드오일변성기"],a:4,e:"④ MOF는 계기용변성기(Metering Out Fit, 전력수급용 계기용변성기)이며 '몰드오일변성기'가 아니다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:55,q:"상수도설계기준상 정수장의 제어방식(컴퓨터 사용/미사용)에 관한 설명으로 옳지 않은 것은?",c:["컴퓨터를 사용하는 제어방식 중 분산제어방식은 위험이 분산되고 신뢰성도 우수하다.","컴퓨터를 사용하지 않는 제어방식은 소규모시설에서 비경제적이다.","컴퓨터를 사용하는 제어방식 중 집중제어방식에서 컴퓨터의 고장은 시스템 전체를 정지시키므로 백업대책이 필요하다.","컴퓨터를 사용하는 제어방식 중 분산제어방식은 설비증설이나 확장성에서 우수하다."],a:2,e:"② 컴퓨터를 사용하지 않는 제어방식은 소규모시설에서 오히려 경제적이다. '비경제적'은 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:56,q:"상수도설계기준상 계측기 노이즈에 관한 설명으로 옳지 않은 것은?",c:["정전유도 노이즈는 신호회로 주변에 존재하는 정전용량이나 분포용량에 의해 발생한다.","전자유도 노이즈는 신호회로와 그 주위의 자계와의 결합에 의해 발생한다.","정전유도 노이즈는 고압전원과 신호회로 간의 정전용량 결합에 의해 발생한다.","전자유도 노이즈는 대전류 회로에 흐르는 전류와 신호회로 간의 정전유도에 의해서 잡음전압이 유도된다."],a:4,e:"④ 전자유도 노이즈는 대전류 회로의 자계(전자유도)에 의해 유도되며, '정전유도에 의해'라는 설명은 옳지 않다(정전유도는 정전용량 결합)."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:57,q:"잔류염소계와 조합하여 일정한 잔류염소량으로 되도록 비율설정신호로 보정하는 방법으로, 비율제어계의 잔류염소계에 의한 보정신호를 가하는 제어방식은?",c:["정치제어","유량비례제어","피드백제어","캐스케이드제어"],a:4,e:"④ 1차측 제어결과(잔류염소계 보정신호)를 2차측 비율설정신호에 더해 보정하는 다단(직렬) 제어는 캐스케이드제어(cascade control)이다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:58,q:"산업안전보건법령상 안전인증대상 보호구로 옳지 않은 것은?",c:["절연용 방호구","용접용 보안면","안전장갑","방음용 귀마개"],a:1,e:"① 절연용 방호구는 안전인증대상 보호구가 아니다(방호장치 등 별도 분류). 안전인증대상 보호구에는 안전화·안전장갑·방진/방독마스크·송기마스크·전동식호흡보호구·보호복·안전대·차광/비산물용 보안경·용접용 보안면·방음용 귀마개(귀덮개) 등이 포함된다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:59,q:"산업안전보건법령상 물질안전보건자료대상물질을 담은 용기에는 경고표시를 하여야 한다. 경고표지 내용으로 옳지 않은 것은?",c:["제품 명칭","유해·위험문구","예방조치 문구","취급자 정보"],a:4,e:"④ 경고표지 기재항목은 명칭, 그림문자, 신호어, 유해·위험문구, 예방조치문구, 공급자 정보이다. '취급자 정보'는 해당하지 않는다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"설비운영",n:60,q:"고압가스안전관리법상 용어의 정의로 옳지 않은 것은?",c:["\"저장소\"란 고압가스를 저장하기 위한 것으로서 일정한 위치에 고정 설치된 것을 말한다.","\"용기\"란 고압가스를 충전하기 위한 것으로서 이동할 수 있는 것을 말한다.","\"냉동기\"란 고압가스를 사용하여 냉동을 하기 위한 기기로서 산업통상자원부령으로 정하는 냉동능력 이상인 것을 말한다.","\"특정설비\"란 저장탱크와 산업통상자원부령으로 정하는 고압가스 관련 설비를 말한다."],a:1,e:"① '저장소'란 일정량 이상의 고압가스를 용기나 저장탱크로 저장하는 일정한 장소를 말한다. '일정한 위치에 고정 설치된 것'은 저장탱크에 가까운 설명으로 저장소의 정의로는 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:61,q:"단위중량(비중량)의 차원을 [MLT]계와 [FLT]계로 표시한 것은?",c:["[ML⁻³], [FL⁻⁴T⁻²]","[ML²T⁻²], [FL]","[ML⁻¹T⁻²], [FL⁻²]","[ML⁻²T⁻²], [FL⁻³]"],a:4,e:"④ 단위중량 γ=무게/부피=(MLT⁻²)/L³=[ML⁻²T⁻²]. FLT계에서는 γ=F/L³=[FL⁻³]."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:62,q:"원형관에 물이 가득 차서 흐르고 있다. 단면1에서 직경 D₁=30cm, 유속 V₁=3.0m/s, 단면2에서 직경 D₂=50cm일 때, 단면2의 유속(m/s)과 유량(m³/s)은 각각 얼마인가? (정상류, 손실 무시)",c:["V₂=0.52, Q=0.14","V₂=1.08, Q=0.21","V₂=1.84, Q=0.35","V₂=2.51, Q=0.57"],a:2,e:"② Q=A₁V₁=(π/4×0.3²)×3.0≈0.212 m³/s≈0.21. V₂=Q/A₂=0.212/(π/4×0.5²)=0.212/0.196≈1.08 m/s."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:63,q:"단위가 없는(무차원) 물리량을 모두 고른 것은? ㄱ.비중 ㄴ.체적탄성계수 ㄷ.프루드수 ㄹ.레이놀즈수",c:["ㄱ, ㄴ","ㄷ, ㄹ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ"],a:4,e:"④ 비중·프루드수·레이놀즈수는 무차원이다. 체적탄성계수는 압력 차원(N/m²)을 가지므로 무차원이 아니다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:64,q:"베르누이 방정식이 성립하기 위한 조건으로 옳지 않은 것은?",c:["비압축성 유체로 가정한다.","임의의 두 점은 같은 유선상에 있어야 한다.","비점성 유체로 가정한다.","부정류(Unsteady Flow)로 가정한다."],a:4,e:"④ 베르누이 방정식은 정상류(Steady Flow)를 가정한다. 부정류 가정은 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:65,q:"관의 길이 100m, 관경 1,000mm인 관로에서 속도수두와 마찰손실수두가 같다면 마찰손실계수는?",c:["0.01","0.03","0.06","0.09"],a:1,e:"① hf=f(L/D)(V²/2g)이고 속도수두 V²/2g와 같으므로 f(L/D)=1 → f=D/L=1.0/100=0.01."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:66,q:"지름 150cm인 관에 3.0m/s의 유속으로 물이 가득 차서 흐르고 있다. 이 관로의 500m 구간 마찰손실수두가 8m일 때 마찰손실계수는 약 얼마인가?",c:["0.027","0.052","0.084","0.117"],a:2,e:"② hf=f(L/D)(V²/2g) → 8=f×(500/1.5)×(3²/(2×9.81))=f×333.3×0.459≈f×152.9 → f≈0.052."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:67,q:"물에 직경 D의 모세관을 세웠을 때, 물의 표면장력 T, 물의 단위중량 w, 접촉각 θ라 할 때, 모세관 현상에 의한 물의 상승 높이를 나타내는 식은?",c:["2w·cosθ/(TD)","2T·cosθ/(wD)","4w·cosθ/(TD)","4T·cosθ/(wD)"],a:4,e:"④ 모세관 상승 높이 h=4T·cosθ/(wD). (표면장력에 비례, 단위중량·직경에 반비례)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:68,q:"폭 9m의 직사각형 수로에 16.2m³/s의 유량이 92cm의 수심으로 흐르고 있다. 이때 프루드수와 흐름 상태는?",c:["0.652, 상류","0.652, 사류","1.533, 상류","1.533, 사류"],a:1,e:"① V=Q/A=16.2/(9×0.92)≈1.96 m/s. Fr=V/√(gh)=1.96/√(9.81×0.92)≈0.652. Fr<1이므로 상류(常流, 사류 아님)."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:69,q:"Manning 공식을 적용할 때 고려해야 할 인자로 옳지 않은 것은?",c:["조도계수","윤변","동수경사","유속계수"],a:4,e:"④ Manning식 V=(1/n)R^(2/3)I^(1/2)의 인자는 조도계수(n), 경심(윤변·통수단면과 관계), 동수경사(I)이다. '유속계수(C)'는 Chezy식의 인자로 Manning식에는 직접 쓰지 않는다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:70,q:"원형 관수로에서 물의 흐름에 따른 마찰손실수두가 가장 작은 것은? (만관 기준, 마찰손실계수와 수로 길이는 일정)",c:["유속 2m/s, 관경 0.5m","유속 3m/s, 관경 1.0m","유속 4m/s, 관경 1.5m","유속 5m/s, 관경 2.5m"],a:1,e:"① hf=f(L/D)(V²/2g)∝V²/D. ①8, ②9, ③10.67, ④10 으로 ①(2²/0.5=8)이 가장 작다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:71,q:"원형관 내 흐름상태를 판단하기 위한 레이놀즈수(Re) 산출식으로 옳은 것은? (R:경심, D:직경, V:유속, μ:점성계수, ν:동점성계수, ρ:밀도)",c:["Re = 4RV/ν","Re = DVμ/ρ","Re = DVρ/ν","Re = RV/(4μ)"],a:1,e:"① Re=DV/ν이며 원형 만관에서 D=4R이므로 Re=4RV/ν. (③은 ν 대신 μ여야 차원이 맞음)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:72,q:"침전지로의 유입 유량 100m³/min, 침전지 용량 8,000m³, 침전지의 유효수심 4m일 때 이 침전지의 표면부하율(m³/m²/d)은?",c:["18","36","54","72"],a:4,e:"④ 표면적 A=용량/수심=8,000/4=2,000 m². Q=100 m³/min=144,000 m³/d. 표면부하율=Q/A=144,000/2,000=72."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:73,q:"관수로의 층류영역에서 사용 가능한 마찰손실계수 식은? (Re는 레이놀즈수)",c:["1/Re","4/Re","24/Re","64/Re"],a:4,e:"④ 원형관 층류(Re<2,000)에서 마찰손실계수 f=64/Re (Hagen-Poiseuille)."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:74,q:"혼화지에서 속도경사(G)를 결정하는 요소가 아닌 것은?",c:["물의 점성계수","표면부하","교반동력","혼화지의 부피"],a:2,e:"② G=√(P/(μV))로 교반동력(P)·점성계수(μ)·부피(V)가 인자이다. 표면부하는 침전지 설계 인자로 속도경사 결정요소가 아니다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:75,q:"급속여과지에 관한 설명으로 옳은 것은?",c:["여과속도는 120~150m/d를 표준으로 한다.","중력식과 압력식이 있으며 압력식을 표준으로 한다.","여과면적은 계획정수량을 일최대정수량으로 나누어 계산한다.","형상은 원형을 표준으로 한다."],a:1,e:"① 급속여과지 여과속도는 120~150 m/d를 표준으로 한다. ②는 중력식이 표준, ④는 직사각형이 표준이다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:76,q:"펌프장에서 흡입구의 유속 1.6m/s, 펌프의 양수량 0.02m³/s일 때, 토출관의 지름(mm)은 약 얼마인가?",c:["16","56","86","126"],a:4,e:"④ A=Q/V=0.02/1.6=0.0125 m². D=√(4A/π)=√(4×0.0125/π)≈0.126 m=126 mm."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:77,q:"수격작용에 관한 설명으로 옳은 것은?",c:["토출측 밸브를 천천히 개폐할 경우 발생한다.","펌프에 플라이휠을 제거하여 수격작용을 방지한다.","토출측 관로에 표준형 조압수조를 설치하여 수격작용을 예방할 수 있다.","수격작용은 배관의 길이가 길수록 일어나기 어렵다."],a:3,e:"③ 조압수조(서지탱크) 설치는 대표적 수격작용 완화책이다. ①은 급격히 개폐할 때 발생, ②는 플라이휠을 '부착'해 관성으로 완화, ④는 관 길이가 길수록 수격이 커진다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:78,q:"펌프의 효율 85%, 흡입구 지름 500mm, 흡입구 유속 2m/s일 때, 5m 양정을 위한 펌프의 축동력(kW)은 약 얼마인가?",c:["22.6","32.6","42.6","52.6"],a:1,e:"① Q=A×V=(π/4×0.5²)×2≈0.393 m³/s. 축동력 P=9.81×Q×H/η=9.81×0.393×5/0.85≈22.6 kW."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:79,q:"임펠러의 직경이 동일할 때, 펌프 상사법칙에서 동력(P)과 분당 회전수(N)의 관계식으로 옳은 것은? (P₁:N₁일 때 동력, P₂:N₂일 때 동력)",c:["P₂ = P₁(N₁/N₂)³","P₂ = P₁(N₂/N₁)³","P₂ = P₁(N₁N₂)³","P₂ = P₁"],a:2,e:"② 상사법칙상 동력은 회전수의 3제곱에 비례(P∝N³)하므로 P₂=P₁(N₂/N₁)³."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수리학",n:80,q:"수격작용의 압력파 전파속도를 산정하기 위해 필요한 인자로 옳지 않은 것은?",c:["관의 지름","관재료의 탄성 계수","관의 두께","관재료의 체적탄성률"],a:4,e:"④ 압력파 전파속도 a=√(K/ρ)/√(1+(K/E)(D/t)) 산정에는 물의 체적탄성계수(K), 밀도, 관지름(D), 관두께(t), 관재료의 탄성계수(영률 E)가 쓰인다. '관재료의 체적탄성률'은 직접 인자가 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:1,q:"응집제, pH 조정제 및 응집보조제의 특성에 관한 내용으로 옳지 않은 것은?",c:["응집제 희석비율은 가능한 한 적은 것이 바람직하다.","pH조정제 주입률은 응집제 주입률만 고려하여 정한다.","응집제 및 응집보조제 주입량은 처리수량과 주입률로 산출한다.","응집제 희석지점은 가능한 한 주입지점과 가까이 설치하는 것이 바람직하다."],a:2,e:"② pH조정제 주입률은 응집제 주입률뿐 아니라 원수의 알칼리도·목표 pH 등을 함께 고려하여 정한다. '응집제 주입률만 고려'는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:2,q:"여과방식에서 응집 전처리가 요구되는 경우에 해당되지 않는 것은?",c:["완속여과에서 원수탁도가 30NTU 이상인 경우","원수 중의 부유하는 현탁물질이 쉽게 침전되거나 여과층에 억류되는 경우","저탁도이더라도 급속여과지에서 콜로이드성 입자가 충분히 제거될 것으로 기대할 수 없는 경우","저탁도이더라도 급속여과지에서 크립토스포리디움 등의 병원성 미생물로 원수가 오염될 우려가 있는 경우"],a:2,e:"② 현탁물질이 쉽게 침전·억류되는 경우는 응집 전처리 없이도 제거가 용이하므로 응집 전처리 요구 사례가 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:3,q:"고속응집침전지 선택 시 고려하여야 할 사항과 구조에 관한 내용으로 옳지 않은 것은?",c:["처리수량의 변동이 클 경우에 적용한다.","원수의 탁도는 10NTU 이상이어야 한다.","표면부하율은 40~60mm/min을 표준으로 한다.","용량은 계획정수량의 1.5~2.0시간분으로 한다."],a:1,e:"① 고속응집침전지는 처리수량과 수질 변동이 적은 경우에 적합하다. 변동이 클 경우에는 안정적 운전이 어려우므로 '변동이 클 경우 적용'은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:4,q:"여과방식 중 급속여과를 적용하여야 하는 경우로 옳지 않은 것은?",c:["탁도가 높은 경우","조류가 많은 경우","미생물군에 의하여 부유물질 및 용해성 물질 등을 산화하는 경우","휴믹산 등 안정한 화합물에 의한 색도유발물질을 제거하는 경우"],a:3,e:"③ 미생물군에 의한 부유·용해성 물질의 산화 제거는 완속여과(생물막)의 특징이다. 급속여과 적용 사유가 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:5,q:"일반적인 정수처리공정과 비교할 때 침전공정이 생략된 방식으로 수질변화가 적고 양호한 수질일 때 적용되는 여과방식은?",c:["자연평형형여과","인라인여과","다층여과","직접여과"],a:4,e:"④ 직접여과는 침전공정을 생략하고 응집·플록형성 후 바로 여과하는 방식으로, 원수 수질이 양호하고 변화가 적을 때 적용한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:6,q:"유입 슬러지량이 1,000m³/d, 농축 슬러지량이 200m³/d일 때, 청징조건을 만족시키는 농축조 면적(m²)은? (등속구간 계면침강속도 0.2m/d)",c:["2,000","3,000","4,000","5,000"],a:3,e:"③ 청징조건 면적 A=월류수량/침강속도. 월류수량=유입-농축인출=1,000-200=800 m³/d. A=800/0.2=4,000 m²."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:7,q:"급속여과지에서 역세척 방식을 적용하고자 할 때 고려하여야 할 사항을 모두 고른 것은? ㄱ.유입플록의 성상과 양 ㄴ.여과층 구성 ㄷ.여과속도 ㄹ.여과지속시간",c:["ㄱ, ㄴ","ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],a:4,e:"④ 역세척 방식은 유입플록의 성상·양, 여과층 구성, 여과속도, 여과지속시간을 모두 고려하여 결정한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:8,q:"급속여과지 하부집수장치 채택 시 고려하여야 할 사항으로 옳지 않은 것은?",c:["역세척 시 염소와 접촉되므로 내식성이 커야 한다.","여과수거 등 유출 측의 수위변동이 큰 구조로 하여야 한다.","역세척과정에서는 통수공경을 줄이고 통수저항을 크게 하여야 한다.","여재의 중량 및 급격한 수압변동에 견딜 수 있는 강도를 가져야 한다."],a:2,e:"② 하부집수장치는 균등한 집수·배수를 위해 유출 측 수위변동이 작은 구조가 되어야 한다. '수위변동이 큰 구조'는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:9,q:"소독제 등에 대한 C·T값 비교에 사용되지 않는 미생물은?",c:["대장균(E. coli)","비브리오균(Vibrio comma)","지아디아 포낭(Giardia lamblia cysts)","크립토스포리디움 난포낭(Cryptosporidium parvum oocysts)"],a:2,e:"② C·T값(소독능) 비교에는 바이러스·지아디아·크립토스포리디움·대장균 등이 주로 쓰인다. 비브리오균은 C·T값 비교 대상으로 사용되지 않는다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:10,q:"처리유량 1,000m³/h, 염소요구농도 5mg/L, 잔류염소농도 0.5mg/L일 때 하루에 주입하는 염소의 양(kg/d)은?",c:["66","132","198","264"],a:2,e:"② 주입농도=염소요구+잔류염소=5+0.5=5.5 mg/L. 유량=1,000 m³/h=24,000 m³/d. 염소량=5.5×24,000=132,000 g/d=132 kg/d."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:11,q:"전염소·중간염소처리에 관한 설명으로 옳은 것은?",c:["중간염소처리에서 염소제 주입지점은 침전지와 여과지 사이에서 잘 혼화되는 장소로 한다.","전염소처리는 통상 질산성 질소를 제거할 목적으로 처리하는 경우가 많다.","원수 중에 마이크로시스티스가 존재하는 경우에는 중간염소처리를 전염소처리로 바꾸는 것이 좋다.","전염소처리 시 망간처리를 목적으로 할 경우 여과수에서 유지해야 할 잔류염소농도는 1mg/L 정도이다."],a:1,e:"① 중간염소처리의 주입지점은 침전지와 여과지 사이의 잘 혼화되는 장소로 한다. ②는 암모니아성 질소·철·망간·조류 제거 목적, ③은 조류(마이크로시스티스)가 있으면 전염소처리 시 세포 파괴로 독소 용출 우려가 있어 오히려 중간염소처리가 유리, ④는 잔류염소 유지농도가 1mg/L보다 낮은 수준이다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:12,q:"염소제에 관한 내용이다. \"차아염소산나트륨은 유효염소 농도가 (ㄱ)% 정도의 (ㄴ) 액체로 (ㄷ)이 강하다.\"의 빈칸으로 옳게 연결된 것은?",c:["ㄱ:5~12, ㄴ:담황색, ㄷ:알칼리성","ㄱ:5~12, ㄴ:무색, ㄷ:산성","ㄱ:10~15, ㄴ:적색, ㄷ:알칼리성","ㄱ:10~15, ㄴ:담황색, ㄷ:산성"],a:1,e:"① 차아염소산나트륨(NaOCl)은 유효염소 약 5~12%의 담황색 액체이며 알칼리성이 강하다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:13,q:"액화염소의 저장설비에 관한 설명으로 옳은 것은?",c:["예비주입기는 필요 없다.","한랭 시에도 실내온도가 항상 20~25℃로 유지되도록 직접보온장치를 설치한다.","주입량과 잔량을 확인하기 위하여 계량설비를 설치한다.","사용량이 10kg/h 이상인 시설에는 원칙적으로 기화기를 설치한다."],a:3,e:"③ 주입량·잔량 확인을 위해 계량설비를 설치한다. ①은 예비주입기가 필요, ②는 직접 가열(직접보온)은 금하고 간접보온을 하며, ④의 기화기 설치 기준 수치는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:14,q:"염소주입제어 방식을 모두 고른 것은? ㄱ.비례적분제어 ㄴ.유량비례제어 ㄷ.잔류염소제어 ㄹ.수동정량제어",c:["ㄱ, ㄷ","ㄴ, ㄹ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ"],a:4,e:"④ 염소주입제어 방식에는 유량비례제어, 잔류염소제어, 수동정량제어 등이 있다. 비례적분(PID)제어는 일반 제어이론으로 염소주입제어 분류 항목이 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:15,q:"배슬러지지에 관한 설명으로 옳지 않은 것은?",c:["용량은 24시간 평균 배슬러지량과 1회 배슬러지량 중에서 큰 것으로 한다.","유지관리의 용이성을 위해 지수는 2지 이상으로 하는 것이 바람직하다.","유효수심은 1~3m, 여유고는 30cm 이상으로 한다.","슬러지배출관을 설치하며, 관경은 150mm 이상으로 해야 한다."],a:3,e:"③ 교재 정답표 기준 ③이 옳지 않은 항목으로 처리되었다(유효수심·여유고 수치 기준 불일치). 세부 수치는 상수도설계기준 원문 확인 권장."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:16,q:"배출수 및 슬러지 처리공정에 관한 설명으로 옳은 것은?",c:["표류수를 취수하는 정수장의 슬러지는 원수수질 변화·오염정도에 따라 성상은 다르나 발생량이 동일하다.","슬러지의 고형물 농도·밀도·농축특성·탈수성은 원수 특성에 크게 영향을 받지 않는다.","저탁도 또는 조류가 번성할 때 발생하는 슬러지는 침강·농축성 및 탈수성이 나쁘다.","정수장의 슬러지 성분은 대부분 유기질로 구성되어 있다."],a:3,e:"③ 저탁도·조류 번성 시 발생 슬러지는 미세·경량 입자가 많아 침강·농축·탈수성이 나쁘다. ①은 발생량도 변하고, ②는 크게 영향받으며, ④는 대부분 무기질로 구성된다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:17,q:"유량이 96m³/d이고, 막 투과유속이 0.01m/h인 경우, 모듈당 막 면적이 40m²인 막모듈의 최소 필요 개수는? (막 여과장치 하루 가동시간 12시간)",c:["5","10","20","40"],a:3,e:"③ 시간당 처리량=96/12=8 m³/h. 필요 막면적=8/0.01=800 m². 모듈 수=800/40=20개."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:18,q:"강변여과수 내 망간 제거공정에 관한 설명으로 옳지 않은 것은?",c:["염소 산화 후 응집침전 여과","염소 산화 후 망간사 처리","과망간산칼륨 산화 후 응집침전 여과","폭기 후 응집침전 여과"],a:4,e:"④ 망간은 산화환원전위가 높아 단순 폭기(공기산화)만으로는 제거가 어렵다. 염소·과망간산칼륨 산화나 망간사 접촉산화가 효과적이며, '폭기 후 응집침전 여과'는 망간 제거공정으로 옳지 않다(폭기는 주로 철 제거)."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:19,q:"소독부산물(THMs) 발생 특성에 관한 설명으로 옳지 않은 것은?",c:["TOC 농도가 높을 때 THMs 농도가 증가한다.","처리수의 pH가 낮을 때 THMs 생성량이 증가한다.","온도가 높을 때 THMs 농도가 증가한다.","급배수관말에서 THMs 발생 가능성이 높다."],a:2,e:"② THMs는 pH가 높을수록 생성이 증가한다. 'pH가 낮을 때 증가'는 옳지 않다. (TOC·온도·접촉시간 증가 시 THMs 증가)"},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수처리공정",n:20,q:"역삼투막을 이용한 해수담수화의 전처리설비에 요구되는 SDI(Silt Density Index)는?",c:["4.0 이하","5.0 이하","6.0 이하","7.0 이하"],a:1,e:"① 역삼투(RO)막의 막오염 방지를 위해 공급수의 SDI는 통상 4.0 이하로 전처리하는 것이 요구된다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:21,q:"먹는물수질공정시험기준상 총칙에 관한 설명으로 옳지 않은 것은?",c:["각각의 시험은 따로 규정이 없는 한 상온에서 조작하고 조작 직후에 그 결과를 관찰한다.","시험조작 중 \"즉시\"란 10초 이내에 표시된 조작을 하는 것을 뜻한다.","\"약\"이라 함은 기재된 양에 대하여 ±10% 이상의 차가 있어서는 안 된다.","감압은 따로 규정이 없는 한 15mmHg 이하로 한다."],a:2,e:"② 시험조작 중 '즉시'는 30초 이내에 표시된 조작을 하는 것을 뜻한다. '10초 이내'는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:22,q:"먹는물수질공정시험기준상 시료를 4℃ 냉암소에 보관하지 않는 것은?",c:["세제","불소","암모니아성 질소","파라티온"],a:3,e:"③ 교재 정답표 기준 정답은 ③(암모니아성 질소)이다. 다만 일반적으로 불소(②)는 실온 보존이 가능하고 암모니아성 질소는 4℃·산처리 보존이 필요해 통념과는 차이가 있으니, 먹는물수질공정시험기준 보존방법 표로 직접 확인 권장(국립환경과학원 고시)."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:23,q:"먹는물수질공정시험기준상 상대검정곡선법에서 내부표준물질을 이용하여 보정하기 위한 오차에 해당하지 않는 것은?",c:["매질에서 발생하는 오차","시험분석 절차에서 발생하는 오차","기기변동으로 발생하는 오차","시스템의 변동으로 발생하는 오차"],a:1,e:"① 내부표준물질(상대검정곡선법)은 기기·시스템·분석절차의 변동 보정에 쓰인다. 매질(매트릭스) 효과로 인한 오차 보정은 표준물첨가법의 영역으로, 내부표준물질의 보정 대상이 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:24,q:"정수처리공정에서 생물처리로 처리할 수 있는 항목으로 옳지 않은 것은?",c:["곰팡이 냄새","음이온 계면활성제","휘발성유기물","암모니아성질소"],a:3,e:"③ 생물처리(생물막)는 곰팡이냄새(지오스민·2-MIB), 음이온계면활성제, 암모니아성질소, 철·망간 등을 제거한다. 휘발성유기물(VOC)은 생물처리로 제거가 어려워(폭기·활성탄 적용) 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:25,q:"유입원수량이 1,000m³/h인 정수장에서 용해율 96%인 응집제의 자-테스트 결과 주입률이 20mg/L일 때, 응집제 투입량(kg/d)은?",c:["19","21","461","500"],a:4,e:"④ 유량=1,000 m³/h=24,000 m³/d. 순 주입량=20×24,000=480,000 g/d=480 kg/d. 용해율 96% 보정 시 실제 투입량=480/0.96=500 kg/d."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:26,q:"오존처리 공정의 오존전달효율이 80%이다. 주입오존량이 5.0mg/L, 잔류오존량이 0.2mg/L일 때, 배오존량(mg/L)은?",c:["0.80","1.25","3.80","3.84"],a:1,e:"① 전달(소비)오존=주입×효율=5.0×0.8=4.0. 배오존=주입-잔류-소비=5.0-0.2-4.0=0.8 mg/L."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:27,q:"활성탄 역세척에 관한 설명으로 옳은 것은?",c:["입상활성탄의 팽창률은 수온과는 무관하다.","활성탄지의 적정 역세척 속도는 모래여과지보다 높다.","활성탄지에서 미생물·미소동물 번식을 고려하여 세척빈도를 높일 경우 활성탄 처리효과가 현저히 저하된다.","물에 의한 역세척만으로 불충분할 경우 공기세척을 병용하는 방식이 효과적이다."],a:4,e:"④ 물 역세척만으로 부족하면 공기세척을 병용하는 것이 효과적이다. ①은 팽창률이 수온(점도)에 영향받고, ②는 활성탄이 가벼워 역세척 속도가 모래보다 낮으며, ③은 적정 세척으로 처리효과가 유지된다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:28,q:"먹는물수질공정시험기준상 총대장균군-효소기질이용법 결과표기. 수돗물·먹는물공동시설은 '불검출/(ㄱ)', 샘물·먹는샘물·해양심층수·염지하수·먹는염지하수는 '불검출/(ㄴ)'으로 표기할 때 (ㄱ),(ㄴ)은?",c:["ㄱ:mL, ㄴ:100mL","ㄱ:mL, ㄴ:250mL","ㄱ:100mL, ㄴ:100mL","ㄱ:100mL, ㄴ:250mL"],a:4,e:"④ 수돗물·먹는물공동시설은 100mL 기준(불검출/100mL), 샘물·먹는샘물·해양심층수·염지하수 등은 250mL 기준(불검출/250mL)으로 표기한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:29,q:"먹는물수질공정시험기준에서 분석항목과 측정방법이 옳게 연결된 것은?",c:["붕소 - 자외선/가시선 분광법","비소 - 양극벗김전압전류법","카바릴 - 질산은 적정법","납 - EDTA 적정법"],a:1,e:"① 붕소는 자외선/가시선 분광법으로 측정한다. 비소는 수소화물생성-원자흡광/ICP, 카바릴은 액체크로마토그래피(HPLC), 납은 원자흡광·ICP 등으로 측정한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:30,q:"먹는물 수질감시항목 운영 등에 관한 고시상 상수원수의 항목 중 평상시 검사주기가 가장 긴 것은?",c:["Corrosion Index","Microcystin-LR","Geosmin","2-MIB"],a:2,e:"② 교재 정답표 기준 정답은 ②(Microcystin-LR)이다. Geosmin·2-MIB는 맛·냄새 관리로 검사주기가 짧은 편이다. 항목별 정확한 평상시 검사주기는 환경부 '먹는물 수질감시항목 운영 고시' 별표로 확인 권장."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:31,q:"광역상수도인 정수장에서 수질검사 항목과 검사 횟수가 옳게 연결된 것은?",c:["잔류염소 - 매일 1회 이상","과망간산칼륨 소비량 - 매월 1회 이상","총트라이할로메탄 - 매분기 1회 이상","망간 - 매반기 1회 이상"],a:1,e:"① 잔류염소는 매일 1회 이상 검사한다. 과망간산칼륨소비량은 매주 1회 이상, 총트라이할로메탄은 매월 1회 이상 등으로 ②③④의 연결은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:32,q:"소독설비에서 소독능 계산값(CT계산값)에 관한 설명으로 옳지 않은 것은?",c:["재염소투입으로 CT계산값이 감소되는 효과가 있다.","잔류소독제의 농도와 접촉시간에 비례한다.","CT계산값은 미생물의 종에 따라 달라진다.","CT계산값은 상수이다."],a:1,e:"① 재염소(중간 재투입)는 잔류소독제 농도를 높여 CT계산값을 오히려 증가시킨다. '감소'는 옳지 않다. (CT계산값=잔류소독제농도 C × 접촉시간 T)"},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:33,q:"상수원수의 수질자료를 해석하는 방법으로 주기특성의 해석 및 시계열의 해석방법이 아닌 것은?",c:["Power Spectrum","자기상관계수","Cluster 분석","Fourier 해석"],a:3,e:"③ Power Spectrum·자기상관계수·Fourier 해석은 주기·시계열 해석방법이다. Cluster(군집) 분석은 자료 분류·유형화 방법으로 주기/시계열 해석방법이 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:34,q:"먹는물관리법령상 시·도지사가 샘물보전구역을 지정 또는 변경지정을 하고자 할 때 고려하여야 할 사항으로 옳지 않은 것은?",c:["샘물의 수질 특성 및 오염 상태","샘물의 부존 특성 및 이용 실태","해당 지역의 지질 특성 및 지하수 이동속도","해당 지역 주민거주 현황"],a:4,e:"④ 샘물보전구역 지정 고려사항은 샘물의 수질·오염 상태, 부존 특성·이용 실태, 지질 특성·지하수 이동속도 등이다. '주민거주 현황'은 고려사항으로 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:35,q:"하천법상 국가하천으로 지정받을 수 있는 하천은?",c:["유역면적 합계가 100km²인 하천","다목적댐의 하류 및 댐 저수지로 인한 배수영향이 미치는 상류의 하천","유역면적 합계가 50km²인 하천으로서 인구 10만 명인 도시를 관류하는 하천","유역면적 합계가 30km²인 하천으로서 범람구역 안의 인구가 1만 명인 지역을 지나는 하천"],a:2,e:"② 다목적댐의 하류 및 댐 저수지 배수영향이 미치는 상류 하천은 국가하천 지정 대상이다. 유역면적 단독 기준(200km² 이상)이나 인구 규모 기준(20만 명 이상 도시 관류 등)에 ①③④는 미달한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:36,q:"먹는물 수질기준 및 검사 등에 관한 규칙상 검사결과 보존에 관한 내용이다. 수질검사결과는 (ㄱ)년, 건강검사결과는 (ㄴ)년간 보존하여야 할 때 (ㄱ),(ㄴ)은?",c:["ㄱ:2, ㄴ:3","ㄱ:3, ㄴ:2","ㄱ:3, ㄴ:3","ㄱ:5, ㄴ:5"],a:2,e:"② 수질검사결과는 3년, 건강검진(건강검사) 결과는 2년간 보존한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:37,q:"수질오염공정시험기준상 인산염인 분석방법이 아닌 것은?",c:["아스코르빈산환원법","이온전극법","자외선/가시선 분광법","이염화주석환원법"],a:2,e:"② 인산염인은 아스코르빈산환원법, 자외선/가시선 분광법, 이염화주석환원법 등으로 분석한다. 이온전극법은 인산염인 분석방법이 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:38,q:"수도법상 수도시설의 관리에 관한 교육 대상자로 옳지 않은 것은?",c:["저수조청소업자","일반수도사업자","공업용수도사업자","상수도관망관리대행업자"],a:3,e:"③ 수도시설 관리 교육 대상은 일반수도사업자, 저수조청소업자, 상수도관망관리대행업자 등이다. 공업용수도사업자는 교육 대상으로 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:39,q:"수도법령상 수도시설의 세부 시설기준에 관한 설명으로 옳지 않은 것은?",c:["지표수의 취수시설은 연중 계획된 1일 최대취수량을 취수할 수 있어야 한다.","저수시설은 갈수기에는 계획된 1일 최대급수량을 취수할 수 있는 저수용량을 갖추지 않아도 된다.","송수시설은 이송과정에서 정수된 물이 외부로부터 오염되지 아니하도록 관수로 등의 구조로 하여야 한다.","정수시설은 소독제로 액화염소를 사용하는 경우에는 중화설비를 설치하여야 한다."],a:2,e:"② 저수시설은 갈수기에도 계획취수량을 확보할 수 있는 저수용량을 갖추어야 한다. '갖추지 않아도 된다'는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수질분석및관리",n:40,q:"수도법령상 일반수도사업자가 수돗물의 공급규정을 정하여 인가관청에 승인신청을 받고자 할 때 신청서에 포함되어야 할 내용으로 옳지 않은 것은?",c:["원가계산","수요예측","급수절차","수질검사성적서"],a:4,e:"④ 공급규정 승인신청서에는 원가계산, 수요예측, 급수절차, 요금산정 등이 포함된다. 수질검사성적서는 포함 내용으로 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:41,q:"배출수 및 슬러지 처리에 관한 설명으로 옳은 것은?",c:["슬러지처리를 통하여 발생되는 케이크는 일반폐기물에 해당된다.","정수장에 인접한 하수처리시설이 있는 경우 관련 부서와 협의하여 하수처리시설로 이송하여 처리할 수 있다.","배슬러지지의 상징수는 정수공정으로 반송하여 재이용한다.","상수도 시설에서 발생되는 슬러지의 기본적인 처리방법은 위생매립이다."],a:2,e:"② 인접 하수처리시설이 있으면 관련 부서와 협의해 이송·처리할 수 있다. ①은 케이크가 일반폐기물로 단정되지 않고, ③은 상징수의 정수공정 직접 반송은 수질에 따라 제한되며, ④의 기본 처리방법은 농축·탈수이다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:42,q:"침전지 슬러지 배출설비에 관한 설명으로 옳지 않은 것은?",c:["슬러지 배출설비는 침전지의 구조와 유지관리 등을 고려하여 선정한다.","배출밸브는 정전 등의 사고가 있을 때 열림 상태가 되도록 한다.","슬러지 배출방식에는 기계식 제거방식, 슬러지 흡입방식 등이 있다.","고속응집침전지의 슬러지 배출설비는 침전지 내 잉여슬러지를 수시 또는 일정한 간격으로 배출할 수 있는 구조로 한다."],a:2,e:"② 정전 등 사고 시 배출밸브가 '열림'이 되면 침전수가 유실되므로, 안전을 위해 '닫힘' 상태가 되도록 해야 한다. ②가 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:43,q:"가압탈수설비의 여과포 선정 시 고려할 사항으로 옳은 것을 모두 고른 것은? ㄱ.강도 ㄴ.재생가능 여부 ㄷ.내산성 ㄹ.내알칼리성 ㅁ.내구성 ㅂ.여과속도",c:["ㄱ, ㄴ, ㄷ","ㄷ, ㄹ, ㅁ, ㅂ","ㄱ, ㄴ, ㄹ, ㅁ, ㅂ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ, ㅂ"],a:4,e:"④ 여과포는 강도·재생가능 여부·내산성·내알칼리성·내구성·여과속도를 모두 고려하여 선정한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:44,q:"정수공정별 설비의 제어에 관한 설명으로 옳지 않은 것은?",c:["배슬러지는 수동 배슬러지제어를 원칙으로 한다.","분말활성탄 흡착설비의 계측제어기기와 주입기기는 방진성, 방폭성 등을 고려한다.","용존공기부상지 설비는 자동운전을 가능하게 한다.","역삼투설비의 운전제어는 전처리와 본처리 등과 연동할 수 있도록 한다."],a:1,e:"① 배슬러지는 자동 배슬러지제어를 원칙으로 한다. '수동 제어 원칙'은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:45,q:"막여과 정수시설의 후처리설비로 옳은 것은?",c:["오존·입상활성탄 설비","스크린설비","응집, 침전설비","전염소 주입설비"],a:1,e:"① 막여과 후처리(고도처리)로는 오존·입상활성탄 설비가 적합하다. 스크린·응집침전·전염소 주입은 막여과의 전처리설비에 해당한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:46,q:"플록형성지에 관한 설명으로 옳지 않은 것은?",c:["교반설비는 수질변화에 따라 교반강도를 조절할 수 있는 구조로 한다.","미소플록을 성장시키기 위한 기계식 교반설비가 필요하다.","교반강도는 하류로 갈수록 점차 증가시키는 것이 바람직하다.","야간에 플록형성상태를 감시할 수 있는 적절한 조명장치를 설치한다."],a:3,e:"③ 교반강도(G값)는 하류로 갈수록 점차 '감소'시켜 형성된 플록의 파괴를 막는 것(테이퍼드 응집)이 바람직하다. '증가'는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:47,q:"분말활성탄설비에 관한 설명으로 옳은 것은?",c:["주입설비실은 가능한 주입장소와 멀리 떨어진 곳에 설치한다.","주입량은 처리수량을 주입률로 나누어 결정한다.","저장설비를 설치하는 건물은 내화성 구조로 한다.","슬러리농도는 10~15%(건조환산한 값)를 표준으로 한다."],a:3,e:"③ 분말활성탄은 분진폭발 위험이 있어 저장설비 건물은 내화성 구조로 한다. ①은 주입장소와 가까이 설치, ②는 주입량=처리수량×주입률, ④는 슬러리농도 표준값이 더 낮은 수준이다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:48,q:"베인(Vane)의 양력작용에 의하여 임펠러 내의 물에 압력과 속도에너지를 주고 가이드베인으로 속도에너지의 일부를 압력으로 변환하여 양수작용을 하는 펌프로 옳은 것은?",c:["원심펌프","축류펌프","사류펌프","벌류트펌프"],a:2,e:"② 프로펠러(베인)의 양력으로 양수하고 가이드베인(안내깃)으로 속도에너지를 압력으로 변환하는 펌프는 축류펌프이다. (저양정·대유량에 적합)"},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:49,q:"정수시설의 슬러지배출용 밸브로 옳지 않은 것은?",c:["다이아프램밸브","공기밸브","편심밸브","핀치밸브"],a:2,e:"② 슬러지배출용으로는 다이아프램밸브·편심밸브·핀치밸브 등이 쓰인다. 공기밸브는 관로 내 공기 배출·흡입용으로 슬러지배출용 밸브가 아니다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:50,q:"펌프의 규정속도(N)를 규정 이외의 회전속도(N')로 변경할 경우 이에 관한 설명으로 옳지 않은 것은?",c:["유량은 회전수 비(N'/N)에 비례한다.","양정은 회전수 비(N'/N)의 2승에 비례한다.","축동력은 회전수 비(N'/N)의 3승에 비례한다.","실제 적용 시 규정 이외의 회전속도는 규정회전속도의 1.5~3배의 범위이다."],a:4,e:"④ 상사법칙상 유량∝N, 양정∝N², 축동력∝N³이다(①②③ 옳음). 실제 적용 회전속도는 규정의 약 ±20% 범위이며 '1.5~3배'는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:51,q:"전자식유량계 설치 시 유의할 사항으로 옳지 않은 것은?",c:["구경은 평균유속이 3~5m/s 사이에 있도록 선정하는 것이 바람직하며, 3m/s 미만이면 기전력이 작고 정밀도상 문제가 생기기 쉽다.","검출기 설치 전후에 필요한 직관부를 확보하고, 유량제어밸브를 설치할 경우에는 검출기 하류측에 설치한다.","검출기를 수직 또는 경사지게 설치할 경우 흐름은 아래쪽에서 위쪽으로 향하도록 한다.","검출기는 유체의 도전율이 불균일한 약품주입지점의 직후는 피해야 한다."],a:1,e:"① 전자식유량계는 저유속에서도 측정이 가능한 것이 장점으로, 권장 유속은 통상 1~3m/s 수준이다. '3~5m/s, 3m/s 미만이면 정밀도 문제'라는 설명은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:52,q:"감시조작설비에 관한 설명으로 옳지 않은 것은?",c:["데이터서버(Data Server)는 운전 감시에 필요한 모든 정보를 화면상에 임의로 표시하는 기능을 수행한다.","중앙제어반(Central Operation Station)은 운전조작 기능과 데이터베이스 기능을 수행한다.","현장제어반(Field Control Station)은 현장의 단위공정 제어에 운전조작 기능과 데이터베이스 기능을 수행한다.","엔지니어링반(Engineering Work Station)은 전체 시스템 운영에 필요한 엔지니어링 데이터를 생성·변경·저장하는 스테이션이다."],a:1,e:"① 데이터서버는 데이터의 수집·저장·관리를 담당한다. 화면상에 정보를 임의로 표시하는 것은 운전자 스테이션(HMI)의 기능으로, ①의 설명은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:53,q:"지시·기록용 기기를 선정하고 설치할 때 유의사항으로 옳지 않은 것은?",c:["구조나 원리가 간단하고 교정보수가 용이한 기기를 선정한다.","기록방식은 사용목적이나 유지관리를 고려하여 선정한다.","설치장소는 진동이나 충격이 없고 전기적 유도장해가 충분한 곳이 바람직하다.","지시계와 기록계의 전원방식은 통일하여야 한다."],a:3,e:"③ 설치장소는 진동·충격이 없고 전기적 유도장해가 '없는' 곳이 바람직하다. '유도장해가 충분한 곳'은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:54,q:"정수시설의 감시제어설비에서 장비와 네트워크의 연결, 다른 네트워크와의 연결, 신호 증폭 기능 등의 역할을 하는 접속장비는?",c:["라우터(Router)","게이트웨이(Gateway)","허브(Hub)","리피터(Repeater)"],a:3,e:"③ 교재 정답표 기준 정답은 ③(허브)이다. 허브는 다수 장비를 네트워크에 연결하는 집선장치이며, 일반적으로 다른 네트워크 연결은 라우터, 신호 증폭은 리피터가 담당하므로 항목별 기능은 별도 확인 권장."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:55,q:"수변전설비 중 직류전원장치에 관한 설명으로 옳지 않은 것은?",c:["차단기 등의 제어 전원으로 사용된다.","보호계전기, 표시등, 비상조명용 전원으로 사용된다.","충전장치는 부동충전방식을 사용하고 적당한 고조파 방지대책을 수립한다.","용도별, 뱅크별, 동력별로 구분하여 설치한다."],a:4,e:"④ 직류전원장치는 제어·보호·비상조명용 전원으로 통합 설치된다. '용도별·뱅크별·동력별 구분 설치'는 변압기(수전설비)에 해당하는 설명으로 직류전원장치에는 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:56,q:"3상 변압기의 병렬운전이 가능한 결선 조합은?",c:["Δ-Δ와 Δ-Y","Δ-Δ와 Y-Δ","Y-Y와 Δ-Δ","Y-Y와 Δ-Y"],a:3,e:"③ 병렬운전은 두 변압기의 위상변위가 같아야 한다. Y-Y와 Δ-Δ는 모두 위상차 0°로 병렬운전이 가능하다. Δ-Y처럼 30° 위상차가 생기는 조합과는 병렬운전할 수 없다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:57,q:"22.9kV, 600kVA, 지상역률 75%의 부하설비를 지상역률 95%로 개선하려고 할 때 소요되는 전력용콘덴서 용량(kVar)은?",c:["216.48","248.95","287.62","332.93"],a:2,e:"② 유효전력 P=600×0.75=450 kW. Qc=P(tanθ₁-tanθ₂)=450×(tan(cos⁻¹0.75)-tan(cos⁻¹0.95))≈450×(0.882-0.329)≈248.95 kVar."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:58,q:"고압가스안전관리법령상 안전설비로 옳지 않은 것은?",c:["독성가스 검지기","독성가스 스크러버","펌프","밸브"],a:3,e:"③ 독성가스 검지기·스크러버(제독설비)는 안전설비에 해당한다. 펌프는 일반 기계설비로 고압가스 안전설비로 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:59,q:"산업안전보건법령상 안전보건표지의 종류로서 옳은 것을 모두 고른 것은? ㄱ.주의표시 ㄴ.경고표시 ㄷ.금지표시 ㄹ.지시표시",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ"],a:4,e:"④ 안전보건표지의 종류는 금지표지·경고표지·지시표지·안내표지이다. '주의표시'는 종류에 없으므로 ㄴ(경고)·ㄷ(금지)·ㄹ(지시)을 고른 ④가 옳다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"설비운영",n:60,q:"산업안전보건법령상 \"중대재해\"에 해당하는 사례를 모두 고른 것은? ㄱ.사망자 2명 발생 ㄴ.1개월 요양 부상자 1명 발생 ㄷ.부상자 동시 20명 발생 ㄹ.직업상 질병자 동시 20명 발생",c:["ㄴ","ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:3,e:"③ 중대재해는 ①사망자 1명 이상, ②3개월 이상 요양 부상자 동시 2명 이상, ③부상자·직업성질병자 동시 10명 이상이다. ㄱ(사망 2명)·ㄷ(부상 20명)·ㄹ(질병 20명)이 해당하고, ㄴ(1개월 요양 1명)은 미해당."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:61,q:"직경이 200mm이고 길이는 100m인 관에 2m/s의 평균유속으로 물이 흐를 때 마찰손실수두가 5m이었다. 마찰손실계수(f)와 마찰속도(u*)는? (중력가속도 9.8m/s²)",c:["f=0.049, u*=0.16m/s","f=0.074, u*=0.19m/s","f=0.098, u*=0.22m/s","f=0.147, u*=0.32m/s"],a:1,e:"① hf=f(L/D)(V²/2g) → 5=f×(100/0.2)×(2²/(2×9.8)) → f=5/102≈0.049. u*=√(g·R·I), R=D/4=0.05, I=hf/L=0.05 → u*=√(9.8×0.05×0.05)≈0.16 m/s."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:62,q:"다음 중 FLT계 차원과 MLT계 차원이 같은 것은? ㄱ.가속도 ㄴ.표면장력 ㄷ.동점성계수 ㄹ.운동량 ㅁ.압력 ㅂ.에너지",c:["ㄱ, ㄷ","ㄱ, ㄹ","ㄴ, ㅁ","ㄷ, ㅂ"],a:1,e:"① FLT계와 MLT계의 차원이 같은 것은 질량/힘이 포함되지 않는 운동학적 양이다. 가속도(LT⁻²)와 동점성계수(L²T⁻¹)가 양 체계에서 동일하다. 표면장력·운동량·압력·에너지는 F 또는 M이 들어가 달라진다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:63,q:"지름이 3cm인 비누풍선 속의 내부와 외부의 압력 차이가 0.09gf/cm²일 때, 비누풍선의 표면장력(gf/cm)은?",c:["0.0338","0.0675","0.1010","0.1350"],a:2,e:"② 교재 정답표 기준 정답은 ②이다. T=ΔP·D/4=0.09×3/4=0.0675 gf/cm로 계산된 값이다. (참고: 막이 2겹인 비눗방울에 ΔP=8T/D를 적용하면 0.0338(①)이 되므로, 적용 공식에 따라 값이 달라지는 점은 유의)"},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:64,q:"관수로 흐름의 마찰손실수두와 관련하여 옳지 않은 것은?",c:["속도수두에 비례한다.","관경에 비례한다.","관로 길이에 비례한다.","마찰손실계수에 비례한다."],a:2,e:"② hf=f(L/D)(V²/2g)에서 마찰손실수두는 관경(D)에 반비례한다. '관경에 비례'는 옳지 않다. (속도수두·관로 길이·마찰손실계수에는 비례)"},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:65,q:"수심 A인 수조에 직경 12cm인 사이펀이 설치되어 있고, 관 최상단은 수조 바닥 기준면과 같은 높이이다. 유출구 Q로부터 사이펀 정점까지의 높이가 B일 때, 사이펀을 통해 흐르는 유속이 가장 큰 경우는? (에너지손실 무시)",c:["A=3m, B=5m","A=5m, B=7m","A=7m, B=9m","A=6m, B=12m"],a:3,e:"③ 유출 유속 v=√(2g·H)이며 구동수두 H는 수면과 유출구 Q의 낙차(=A)에 해당한다. 정점높이가 대기압 한계 내라면 A가 가장 큰 ③(A=7m)에서 유속이 가장 크다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:66,q:"에너지보정계수(α)와 운동량보정계수(β)에 관한 설명으로 옳지 않은 것은?",c:["이상유체의 흐름이 균일 유속분포일 때 α는 1이다.","실제유체의 흐름일 경우 β는 1보다 큰 값을 가진다.","β는 속도수두를 보정하기 위한 무차원 상수이다.","실제유체의 흐름일 경우 α는 1보다 큰 값을 가진다."],a:3,e:"③ 속도수두(운동에너지)를 보정하는 계수는 에너지보정계수 α이다. β(운동량보정계수)는 운동량을 보정하는 계수이므로 '속도수두를 보정'한다는 설명은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:67,q:"유량계에 관한 설명으로 옳지 않은 것은?",c:["벤투리미터는 축소 전후 단면 간의 압력수두차를 측정하여 유량을 계산하는 데 사용된다.","엘보미터에서는 90° 만곡관 내측과 외측에서 압력수두차를 측정하여 유량을 계산한다.","오리피스 유량계는 관내 흐름 단면을 축소시켜 그 전후의 압력차를 이용해 유량을 측정하는 기구이다.","노즐은 벤투리미터와 유사하지만 확대부가 없어서 비경제적인 단점이 있다."],a:4,e:"④ 노즐은 벤투리미터와 유사하나 확대부(디퓨저)가 없어 구조가 간단하고 오히려 경제적이다. '비경제적'이라는 설명은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:68,q:"입자의 제1형 독립침전과 관련된 스토크스(Stokes)의 법칙에 관한 설명으로 옳은 것은?",c:["입자의 항력계수가 입자의 모양과 레이놀즈수의 영향을 동시에 받는 경우에 적용할 수 있다.","침강속도는 입자와 액체의 비중 차에 반비례한다.","수온이 높을수록 침강속도는 느려진다.","침강속도는 입자 직경의 제곱에 비례하고, 액체의 점성에는 반비례한다."],a:4,e:"④ 스토크스 침강속도 vs=g(ρs-ρ)d²/(18μ)로 입자 직경의 제곱에 비례하고 점성에 반비례한다. ①은 Re<1 층류(항력계수 24/Re)에 적용, ②는 비중 차에 비례, ③은 수온↑→점성↓→침강속도↑이다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:69,q:"관수로 흐름의 에너지손실에 관한 설명으로 옳지 않은 것은?",c:["마찰손실은 유체의 점성 때문에 발생하며 미소손실이라고도 한다.","관수로의 출구부가 저수지나 수조로 연결되는 경우, 단면급확대손실계수는 1.0이다.","밸브는 관로의 유량을 조절하기 위한 부속물로 밸브의 종류 및 개방 정도에 따라 에너지손실이 다양하게 나타난다.","단면점확대손실계수는 1.0보다 큰 값을 가질 수도 있다."],a:1,e:"① 마찰손실은 주손실(major loss)이다. 미소손실(부차적 손실, minor loss)은 밸브·곡관·단면변화 등에서 생기는 손실로, 마찰손실을 '미소손실'이라 한 ①의 설명은 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:70,q:"길이 50m, 폭 20m, 유효수심 4m의 제원을 갖는 장방형침전지에서 입자의 침강속도가 2cm/min인 경우, 입자의 완전제거를 위한 유량(m³/d)은? (스토크스 제1형 독립침전)",c:["480","2,000","14,400","28,800"],a:4,e:"④ 완전제거 조건은 표면부하율=침강속도. 표면적 A=50×20=1,000 m². vs=2cm/min=0.02 m/min=28.8 m/d. Q=vs×A=28.8×1,000=28,800 m³/d. (유효수심은 무관)"},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:71,q:"개수로 흐름에 관한 설명으로 옳은 것은?",c:["일정한 비에너지에 대해 한계류(Critical Flow)에서 유량이 최대이다.","사류(Supercritical Flow)에서는 수심이 증가할수록 비에너지가 증가한다.","상류(Subcritical Flow)에서는 수심이 증가할수록 비에너지가 감소한다.","상류(Subcritical Flow)에서 사류(Supercritical Flow)로 흐름이 전환될 때 도수(Hydraulic Jump)현상을 수반한다."],a:1,e:"① 일정 비에너지에서 한계수심일 때 유량이 최대이다. ②는 사류에서 수심 증가 시 비에너지 감소, ③은 상류에서 수심 증가 시 비에너지 증가, ④는 도수가 사류→상류 전환 시 발생한다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:72,q:"수면차가 20m인 두 수조가 길이 200m, 직경 300mm의 단일관으로 연결되어 있을 때 관로의 단면평균유속(m/s)은? (마찰손실계수 0.025, 단면급확대·급축소손실계수 각각 1.0과 0.5, g=9.8m/s²)",c:["2.33","4.65","9.30","16.17"],a:2,e:"② H=(fL/D+ΣK)V²/2g. fL/D=0.025×200/0.3≈16.67, ΣK=1.0+0.5=1.5, 합 18.17. 20=18.17×V²/19.6 → V²≈21.6 → V≈4.65 m/s."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:73,q:"직경 200mm의 관로가 직경 500mm로 급확대될 때, 유량이 0.2m³/s라면 단면급확대로 인한 손실수두(m)는? (g=9.8m/s²)",c:["0.04","0.74","1.46","2.14"],a:3,e:"③ 급확대손실 hL=(V₁-V₂)²/2g. V₁=0.2/(π/4×0.2²)≈6.37, V₂=0.2/(π/4×0.5²)≈1.02. hL=(6.37-1.02)²/19.6≈1.46 m."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:74,q:"수평하게 설치된 직경 300mm인 원형관에 물이 흐르고 있다. 벽면에서 마찰응력이 20N/m²이라면, 200m를 흐르는 동안 벽면 마찰로 인한 압력강하량(kPa)은?",c:["13.33","26.67","53.33","106.67"],a:3,e:"③ 힘 균형 ΔP·(πD²/4)=τ₀·(πD·L) → ΔP=4τ₀L/D=4×20×200/0.3=53,333 Pa≈53.33 kPa."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:75,q:"A 정수장과 B 배수지의 수면표고가 각각 20m, 50m이고 86,400m³/d를 송수한다. 송수 에너지손실 12m, 펌프효율 75%일 때 소요동력(kW)은? (물 단위중량 1,000kgf/m³, g=9.8m/s²)",c:["290.2","372.0","474.1","548.8"],a:4,e:"④ 전양정 H=(50-20)+12=42 m. Q=86,400 m³/d=1 m³/s. P=9.8×Q×H/η=9.8×1×42/0.75≈548.8 kW."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:76,q:"계획급수인구 80,000명, 계획 1인 1일 최대급수량 180L인 A 도시 정수장에 여과속도 120m/d인 급속여과지를 설치할 때 여과지의 소요면적(m²)은?",c:["40","60","90","120"],a:4,e:"④ 계획 1일 최대급수량=80,000×180 L=14,400 m³/d. 여과면적=Q/여과속도=14,400/120=120 m²."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:77,q:"A 펌프장에서 최고 효율점의 양수량이 660m³/h, 전양정이 10m, 회전속도가 1,000rpm인 조건으로 운영되는 경우 펌프의 비속도(Ns)는?",c:["480","590","660","880"],a:2,e:"② Ns=N·Q^0.5/H^0.75. Q=660 m³/h=11 m³/min. Ns=1,000×√11/10^0.75≈1,000×3.317/5.623≈590."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:78,q:"펌프계의 수격작용에 관한 설명으로 옳은 것은?",c:["펌프 급정지, 급가동 또는 밸브 급폐쇄로 인해 관내 물의 속도가 급격히 변할 때 일어난다.","수격현상은 관경이 클수록 일어나기 쉽다.","펌프의 내부에서 물이 기화되면서 공동이 생기는 현상이다.","수격작용을 경감시키기 위해 착수정을 설치한다."],a:1,e:"① 수격작용은 펌프 급정지·급가동·밸브 급폐쇄 등으로 관내 유속이 급변할 때 발생한다. ②는 관경이 작을수록(유속이 클수록) 심하고, ③은 공동현상(cavitation) 설명이며, ④의 경감대책은 조압수조(서지탱크)·플라이휠 등이다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:79,q:"펌프의 공동현상(Cavitation) 방지 대책으로 옳지 않은 것은?",c:["흡입관의 손실을 작게 한다.","펌프의 설치위치를 낮춘다.","펌프의 회전속도를 높게 선정한다.","흡입측 밸브를 완전히 개방하여 펌프를 운전한다."],a:3,e:"③ 회전속도를 높이면 흡입측 압력이 더 낮아져 공동현상이 심해진다. 회전속도는 '낮게' 선정해야 하므로 ③이 옳지 않다."},
{g:"ex33_2",gt:"제33회 2급 기출문제 (2023)",s:"수리학",n:80,q:"펌프특성곡선에서 확인할 수 없는 항목은?",c:["전양정","레이놀즈수","효율","축동력"],a:2,e:"② 펌프특성곡선은 유량에 따른 전양정·효율·축동력(및 NPSH) 변화를 나타낸다. 레이놀즈수는 펌프특성곡선에서 확인할 수 있는 항목이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:1,q:"pH 조정제가 아닌 것은?",c:["소석회","황산","액체수산화나트륨","황산알루미늄"],a:4,e:"④ 소석회·수산화나트륨(상향), 황산(하향)은 pH 조정제이다. 황산알루미늄(alum)은 응집제로 pH 조정제가 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:2,q:"응집제의 급속혼화 방법으로 옳은 것을 모두 고른 것은? ㄱ.인라인 고정식 혼화 ㄴ.전기분해식 혼화 ㄷ.기계식 혼화 ㄹ.흡착식 혼화",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:2,e:"② 급속혼화 방법에는 기계식 혼화, 인라인(관내) 고정식 혼화, 펌프혼화, 우류식 등이 있다. 전기분해식·흡착식은 급속혼화 방법이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:3,q:"처리유량이 120,000m³/d, 유효수심 4m, 체류시간이 3시간인 횡류식 침전지의 소요면적(m²)은?",c:["1,250","3,750","5,000","10,000"],a:2,e:"② 용적 V=Q×t=120,000×(3/24)=15,000 m³. 면적 A=V/수심=15,000/4=3,750 m²."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:4,q:"단층 급속여과지의 표준 여과속도(m/d)는?",c:["120 이하","120~150","150~200","200~300"],a:2,e:"② 단층 급속여과지의 표준 여과속도는 120~150 m/d이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:5,q:"급속여과지에서 세척효과가 불충분할 경우에 나타나는 현상이 아닌 것은?",c:["여과지속시간의 감소","머드볼의 발생","여과층 표면의 균일","여과수질의 악화"],a:3,e:"③ 세척 불충분 시 여과지속시간 감소·머드볼 발생·여과수질 악화·여과층 표면의 불균일(크랙)이 나타난다. '표면의 균일'은 해당하지 않는다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:6,q:"급속여과지에 관한 설명으로 옳지 않은 것은?",c:["여과지 1지의 여과면적은 200m² 이상으로 한다.","여과지 수는 예비지를 포함하여 2지 이상으로 한다.","형상은 직사각형을 표준으로 한다.","여과지 수가 10지를 넘을 경우 여과지 수의 1할 정도를 예비지로 한다."],a:1,e:"① 여과지 1지의 여과면적은 150m² 이하로 하는 것이 표준이다(균등 배분·세척 용이). '200m² 이상'은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:7,q:"급속여과지의 기능에 관한 설명으로 옳지 않은 것은?",c:["이온물질에 대한 억류기능","탁질의 양적인 억류기능","수질과 수량의 변동에 대한 완충기능","충분한 역세척기능"],a:1,e:"① 급속여과는 부유 탁질을 물리적으로 억류하는 기능을 하며, 용존 이온물질은 억류하지 못한다. '이온물질에 대한 억류기능'은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:8,q:"맛이나 냄새를 유발하는 생물학적 발생원이 아닌 것은?",c:["방선균","조류","황산염 환원균","질산화균"],a:4,e:"④ 방선균(지오스민)·조류(2-MIB)·황산염환원균(황화수소 냄새)은 맛·냄새의 생물학적 발생원이다. 질산화균은 암모니아 산화 미생물로 맛·냄새 발생원이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:9,q:"크립토스포리디움 난포낭 제거에 관한 대책으로 옳지 않은 것은?",c:["여과수 탁도를 상시 감시하고 가능한 낮게 유지해야 한다.","역세척 후 여과를 다시 시작할 때는 일정 시간동안 여과수를 배출하는 시동방수설비를 설치한다.","탁질 유출을 방지하기 위해 여과지속시간을 연장한다.","오존처리는 효과적인 소독법이다."],a:3,e:"③ 여과지속시간을 무리하게 연장하면 여과층이 파과되어 오히려 탁질(난포낭) 누출 위험이 커진다. '여과지속시간 연장'은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:10,q:"고도산화법(AOP)에서 오존(O₃)과 함께 사용할 수 있는 방법이나 약품으로 옳지 않은 것은?",c:["활성탄","High pH","H₂O₂","UV"],a:1,e:"① AOP는 O₃/H₂O₂, O₃/UV, O₃/High pH 등으로 OH라디칼을 생성한다. 활성탄은 흡착공정으로 표준 AOP 조합에 해당하지 않는다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:11,q:"병원성 미생물 제거율 및 불활성화비 계산방법에 관한 설명으로 옳은 것은?",c:["정수처리기준에서 바이러스 3log(99.9%), 지아디아 포낭 4log(99.99%) 제거가 요구된다.","불활성화비는 CT요구값을 CT계산값으로 나눈 값이다.","CT값을 향상시키기 위해 정수지 도류벽 추가설치 및 정수지 수위를 높게 유지한다.","추적자 시험의 경우 투입된 추적자의 20%가 정수지에서 유출되는 시간을 접촉시간으로 한다."],a:3,e:"③ 도류벽 추가·수위 상승으로 접촉시간(T)을 늘려 CT값을 높일 수 있다. ①은 바이러스 4log·지아디아 3log로 반대, ②는 불활성화비=CT계산값/CT요구값, ④는 T₁₀(추적자 10% 유출시간)을 접촉시간으로 한다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:12,q:"처리유량이 100,000m³/d, 염소요구량이 0.5mg/L일 때 주입되는 염소의 양이 100kg/d이면 잔류염소농도(mg/L)는?",c:["0.2","0.5","1.0","2.0"],a:2,e:"② 주입농도=염소량/유량=100,000 g/100,000 m³=1.0 mg/L. 잔류염소=주입농도-염소요구량=1.0-0.5=0.5 mg/L."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:13,q:"배오존 처리방법을 모두 고른 것은? ㄱ.활성탄흡착분해법 ㄴ.가열분해법 ㄷ.촉매분해법",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],a:4,e:"④ 배오존(off-gas) 처리법에는 가열분해법, 촉매분해법, 활성탄흡착분해법이 모두 사용된다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:14,q:"염소의 주입 및 제해설비에 관한 설명으로 옳은 것은?",c:["중화반응탑은 일반적으로 수산화나트륨 40% 이상 농도를 사용하여 염소가스를 중화시킨다.","염소용 배관은 내압력·내약품성 재료를 사용하고 있으므로 예비 배관은 필요하지 않다.","액화염소 사용량이 20kg/h 이상인 경우 원칙적으로 기화기를 사용한다.","배풍기는 누출된 염소가스를 신속히 대기로 확산·희석하기 위한 목적으로 설치된다."],a:3,e:"③ 액화염소 사용량이 많을 경우(20kg/h 이상) 원칙적으로 기화기를 사용한다. ②는 예비배관이 필요하고, ④의 배풍기는 누출가스를 제해(중화)설비로 보내는 목적이며, ①의 중화액 농도 기준은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:15,q:"오염물질 처리에 관한 설명으로 옳지 않은 것은?",c:["침식성 유리탄산을 많이 포함한 경우에는 폭기처리나 산처리를 한다.","플루오린을 감소시키기 위하여 응집침전, 활성알루미나, 골탄, 전해 등의 처리를 한다.","비소를 제거하기 위하여 응집처리를 한다.","휘발성 유기화합물을 저감시키기 위하여 입상활성탄처리를 한다."],a:1,e:"① 침식성 유리탄산(CO₂)이 많은 경우 폭기처리나 알칼리처리(소석회 등)를 한다. '산처리'는 오히려 부식성을 높이므로 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:16,q:"함수율이 90%인 침전슬러지 150m³을 탈수하여 함수율 75%를 얻었다. 탈수 후 슬러지 부피(m³)는? (비중 1, 고형물량은 탈수 전후 동일)",c:["40","50","60","70"],a:3,e:"③ 고형물량 보존: V₁(1-w₁)=V₂(1-w₂). 150×(1-0.90)=V₂×(1-0.75) → 15=0.25V₂ → V₂=60 m³."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:17,q:"정수장에서 발생되는 배출수 및 슬러지의 처리방법으로 옳은 것을 모두 고른 것은? ㄱ.자연건조 ㄴ.여과 ㄷ.기계탈수 ㄹ.하수처리장 이송처리 ㅁ.소독 ㅂ.탈수·열건조",c:["ㄴ, ㄷ, ㄹ","ㄴ, ㄹ, ㅁ","ㄱ, ㄷ, ㄹ, ㅂ","ㄱ, ㄷ, ㅁ, ㅂ"],a:3,e:"③ 배출수·슬러지 처리에는 자연건조·기계탈수·하수처리장 이송처리·탈수 및 열건조가 해당한다. 여과·소독은 정수처리 공정이며 슬러지 처리방법이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:18,q:"소독부산물의 생성 및 제어에 관한 설명으로 옳은 것은?",c:["자외선은 잔류효과가 없으며, 유해한 소독부산물을 생성하지 않는다.","소독부산물은 고도정수처리설의 처리대상 수질항목에 해당되지 않는다.","오존은 유해한 소독부산물을 생성할 가능성이 없다.","소독부산물 전구물질의 저감을 위하여 후염소처리를 한다."],a:1,e:"① 자외선(UV)은 잔류효과가 없고 화학적 소독부산물을 거의 생성하지 않는다. ②는 처리대상에 해당하고, ③은 오존도 브롬산염 등 부산물을 생성하며, ④는 전구물질 저감을 위해 전염소처리를 줄이고 활성탄·중간염소를 활용한다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:19,q:"입상활성탄 흡착설비에 관한 설명으로 옳지 않은 것은?",c:["흡착탑 또는 흡착지에 입상활성탄을 충전하고 여기에 처리할 물을 통과시킨다.","입상활성탄 공정은 혼화공정 전후에 위치하는 것이 일반적이다.","입상활성탄은 맛·냄새물질 등 다양한 유기물을 제거할 목적으로 사용할 수 있다.","흡착방식은 고정상식과 유동상식으로 분류된다."],a:2,e:"② 입상활성탄(GAC) 공정은 일반적으로 여과·오존 처리 이후의 정수처리 후반부에 위치한다. '혼화공정 전후'에 둔다는 설명은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수처리공정",n:20,q:"막여과 정수시설의 원수 전처리시설이 아닌 것은?",c:["협잡물 제거를 위한 스크린 또는 스트레이너설비","철, 망간 등의 산화를 위한 전염소 또는 전오존 주입설비","탁질 및 유기물 제거를 위한 응집, 침전, 여과설비","맛·냄새물질 등 미량유기물 등을 제거를 위한 입상활성탄 주입설비"],a:4,e:"④ 입상활성탄은 막여과 후단의 고도처리(후처리)에 해당한다. 스크린·전염소(전오존)·응집침전은 전처리시설이지만 입상활성탄은 전처리시설이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:21,q:"먹는물수질공정시험기준상 분석항목과 분석방법이 옳게 연결된 것은?",c:["경도 - EDTA 적정법","증발잔류물 - 유리전극법","세제(음이온 계면활성제) - OT 비색법","유기인계 농약 - 자외선/가시선 분광법"],a:1,e:"① 경도는 EDTA 적정법으로 측정한다. 증발잔류물은 중량법, 세제(음이온계면활성제)는 자외선/가시선 분광법, 유기인계 농약은 기체크로마토그래피로 측정한다."},

{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:23,q:"먹는물 시료 100mL를 0.002M 과망간산칼륨으로 적정해 15mL 소비, 바탕시험(정제수) 0.1mL 소비되었다면 시료의 과망간산칼륨 소비량(mg/L)은? (농도계수 f=0.95)",c:["35.4","44.7","51.8","63.7"],a:2,e:"② 소비량=(본시험-바탕)×f×0.316×(1000/시료량). 0.002M KMnO₄ 1mL=0.316mg. (15-0.1)×0.95×0.316×(1000/100)≈44.7 mg/L."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:24,q:"수질오염공정시험기준상 클로로필 a 분석절차 중 전처리에 관한 설명으로 옳은 것은?",c:["시료 적당량을 Gelman여과지(GF/E, 0.2μm)로 여과한다.","여과지와 염산(2+8) 적당량을 조직마쇄기에 함께 넣고 마쇄한다.","마쇄한 시료를 마개 있는 원심분리관에 넣고 밀봉하여 10℃ 어두운 곳에서 방치한다.","하룻밤 방치한 시료를 500g의 원심력으로 20분간 원심분리하거나 용매-저항 주사기로 여과한다."],a:4,e:"④ 방치한 시료를 500g로 20분간 원심분리(또는 용매저항 주사기 여과)한다. ①은 GF/C 여과지, ②는 90% 아세톤으로 마쇄, ③은 4℃ 어두운 곳 방치가 옳다."},

{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:34,q:"수도법령과 불활성화비 계산방법 및 정수처리 인증 등에 관한 규정에 대한 내용으로 옳은 것은?",c:["탁도기준을 준수한 막여과 방식 중 한외여과 바이러스 제거율이 가장 낮다.","병원성 미생물의 불활성화비 정수처리기준은 1 미만이다.","정수처리 인증을 받고자 하는 수도사업자는 환경부장관의 인증을 받아야 한다.","불활성화비 검사를 위한 수소이온농도의 검사 주기는 1일 1회 이상이다."],a:4,e:"④ 불활성화비 산정에 필요한 수소이온농도(pH)는 1일 1회 이상 검사한다. ②는 불활성화비 기준이 1 이상이어야 하고, ①③은 규정과 맞지 않는다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:35,q:"먹는물 수질기준 및 검사 등에 관한 규칙상 심미적 영향물질에 관한 기준 항목으로 옳지 않은 것은?",c:["알루미늄","동","붕소","과망간산칼륨 소비량"],a:3,e:"③ 심미적 영향물질에는 알루미늄·동·과망간산칼륨 소비량·색도·탁도·경도 등이 있다. 붕소는 건강상 유해영향 무기물질로 심미적 영향물질이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:36,q:"먹는물관리법에서 정의한 '먹는물'이 아닌 것은?",c:["샘물","먹는염지하수","수돗물","먹는해양심층수"],a:1,e:"① '샘물'은 가공 전 원수를 가리키며 그 자체는 먹는물에 해당하지 않는다(먹는샘물은 해당). 먹는염지하수·수돗물·먹는해양심층수는 먹는물에 포함된다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:37,q:"수도법상 일반수도에 해당하는 것을 모두 고른 것은? ㄱ.광역상수도 ㄴ.전용상수도 ㄷ.마을상수도 ㄹ.공업용수도 ㅁ.지방상수도 ㅂ.소규모 급수시설",c:["ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㅁ","ㄴ, ㄷ, ㅂ","ㄹ, ㅁ, ㅂ"],a:2,e:"② 일반수도는 광역상수도·지방상수도·마을상수도이다. 전용상수도는 전용수도, 공업용수도는 별도, 소규모 급수시설도 일반수도가 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:38,q:"먹는물 수질감시항목에 대한 평상시 검사주기가 가장 긴 항목은?",c:["Microcystin-LR","Geosmin","Antimony","Perchlorate"],a:3,e:"③ 교재 정답표 기준 정답은 ③(Antimony)이다. Geosmin·Microcystin-LR은 맛·냄새/조류 관리로 검사주기가 짧은 편이다. 항목별 평상시 검사주기는 환경부 '먹는물 수질감시항목 운영 고시'로 확인 권장."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:39,q:"수도법령상 정수처리기준에 관한 설명으로 옳은 것은?",c:["공업용 수도사업자는 수돗물이 병원성 미생물로부터 안전성이 확보되도록 환경부령으로 정하는 정수처리기준을 지켜야 한다.","정수처리기준의 적용구간은 착수정부터 정수장의 배수지 유출지점까지이다.","최초 인증 이후 정수처리기준의 인증주기는 3년이다.","소독에 의한 불활성화비의 검사 항목은 잔류소독제농도, 수소이온농도, 탁도이다."],a:3,e:"③ 교재 정답표 기준 정답은 ③이다. ①은 일반수도사업자에 적용되고, ④의 불활성화비 검사항목은 잔류소독제농도·pH·수온·접촉시간으로 '탁도'는 별도 항목이다. 세부 규정은 수도법 시행규칙 확인 권장."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수질분석및관리",n:40,q:"먹는물수질공정시험기준상 미생물 시험에서 막여과법을 사용하지 않는 항목은?",c:["시겔라","여시니아균","대장균","중온일반세균"],a:4,e:"④ 대장균·분원성대장균군·시겔라·여시니아 등은 막여과법으로 시험한다. 중온일반세균(일반세균)은 평판집락법(혼합희석/도말)으로 시험하므로 막여과법을 쓰지 않는다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:41,q:"침전지 배출수 및 슬러지 배출에 관한 설명으로 옳지 않은 것은?",c:["슬러지 배출밸브는 다이어프램밸브나 편심밸브 등이 사용된다.","배출관의 관경은 최소 150mm 이상으로 한다.","배출수 및 슬러지 배출은 반드시 펌프를 설치하여 배출한다.","배수관의 상단은 바닥보다 관경의 2배 이상 낮게 설치한다."],a:3,e:"③ 배출수·슬러지는 수두차(중력)에 의해서도 배출할 수 있으므로 '반드시 펌프를 설치'한다는 설명은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:42,q:"수류식 혼화방법에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ.수류식 혼화장치에는 파샬플룸·벤투리미터·위어 등이 있다. ㄴ.단점으로 응집제와 가압수의 부유물질로 노즐이 폐색된다. ㄷ.혼화강도를 조절할 방법이 없다. ㄹ.약품 확산 시 압력은 70kPa 이상으로 한다.",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ"],a:2,e:"② 수류식 혼화는 파샬플룸·벤투리·위어 등을 이용하며(ㄱ) 혼화강도 조절이 어렵다(ㄷ). ㄴ(노즐 폐색)·ㄹ(70kPa)은 가압수확산식의 특성으로 수류식 설명이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:43,q:"플록의 충돌결합회수에 관한 설명으로 옳은 것은?",c:["플록입자수의 2승에 비례한다.","큰 플록을 형성시키기 위해 플록농도가 적을수록 효과적이다.","캠프(Camp)와 스타인(Stein)의 식은 난류층의 입자충돌에 관하여 유도된 것이다.","입자경의 3승에 반비례한다."],a:1,e:"① 충돌결합회수는 입자수(플록농도)의 2승에 비례한다. ②는 농도가 클수록 충돌이 많고, ③은 Camp-Stein 식이 속도경사(G) 기반이며, ④는 입자경의 3승에 비례한다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:44,q:"수도법상 수도꼭지에서의 먹는물 잔류염소 농도 규정 중 평상시 유리잔류염소(A)와 결합잔류염소(B)의 농도기준(mg/L)은?",c:["A:0.1 이상, B:0.4 이상","A:0.1 이상, B:0.5 이상","A:0.2 이상, B:0.5 이상","A:0.3 이상, B:0.1 이상"],a:1,e:"① 수도꼭지 잔류염소 기준(평상시)은 유리잔류염소 0.1mg/L 이상, 결합잔류염소 0.4mg/L 이상이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:45,q:"응집용 약품저장설비에 관한 설명으로 옳지 않은 것은?",c:["콘크리트제, 강제, 강화플라스틱(FRP)제 등으로 구조상 안전해야 한다.","설치장소는 옥내·외를 막론하고 누출액을 발견하기 쉽고 검사·관리가 용이한 구조로 한다.","약품은 주로 강한 산성이나 알칼리성이므로 내식성의 재질로 해야 한다.","저장설비의 용량은 계획정수량에 평균 주입률을 더하여 산정한다."],a:4,e:"④ 저장설비 용량은 계획정수량에 평균 주입률을 '곱하여' 산정한다. '더하여 산정'은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:46,q:"가압탈수기의 여과포 선정조건이 아닌 것은?",c:["내산성, 내알칼리성","강도, 내구성이 클 것","사용 중에 팽창과 수축이 클 것","탈수여액의 청징도가 높을 것"],a:3,e:"③ 여과포는 사용 중 팽창·수축이 '작아야' 형상 안정성과 탈수효율이 유지된다. '팽창·수축이 클 것'은 선정조건이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:47,q:"정수시설의 감시제어설비 및 계측제어기기에 관한 설명으로 옳지 않은 것은?",c:["급속충전방식은 충전기가 부담하기 어려운 일시적인 대전류 부하를 축전지가 부담하는 방식이다.","환경보전대책이나 생애주기비용을 감안하여 합리적이고 효율적인 설비로 한다.","전자유량계는 패러데이의 전자유도법칙을 이용한다.","원격지에 설치되어 있는 펌프장은 무인화를 원칙으로 한다."],a:1,e:"① 일시적 대전류 부하를 축전지가 분담하는 방식은 '부동충전(floating)' 방식이다. 급속충전은 방전된 축전지를 단시간에 충전하는 방식으로 ①의 설명은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:48,q:"변류기 2차 단자간에 접속된 부하가 소비하는 피상전력(VA)은?",c:["과전류강도","오차계급","과전류정수","부담"],a:4,e:"④ 변류기(CT) 2차측에 접속된 부하가 소비하는 피상전력을 '부담(burden)'이라 한다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:49,q:"정수시설 계측제어설비 및 기기에 관한 설명으로 옳지 않은 것을 모두 고른 것은? ㄱ.계측제어기기의 조작부는 수위·압력·수량·수질 등의 변화량을 검출하여 신호로 변환하는 장치이다. ㄴ.차압식 유량계는 유량에 반비례하는 차압을 발생시키는 조임기구와 차압전송기로 구성된다. ㄷ.염소 주입 전 측정치로 주입량을 설정하고 편차가 생기기 전 조절하는 방식은 피드포워드제어이다.",c:["ㄱ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],a:2,e:"② ㄱ은 변화량을 검출하는 것은 '검출부'이며 조작부는 신호에 따라 기기를 조작하므로 틀리고, ㄴ은 차압이 유량의 '제곱에 비례'하므로 틀리다. ㄷ(피드포워드제어)은 옳은 설명이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:50,q:"용량이 10, 20, 30μF인 콘덴서가 직렬 접속된 회로에 110V 직류전압이 인가되었을 때, 콘덴서 합성용량(μF)은 약 얼마인가?",c:["5.5","8.5","20.0","60.0"],a:1,e:"① 직렬 합성용량 1/C=1/10+1/20+1/30=11/60 → C=60/11≈5.5 μF."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:51,q:"영상전압을 검출하는 전기설비는?",c:["CT","ZCT","PT","GPT"],a:4,e:"④ 영상전압 검출은 GPT(접지형 계기용변압기)로 한다. 영상전류 검출은 ZCT, 일반 전류·전압 변성은 CT·PT이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:52,q:"정수장에서 컴퓨터를 사용하는 제어방식에 관한 설명으로 옳지 않은 것은?",c:["집중제어방식은 시퀀스제어나 피드백제어는 물론 복합제어나 고도의 연산이 필요한 제어도 가능하다.","정수장같이 취수, 침전 및 여과 등 복수 처리 기능을 갖는 경우 분산제어방식이 적합하지 않다.","집중제어방식에서 컴퓨터의 고장은 시스템 전체를 정지시킬 수 있으므로 백업대책이 필요하다.","분산제어방식은 고장범위가 한정되어 위험이 분산되고 신뢰성도 우수하다."],a:2,e:"② 취수·침전·여과 등 복수의 처리 기능을 갖는 정수장에는 위험분산·확장성이 우수한 분산제어방식이 오히려 적합하다. '적합하지 않다'는 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:53,q:"전동기 속도제어 시 가변전압으로 가변주파수의 교류전력을 출력하는 방식은?",c:["ELB","VVVF","LBS","CVCF"],a:2,e:"② VVVF(Variable Voltage Variable Frequency)는 전압과 주파수를 함께 가변하여 교류전동기의 속도를 제어하는 방식이다. CVCF는 정전압·정주파수 방식이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:54,q:"초음파 유량계 설치 시 유의사항으로 옳지 않은 것은?",c:["측정관의 재질은 강관, 주철관 등으로 내면에 라이닝이 있더라도 지장이 없다.","측정방식은 전반속도차법과 Doppler법이 있다.","액의 밀도에 의한 보정이 필요하다.","정밀한 측정을 위해서 배관 내는 항상 유체가 충만되어야 한다."],a:3,e:"③ 초음파 유량계는 음파의 전파시간차·도플러 효과로 유속을 측정하므로 액의 밀도에 의한 보정이 필요하지 않다. '밀도 보정이 필요하다'는 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:55,q:"다음에서 설명하는 밸브는? \"정·역류의 유체력에 의하여 개폐되고 설치한 다음에 운전자가 임의로 조작하기 어려운 밸브\"",c:["역류방지용 밸브","차단용 밸브","방류용 밸브","제어용 밸브"],a:1,e:"① 유체의 흐름(정·역류)에 의해 자동으로 개폐되어 운전자가 임의 조작하기 어려운 밸브는 역류방지용 밸브(체크밸브)이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:56,q:"산업안전보건법령상 물질안전보건자료 대상물질을 제조하거나 수입하려는 자의 기재사항으로 옳지 않은 것은?",c:["제품명","안전 및 보건상의 취급 주의 사항","건강 및 환경에 대한 유해성, 물리적 위험성","물리·화학적 특성 등 환경부령으로 정하는 사항"],a:4,e:"④ 물질안전보건자료(MSDS) 기재사항은 산업안전보건법에 따라 '고용노동부령'으로 정한다. '환경부령으로 정하는 사항'은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:57,q:"정수 공정별 수질계측기의 기본 설치항목의 연결로 옳지 않은 것은?",c:["취수장 - 탁도계","착수정 - 전기전도도계","침전지 - 알칼리도계","정수지 - 잔류염소계"],a:3,e:"③ 침전지의 기본 수질계측 항목은 탁도계이다. 알칼리도계는 혼화·응집 단계의 항목으로 '침전지-알칼리도계' 연결은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:58,q:"감시조작설비 중 전체 시스템의 운영에 필요한 엔지니어링 데이터를 생성·변경·저장하는 설비는?",c:["ESS","EWS","FCS","COS"],a:2,e:"② EWS(Engineering Work Station)는 전체 시스템 운영을 위한 엔지니어링 데이터를 생성·변경·저장하는 설비이다. FCS는 현장제어반, COS는 중앙운전반이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:59,q:"펌프설치에 관한 설명으로 옳지 않은 것은?",c:["펌프의 흡입관은 공기가 갇히지 않도록 배관한다.","펌프의 토출관은 마찰손실이 작도록 고려한다.","펌프 흡수정은 펌프 설치위치에 가급적 가까이 만들고 난류·와류가 일어나지 않는 형상으로 한다.","펌프의 흡입관에는 체크밸브와 제어밸브를 설치한다."],a:4,e:"④ 체크밸브와 제어밸브는 펌프 '토출관'에 설치한다. 흡입관에는 풋밸브 등을 두므로 '흡입관에 체크·제어밸브를 설치'한다는 설명은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"설비운영",n:60,q:"산업안전보건법령상 '중대재해'에 관한 설명으로 옳은 것은?",c:["2개월 이상의 요양이 필요한 부상자가 동시에 2명 이상 발생한 재해","부상자가 동시에 5명 이상 발생한 재해","직업성 질병자가 동시에 10명 이상 발생한 재해","산업재해 중 사망 등 재해 정도가 심한 것으로서 대통령령으로 정하는 재해"],a:3,e:"③ 중대재해는 사망자 1명 이상, 3개월 이상 요양 부상자 동시 2명 이상, 부상자·직업성질병자 동시 10명 이상이다. ①은 '3개월', ②는 '10명', ④는 '고용노동부령'이 옳다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:61,q:"[MLT]계로 표현되는 점성계수의 차원으로 옳은 것은?",c:["[ML⁻²T⁻²]","[ML⁻¹T⁻¹]","[L²T⁻¹]","[L³T⁻¹]"],a:2,e:"② 점성계수 μ의 차원은 [ML⁻¹T⁻¹]이다. ([L²T⁻¹]는 동점성계수 ν의 차원)"},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:62,q:"원형관에서 모세관현상의 상승고에 관한 설명으로 옳지 않은 것은?",c:["액체의 표면장력에 비례한다.","모세관의 지름에 반비례한다.","액체의 단위중량에 비례한다.","물의 경우 수온 증가에 반비례한다."],a:3,e:"③ 모세관 상승고 h=4T·cosθ/(wD)로 액체의 단위중량(w)에 반비례한다. '단위중량에 비례한다'는 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:63,q:"지름 1.5cm인 관로에 유량 210cm³/min의 물이 흐를 때, 관의 레이놀즈수(Re)는 약 얼마인가? (동점성계수 1.12×10⁻² cm²/s)",c:["133","265","2,600","15,916"],a:2,e:"② Q=210 cm³/min=3.5 cm³/s. V=Q/A=3.5/(π/4×1.5²)≈1.98 cm/s. Re=VD/ν=1.98×1.5/(1.12×10⁻²)≈265."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:64,q:"저수지에서 오리피스를 통해 물이 흘러간다. 수심(H) 10m, 오리피스 지름(D) 10cm일 때 오리피스를 통해 흘러가는 물의 유속(m/s)은? (총손실수두는 3V²/2g)",c:["7","9","11","14"],a:1,e:"① 에너지식 H=V²/2g+3V²/2g=4V²/2g → 10=4V²/19.6 → V²=49 → V=7 m/s."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:65,q:"지름 15cm인 관 속을 0.85m/s의 속도로 액체가 흐를 때 관의 마찰계수(f)는 약 얼마인가? (액체의 동점성계수 1.1×10⁻⁴ m²/s)",c:["0.022","0.033","0.044","0.055"],a:4,e:"④ Re=VD/ν=0.85×0.15/(1.1×10⁻⁴)≈1,159 (층류). f=64/Re=64/1,159≈0.055."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:66,q:"관수로의 유량측정장치에 관한 설명으로 옳은 것은?",c:["자기식 유량측정기에서 유량은 자속밀도에 비례한다.","벤투리미터는 관로 도중에 단면축소부를 두어 단면 간의 수두차를 측정하여 유량을 계산하는 방식이다.","자기식 유량측정기는 고형물질이 많은 관수로의 유량측정에는 이용할 수 없다.","위어로 유량을 측정하는 경우 벽의 마찰에 영향을 받지 않는다."],a:2,e:"② 벤투리미터는 단면축소부 전후의 수두차로 유량을 산정한다. ①은 유속에 비례(자속밀도 일정), ③은 고형물이 많아도 측정 가능한 것이 자기식의 장점, ④는 개수로 위어로 벽 마찰 영향을 받는다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:67,q:"식 'p/γ + V²/2g + z = H = constant'에 관한 설명으로 옳지 않은 것은?",c:["베르누이 방정식을 나타낸 것으로 오일러 에너지식을 적분하여 얻을 수 있다.","베르누이 방정식을 적용하고자 하는 임의의 두 점은 항상 같은 유선상에 있어야 한다.","p/γ를 압력수두, V²/2g을 속도수두, z를 위치수두라 한다.","베르누이 방정식은 정상흐름·비압축성·비점성·동일 유선상의 흐름 중 한가지 이상을 만족하는 흐름에 적용할 수 있다."],a:4,e:"④ 베르누이 방정식은 정상흐름·비압축성·비점성·동일 유선상의 조건을 '모두' 만족해야 적용할 수 있다. '한가지 이상'을 만족하면 적용한다는 설명은 옳지 않다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:68,q:"혼화지에서 속도경사(G)에 관한 설명으로 옳지 않은 것은?",c:["수온에 따라 변동한다.","속도경사(G)의 차원은 [T⁻¹]이다.","점성계수(μ)의 1/2승에 반비례한다.","동력(P)의 1/2승에 반비례한다."],a:4,e:"④ G=√(P/(μV))이므로 동력 P의 1/2승에 '비례'한다. '동력의 1/2승에 반비례'는 옳지 않다. (점성계수의 1/2승에는 반비례)"},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:69,q:"길이 1km, 지름 500mm인 원형관에 평균유속 1m/s로 물이 가득차서 흐르고 있다. 관의 마찰손실계수가 0.02일 때 마찰손실수두(m)는 약 얼마인가?",c:["1","2","3","4"],a:2,e:"② hf=f(L/D)(V²/2g)=0.02×(1,000/0.5)×(1²/(2×9.8))≈0.02×2,000×0.051≈2 m."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:70,q:"개수로 흐름에 관한 설명으로 옳은 것은?",c:["한계수심은 일정 유량이 흐를 때 비에너지가 최대인 수심이다.","수심이 한계수심보다 큰 흐름은 사류이다.","상류는 프루드수가 1보다 큰 흐름이다.","흐름이 사류에서 상류로 급격히 변할 때 도수현상이 발생한다."],a:4,e:"④ 사류→상류로 급변할 때 도수(Hydraulic Jump)가 발생한다. ①은 비에너지가 '최소'인 수심, ②는 한계수심보다 크면 상류, ③은 상류가 Fr<1이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:71,q:"물이 가득차서 흐르는 원형관의 동수반경이 15cm일 때, 관의 직경(m)은?",c:["0.3","0.4","0.6","0.8"],a:3,e:"③ 원형 만관에서 동수반경 R=D/4이므로 D=4R=4×0.15=0.6 m."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:72,q:"에너지경사선과 동수경사선을 구분하는 수두는?",c:["속도수두","압력수두","위치수두","마찰손실수두"],a:1,e:"① 에너지경사선(EGL)=동수경사선(HGL)+속도수두이므로, 두 선의 차이가 곧 속도수두이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:73,q:"정수장에서 침전지의 제거효율 향상 방법으로 옳은 것을 모두 고른 것은? ㄱ.유량을 적게 한다. ㄴ.경사판 침전지를 사용한다. ㄷ.플록의 침강속도를 적게 한다. ㄹ.표면적 부하율을 크게 한다.",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ"],a:1,e:"① 유량을 줄이고(ㄱ) 경사판 침전지로 침전면적을 늘리면(ㄴ) 효율이 향상된다. ㄷ은 침강속도를 '크게', ㄹ은 표면부하율을 '작게' 해야 효율이 높아진다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:74,q:"계획급수인구 50,000명, 계획1인1일 최대급수량 150L인 A도시 정수장에 여과속도 120m/d인 급속여과지를 설치할 때 여과지의 소요면적(m²)은?",c:["31.5","50","62.5","75"],a:3,e:"③ 계획1일최대급수량=50,000×150 L=7,500 m³/d. 여과면적=7,500/120=62.5 m²."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:75,q:"펌프의 제원결정에 검토되는 항목으로 옳지 않은 것은?",c:["전양정","토출량","비력","구경"],a:3,e:"③ 펌프 제원은 전양정·토출량(유량)·구경·회전수·비속도 등으로 결정한다. '비력(比力, specific force)'은 개수로 수리 개념으로 펌프 제원 항목이 아니다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:76,q:"펌프의 비속도(Ns)를 나타내는 식은? (N:분당 회전수, Q:최고 효율점의 양수량, H:최고 효율점의 전양정)",c:["Ns = N·Q^(1/2)/H^(5/4)","Ns = N·Q^(1/2)/H^(3/4)","Ns = N·Q^(1/4)/H^(5/4)","Ns = N·Q^(1/4)/H^(3/4)"],a:2,e:"② 비속도 Ns=N·Q^(1/2)/H^(3/4)이다. (유량의 1/2승, 전양정의 3/4승)"},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:77,q:"개수로와 관수로 흐름에서 가장 지배적인 영향인자의 연결로 옳은 것은?",c:["개수로 - 중력, 관수로 - 압력","개수로 - 대기압, 관수로 - 비에너지","개수로 - 레이놀즈수, 관수로 - 대기압","개수로 - 압력, 관수로 - 비력"],a:1,e:"① 자유표면이 있는 개수로는 중력이, 관 내부가 가득 찬 관수로는 압력이 가장 지배적인 영향인자이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:78,q:"사이펀(Siphon)에 관한 설명으로 옳은 것은?",c:["만곡부에서 부압(-)이 발생한다.","한계수심이 발생한다.","상류에서 사류로 변환되는 장치이다.","펌프의 일종이다."],a:1,e:"① 사이펀의 정점(만곡부)에서는 대기압보다 낮은 부압(-)이 발생한다. 사이펀은 펌프 없이 대기압과 위치수두차로 물을 이송하는 관로이다."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:79,q:"펌프의 축동력이 5kW일 때, 유량 0.1m³/s를 양수할 수 있는 전양정(m)은 약 얼마인가? (물 단위중량 1,000kgf/m³, 펌프 효율 75%, 손실 무시)",c:["1.1","2.9","3.8","5.1"],a:3,e:"③ P=9.8·Q·H/η → H=P·η/(9.8·Q)=5×0.75/(9.8×0.1)≈3.8 m."},
{g:"ex32_2",gt:"제32회 2급 기출문제 (2022)",s:"수리학",n:80,q:"유량 0.6m³/s의 물을 전양정 12m까지 양수하기 위한 펌프의 소요동력(kW)은 약 얼마인가? (물 단위중량 1,000kgf/m³, 효율 75%, 손실 무시)",c:["32.5","54.6","70.5","94.1"],a:4,e:"④ P=9.8·Q·H/η=9.8×0.6×12/0.75≈94.1 kW."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:1,q:"응집제에 관한 설명으로 옳지 않은 것은?",c:["황산알루미늄은 대부분의 경우 액체가 사용된다.","철염계 응집제는 플록이 침강하기 어렵다.","폴리염화알루미늄은 분말활성탄과 구분하기 위하여 PACl이라고 표시한다.","폴리염화알루미늄은 황산알루미늄보다 적정주입 pH 범위가 넓다."],a:2,e:"② 철염계 응집제는 플록이 무겁고 침강성이 좋다. '플록이 침강하기 어렵다'는 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:2,q:"응집보조제에 관한 설명으로 옳은 것은?",c:["주입량은 처리수량과 주입률로 산출한다.","알긴산나트륨은 액상을 주로 사용한다.","활성규산은 응집보조제로서 활성화 조작이 쉽다.","주입지점은 혼화가 어려운 지점으로 한다."],a:1,e:"① 응집보조제 주입량은 처리수량×주입률로 산출한다. ②는 알긴산나트륨이 분말, ③은 활성규산의 활성화 조작이 까다로우며, ④는 혼화가 잘되는 지점에 주입한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:3,q:"플록형성지에 관한 설명으로 옳은 것은?",c:["플록형성지는 직사각형이 표준이다.","교반강도는 하류로 갈수록 증가시킨다.","플록형성시간은 계획정수량에 대하여 20~40초이다.","플록형성지는 침전지와 떨어지게 설치한다."],a:1,e:"① 플록형성지는 직사각형이 표준이다. ②는 교반강도를 하류로 갈수록 감소(테이퍼드), ③은 형성시간이 20~40분, ④는 침전지에 붙여 설치한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:4,q:"pH 조정제로 사용되지 않는 것은?",c:["소다회","소석회","수산화나트륨","규산나트륨"],a:4,e:"④ 소다회·소석회·수산화나트륨은 pH 조정제(상향)이다. 규산나트륨은 응집보조제(활성규산 원료)로 pH 조정제가 아니다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:5,q:"급속여과지의 성능평가 지표가 아닌 것은?",c:["여과수탁도","여과지속시간","역세척수량의 여과수량에 대한 비율","손실수두"],a:4,e:"④ 교재 정답표 기준 정답은 ④(손실수두)이다. 급속여과 성능평가에는 여과수탁도·여과지속시간·역세척수량 비율 등을 사용하며, 손실수두는 운전관리 지표로 별도 취급된다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:6,q:"완속여과지의 표준 모래층 두께(cm)는?",c:["10~30","40~60","70~90","100~120"],a:3,e:"③ 완속여과지의 표준 모래층 두께는 70~90 cm이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:7,q:"급속여과지의 하부집수 방식이 아닌 것은?",c:["블랑키트블록형","휠러블록형","스트레이너블록형","유공블록형"],a:1,e:"① 하부집수장치 방식에는 휠러형·스트레이너형·유공블록형·다공판형 등이 있다. '블랑키트블록형'은 해당하지 않는다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:8,q:"자외선 소독에 관한 설명으로 옳지 않은 것은?",c:["살균력을 갖는 가장 적합한 파장은 253.7nm이다.","타 소독에 비해 무독성이다.","THM 생성, 높은 유지관리비 등의 단점이 있다.","영향인자는 수질, 램프의 상태 등이 있다."],a:3,e:"③ 자외선 소독은 화학약품을 쓰지 않아 THM 등 소독부산물을 생성하지 않는다. 'THM 생성'을 단점으로 든 ③은 옳지 않다(THM은 염소소독의 단점)."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:9,q:"염소소독에 관한 설명으로 옳은 것은?",c:["유리염소는 차아염소산(HOCl)과 차아염소산이온(OCl⁻)을 말한다.","차아염소산보다 차아염소산이온이 살균작용이 강하다.","클로라민은 염소가 수중의 인화합물과 반응하여 형성한다.","결합염소는 모노클로라민(NH₂Cl), 다이클로라민(NHCl₂), 트라이클로라민(NCl₃)을 말한다."],a:1,e:"① 유리(잔류)염소는 HOCl과 OCl⁻을 말한다. ②는 HOCl이 OCl⁻보다 살균력이 강하고, ③은 클로라민이 암모니아(질소화합물)와의 반응으로 생성되며, ④는 트라이클로라민(NCl₃)은 보통 결합잔류염소에서 제외한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:10,q:"전염소 및 중간염소처리의 목적으로 옳은 것을 모두 고른 것은? ㄱ.세균 제거 ㄴ.1,4-다이옥산 제거 ㄷ.철과 망간 제거 ㄹ.맛과 냄새 제거",c:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:3,e:"③ 전·중간염소처리는 세균 제거, 철·망간 산화제거, 맛·냄새 제거 등을 목적으로 한다. 1,4-다이옥산은 염소로 제거되지 않아(고도산화 필요) 목적에 해당하지 않는다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:11,q:"염소 살균력 설명: \"동일한 접촉시간으로 동등한 소독효과를 위해 결합잔류염소는 유리잔류염소보다 ( )배의 양이 필요하고, 동일한 양으로 동등한 효과를 위해 약 ( )배의 접촉시간이 필요하다\"의 빈칸은?",c:["5, 30","15, 50","25, 100","50, 150"],a:3,e:"③ 결합잔류염소는 유리잔류염소에 비해 약 25배의 양, 또는 약 100배의 접촉시간이 필요하다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:12,q:"유량이 10,000m³/d인 처리수에 평균 6mg/L 비율로 염소를 주입했다. 잔류염소가 2mg/L인 경우 이 처리수의 염소요구량(kg/d)은?",c:["24","30","36","40"],a:4,e:"④ 염소요구량 농도=주입농도-잔류염소=6-2=4 mg/L. 염소요구량=4×10,000=40,000 g/d=40 kg/d."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:13,q:"배오존처리방법에 해당하지 않는 것은?",c:["가열분해법","촉매분해법","증발분해법","활성탄흡착분해법"],a:3,e:"③ 배오존 처리법에는 가열분해법·촉매분해법·활성탄흡착분해법이 있다. '증발분해법'은 해당하지 않는다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:14,q:"액화염소의 저장설비에 관한 설명으로 옳은 것은?",c:["저장량은 항상 1일 사용량의 3~5일분이다.","저장용기는 50kg, 100kg, 1ton을 사용한다.","저장용기는 40℃ 이상으로 유지한다.","저장용기는 직접 가열해도 무방하다."],a:2,e:"② 액화염소 저장용기는 50kg·100kg·1ton 용기를 사용한다. ③은 40℃ 이하로 유지하고, ④는 직접 가열을 금지하며, ①의 저장량 기준은 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:15,q:"배출수처리공정에 관한 설명으로 옳은 것은?",c:["발생한 배출수는 전량 처리하는 것이 경제적이다.","계획탁도는 고탁도 시의 취수 회피를 고려하여 결정한다.","계획처리고형물량은 표면부하율을 기초로 하여 산정한다.","슬러지 케이크는 하수도법에 따라 적정하게 처분되어야 한다."],a:2,e:"② 계획탁도는 고탁도 시 취수 회피 등을 고려하여 결정한다. ①은 반송·재이용이 경제적이고, ③은 원수탁도·정수량을 기초로 산정하며, ④는 폐기물관리법에 따라 처분한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:16,q:"배출수처리시설의 배출신고량이 1~3종에 해당하는 경우 부착해야 할 TMS 수질자동측정기기에 해당하지 않는 것은?",c:["탁도","수소이온농도","총질소","총인"],a:1,e:"① 수질TMS 측정항목은 COD/TOC·SS·총질소·총인·수소이온농도 등이다. '탁도'는 TMS 부착 대상 항목이 아니다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:17,q:"미량 오염물질과 처리방법 간의 연결로 옳지 않은 것은?",c:["비소 - 이산화망간 흡착처리","소독부산물 전구물질 - 중간염소처리","트라이클로로에틸렌 - 입상활성탄처리","음이온계면활성제 - 폭기처리"],a:4,e:"④ 음이온계면활성제(세제)는 생물처리·활성탄 흡착 등으로 제거한다. 폭기처리는 휘발성 물질 제거용으로 '음이온계면활성제-폭기처리' 연결은 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:18,q:"해수담수화용 폴리아미드계 역삼투막에 관한 설명으로 옳은 것은?",c:["비교적 무른 지지층으로 쉽게 압밀화된다.","온도가 높을수록 물의 투과율과 염분투과율 모두 커지는 경향이 있다.","염소 등의 산화제에 대한 내성이 크다.","셀룰로스 아세테이트계 막에 비해 유기물 제거성이 낮다."],a:2,e:"② 온도가 높을수록 물·염분 투과율이 모두 커지는 경향이 있다. ①은 폴리아미드막이 비교적 단단하고, ③은 산화제(염소)에 약하며, ④는 셀룰로스 아세테이트계보다 유기물 제거성이 높다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:19,q:"막모듈의 하부로부터 블로어를 사용하여 막의 1차 측에서 기액혼합류로 세척하는 방식은?",c:["역압수세척","에어스크러빙","역압공기세척","기계진동"],a:2,e:"② 블로어로 공기를 주입해 기액혼합류로 막 표면을 세척하는 방식은 에어스크러빙(air scrubbing)이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수처리공정",n:20,q:"입상활성탄 흡착공정 설계인자 중 입상활성탄층을 통과하는 1시간당 처리수량을 입상활성탄의 용적으로 나눈 값은?",c:["공간속도(SV)","공상접촉시간(EBCT)","선속도(LV)","흡착능력(AC)"],a:1,e:"① 공간속도(SV)=시간당 처리수량/활성탄 용적이다. 공상접촉시간(EBCT)은 그 역수(활성탄 용적/유량)에 해당한다."},

{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수질분석및관리",n:24,q:"수질오염공정시험기준상 배출허용기준 적합여부 판정을 위해 복수시료를 채취하는 경우 단일시료로 합쳐서 측정해도 되는 항목은?",c:["부유물질","시안(CN)","대장균군","노말헥산추출물질"],a:1,e:"① 부유물질은 비교적 보존성이 있어 복수시료를 합쳐 단일시료로 측정할 수 있다. 시안·대장균군·노말헥산추출물질은 개별 채취·측정이 필요하다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수질분석및관리",n:25,q:"다음이 설명하는 시험방법에 해당되는 심미적 영향물질은? \"암모니아 완충용액을 넣어 pH 10으로 조절한 다음 적정에 의해 소비된 EDTA 용액으로부터 탄산칼슘의 양으로 환산하여 구함\"",c:["세제","탁도","경도","잔류염소"],a:3,e:"③ EDTA 적정으로 탄산칼슘(CaCO₃) 양으로 환산하는 시험은 경도(총경도) 측정법이다."},

{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수질분석및관리",n:28,q:"먹는물수질공정시험기준상 잔류염소의 측정방법이 아닌 것은?",c:["DPD 비색법","OT 비색법","DPD 분광법","연속흐름법"],a:4,e:"④ 잔류염소는 DPD 비색법·OT 비색법·DPD 분광법(흡광광도법) 등으로 측정한다. '연속흐름법'은 잔류염소 측정방법이 아니다."},

{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:42,q:"횡류식 침전지의 정류설비에 관한 설명으로 옳지 않은 것은?",c:["정류벽 등을 설치하여 유입수가 침전지의 횡단면에 균등하게 유입되도록 한다.","정류벽을 유입단에서 0.5m 이상 떨어져 설치한다.","정류벽에서 정류공의 총면적은 유수단면적의 6% 정도를 표준으로 한다.","침전지 내에서 편류나 밀도류를 발생시키지 않고 제거율을 높이기 위한 설비이다."],a:2,e:"② 정류벽은 유입단에서 약 1.5m 이상 떨어뜨려 설치한다. '0.5m 이상'은 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:43,q:"다음에서 설명하는 급속혼화시설은? \"혼화강도의 조절이 어렵다. 와류의 정도가 처리수량에 좌우된다. 혼화장치에는 파샬플룸·벤투리미터 등이 있다.\"",c:["수류식 혼화","기계식 혼화","인라인 고정식 혼화","파이프 격자에 의한 혼화"],a:1,e:"① 파샬플룸·벤투리미터를 이용하고 와류가 처리수량에 좌우되며 혼화강도 조절이 어려운 방식은 수류식 혼화이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:44,q:"침전지 이전에 염소제를 주입하는 방식은?",c:["전염소처리","중간염소처리","후염소처리","재염소처리"],a:1,e:"① 침전지 이전(응집·침전 전)에 염소를 주입하는 방식은 전염소처리이다. 중간염소처리는 침전지와 여과지 사이, 후염소처리는 여과 이후에 주입한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:45,q:"급속여과지에서 역세척 효과가 불충분할 경우에 나타날 수 있는 현상이 아닌 것은?",c:["여과지속시간의 감소","여과수질의 악화","머드볼의 발생","여과층 표면의 균일"],a:4,e:"④ 역세척이 불충분하면 여과지속시간 감소·여과수질 악화·머드볼 발생·여과층 표면의 불균일(크랙)이 나타난다. '표면의 균일'은 해당하지 않는다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:46,q:"배출수처리시설에서 침전슬러지를 받아들이는 시설은?",c:["배출수지","배슬러지지","농축조","여과지"],a:2,e:"② 침전지에서 발생한 슬러지를 받아들이는 시설은 배슬러지지이다. 배출수지는 여과지 역세척 배출수를 받아들인다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:47,q:"정수장 배출수 처리의 일반적인 순서로 옳은 것은?",c:["조정 → 농축 → 탈수 → 처분","조정 → 탈수 → 농축 → 처분","농축 → 탈수 → 조정 → 처분","농축 → 조정 → 처분 → 탈수"],a:1,e:"① 배출수 처리는 조정(배출수지·배슬러지지) → 농축(농축조) → 탈수 → 처분(건조·매립 등) 순서로 진행한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:48,q:"하천수나 지하수를 착수정까지 양수하기 위해 설치하는 펌프는?",c:["취수펌프","배수펌프","가압펌프","고양정펌프"],a:1,e:"① 원수(하천수·지하수)를 착수정까지 양수하는 펌프는 취수펌프이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:49,q:"역류방지용 밸브가 아닌 것은?",c:["스윙식 체크밸브","풋밸브","콘밸브","플랩밸브"],a:3,e:"③ 스윙체크밸브·풋밸브·플랩밸브는 역류방지용 밸브이다. 콘밸브는 유량조절(제어)용 밸브로 역류방지용이 아니다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:50,q:"구조가 견고하고 가격이 저렴하며 운전·보수가 용이해 펌프 구동용으로 가장 일반적으로 사용되는 전동기는?",c:["영구자석형 전동기","직류전동기","분권전동기","3상 유도전동기"],a:4,e:"④ 3상 유도전동기는 구조가 견고하고 저렴하며 유지보수가 용이해 펌프 구동용으로 가장 널리 쓰인다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:51,q:"펌프를 선정할 때 사용하는 대푯값으로 계획수량, 동수압, 관로특성 등을 고려해서 사용하는 값은?",c:["회전속도","비속도","토출량","전양정"],a:2,e:"② 비속도(Ns)는 토출량·전양정·회전수로 산정되는 펌프 형식 선정의 대푯값으로, 계획수량·동수압·관로특성 등을 종합 고려한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:52,q:"한국전기설비규정(KEC)에서 정한 중성선(N)의 색상은?",c:["갈색","녹색","회색","청색"],a:4,e:"④ KEC상 중성선(N)은 청색이다. (L1 갈색, L2 흑색, L3 회색, 보호도체는 녹황 교차)"},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:53,q:"광도 I가 400cd인 광원으로부터 2m 떨어진 곳의 법선조도 E(lx)는?",c:["100","200","566","800"],a:1,e:"① 법선조도 E=I/r²=400/2²=100 lx."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:54,q:"피뢰기에 관한 설명으로 옳지 않은 것은?",c:["피뢰기는 보호대상기기와 가능하면 가깝게 설치한다.","피뢰기 제한전압은 실효치로 표시한다.","직렬갭은 속류를 차단한다.","특성요소는 비직선 저항체로 이상전압의 파고치를 저감시킨다."],a:2,e:"② 피뢰기 제한전압은 파고치(peak value)로 표시한다. '실효치로 표시'한다는 설명은 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:55,q:"소독설비에서 미리 설정된 염소주입률로 주입량을 제어하는 방식은?",c:["정치제어","피드백제어","케스케이드제어","유량비례제어"],a:4,e:"④ 미리 설정한 주입률에 따라 처리유량에 비례하여 염소를 주입하는 방식은 유량비례제어이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:56,q:"상수도시설에서 계측제어용 기기에 관한 설명으로 옳지 않은 것은?",c:["계측제어기기는 일반적으로 검출부, 표현부, 조절부, 조작부 및 전송부로 나누어진다.","표현부는 수위·압력·수량·수질 등의 변화량을 검출하여 신호로 변환하는 장치이다.","조작부는 조절부로부터 조작신호를 받아 제어목적을 달성하기 위하여 작동하는 장치이다.","전송부는 검출부·표현부·조절부·조작부 상호 간에 신호를 전달하는 장치이다."],a:2,e:"② 변화량을 검출하여 신호로 변환하는 것은 '검출부'이다. 표현부는 측정값을 표시·기록하는 장치이므로 ②의 설명은 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:57,q:"감시조작설비 중 현장제어반을 나타내는 것은?",c:["COS","FCS","EWS","DS"],a:2,e:"② FCS(Field Control Station)가 현장제어반이다. COS는 중앙운전반, EWS는 엔지니어링반이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:58,q:"패러데이 법칙을 응용한 유량계는?",c:["초음파유량계","차압식유량계","전자식유량계","위어식유량계"],a:3,e:"③ 전자식유량계는 패러데이의 전자유도법칙(자기장 내 도체 운동 시 기전력 발생)을 응용한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:59,q:"산업안전보건법령상 안전인증대상기계 등의 안전인증의 전부 또는 일부를 면제받을 수 있는 요건이 아닌 것은?",c:["연구·개발을 목적으로 제조·수입하거나 수출을 목적으로 제조하는 경우","고용노동부장관이 정하여 고시하는 외국의 안전인증기관에서 인증을 받은 경우","다른 법령에 따라 안전성에 관한 검사나 인증을 받은 경우로서 고용노동부령으로 정하는 경우","3년 이상 해당 사업장에서 사용하여 안전이 입증된 경우"],a:4,e:"④ 안전인증 면제요건은 ①②③이다. '3년 이상 사용하여 안전이 입증된 경우'는 면제요건에 해당하지 않는다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"설비운영",n:60,q:"안전보건표지(마름모 안에 불꽃 그림)가 의미하는 것은?",c:["산화성 물질 경고","폭발성 물질 경고","인화성 물질 경고","화기 금지 경고"],a:3,e:"③ 마름모 테두리 안의 불꽃 그림문자는 GHS상 '인화성 물질 경고'를 의미한다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:61,q:"베르누이 방정식에 관한 설명으로 옳지 않은 것은?",c:["총수두는 압력수두, 위치수두, 속도수두의 합으로 표현된다.","개수로에서 동수경사선은 수면과 일치한다.","동수경사선은 압력수두와 위치수두의 합을 연결한 선이다.","비정상류 흐름으로 가정한다."],a:4,e:"④ 베르누이 방정식은 정상류(Steady Flow)를 가정한다. '비정상류로 가정한다'는 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:62,q:"관의 길이가 30m이고 관경이 500mm인 관로에서 속도수두가 마찰손실수두의 1/40이라면 마찰손실계수는?",c:["0.033","0.037","0.067","0.075"],a:3,e:"③ 교재 정답표 기준 정답은 ③(0.067)이다. hf=f(L/D)(V²/2g)에서 속도수두=hf/40이면 f(L/D)=40인데, 제시된 L=30m·D=0.5m(L/D=60)로 계산하면 f≈0.67로 자릿수 차이가 있어 수치 검증을 권장한다(원문 L/D=600 가정 시 0.067)."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:63,q:"압력의 차원을 [MLT]계로 옳게 나타낸 것은?",c:["[ML⁻¹T⁻²]","[ML⁻²T⁻³]","[ML⁻²T]","[ML²T⁻³]"],a:1,e:"① 압력=힘/면적=(MLT⁻²)/L²=[ML⁻¹T⁻²]."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:64,q:"물의 밀도에 관한 설명으로 옳지 않은 것은?",c:["0℃에서 물의 밀도는 얼음의 밀도보다 크다.","물의 동점성계수는 점성계수를 밀도로 나눈 값이다.","[MLT]계로 물의 밀도는 [MLT⁻³]이다.","물의 밀도는 약 4℃, 1기압에서 가장 크다."],a:3,e:"③ 밀도=질량/부피=M/L³=[ML⁻³]이다. '[MLT⁻³]'은 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:65,q:"유체의 에너지방정식 '일정(Constant) = z + (ㄱ) + (ㄴ)'에서 (ㄱ),(ㄴ)으로 옳은 것은? (P:압력, γ:단위중량, z:높이, V:유속, g:중력가속도)",c:["ㄱ:H, ㄴ:P²/γ","ㄱ:P/γ, ㄴ:V²/2g","ㄱ:P/γ², ㄴ:V/(2g)²","ㄱ:(P/γ)², ㄴ:(V/2g)²"],a:2,e:"② 베르누이식은 z+P/γ+V²/2g=일정이다. 따라서 (ㄱ)=압력수두 P/γ, (ㄴ)=속도수두 V²/2g."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:66,q:"개수로 흐름에서 프루드수(Fr)에 관한 설명으로 옳지 않은 것은? (Fr=V/√(gh))",c:["√(gh)=V : 한계류","√(gh)<V : 사류","√(gh)>V : 상류","관성력과 점성력의 비로 나타낸다."],a:4,e:"④ 프루드수는 관성력과 '중력'의 비이다. 관성력과 점성력의 비는 레이놀즈수이므로 ④는 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:67,q:"정수장 내 오존소독에 관한 설명으로 옳지 않은 것은?",c:["맛·냄새 물질을 제거한다.","소독부산물을 다량 발생시킨다.","색도의 제거가 가능하다.","오존주입량은 처리수량에 주입률을 곱하여 산정한다."],a:2,e:"② 오존소독은 맛·냄새·색도 제거에 효과적이며 염소소독에 비해 소독부산물 생성이 적은 편이다. '소독부산물을 다량 발생시킨다'는 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:68,q:"완속여과지의 표준 여과속도(m/d)는?",c:["4~5","50~100","120~150","240~300"],a:1,e:"① 완속여과지의 표준 여과속도는 4~5 m/d이다. (급속여과지는 120~150 m/d)"},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:69,q:"침전지에서 침전효율을 나타내는 기본적인 지표로 옳은 것은?",c:["표면부하율","불활성비","속도경사","오존주입률"],a:1,e:"① 침전지의 침전효율을 나타내는 기본 지표는 표면부하율(=Q/A, 표면적당 처리유량)이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:70,q:"물이 가득 차서 흐르는 원형관의 직경이 60cm일 때, 관의 동수반경(cm)은?",c:["5","10","15","20"],a:3,e:"③ 원형 만관에서 동수반경 R=D/4=60/4=15 cm."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:71,q:"관수로의 흐름에서 마찰손실수두(hL)에 관한 설명으로 옳지 않은 것은?",c:["관의 직경에 비례한다.","속도수두에 비례한다.","관의 길이에 비례한다.","마찰손실계수에 비례한다."],a:1,e:"① hf=f(L/D)(V²/2g)에서 마찰손실수두는 관의 직경(D)에 반비례한다. '직경에 비례'는 옳지 않다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:72,q:"관로길이 100m, 관경 100mm인 관수로에 평균유속 5.0m/s로 물이 흐를 때 마찰손실수두(m)는 약 얼마인가? (마찰손실계수 0.015, g=9.8m/s²)",c:["7.5","10.5","15.4","19.1"],a:4,e:"④ hf=f(L/D)(V²/2g)=0.015×(100/0.1)×(5²/(2×9.8))≈19.1 m."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:73,q:"레이놀즈(Reynolds)수가 400일 때, 개수로의 흐름상태로 옳은 것은?",c:["층류","와류","상류","난류"],a:1,e:"① 개수로에서 Re가 약 500 이하이면 층류이다. Re=400이므로 층류이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:74,q:"밸브의 급폐쇄 또는 급가동으로 인하여 관로 내 흐름의 운동에너지가 압력에너지로 변환되어 관로벽에 충격을 주는 현상은?",c:["양력작용","모세관현상","수격작용","도수현상"],a:3,e:"③ 밸브 급폐쇄·급가동 등으로 유속이 급변하며 압력파가 관벽에 충격을 주는 현상은 수격작용(water hammer)이다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:75,q:"전양정이 5m일 때 5.0kW의 펌프로 0.07m³/s의 물을 양수했다면 이 펌프의 효율은 약 얼마인가? (물 단위중량 1,000kgf/m³, g=9.8m/s², 손실수두 무시)",c:["0.29","0.49","0.69","0.89"],a:3,e:"③ P=9.8·Q·H/η → η=9.8·Q·H/P=9.8×0.07×5/5.0≈0.69."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:76,q:"펌프특성곡선을 통해 확인할 수 있는 항목이 아닌 것은?",c:["효율","축동력","양정","프루드수"],a:4,e:"④ 펌프특성곡선은 유량에 따른 양정·효율·축동력(및 NPSH)을 나타낸다. 프루드수는 펌프특성곡선에서 확인할 수 있는 항목이 아니다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:77,q:"펌프의 토출량이 13.5m³/min이고 흡입구 유속이 1.5m/s일 때, 펌프의 흡입구경(mm)은? (흡입구경 D=146√(Q/V))",c:["138","238","338","438"],a:4,e:"④ D=146√(Q/V)=146×√(13.5/1.5)=146×√9=146×3=438 mm."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:78,q:"8m³/s의 물을 총양정 20m 높이로 양수하는 데 필요한 펌프의 동력(HP)은 약 얼마인가? (펌프 효율 85%, 손실수두 무시, g=9.8m/s², 물 단위중량 1,000kgf/m³)",c:["742","2,509","4,239","6,381"],a:2,e:"② P(HP)=(1,000·Q·H)/(75·η)=(1,000×8×20)/(75×0.85)≈2,509 HP. (1HP=75 kgf·m/s)"},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:79,q:"펌프의 운전에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ.병렬운전은 양정 변화가 적고 양수량 변화가 큰 경우에 적합하다. ㄴ.직렬운전 시 운전점 양정은 단독운전 양정의 2배로 구한다. ㄷ.병렬운전 시 운전점 양수량은 단독운전 양수량의 2배보다 적다. ㄹ.관로 저항곡선 구배가 급한 곳에서는 직렬운전이 유리하다.",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],a:4,e:"④ ㄱ~ㄹ 모두 옳다. 병렬운전은 양수량 증대(양정 변화 적은 경우), 직렬운전은 양정 증대(저항곡선 구배 급한 경우)에 유리하며, 실제 병렬 양수량은 관로저항 때문에 단독의 2배보다 적다."},
{g:"ex36_3",gt:"제36회 3급 기출문제 (2024)",s:"수리학",n:80,q:"펌프의 비속도(Ns)를 나타내는 식은? (N:분당 회전수, H:최고효율점의 전양정, Q:최고효율점의 양수량)",c:["Ns = N·Q^(1/2)/H^(4/3)","Ns = N·Q^(1/3)/H^(4/3)","Ns = N·Q^(1/2)/H^(3/4)","Ns = N·Q^(1/3)/H^(3/4)"],a:3,e:"③ 비속도 Ns=N·Q^(1/2)/H^(3/4)이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:1,q:"플록형성지에 관한 설명으로 옳지 않은 것은?",c:["직사각형이 표준형태이다.","교반강도는 하류로 갈수록 점차 증가시키는 것이 바람직하다.","교반설비는 수질 변화에 따라 교반 강도를 조절할 수 있는 구조로 한다.","플록형성시간은 계획정수량에 대하여 20~40분간을 표준으로 한다."],a:2,e:"② 교반강도(G값)는 하류로 갈수록 점차 '감소'시켜 형성된 플록의 파괴를 막아야 한다(테이퍼드 응집). '증가'는 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:2,q:"침전지에 관한 설명으로 옳지 않은 것은?",c:["제거율을 높이기 위해 침전지 중간에 경사판을 설치하는 것을 고려한다.","활성이 있는 미세플록을 기성 플록과 적극적으로 접촉시키면 제거율이 향상된다.","다층침전지는 용지점용면적의 비율보다 큰 용량의 침전지를 만들 수 있다.","침전지 중간에서 상징수를 유출시키면 제거율이 저하된다."],a:4,e:"④ 침전지 중간에서 상징수를 분산 유출(다단 유출)하면 표면부하가 낮아져 오히려 제거율이 향상된다. '제거율이 저하된다'는 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:3,q:"침전지 제거율이 낮아지는 경우는?",c:["유입 유량 증가","표면부하율 감소","플록의 침강속도 증가","침전지 표면적 증가"],a:1,e:"① 유입 유량이 증가하면 표면부하율(Q/A)이 커져 제거율이 낮아진다. ②③④는 모두 제거율을 높이는 요인이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:4,q:"표면부하율이 20mm/min으로 설계된 횡류식 침전지에서 침강속도가 40mm/min인 입자의 예상되는 제거율(%)은?",c:["20","40","80","100"],a:4,e:"④ 입자의 침강속도(40mm/min)가 표면부하율(20mm/min) 이상이면 그 입자는 100% 제거된다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:5,q:"입도분포 실험에서 중량통과율 10%, 30%, 40%, 60%, 80%에 해당하는 여과모래의 입경이 각각 0.5mm, 0.6mm, 0.7mm, 0.8mm, 0.9mm일 때 여과모래의 균등계수는?",c:["1.2","1.4","1.6","1.8"],a:3,e:"③ 균등계수=D60/D10=0.8/0.5=1.6."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:6,q:"완속여과법을 선택하여야 하는 경우로 옳은 것은?",c:["생물반응에 의한 산화와 분해가 필요한 경우","여과속도를 130m/d로 운전해야 하는 경우","휴믹산 등의 화합물에 의한 색도가 있는 경우","탁도가 높거나 조류가 많은 경우"],a:1,e:"① 완속여과는 모래층 생물막에 의한 산화·분해가 필요한 경우에 적합하다. ②(130m/d)는 급속여과 영역, ③·④는 급속여과·고도처리가 적합하다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:7,q:"하향류 여과 시설의 여과층에 따른 탁질억류량 분포가 다음 그림과 같은(상·하부 사이에 뚜렷한 단차가 있는) 여과층의 형식은?",c:["단일 여과층","입도 분포를 상부 조립에서 하부 세립으로 점진적으로 구성한 여과층","2층 여과층","3층 여과층"],a:3,e:"③ 탁질억류량 분포에 뚜렷한 단차(두 영역)가 나타나는 것은 서로 다른 여재 2종으로 구성된 2층 여과층의 특징이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:8,q:"염소소독제의 특성 및 살균력에 관한 설명으로 옳지 않은 것은?",c:["차아염소산이온에 비해 차아염소산의 살균력이 강하다.","차아염소산나트륨과 차아염소산이온을 유리염소 또는 유리잔류염소라고 한다.","pH가 낮아질수록 차아염소산의 존재 비율이 높아지므로 소독 효과가 커진다.","결합잔류염소에 비하여 유리잔류염소의 살균력이 강하다."],a:2,e:"② 유리(잔류)염소는 차아염소산(HOCl)과 차아염소산이온(OCl⁻)을 말한다. '차아염소산나트륨과 차아염소산이온'이라는 ②의 설명은 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:9,q:"염소가스 저장시설의 제해설비 중, 흡수용 제해제와 중화제로 가장 널리 사용되는 것을 순서대로 바르게 나타낸 것은?",c:["소석회 - 수산화나트륨","소석회 - 염화나트륨","생석회 - 수산화나트륨","생석회 - 염화나트륨"],a:1,e:"① 염소가스 흡수용 제해제로는 소석회, 중화제로는 수산화나트륨(가성소다)이 가장 널리 사용된다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:10,q:"수도법령상 일반수도사업자가 병원성 미생물에 의하여 오염되었거나 오염될 우려가 있는 경우에 수도꼭지의 먹는물에서 유지해야 하는 결합잔류염소의 최소농도(mg/L)는?",c:["0.2","0.4","1.0","1.8"],a:4,e:"④ 오염(우려) 시 수도꼭지 결합잔류염소는 1.8mg/L 이상(유리잔류염소는 0.4mg/L 이상)을 유지해야 한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:11,q:"여과공정만으로 정수처리기준상 병원성미생물의 최소제거 및 불활성화 기준을 충족하는 여과 방식으로 옳은 것을 모두 고른 것은? ㄱ.정밀여과 ㄴ.한외여과 ㄷ.나노여과 ㄹ.역삼투",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄷ, ㄹ"],a:4,e:"④ 막공이 매우 작은 나노여과(NF)·역삼투(RO)는 여과만으로 바이러스까지 제거·불활성화 기준을 충족할 수 있다. 정밀여과(MF)·한외여과(UF)는 바이러스 제거에 한계가 있다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:12,q:"소독 공정에서 요구되는 CT요구값의 산출에 필요한 항목이 아닌 것은?",c:["pH","수온","잔류 소독제 농도","소독제의 종류"],a:3,e:"③ CT요구값(소독능 요구값)은 pH·수온·소독제 종류·대상 미생물에 따라 정해진다. 잔류 소독제 농도는 CT계산값(실측) 산출에 쓰이는 항목으로 요구값 산출 항목이 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:13,q:"먹는물 수질기준 중 분원성 연쇄상구균과 살모넬라 기준이 적용되지 않는 것은?",c:["먹는샘물","수돗물","먹는염지하수","먹는해양심층수"],a:2,e:"② 분원성 연쇄상구균·살모넬라 기준은 먹는샘물·먹는염지하수·먹는해양심층수 등에 적용되며, 수돗물에는 적용되지 않는다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:14,q:"슬러지 처리시설 중 슬러지의 유량 조정이 주요 기능인 시설만으로 연결된 것은?",c:["배출수지 - 배슬러지지","배출수지 - 농축조","배슬러지지 - 농축조","농축조 - 탈수기"],a:1,e:"① 배출수지(여과 세척배출수 조정)와 배슬러지지(침전슬러지 조정)는 유량 조정이 주요 기능이다. 농축조는 농축, 탈수기는 탈수가 주기능이다."},

{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:16,q:"농축조의 슬러지 처리량이 100kg/d이고 고형물부하율이 20kg/(m²·d)일 때, 농축조의 표면적(m²)은?",c:["0.2","5","120","2,000"],a:2,e:"② 표면적=슬러지 처리량/고형물부하율=100/20=5 m²."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:17,q:"막여과 공정의 약품세척에서 무기물을 제거하기 위해 일반적으로 사용되는 약품이 아닌 것은?",c:["염산","황산","차아염소산나트륨","산 세제"],a:3,e:"③ 무기물(스케일) 제거에는 염산·황산·산 세제 등 산성 약품을 사용한다. 차아염소산나트륨은 유기물·미생물 제거용 산화제로 무기물 제거 약품이 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:18,q:"색도가 높은 원수를 처리하는 데 적합한 공정은?",c:["모래여과","pH 조정","폭기","응집침전"],a:4,e:"④ 색도(휴믹산 등)는 응집침전으로 효과적으로 제거한다. (필요 시 오존·활성탄 병용)"},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:19,q:"모래여과지의 처리수에 오존을 주입하는 공정은?",c:["전오존","중오존","후오존","배오존"],a:3,e:"③ 여과 처리수(여과 후)에 오존을 주입하는 것은 후오존 공정이다. 전오존은 착수·혼화 전, 중오존은 침전과 여과 사이에 주입한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수처리공정",n:20,q:"자외선 소독 공정에서 조사량에 미치는 영향인자 중 접촉시간과 관련된 것은?",c:["경도","부유물 농도","유입 유량","자외선 램프의 사용기간"],a:3,e:"③ 유입 유량이 클수록 자외선 반응조 내 체류(접촉)시간이 짧아져 조사량이 감소한다. 따라서 접촉시간과 직접 관련된 인자는 유입 유량이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:21,q:"수질오염공정시험기준상 수질 시료 채취에 관한 설명으로 옳지 않은 것은?",c:["시료채취와 보존은 법적인 요구 사항이므로 규정에 따라 실시한다.","수동시료채취의 경우 30분 이상 간격으로 2회 이상 채취하여 단일시료로 한다.","부득이한 사유로 6시간 이상 간격으로 채취한 시료는 각각 측정분석한 후 산술평균하여 산출한다.","자동시료채취기로 채취한 경우는 6시간 이내에 1시간 이상 간격으로 2회 이상 채취하여 단일시료로 한다."],a:4,e:"④ 자동시료채취기는 6시간 이내에 '30분 이상' 간격으로 2회 이상 채취하여 단일시료로 한다. '1시간 이상 간격'은 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:22,q:"0.5N NaOH 용액 400mL와 2M NaOH 용액 300mL에 포함된 NaOH 질량(g)의 합은? (NaOH 분자량 40)",c:["20","24","28","32"],a:4,e:"④ 0.5N(=0.5M) 400mL → 0.5×0.4×40=8 g. 2M 300mL → 2×0.3×40=24 g. 합=8+24=32 g."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:23,q:"수질오염공정시험기준상 총칙의 내용으로 옳은 것은?",c:["시험조작 중 \"즉시\"란 60초 이내에 표시된 조작을 하는 것을 뜻한다.","감압은 따로 규정이 없는 한 15mmHg 이하로 한다.","\"약\"이라 함은 기재된 양에 대하여 ±5% 이상의 차가 있어서는 안 된다.","기체 중의 농도는 표준상태(25℃, 1기압)로 환산 표시한다."],a:2,e:"② 감압은 따로 규정이 없으면 15mmHg 이하로 한다. ①은 '즉시'가 30초 이내, ③은 ±10%, ④는 표준상태가 0℃·1기압이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:24,q:"정수시설의 입상활성탄 세척빈도에 영향을 주는 인자가 아닌 것은?",c:["미소동물의 생명주기","입상활성탄의 비중","흡착방식(고정상, 유동상)","입상활성탄 입자의 크기"],a:2,e:"② 세척빈도는 미소동물 번식(생명주기)·흡착방식·입자 크기·처리수량 등에 영향을 받는다. 입상활성탄의 비중은 세척빈도에 직접 영향을 주는 인자가 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:25,q:"정수처리공정에서 응집용 약품주입에 관한 설명으로 옳지 않은 것은?",c:["원수가 저탁도이더라도 급속여과지에서 약품에 의한 응집 후 여과가 필수적이다.","약품주입률은 자-테스트(Jar-test)로 결정하는 방식이 일반적이다.","자-테스트 방법은 각 정수장의 조건에 따라 달라질 수 있다.","응집제와 응집보조제 저장설비의 용량은 각각 10일분 이상으로 한다."],a:4,e:"④ 응집제 저장설비 용량은 통상 30일분 이상으로 한다. '각각 10일분 이상'은 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:26,q:"오존처리 공정에서 오존주입량 5mg/L, 배출오존량 1mg/L, 잔류오존량 0.5mg/L일 때 오존이용률(흡수율)(%)은?",c:["70","80","87.5","90"],a:1,e:"① 교재 정답표 기준 정답은 ①(70%)이다. 오존이용률=(주입-배출-잔류)/주입×100=(5-1-0.5)/5×100=70%. (참고: (주입-배출)/주입 기준 흡수율로 보면 80%)"},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:27,q:"정수지에서 잔류염소 농도 0.5mg/L, 소독제 접촉시간 30분, 바이러스에 대한 불활성화비가 5일 때 이 정수지의 CT요구값은?",c:["3","6","9","12"],a:1,e:"① CT계산값=C×T=0.5×30=15. 불활성화비=CT계산값/CT요구값 → 5=15/CT요구값 → CT요구값=3."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:28,q:"먹는물수질공정시험기준상 증발잔류물 측정: \"이 시험기준의 정량한계는 ( )mg/L이고, 정량범위는 ( )~20,000mg/L이다.\"의 공통 빈칸은?",c:["1","2","5","10"],a:3,e:"③ 증발잔류물의 정량한계는 5mg/L이며 정량범위는 5~20,000mg/L이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:29,q:"먹는물수질공정시험기준상 냄새 항목 분석에 관한 설명으로 옳지 않은 것은?",c:["시료는 온도를 40~50℃로 높여 관능적으로 냄새를 맡아서 판단한다.","이 시험기준에 의해 판단할 때 염소 냄새는 제외한다.","냄새를 측정하는 사람과 시료를 준비하는 사람은 다른 사람이어야 한다.","고무, 콕 및 플라스틱 마개는 사용 가능하다."],a:4,e:"④ 냄새 분석에서는 고무·콕·플라스틱 마개가 자체 냄새로 시료를 오염시킬 수 있어 사용할 수 없다(유리마개 사용). ④는 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:30,q:"먹는물수질공정시험기준상 암모니아성 질소의 측정방법이 아닌 것은?",c:["자외선/가시선 분광법","질산은 적정법","이온크로마토그래피","연속흐름법"],a:2,e:"② 암모니아성 질소는 자외선/가시선 분광법(인도페놀법)·이온크로마토그래피·연속흐름법으로 측정한다. 질산은 적정법은 염소이온 측정법이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:31,q:"소독에 의한 불활성화비 계산: \"계산된 불활성화비 값이 ( ) 이상이면 99.9%의 지아디아 포낭 불활성화가 이루어진 것으로 한다.\"의 빈칸은?",c:["0.01","0.1","1.0","10"],a:3,e:"③ 불활성화비(CT계산값/CT요구값)가 1.0 이상이면 목표 불활성화(지아디아 99.9% 등)가 달성된 것으로 본다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:32,q:"먹는물 수질기준 중 건강상 유해영향 유기물질에 해당하는 것은?",c:["다이브로모아세토나이트릴","클로로폼","페놀","스트론튬(Sr-90)"],a:3,e:"③ 페놀은 건강상 유해영향 유기물질이다. ①·②는 소독부산물, ④는 방사능 물질에 해당한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:33,q:"먹는물 수질기준 및 검사 등에 관한 규칙상 광역상수도 정수장에서 매일 1회 이상 검사해야 하는 항목이 아닌 것은?",c:["냄새","증발잔류물","색도","탁도"],a:2,e:"② 매일 1회 이상 검사항목은 냄새·맛·색도·탁도·수소이온농도·잔류염소이다. 증발잔류물은 매일 검사항목이 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:34,q:"먹는물관리법상 먹는물에 해당하는 것을 모두 고른 것은? ㄱ.샘물 ㄴ.염지하수 ㄷ.먹는해양심층수 ㄹ.수돗물",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄷ, ㄹ"],a:4,e:"④ 먹는물에는 먹는해양심층수·수돗물 등 '먹을 수 있는 물'이 포함된다. 샘물·염지하수는 가공 전 원수로 그 자체는 먹는물에 해당하지 않는다(먹는샘물·먹는염지하수는 해당)."},
