<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>정수시설운영관리사 기출문제</title>
<style>
:root{--bg:#0e1024;--card:rgba(255,255,255,.055);--ink:#eef0ff;--sub:#9aa3c7;--acc:#8b5cf6;--acc2:#ff4d9e;--cyan:#22d3ee;--ok:#34f5a8;--bad:#ff6b8a;--line:rgba(255,255,255,.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--ink);font-size:16px;line-height:1.55;
background:#0e1024;background-image:radial-gradient(800px 500px at 85% -10%,rgba(139,92,246,.35),transparent 60%),radial-gradient(700px 450px at -10% 30%,rgba(255,77,158,.22),transparent 60%),radial-gradient(600px 400px at 50% 110%,rgba(34,211,238,.18),transparent 60%);background-attachment:fixed}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{background:rgba(14,16,36,.75);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:14px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
header h1{font-size:18px;font-weight:800;flex:1;color:#f2f3ff;text-shadow:0 1px 8px rgba(0,0,0,.55)}
header button{background:rgba(255,255,255,.1);border:1px solid var(--line);color:#fff;border-radius:12px;padding:7px 14px;font-size:14px;font-weight:700;cursor:pointer}
main{flex:1;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.btn{display:block;width:100%;border:0;border-radius:16px;padding:15px;font-size:16px;font-weight:800;background:linear-gradient(135deg,#7c4dff,#ff4d9e);color:#fff;margin-top:10px;cursor:pointer;box-shadow:0 6px 22px rgba(140,77,255,.35);transition:transform .12s}
.btn.sec{background:rgba(255,255,255,.08);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.warn{background:rgba(255,107,138,.14);color:var(--bad);border:1px solid rgba(255,107,138,.4);box-shadow:none}
.btn:active{transform:scale(.96)}
.row{display:flex;gap:8px}.row .btn{flex:1}
.tag{display:inline-block;background:linear-gradient(135deg,rgba(124,77,255,.35),rgba(255,77,158,.35));color:#e9defc;border:1px solid rgba(167,139,250,.4);border-radius:99px;padding:2px 10px;font-size:12px;font-weight:800;margin-right:6px}
.muted{color:var(--sub);font-size:13px}
h2{font-size:16px;margin-bottom:8px;font-weight:800}
.exam-item{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;transition:transform .12s}
.exam-item:active{transform:scale(.98)}
.exam-item:last-child{border-bottom:0}
.exam-item .nm{font-weight:700}
.exam-item .stat{flex-shrink:0;font-size:20px;width:26px;text-align:center;margin-right:6px}
.exam-item.is-done{opacity:.62}
.exam-item.is-done .nm{color:var(--sub)}
.statlabel{display:inline-block;font-size:11px;font-weight:800;padding:1px 8px;border-radius:99px;margin-left:6px;vertical-align:middle;white-space:nowrap}
.statlabel.done{background:rgba(52,245,168,.18);color:#34f5a8;border:1px solid rgba(52,245,168,.45)}
.statlabel.prog{background:rgba(124,77,255,.22);color:#c4b5fd;border:1px solid rgba(167,139,250,.5)}
.pct{font-size:13px;color:var(--sub)}
.hero{text-align:center;padding:22px 16px}
.hero .drop{font-size:52px;display:inline-block;animation:float 2.6s ease-in-out infinite}
.hero .hi{font-size:18px;font-weight:800;margin-top:6px}
.hero .sub{color:var(--sub);font-size:13px;margin-top:3px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
/* quiz */
.qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.qnum{font-weight:800;color:#c4b5fd;font-size:14px}
.streak{font-size:13px;font-weight:800;background:linear-gradient(135deg,rgba(255,140,0,.25),rgba(255,77,158,.25));border:1px solid rgba(255,160,80,.45);border-radius:99px;padding:3px 10px;white-space:nowrap}
.star{font-size:22px;background:none;border:0;color:#4a517a;cursor:pointer}
.star.on{color:#ffd34d;text-shadow:0 0 12px rgba(255,211,77,.7)}
.qtext{font-size:17px;font-weight:700;white-space:pre-wrap;margin-bottom:14px}
.choice{display:flex;gap:10px;align-items:flex-start;border:1.5px solid var(--line);border-radius:16px;padding:13px;margin-bottom:9px;cursor:pointer;background:rgba(255,255,255,.04);white-space:pre-wrap;transition:transform .1s,border-color .15s}
.choice:active{transform:scale(.98)}
.choice .no{font-weight:800;color:#a78bfa;flex-shrink:0}
.choice.right{border-color:var(--ok);background:rgba(52,245,168,.12);box-shadow:0 0 18px rgba(52,245,168,.25);animation:pop .35s}
.choice.wrong{border-color:var(--bad);background:rgba(255,107,138,.12);animation:shake .4s}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.035)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
.exp{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.3);border-left:4px solid var(--cyan);border-radius:14px;padding:13px;margin-top:12px;font-size:15px;white-space:pre-wrap}
.exp b{color:var(--cyan)}
.verdict{font-weight:800;margin-top:12px;font-size:17px}
.verdict.ok{color:var(--ok)}.verdict.bad{color:var(--bad)}
.progress{height:8px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:12px}
.progress i{display:block;height:100%;background:linear-gradient(90deg,#7c4dff,#ff4d9e,#22d3ee);border-radius:99px;transition:width .3s}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:10px}
.grid button{border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);border-radius:10px;padding:7px 0;font-size:13px;cursor:pointer}
.grid button.done-ok{background:rgba(52,245,168,.15);border-color:rgba(52,245,168,.5);color:var(--ok);font-weight:800}
.grid button.done-bad{background:rgba(255,107,138,.15);border-color:rgba(255,107,138,.5);color:var(--bad);font-weight:800}
.grid button.cur{outline:2px solid #a78bfa}
.statline{display:flex;justify-content:space-between;padding:10px 2px;border-bottom:1px solid var(--line);font-size:14px}
.statline:last-child{border-bottom:0}
.bigscore{font-size:46px;font-weight:900;background:linear-gradient(90deg,#a78bfa,#ff7ab8,#22d3ee);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,22,45,.95);border:1px solid var(--line);color:#fff;padding:11px 20px;border-radius:99px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:99;max-width:90%}
#toast.show{opacity:1}
textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);border-radius:12px;padding:10px;font-size:13px;min-height:90px}
.aiBox{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
footer{padding:12px;text-align:center;color:var(--sub);font-size:12px}
.party{position:fixed;pointer-events:none;z-index:98;font-size:22px;will-change:transform,opacity}
</style>
</head>
<body>
<div id="app">
<header><h1 id="hTitle">💧 정수퀴즈</h1><button id="hBack" style="display:none" onclick="goHome()">🏠 홈</button></header>
<main id="main"></main>
<footer>학습기록은 이 기기 브라우저에 저장됩니다 · 설정에서 백업 가능</footer>
</div>
<div id="toast"></div>
<script>
/* ===================== 데이터 =====================
   필드: g그룹키, gt그룹제목, s과목, n번호, q문제, c보기4, a정답(1~4), e해설 */
const QUESTIONS = [
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:23,q:"2,4-D와 할로아세틱에시드 표준원액에 대한 설명으로 틀린 것은?",c:["시판되는 표준원액을 사용해도 좋다.","2,4-D와 모노클로로아세틱에시드, 모노브로모아세틱에시드를 각각 50.0mg씩 취하여 메틸삼차-부틸에테르에 녹여 50mL로 한다.","-10℃의 어두운 곳에서 보관하며, 2개월 이내에 사용한다.","500배 희석하여 사용한다."],a:4,e:"2,4-D와 할로아세틱에시드 표준원액(고시 별표 3): 각 50.0mg씩 취하여 메틸삼차-부틸에테르에 녹여 50mL로 한다. 이 용액 1mL는 각 1mg을 함유한다. -10℃의 어두운 곳에서 보관하며 2개월 이내 사용. '500배 희석'은 표준원액 자체에 대한 설명으로 틀림."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:24,q:"2,4-D와 할로아세틱에시드 검사에 사용되는 기체크로마토그래프-전자포획검출법의 조작조건으로 틀린 것은?",c:["시료도입부 온도: 200~280℃","칼럼온도: 40~310℃","유량: 0.5~4mL/min","운반기체: 부피백분율 99.999% 이상의 헬륨 또는 아르곤"],a:4,e:"운반기체는 부피백분율 99.999% 이상의 헬륨 또는 질소를 사용한다(아르곤이 아님) (고시 별표 3)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:25,q:"알라클러 검사에 사용되는 기체크로마토그래프-전자포획검출법의 전처리로 틀린 것은?",c:["시료 200mL를 250mL 분액깔때기에 취하고 내부표준용액 200μL를 넣고 섞는다.","인산이수소칼륨 5g을 넣어 pH 9 정도로 맞춘다.","염화나트륨 10g을 넣은 후 잘 녹인다.","다이클로로메탄 10mL를 넣고 10분간 격렬히 흔든다."],a:2,e:"인산이수소칼륨 1g을 넣어 pH 4.5 정도로 맞춘다(5g/pH 9가 아님) (고시 별표 3)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:26,q:"프탈레이트와 아디페이트 검사에 사용되는 기체크로마토그래프-질량분석법의 시약에 대한 설명으로 틀린 것은?",c:["표준용액 - 표준시약 또는 특급 이상의 것을 사용하며, 표준물질의 순도가 96% 이상이면 농도는 보정하지 아니한다.","표준원액 - 냉장고에 보존한다.","표준용액 - 각각의 표준원액 250μL를 취하여 25mL 갈색의 부피플라스크에 넣고 잘 혼합한 다음 메탄올로 채운 후 냉장고에 보존한다.","내부표준용액 - 메탄올로 50배 희석한다."],a:4,e:"내부표준용액(100mg/L)은 메탄올로 10배 희석한다(50배가 아님) (고시 별표 3)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:27,q:"안티몬(Sb) 검사에 사용되는 유도결합플라스마-원자발광분광법의 안티몬표준용액(10mg/L) 제조방법으로 가장 올바른 것은?",c:["안티몬표준원액(1,000mg/L) 0.5mL를 10mL 부피플라스크에 넣고 표준원액과 같은 양의 산을 넣어 정제수로 표선까지 채운다.","안티몬표준원액(1,000mg/L) 1.0mL를 100mL 부피플라스크에 넣고 표준원액과 같은 양의 산을 넣어 정제수로 표선까지 채운다.","안티몬표준원액(1,000mg/L) 1.0mL를 10mL 부피플라스크에 넣고 표준원액과 같은 양의 산을 넣어 정제수로 표선까지 채운다.","안티몬표준원액(1,000mg/L) 2.0mL를 100mL 부피플라스크에 넣고 표준원액과 같은 양의 산을 넣어 정제수로 표선까지 채운다."],a:2,e:"안티몬표준원액(1,000mg/L) 1.0mL를 100mL 부피플라스크에 넣고(→10mg/L), 표준원액과 같은 양의 산을 넣어 정제수로 표선까지 채운다(고시 별표 3)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:28,q:"2,4-D와 할로아세틱에시드 검사에 사용되는 기체크로마토그래프-전자포획검출법의 내부표준용액 제조에 쓰이는 것은?",c:["1,2,3-트라이클로로프로판","무수황산나트륨","탄산수소나트륨","황산구리"],a:1,e:"기체크로마토그래프-전자포획검출법 내부표준용액(고시 별표 3): 1,2,3-트라이클로로프로판 50.0mg을 취하여 메틸삼차-부틸에테르에 녹여 50mL로 한다. 이 용액 1mL는 1,2,3-트라이클로로프로판 0.025mg을 함유한다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:1,q:"수질자동측정기 선정 시 일반적 고려사항이 아닌 것은?",c:["측정기의 성능","측정기의 가격","측정기의 내구성","현장설치 비용"],a:2,e:"①·③·④ 외에 유지관리비용, 시운전 및 교육 등이 고려사항이다. 측정기의 가격 자체는 일반적 고려사항으로 보기 어렵다(정답표상 ②)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:2,q:"정수지 내 수질자동측정기의 기본설치항목이 아닌 것은?",c:["수온","pH","탁도","COD"],a:4,e:"기본설치항목: 수온, pH, 탁도, 잔류염소. COD는 해당 없음."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:3,q:"여과지 내 수질자동측정기의 추가설치항목이 아닌 것은?",c:["pH","탁도","알칼리도","플루오린"],a:2,e:"여과지 '탁도'의 경우 기본설치항목으로 통합여과수 탁도계와 여과지별 탁도계를 포함한다(추가설치항목이 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:4,q:"수질자동측정기의 가장 기본적인 감시인자로 정수처리공정 중 모든 물리적·화학적 공정에 영향을 미치는 항목은?",c:["pH, 수온","탁도계","알칼리도","TOC(Total Organic Carbon)"],a:1,e:"pH, 수온은 소독, 혼화, 응집, 침전, 여과, 부식제어 등에 영향을 미친다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:5,q:"다음 중 소독부산물 주요 원인물질인 유기물질에 대한 감시기능강화 및 소독부산물 저감을 위한 공정운영 판단기준 항목은?",c:["전기전도도(EC)","잔류염소","조류측정기(Chl-a)","TOC(Total Organic Carbon)"],a:4,e:"TOC(Total Organic Carbon)는 취수장이나 착수정에서 소독부산물 주요 원인물질인 유기물질에 대한 감시기능강화 및 소독부산물 저감을 위한 공정운영 판단기준 항목이다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:6,q:"수온에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - ℃","측정원리 - 열전대 온도계, 측온저항체 온도계","측정범위 - -10~45℃","정밀도 - 허용오차 최대눈금치 ±5% 이하"],a:4,e:"정밀도: 허용오차 최대눈금치 ±2% 이하(±5%가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:7,q:"pH에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - pH","측정원리 - 전극법","측정범위 - 0~14pH","분해능 - 0.1pH"],a:4,e:"분해능: 0.01pH(0.1pH가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:8,q:"원수탁도에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - NTU","측정원리 - 표면산란광","측정범위 - 0~100/1,000(2,000)NTU","분해능 - 0.1NTU"],a:4,e:"분해능: 1NTU(0.1NTU가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:9,q:"전기전도도에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - μS/cm","측정원리 - 90° 산란광","측정범위 - 호소수 0~500μS/cm, 하천수 0~1,000μS/cm","분해능 - 0.1μS/cm"],a:2,e:"측정원리: 전극법(90° 산란광이 아님 — 그것은 탁도계 원리)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:10,q:"알칼리도에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - 중화적정법","측정범위 - 0~50(100)mg/L","정밀도 - 최대눈금치 ±1% 이하"],a:4,e:"정밀도: 최대눈금치 ±3% 이하(±1%가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:11,q:"잔류염소에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - 무시약식","측정범위 - 무시약식 0~10mg/L","분해능 - 0.01mg/L"],a:3,e:"측정범위: 무시약식 0~3mg/L(0~10mg/L가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:12,q:"플루오린에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - 전극법","측정범위 - 0~3mg/L","분해능 - 0.01mg/L"],a:4,e:"분해능: 0.001mg/L(0.01mg/L가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:13,q:"TOC에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - Streaming Current","측정범위 - 0~10mg/L","분해능 - <0.1mg/L"],a:2,e:"측정원리: CO₂ 산화법(Streaming Current가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:14,q:"NH₃-N에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - 이온전극법","측정범위 - 0~10mg/L","재현성 - 최대눈금치 ±3% 이하"],a:4,e:"재현성: 최대눈금치 ±2% 이하(±3%가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:15,q:"조류측정기에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - UV흡광법","측정범위 - 0~100ppb","분해능 - 0.01mg/L"],a:2,e:"측정원리: 형광광도법(UV흡광법이 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:16,q:"COD(UV)에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - UV흡광법","측정범위 - 흡광도 0~10ABS","분해능 - 0.1mg/L"],a:3,e:"측정범위: 흡광도 0~2.5ABS, COD환산 0~200mg/L(0~10ABS가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:17,q:"SS에 대한 수질자동측정기의 일반적 성능기준이 틀린 것은?",c:["측정단위 - mg/L","측정원리 - 전극법","측정범위 - 0~1,000mg/L","분해능 - 0.1mg/L"],a:2,e:"SS 측정원리에 대한 기준이 없다. '전극법'은 잘못된 설명이다(SS는 광학적 산란/투과 원리)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:18,q:"수질자동측정기 및 시료채취 위치에 대한 설명으로 틀린 것은?",c:["수질자동측정기는 현장(Local)설치를 원칙으로 한다.","현장 여건상 필요시 중앙집중식(Remote)으로 설치할 수 있다.","중앙집중식으로 설치 시 시료 공급과정에서의 오염, 변질 등 수질변화를 최대화한다.","취수장의 시료채취 위치는 침사지 또는 흡수정이다."],a:3,e:"중앙집중식으로 설치 시 시료 공급과정에서의 오염, 변질 등 수질변화를 최소화한다(최대화가 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:19,q:"침전수의 수질자동측정기의 설치 위치는?",c:["취수펌프장","약품투입실","여과지동","정수지"],a:3,e:"침전수의 기기설치 위치는 여과지동이다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:20,q:"수질자동측정기 설치 시 유의사항으로 틀린 것은?",c:["수질자동측정기실에는 PVC 배관경화, 탈포수조 부착생물 성장 등을 방지하기 위해 차광설비를 설치한다.","수질자동측정기실은 타시설과 일체의 공간으로 하고 낙뢰, 습기, 먼지, 부식성 가스(염소) 등에 의해 계측기가 손상받지 않도록 적절한 보호설비를 설치한다.","샘플링 펌프 및 수질자동계측기 전원은 단전 시에도 정상가동이 될 수 있도록 무정전 전원장치(UPS) 또는 기존 비상발전기 등을 이용하여 안정적인 전원 공급을 고려한다.","수질자동측정기실에는 기기의 보정과 유지보수를 위해 정수가 공급될 수 있도록 배관을 구성한다."],a:2,e:"수질자동측정기실은 타시설과 '별도의' 공간으로 구분하고 낙뢰, 습기, 먼지, 부식성 가스(염소) 등에 의해 계측기가 손상받지 않도록 적절한 보호설비(써지어레스트, 환기설비 등)를 설치하며 원활한 유지보수, 검교정 및 장래 시설확장을 위해 충분한 여유공간을 확보한다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:21,q:"수질자동측정기 운영 시스템 구성 시 유의사항으로 틀린 것은?",c:["수질자동측정기 계측신호를 안정적으로 수집할 수 있도록 시스템을 구성한다.","시스템 용량은 장래 설비확장을 고려하여야 한다.","운영시스템은 공정별 실시간 측정값을 표현하고 샘플링 펌프와 계측기 가동상태를 감시 및 조작할 수 있는 기능과 실시간 트렌드기능, 레포트기능, 백업기능 등이 포함되어 있어야 한다.","측정자료는 매 1시간 간격으로 순시치를 기록하고 백업은 엑셀파일로 변환한다."],a:4,e:"측정자료는 매 15분 간격으로 순시치를 기록하고 백업은 엑셀파일로 변환한다(1시간이 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:22,q:"탁도계 수질자동측정기 설치 시 유의사항으로 틀린 것은?",c:["취수장 탁도계의 경우 하천수를 취수하는 경우, 여러 정수장으로 원수를 공급하는 광역취수장 또는 기타 현장여건상 필요시에 설치하고 경보가 가능토록 한다.","탁도 측정방식은 NTU 방식을 표준으로 하며 검출기가 산란광을 받아들이는 각도가 입사광에 대해 30°로부터 ±60°를 넘지 않아야 한다.","공정관리용 여과지 탁도계는 여과수가 통합되어 유출되는 대표지점에서 샘플링을 실시하여 탁도를 측정하며 동일한 시료를 대상으로 입자수 감시를 위해 입자계수기를 설치할 수 있다.","개별 여과지 탁도계는 여과지 탁도관리 및 적절한 역세시점 파악 등을 위해 지별로 설치하며 개별 여과지 탁도 측정값을 역세척 인자 등 여과지 운영자료로 활용한다."],a:2,e:"탁도 측정방식은 NTU 방식을 표준으로 하며 검출기가 산란광을 받아들이는 각도가 입사광에 대해 90°로부터 ±30°를 넘지 않아야 한다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:23,q:"입자계수기(Particle Counter) 설치 시 유의사항으로 틀린 것은?",c:["입자계수기는 통합여과수 탁도계와 함께 설치한다.","설치순서는 탁도계, 입자계수기 순서로 하고 입자계수기 단독으로 설치할 수 있다.","탁도측정 후 유출되는 시료 또는 동일한 시료수를 탁도와 입자계수기로 동시에 공급하여 탁도 및 입자계수 측정이 될 수 있도록 구성한다.","입자계수기는 탈부착이 가능한 구조로 설치하며 필요시 개별 여과지 연결부분으로 설치하여 개별 여과지 진단에 활용할 수 있도록 한다."],a:2,e:"설치순서는 탁도계, 입자계수기 순서로 하고 입자계수기 단독으로는 설치할 수 없다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:24,q:"잔류염소계 설치 시 유의사항으로 틀린 것은?",c:["취수장에서 전염소 처리 시 착수정에 설치할 수 있다.","정수장에서 전염소 처리 시 혼화지 및 침전지에도 설치할 수 있다.","전염소 종속제어를 위해 필요시 혼화지 유출측과 여과지 유입 전 적정지점 또는 전염소 주입 후 10분 이내 지점에서 샘플링하여 잔류염소를 측정한다.","여과지 잔류염소계는 개별 여과수 통합지점에서 샘플링하여 측정한다."],a:3,e:"전염소 종속제어를 위해 필요시 혼화지 유출측과 응집지 유입 전 적정지점 또는 전염소 주입 후 5분 이내 지점에서 샘플링하여 잔류염소를 측정한다(10분이 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:25,q:"유동전류계(SCD; Streaming Current Detector) 설치 시 유의사항으로 틀린 것은?",c:["SCD는 응집제 주입 후 30초에서 2분 이내의 적정지점(응집지 유입 전)에서 채수하여 측정할 수 있도록 구성한다.","현장설치(Local)를 원칙으로 한다.","SCD를 활용한 응집제 주입량 제어·감시 시스템을 구성한다.","응집제 주입제어의 경우 전체적인 제어시간이 3분을 넘어서는 안 된다."],a:4,e:"응집제 주입제어의 경우 전체적인 제어시간이 5분을 넘어서는 안 된다(3분이 아님)."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:26,q:"TOC의 일반적인 분석단계로 올바른 것은?",c:["시료전처리 → 무기성 탄소제거 → CO₂ 산화 → TOC","시료전처리 → CO₂ 산화 → 무기성 탄소제거 → TOC","무기성 탄소제거 → 시료전처리 → CO₂ 산화 → TOC","무기성 탄소제거 → CO₂ 산화 → 시료전처리 → TOC"],a:1,e:"TOC의 일반적인 분석단계: 시료전처리 → 무기성 탄소제거 → CO₂ 산화 → TOC 검출 순서이며, CO₂ 산화방식에 따라 저온산화(100℃ 이하)와 고온산화(680~950℃)로 분류한다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:27,q:"TOC의 저온산화방식의 장점이 아닌 것은?",c:["높은 검출한계","오븐 내에 고형물 비생성","유지보수비용 낮음","높은 수준의 자동화"],a:1,e:"저온산화방식의 장점: 낮은 검출한계(>0.2mg/L), 많은 시료량으로 높은 대표성, 오븐 내에 고형물 비생성, 유지보수비용 낮음, 초기투자비 낮음, 외부표준물질을 이용한 자동보정, 높은 수준의 자동화, 100μm 입자크기 요구, 높은 응답시간(95% 이상). '높은 검출한계'는 장점이 아니다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:28,q:"TOC의 고온산화방식의 장점이 아닌 것은?",c:["최적 산화 가능","염화물 간섭영향 없음","위험성 화학약품 사용, 생성 없음","낮은 응답시간"],a:4,e:"고온산화방식의 장점: 최적 산화 가능, 고농도 처리 가능, 염화물 간섭영향 없음, 위험성 화학약품 미사용, 낮은 화학약품 소비, 간단한 외부형태, 유지보수 간단, 큰 측정범위, 외부표준물질 자동보정, 높은 응답시간(95% 이상), 높은 자동화. '낮은 응답시간'은 장점이 아니다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:29,q:"광역·지방상수도 하천수의 원수 수질검사 항목수로 올바른 것은?",c:["18","21","29","31"],a:4,e:"광역·지방상수도 하천수: 검사 항목수 31개, 검사 주기 월별 6개, 분기별 25개."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:30,q:"광역 및 지방상수도 하천수의 월 1회 이상 측정항목이 아닌 것은?",c:["pH","BOD","SS","유기인"],a:4,e:"하천수, 복류수의 월 1회 이상 측정항목: 수소이온농도, 생물화학적 산소요구량, 부유물질량, 용존산소량, 대장균군(총대장균군, 분원성 대장균군). 유기인은 해당 없음."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:31,q:"광역 및 지방상수도 호소수의 분기 1회 이상 측정항목이 아닌 것은?",c:["음이온 계면활성제","PCB","플루오린","다이아지논"],a:4,e:"다이아지논은 지하수의 반기 1회 이상 측정항목이다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:32,q:"광역 및 지방상수도 지하수의 반기 1회 이상 측정항목이 아닌 것은?",c:["Cd","As","CN","PCB"],a:4,e:"지하수의 반기 1회 이상 측정항목: 카드뮴, 비소, 시안, 수은, 납, 크롬, 음이온 계면활성제, 다이아지논, 파라티온, 페니트로티온, 플루오린, 셀레늄, 암모니아성 질소, 질산성 질소, 카르바릴, 1,1,1-트라이클로로에탄, 테트라클로로에틸렌, 트라이클로로에틸렌, 페놀. PCB는 해당 없음."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:33,q:"전용상수도 및 소규모급수시설에서 하천수, 복류수, 계곡수 등의 표류수 측정항목이 아닌 것은?",c:["COD","BOD","SS","DO"],a:1,e:"① COD는 호소수 반기 1회 이상 측정항목이다. 표류수 측정항목은 BOD, SS, DO 등이다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:34,q:"수도관 수도꼭지 수질검사 실시 시 수질검사항목이 아닌 것은?",c:["총대장균군","잔류염소","아연","유기인"],a:4,e:"수도관 수도꼭지 수질검사 항목: 미생물(일반세균, 총대장균군, 대장균/분원성 대장균군), 소독(잔류염소), 급수관재질(철, 동, 아연, 망간), 하수유입(암모니아성 질소, 염소이온). 유기인은 해당 없음."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:35,q:"정수장에서 매일 검사하는 먹는물 검사항목이 아닌 것은?",c:["냄새","맛","색도","대장균"],a:4,e:"정수장에서 매일 검사하는 먹는물 검사항목: 냄새, 맛, 색도, 탁도, pH, 잔류염소. 대장균은 매일 검사 대상이 아니다."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:36,q:"수도꼭지에서 매월 검사하는 먹는물 검사항목이 아닌 것은?",c:["일반세균","총대장균군","분원성 대장균군","과망간산칼륨소비량"],a:4,e:"수도꼭지에서 매월 검사하는 먹는물 검사항목: 일반세균, 총대장균군, 대장균/분원성 대장균군, 잔류염소. 과망간산칼륨소비량은 해당 없음."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:37,q:"급수과정별 시설에서 매분기 검사하는 먹는물 검사항목이 아닌 것은?",c:["총대장균군","대장균","암모니아성 질소","플루오린"],a:4,e:"급수과정별 시설에서 매분기 검사하는 먹는물 검사항목: 일반세균, 총대장균군, 대장균/분원성 대장균군, 암모니아성 질소, 총트라이할로메탄, 동, pH, 아연, 철, 탁도, 잔류염소. 플루오린은 해당 없음."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:38,q:"수돗물의 불신 해소 및 신뢰도 제고를 위한 방안으로 볼 수 없는 것은?",c:["시민참여 역할강화를 위한 수돗물평가위원회의 운영 활성화","수돗물 서비스센터 운영 강화","수돗물 불신해소를 위한 프로그램 개발·시행","PET병 수돗물의 사용 억제"],a:4,e:"수돗물의 불신 해소 및 신뢰도 제고를 위한 방안에는 ①, ②, ③ 외에 '우리집 수돗물 안심확인제' 시행 및 '수돗물 사랑마을' 운영이 있다. PET병 수돗물 사용 억제는 해당 없음."},
{g:"b2c3",gt:"[1권] 2과목 3장 먹는물 수질관리 방법",s:"수질분석",n:39,q:"먹는물 수질관리 결과보고의 주기로 틀린 것은?",c:["정수장 및 수도꼭지 수질검사결과 - 매월","급수과정별 수질검사결과 - 매분기","수질감시항목 수질검사결과 - 매반기","정수처리기준 운영결과 - 매월"],a:3,e:"수질감시항목 수질검사결과: 매년(1회)이다(매반기가 아님)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:1,q:"환경정책기본법의 목적으로 틀린 내용은?",c:["환경보전에 관한 국민의 권리·의무와 국가의 책무를 명확히 함","환경정책의 기본이 되는 사항을 정하여 환경오염과 환경훼손을 예방함","환경을 적정하고 지속가능하게 관리·보전함","수도를 적정하고 합리적으로 설치·관리함"],a:4,e:"④ 수도법의 목적에 해당한다(수도법 제1조). 환경정책기본법의 목적과는 무관하다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:2,q:"환경정책기본법상 기본이념으로 적절하지 않은 것은?",c:["환경의 질적인 향상과 그 보전을 통한 쾌적한 환경의 조성","인간과 환경 간의 조화와 균형의 유지","현재의 국민보다 후손들이 그 혜택을 널리 향유할 수 있게 함","환경을 이용하는 모든 행위를 할 때에는 환경보전을 우선적으로 고려"],a:3,e:"기후변화 등 지구환경상의 위해를 예방하기 위하여 공동으로 노력함으로써 현 세대의 국민이 그 혜택을 널리 누릴 수 있게 함과 동시에 미래의 세대에게 그 혜택이 계승될 수 있도록 하여야 한다(환경정책기본법 제2조). '후손들이' 우선이 아니라 현 세대와 미래세대가 함께 누리는 것이다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:3,q:"일정한 지역에서 환경오염 또는 환경훼손에 대하여 환경이 스스로 수용·정화 및 복원하여 환경의 질을 유지할 수 있는 한계를 무엇이라 하는가?",c:["환경오염","환경훼손","환경보전","환경용량"],a:4,e:"환경용량: 일정한 지역에서 환경오염 또는 환경훼손에 대하여 환경이 스스로 수용·정화 및 복원하여 환경의 질을 유지할 수 있는 한계(환경정책기본법 제3조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:4,q:"하천에서 사람의 건강보호 기준으로 연결이 잘못된 것은?",c:["카드뮴(Cd) - 0.005mg/L 이하","비소(As) - 0.5mg/L 이하","벤젠 - 0.01mg/L 이하","시안(CN) - 검출되어서는 안 됨"],a:2,e:"② 비소(As): 0.05mg/L 이하(환경정책기본법 시행령 별표 1). 0.5mg/L가 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:5,q:"등급별 수질 및 수생태계 상태를 설명한 내용으로 틀린 내용은?",c:["좋음 - 용존산소가 풍부하고 오염물질이 없는 청정상태의 생태계로 여과·살균 등 간단한 정수처리 후 생활용수로 사용할 수 있음","약간 좋음 - 약간의 오염물질은 있으나 용존산소가 많은 상태의 다소 좋은 생태계로 여과·침전·살균 등 일반적인 정수처리 후 생활용수 또는 수영용수로 사용할 수 있음","보통 - 보통의 오염물질로 인하여 용존산소가 소모되는 일반 생태계로 여과·침전·활성탄 투입·살균 등 고도의 정수처리 후 생활용수로 이용하거나 일반적 정수처리 후 공업용수로 사용할 수 있음","나쁨 - 다량의 오염물질로 인하여 용존산소가 소모되는 생태계로 산책 등 국민의 일상생활에 불쾌감을 주지 않으며, 활성탄 투입·역삼투압 공법 등 특수한 정수처리 후 공업용수로 사용할 수 있음"],a:1,e:"① '매우 좋음'에 해당한다(환경정책기본법 시행령 별표 1). '좋음'은 용존산소가 풍부하고 약간의 오염물질이 있는 상태이다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:6,q:"하천의 생활환경 기준으로 '매우 좋음'을 나타내는 지표로 부적절한 것은?",c:["수소이온농도(pH) - 6.5~8.5","생물화학적 산소요구량(BOD) - 1mg/L 이하","부유물질량 - 25mg/L 이하","용존산소량 - 5.0mg/L 이상"],a:4,e:"④ 용존산소량: 7.5mg/L 이상(환경정책기본법 시행령 별표 1). '매우 좋음' 등급은 5.0mg/L 이상이 아니라 7.5mg/L 이상이다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:7,q:"해역의 전수역에서 사람의 건강보호를 위한 항목별 기준이 잘못 연결된 것은?",c:["6가크로뮴(Cr⁶⁺) - 0.005mg/L 이하","구리(Cu) - 0.02mg/L 이하","폴리클로리네이티드바이페닐(PCB) - 0.0005mg/L 이하","다이아지논 - 0.02mg/L 이하"],a:1,e:"① 6가크로뮴(Cr⁶⁺): 0.05mg/L 이하(환경정책기본법 시행령 별표 1). 0.005mg/L가 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:8,q:"호소의 생활환경 기준으로 '나쁨' 등급에 해당하는 기준으로 틀린 것은?",c:["수소이온농도(pH) - 6.0~8.5","총유기탄소량(TOC) - 8mg/L 이하","용존산소량(DO) - 2.0mg/L 이상","부유물질량(SS) - 15mg/L 이하"],a:4,e:"④ 부유물질량(SS): 쓰레기 등이 떠있지 않을 것(환경정책기본법 시행령 별표 1). '나쁨' 등급은 SS 수치기준이 아니라 쓰레기 미부유 기준이다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:9,q:"물환경보전법상 '점오염원'과 관련 없는 내용은?",c:["폐수배출시설","하수발생시설","불특정 장소","관로·수로"],a:3,e:"점오염원: 폐수배출시설, 하수발생시설, 축사 등으로서 관로·수로 등을 통하여 일정한 지점으로 수질오염물질을 배출하는 배출원을 말한다(물환경보전법 제2조). '불특정 장소'는 비점오염원의 특징이다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:10,q:"다음 중 수질오염감시경보의 대상 항목이 아닌 것은?",c:["남조류 세포수","총질소","총유기탄소","페놀"],a:1,e:"① 남조류 세포수는 조류경보의 대상 항목에 해당된다(물환경보전법 시행령 별표 2). 수질오염감시경보 항목이 아니다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:11,q:"상수원 구간의 조류경보의 경보단계로 옳지 않은 것은?",c:["관심","주의","조류 대발생","해제"],a:2,e:"상수원 구간의 조류경보의 경보단계(물환경보전법 시행령 별표 3): 관심, 경계, 조류 대발생, 해제. '주의'는 해당 없음."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:12,q:"상수원 구간의 조류경보의 '조류 대발생' 발령·해제기준으로 남조류의 세포수가 맞는 것은?",c:["1,000세포/mL 이상 10,000세포/mL 미만인 경우","10,000세포/mL 이상 1,000,000세포/mL 미만인 경우","1,000,000세포/mL 이상인 경우","1,000세포/mL 미만인 경우"],a:3,e:"조류 대발생 기준: 남조류 세포수 1,000,000세포/mL 이상(물환경보전법 시행령 별표 3). ① 관심기준, ② 경계기준, ④ 해제기준."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:13,q:"수질오염감시경보의 단계로 올바르게 연결한 것은?",c:["관심 - 주의 - 경계 - 심각 - 해제","주의 - 관심 - 경계 - 심각 - 해제","경계 - 관심 - 주의 - 심각 - 해제","경계 - 주의 - 관심 - 심각 - 해제"],a:1,e:"수질오염감시경보의 단계(물환경보전법 시행령 별표 3): 관심 - 주의 - 경계 - 심각 - 해제"},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:14,q:"수질오염감시경보에 대한 설명으로 틀린 것은?",c:["측정소별 측정항목과 측정항목별 경보기준 등 수질오염감시경보에 관하여 필요한 사항은 환경부장관이 고시한다.","용존산소, 전기전도도, 총유기탄소 항목이 경보기준을 초과하는 것은 그 기준초과 상태가 30분 이상 지속되는 경우를 말한다.","수소이온농도 항목이 경보기준을 초과하는 것은 3 이하 또는 12 이상이 30분 이상 지속되는 경우를 말한다.","생물감시장비 중 물벼룩감시장비가 경보기준을 초과하는 것은 양쪽 모든 시험조에서 30분 이상 지속되는 경우를 말한다."],a:3,e:"③ 수소이온농도 항목이 경보기준을 초과하는 것은 5 이하 또는 11 이상이 30분 이상 지속되는 경우를 말한다(물환경보전법 시행령 별표 3). 3 이하/12 이상이 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:15,q:"먹는물관리법상 '먹는물'에 해당되지 않는 것은?",c:["빗물","수돗물","먹는샘물","먹는해양심층수"],a:1,e:"먹는물: 먹는 데에 일반적으로 사용하는 자연 상태의 물, 자연 상태의 물을 먹기에 적합하도록 처리한 수돗물, 먹는샘물, 먹는염지하수, 먹는해양심층수 등을 말한다(먹는물관리법 제3조). 빗물은 해당 없음."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:16,q:"먹는물의 수질기준을 정하여 보급하는 등 먹는물의 수질 관리를 위하여 필요한 시책을 마련하여야 하는 자는?",c:["환경부장관","특별시장·광역시장·도지사·특별자치도지사","지방자치단체장","지방환경청장"],a:1,e:"환경부장관은 먹는물, 샘물 및 염지하수의 수질기준을 정하여 보급하는 등 먹는물, 샘물 및 염지하수의 수질 관리를 위하여 필요한 시책을 마련하여야 한다(먹는물관리법 제5조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:17,q:"먹는물공동시설의 수질을 정기적으로 검사하는 등 먹는물공동시설의 알맞은 관리를 위하여 필요한 조치를 하여야 하는 자는?",c:["환경부장관","시·도지사","시장·군수·구청장","지방환경청장"],a:3,e:"먹는물공동시설 소재지의 특별자치시장·특별자치도지사·시장·군수·구청장은 먹는물공동시설을 개선하고 수질을 정기적으로 검사하며 필요한 조치를 하여야 한다(먹는물관리법 제8조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:18,q:"먹는샘물의 검사 중 관능검사에 해당하는 항목이 아닌 것은?",c:["성상","온도","색깔","냄새"],a:2,e:"관능검사: 정밀검사 결과 적합판정을 받은 같은 회사, 같은 제품을 6개월 이내에 다시 수입하는 것은 현품의 성상·색깔·맛·냄새 등에 의하여 판단한다(먹는물관리법 시행규칙 별표 4). 온도는 해당 없음."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:19,q:"먹는물 수질기준 중 건강상 유해영향 무기물질에 관한 기준으로 틀린 것은?",c:["수은은 0.001mg/L를 넘지 아니할 것","암모니아성 질소는 0.5mg/L를 넘지 아니할 것","카드뮴은 0.005mg/L를 넘지 아니할 것","납은 0.1mg/L를 넘지 아니할 것"],a:4,e:"④ 납은 0.01mg/L를 넘지 아니할 것(먹는물 수질기준 및 검사 등에 관한 규칙 별표 1). 0.1mg/L가 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:20,q:"먹는물 수질기준 중 건강상 유해영향 유기물질에 관한 기준으로 틀린 것은?",c:["페놀은 0.005mg/L를 넘지 아니할 것","파라티온은 0.005mg/L를 넘지 아니할 것","톨루엔은 0.7mg/L를 넘지 아니할 것","1,1-다이클로로에틸렌은 0.03mg/L를 넘지 아니할 것"],a:2,e:"② 파라티온은 0.06mg/L를 넘지 아니할 것(먹는물 수질기준 및 검사 등에 관한 규칙 별표 1). 0.005mg/L가 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:21,q:"먹는물 수질기준 중 소독제 및 소독부산물질에 관한 기준으로 틀린 것은?",c:["유리잔류염소는 0.5mg/L를 넘지 아니할 것","클로로폼은 0.08mg/L를 넘지 아니할 것","총트라이할로메탄은 0.1mg/L를 넘지 아니할 것","트라이클로로아세토나이트릴은 0.004mg/L를 넘지 아니할 것"],a:1,e:"① 잔류염소(유리잔류염소)는 4.0mg/L를 넘지 아니할 것(먹는물 수질기준 및 검사 등에 관한 규칙 별표 1). 0.5mg/L가 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:22,q:"먹는물 수질기준 중 심미적 영향물질에 관한 기준으로 틀린 것은?",c:["경도는 1,000mg/L(수돗물의 경우 300mg/L, 먹는염지하수·먹는해양심층수의 경우 1,200mg/L)를 넘지 아니할 것","과망간산칼륨 소비량은 10mg/L를 넘지 아니할 것","색도는 5도를 넘지 아니할 것","아연은 5mg/L를 넘지 아니할 것"],a:4,e:"④ 아연은 3mg/L를 넘지 아니할 것(먹는물 수질기준 및 검사 등에 관한 규칙 별표 1). 5mg/L가 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:23,q:"상수원관리규칙에서 수원의 구분으로 틀린 것은?",c:["복류수 - 하천, 호소나 이에 준하는 수역의 바닥면 아래나 옆면의 모래자갈층 등의 속을 흐르는 물","호소수 - 하천이나 계곡에 흐르는 물을 댐이나 제방 등을 쌓아 가두어 놓은 물","해수 - 지표 아래에서 흐르는 물로서 복류수를 제외한 물","강변여과수 - 하천, 호소 또는 그 인근지역의 모래자갈층을 통과한 물"],a:3,e:"해수는 해역에 존재하는 해수와 해수가 침투하여 지하에 존재하는 물을 말한다. ③은 '지하수'의 정의이다(지하수: 지표 아래에서 흐르는 물로서 복류수와 강변여과수를 제외한 물) (상수원관리규칙 제3조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:24,q:"마을상수도·전용상수도 및 소규모급수시설의 하천수, 복류수, 계곡수 등의 표류수에서 반기마다 1회 이상 측정해야 하는 항목이 아닌 것은?",c:["수소이온농도","음이온 계면활성제","총대장균군","생물화학적 산소요구량"],a:2,e:"마을상수도·전용상수도 및 소규모급수시설의 표류수에서 반기마다 1회 이상 측정해야 하는 항목: 수소이온농도, 생물화학적 산소요구량, 총유기탄소량, 부유물질량, 용존산소량, 대장균군(총대장균군, 분원성 대장균군)(상수원관리규칙 별표 6). 음이온 계면활성제는 해당 없음."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:25,q:"수도법상 소규모급수시설의 기준으로 올바른 것은?",c:["급수인구 100명 미만 또는 1일 공급량 10m³ 미만인 급수시설","급수인구 100명 미만 또는 1일 공급량 20m³ 미만인 급수시설","급수인구 200명 미만 또는 1일 공급량 50m³ 미만인 급수시설","급수인구 1,000명 미만 또는 1일 공급량 100m³ 미만인 급수시설"],a:2,e:"소규모급수시설: 주민이 공동으로 설치·관리하는 급수인구 100명 미만 또는 1일 공급량 20m³ 미만인 급수시설 중 특별시장·광역시장·특별자치시장·특별자치도지사·시장·군수(광역시의 군수는 제외)가 지정하는 급수시설을 말한다(수도법 제3조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:26,q:"수도법상 수도정비계획은 몇 년마다 수립하여야 하는가?",c:["3년","5년","10년","15년"],a:3,e:"특별시장·광역시장·특별자치시장·특별자치도지사·시장·군수(광역시의 군수는 제외)는 국가수도기본계획을 바탕으로 수도의 정비에 관한 계획(수도정비계획)을 10년마다 수립하여야 한다(수도법 제5조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:27,q:"상수원보호구역의 관리를 담당하는 자는?",c:["환경부장관","시·도지사","특별자치시장·특별자치도지사·시장·군수·구청장","지방환경청장"],a:3,e:"상수원보호구역은 해당 구역을 관할하는 특별자치시장·특별자치도지사·시장·군수·구청장이 관리한다(수도법 제8조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:28,q:"정수시설의 구비요건으로 부적합한 내용은?",c:["정수시설은 상수도시설의 규모, 원수의 수질 및 그 변동의 정도 등을 고려하여 안정적으로 정수를 할 수 있도록 설치하여야 한다.","정수시설에는 탁도, 수소이온농도(pH), 그 밖의 수질, 수위 및 수량 측정을 위한 설비를 설치하여야 한다.","소독제의 주입설비는 최대용량의 주입기가 고장이 나는 경우에도 계획된 1일 최대급수량을 소독하는 데에 지장이 없도록 설치하여야 한다.","지하수를 수원으로 하는 경우에는 여과시설을 설치하여야 한다."],a:4,e:"④ 지표수를 수원으로 하는 경우에는 여과시설을 설치하여야 한다(수도법 시행규칙 별표 3). 지하수가 아니라 지표수이다."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:29,q:"완속여과를 하는 정수시설의 구비 요건으로 틀린 것은?",c:["설계 여과속도 - 3m/일 이하","여과사의 유효경 - 0.3~0.45mm","균등계수 - 2.0 이하","모래층두께 - 70~90cm"],a:1,e:"① 설계 여과속도: 5m/일 이하(수도법 시행규칙 별표 3). 3m/일이 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:30,q:"급속여과를 하는 정수시설에서 급속여과지의 설계 여과속도 요건은?",c:["5m/일 이상","5m/시간 이상","10m/시간 이상","10m/일 이상"],a:2,e:"급속여과를 하는 정수시설에서 급속여과지의 설계 여과속도는 5m/시간 이상으로 한다(수도법 시행규칙 별표 3)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:31,q:"시설규모가 50만m³ 이상일 때 정수시설운영관리사 배치기준으로 맞는 것은?",c:["정수시설운영관리사 1급 1명 이상","정수시설운영관리사 2급 2명 이상","정수시설운영관리사 3급 3명 이상","정수시설운영관리사 1급 2명 이상"],a:4,e:"시설규모가 50만m³ 이상일 때 정수시설운영관리사 배치기준(수도법 시행령 별표 2): 1급 2명 이상, 2급 3명 이상, 3급 5명 이상."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:32,q:"수도에 관하여 일반수도사업자가 해야 할 위생상의 조치로 틀린 내용은?",c:["수도시설을 항상 청결히 하고 깔따구 유충 등 소형생물의 유입 여부를 주기적으로 확인하여 수질기준을 준수하고 먹는물의 오염을 방지할 것","수도시설의 주위에는 울타리를 설치하고 자물쇠장치를 하는 등 사람이나 가축이 함부로 시설에 접근하지 못하도록 할 것","수도꼭지의 먹는물 유리잔류염소가 항상 0.1mg/L(결합잔류염소는 0.4mg/L) 이상이 되도록 할 것","병원성 미생물에 의하여 오염되었거나 오염될 우려가 있는 경우에는 유리잔류염소가 1.5mg/L(결합잔류염소는 1.8mg/L) 이상이 되도록 할 것"],a:4,e:"④ 병원성 미생물에 의하여 오염되었거나 오염될 우려가 있는 경우에는 유리잔류염소가 0.4mg/L(결합잔류염소는 1.8mg/L) 이상이 되도록 할 것(수도법 시행규칙 제22조의2). 1.5mg/L가 아님."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:33,q:"폐기물관리법상 폐기물의 처리기준으로 틀린 내용은?",c:["폐기물의 종류와 성질·상태별로 재활용 가능성 여부, 가연성이나 불연성 여부 등에 따라 구분하여 수집·운반·보관할 것","수집·운반·보관의 과정에서 폐기물이 흩날리거나 누출되지 아니하도록 하고, 침출수가 유출되지 아니하도록 하며, 침출수가 생기는 경우에는 환경부령으로 정하는 바에 따라 처리할 것","해당 폐기물을 적정하게 처분, 재활용 또는 보관할 수 있는 장소 외의 장소로 운반하지 아니할 것","생활폐기물은 폐기물처리시설에서 처리할 것"],a:4,e:"④ 폐기물은 폐기물 처분시설 또는 재활용시설에서 처리할 것. 다만, 생활폐기물 배출자가 처리하는 경우 및 폐기물을 환경부령으로 정하는 바에 따라 생활환경 보전상 지장이 없는 방법으로 적정하게 처리하는 경우에는 그러하지 아니하다(폐기물관리법 시행령 제7조)."},
{g:"b2c4",gt:"[1권] 2과목 4장 수질관련법규",s:"수질분석",n:34,q:"폐기물관리법상 용어의 정의로 틀린 항목은?",c:["폐기물 - 쓰레기, 연소재, 오니, 폐유, 폐산, 폐알칼리 및 동물의 사체 등으로서 사람의 생활이나 사업활동에 필요하지 아니하게 된 물질을 말한다.","생활폐기물 - 일반폐기물 외의 폐기물을 말한다.","지정폐기물 - 사업장폐기물 중 폐유·폐산 등 주변 환경을 오염시킬 수 있거나 의료폐기물 등 인체에 위해를 줄 수 있는 해로운 물질로서 대통령령으로 정하는 폐기물을 말한다.","의료폐기물 - 보건·의료기관, 동물병원, 시험·검사기관 등에서 배출되는 폐기물 중 인체의 감염 등 위해를 줄 우려가 있는 폐기물과 인체 조직 등 적출물, 실험 동물의 사체 등 보건·환경보호상 특별한 관리가 필요하다고 인정되는 폐기물로서 대통령령으로 정하는 폐기물을 말한다."],a:2,e:"② 생활폐기물: '사업장폐기물 외의 폐기물'을 말한다(폐기물관리법 제2조). '일반폐기물 외의 폐기물'이 아니다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:3,q:"다음 중 완속여과방식에 대한 설명으로 옳지 않은 것은?",c:["원수의 수질은 비교적 양호하며 대장균군 1,000(100mL, MPN) 이하, 생물학적 산소요구량(BOD) 2mg/L 이하, 최고탁도 10도 이하인 경우에는 완속여과방식으로 할 수 있다.","원수는 지하수, 부영양화가 진행되지 않는 댐수, 호소수, 오염이 진행되지 않는 하천수 등에서 원수 중에 소량의 탁질 및 미량의 유기물질제거를 목적으로 하는 처리방법이다.","처리공정은 급속여과방식과 같다.","비교적 얇은 사층을 통과하여 천천히 여과함으로써 원수를 정화하는 것이다."],a:3,e:"③ 완속여과방식의 처리공정: 원수 → 착수정 → 침전지 → 완속여과 → 염소주입점 → 정수지(배수지) → 송수. 급속여과방식과는 다르다(급속은 응집·약품침전 포함)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:4,q:"급속여과방식에 대한 설명 중 옳은 것은?",c:["원수의 수질이 간이처리방식 및 완속여과방식으로 정화할 수 없는 경우에는 급속 여과방식이 적합하다.","탁질로부터 미량의 암모니아성 질소, 망간, 세균, 냄새물질 등도 제거된다.","유지관리가 간단하고 고도의 기술을 요구하지 않는다.","여과속도가 느리고 넓은 면적과 모래 삭취 등으로 인한 노력이 많이 필요하다."],a:1,e:"급속여과방식: 약품침전지, 급속여과지, 소독시설로 구성되고 현탁물질을 처음부터 약품처리에 의해 응집시켜 플록을 침전지에서 효율적으로 침전, 제거하고 다음에 급속여과지에서 제거하는 방식이다. ②·③·④는 완속여과방식에 대한 설명이다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:5,q:"착수정에 대한 설명 중 틀린 것은?",c:["착수정은 도수시설에서 도수되는 원수의 수위동요를 안정시키고 원수량을 조절하여 다음에 연결되는 약품주입, 침전, 여과 등 일련의 정수작업이 정확하고 용이하게 처리될 수 있도록 하기 위하여 설치한다.","착수정은 2지 이상으로 분할하는 것이 원칙이다.","형상은 일반적으로 직사각형 또는 원형으로 하고 유입구에는 제수밸브 등을 설치한다.","착수정에는 원수의 수질을 파악할 수 있도록 채수설비와 분말활성탄주입설비장치를 설치하는 것이 바람직하다."],a:4,e:"④ 착수정에는 원수의 수질을 파악할 수 있도록 채수설비와 수질측정장치를 설치하는 것이 바람직하다(분말활성탄주입설비가 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:6,q:"다음 중 착수정에 대한 설명으로 옳지 않은 것은?",c:["착수정은 2지 이상으로 분할하는 것이 원칙이나 분할하지 않는 경우에는 반드시 우회관을 설치하며 배수설비를 설치한다.","수위가 고수위 이상으로 올라가지 않도록 월류관이나 월류위어를 설치한다.","월류량의 유량은 유입량의 1/2 이상으로 한다.","착수정의 고수위와 주변 벽체의 상단 간에는 60cm 이상의 여유를 두어야 한다."],a:3,e:"③ 월류량의 유량은 유입량의 1/5 이상으로 하며 설치위치는 유입수 유입 시 파고형상에 의한 월류로 인하여 원수의 손실이 염려되는 경우를 고려하여 고수위보다 2~5cm 높게 설치할 수도 있다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:7,q:"다음 중 응집제의 역할로 가장 알맞은 것은?",c:["이온이나 콜로이드물질과 반응하여 육안으로 볼 수 있는 입자가 형성되도록 한다.","원수 중에 냄새나는 물질을 분해한다.","약품이 잘 섞이게 하는 역할을 한다.","응집지에서 형성된 플록을 제거하는 역할을 한다."],a:1,e:"응집제는 이온이나 콜로이드물질과 반응하여 육안으로 볼 수 있는 입자(플록)가 형성되도록 한다. ② 오존처리, ③ 혼화지의 역할, ④ 침전지의 역할이다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:8,q:"정수시설의 응집용 약품에 대한 설명으로 틀린 것은?",c:["응집제로는 명반 등이 있다.","알칼리제로는 소다회 등이 있다.","보조제로는 활성규산 등이 있다.","첨가제로는 소금 등이 있다."],a:4,e:"정수시설의 응집용 약품: 응집제(명반(황산알루미늄), 폴리염화알루미늄(PAC), 황산제1철, 황산제2철, 유기고분자 응집제), 알칼리제/pH 조정제(소석회, 소다회, 액체수산화나트륨), 응집보조제(활성규산, 알긴산소다). 첨가제(소금)는 해당 없음."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:9,q:"황산알루미늄에 대한 설명으로 옳지 않은 것은?",c:["황산알루미늄은 무색의 점성이 있는 중성 액체이다.","액체황산알루미늄[액반 또는 LAS]과 고체황산알루미늄[고반 또는 SAS]으로 구분한다.","황산알루미늄은 황산반토라고도 하며 고형과 액체가 있으며 취급이 용이하다.","대부분의 경우 액체가 사용되나 겨울철에 산화알루미늄의 농도가 높으면 결정이 석출하여 송액관을 막히게 하는 예가 있으므로 사용 시 농도에 주의하여야 한다."],a:1,e:"① 황산알루미늄은 무색의 점성이 있는 산성 액체이다(20℃에서 비중 1.3, 점도 20cPs). 중성이 아니다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:10,q:"황산알루미늄의 특징으로 옳지 않은 것은?",c:["가격이 저렴하고, 현탁물질에도 유효하다.","독성이 있으므로 대량주입은 삼가야 한다.","결정은 부식성이 없어 취급이 용이하다.","저장 중에 응집능력의 저하가 없다."],a:2,e:"② 황산알루미늄은 독성이 없으므로 대량주입이 가능하다. 적정주입률 범위는 좁다(최적 pH 5.5~7.5), 저온·고탁도 시 응집보조제가 필요하다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:11,q:"정수시설의 배치에 대한 내용으로 옳지 않은 것은?",c:["처리계열은 가능한 한 독립된 2 이상의 계열로 분할하는 것이 바람직하다.","각 시설 간에 수위결정을 위한 손실수두는 수리계산이나 실험에 의하여 결정한다.","완속여과지 방식의 경우 착수정으로부터 침전지, 여과지까지의 전체 손실수두는 3~4m로 한다.","급속여과 방식의 경우에는 고도정수처리 등을 하지 않는 통상적인 응집, 침전, 여과까지의 시설전체의 손실수두는 3.0~5.5m 정도가 된다."],a:3,e:"③ 완속여과지 방식의 경우 착수정으로부터 침전지, 여과지까지의 전체 손실수두는 1~2m로 한다(3~4m가 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:12,q:"다음 중 폴리염화알루미늄에 대한 특성으로 옳지 않은 것은?",c:["응집 및 플록형성이 황산알루미늄보다 현저히 빠르며 모든 탁질에 매우 유효하다.","10% 용액 pH 3.8의 경우 콘크리트, 철에 부식성을 갖는다.","장기간 저장하면 동결현상이 나타난다.","저수온, 고탁도 시에도 응집효과가 우수하여 응집보조제가 불필요하다."],a:3,e:"③ 폴리염화알루미늄(PAC)은 장기간 저장하면 응집능력이 저하되나 동결현상은 없다. 적정주입률 범위가 넓고(최적 pH 6~9), pH·알칼리도 저하가 황산알루미늄의 1/2 이하이다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:13,q:"다음 중 폴리수산화염화규산알루미늄의 특징에 대한 설명으로 옳지 않은 것은?",c:["산화알루미늄이 5~17%이고, 이산화규소(SiO₂)가 0.1~3%이며 액체상으로 기존의 응집제로 사용되고 있는 폴리염화알루미늄과 유사하다.","잔류알루미늄을 기존의 응집제에 비하여 15% 이상 감소시켜 준다.","약품의 투입량이 적고 치밀한 플록을 형성시킴으로써, 슬러지 발생량 및 처리비용을 30% 이상 감소시켜 준다.","동결성이 높아 저장안정성이 낮다."],a:4,e:"④ 폴리수산화염화규산알루미늄은 어는점이 -20℃로 낮아 저장안정성이 좋으므로 사용하기에 편리하다(동결성이 높지 않음)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:14,q:"다음 중 황산제2철 및 염화제2철에 대한 특징으로 옳지 않은 것은?",c:["응집적정범위가 pH 4.0~11.0으로 매우 넓으며 알칼리영역에서도 플록이 용해되지 않는다.","플록이 무거우며 침강이 빠르다.","황화수소 및 색도의 제거가 가능하다.","후민질 등의 물질에 대하여 철화합물을 생성하게 되어 제거하기 어렵고 부식성이 매우 약하다."],a:4,e:"④ 부식성이 매우 강하므로 설비기계의 재질 선정에 주의하여야 한다(부식성이 약한 것이 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:15,q:"다음 중 폴리유기황산알루미늄마그네슘(PSO-M)에 대한 특징으로 옳지 않은 것은?",c:["타 응집제에 비하여 가격이 비싸다.","갈수기 조류번식으로 인한 pH 상승 시 pH 강화효과가 있다.","저온에서 쉽게 동결되지 않는다.","pH 변화에 따른 응집변화의 폭이 넓어 급격한 수질변화에 적합하다."],a:1,e:"① 폴리유기황산알루미늄마그네슘은 무색 또는 황갈색의 투명한 액체로(pH 3.0 이상, 비중 1.22) 타 응집제에 비하여 가격이 저렴하다(비싼 것이 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:16,q:"다음 중 응집제의 주입지점으로 옳지 않은 것은?",c:["관내 설치혼화기","낙차지점","회전익의 근접지역","기계적 교반을 하는 경우에는 낙차지점"],a:4,e:"기계적 교반을 하는 경우에는 교반장치 회전익의 최근접지점이거나 원수유입관 끝 부분의 중심부 등이어야 한다(낙차지점이 아님). 응집제 주입지점은 혼화방법에 따라 다를 수 있으나 관내 설치혼화기, 낙차지점 또는 회전익의 근접지역이나 유입관의 중심부 등 주입과 동시에 신속한 교반이 이루어질 수 있는 지점이어야 한다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:17,q:"소석회의 특징으로 옳지 않은 것은?",c:["수분을 흡수하여 고화되기 쉬우므로 제습을 고려하여야 한다.","입상이므로 저장이 쉽고, 자동주입하기가 좋다.","분말이므로 취급이 어렵고, 분진대책이 필요하다.","완속여과지에 사용하면 여과사가 서로 부착하는 일이 있다."],a:2,e:"② 소석회는 경제적이나 분말이므로 취급하기가 곤란하며 완속여과지에 사용하면 여과사가 서로 부착하는 일이 있다. 또 자동주입이 비교적 어렵고, 운반 및 저장이 불편하다(입상이 아니라 분말)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:18,q:"황산에 대한 설명 중 옳지 않은 것은?",c:["황산 등의 산성 약품은 부영양화 등의 이유로 높아진 원수의 pH를 낮추기 위하여 쓸 수도 있다.","주입장소는 응집제 주입장소의 하류측으로 혼화가 잘 되는 장소이어야 한다.","전염소처리 시 염소 1mg/L에 대하여 알칼리도는 이론상 1.41mg/L를 소비하나 전염소주입률을 높을 때는 보정이 필요하다.","소석회와 소다회는 대개 건식주입을 하나 습식주입을 할 때는 소석회를 석회유로 하여 10~20%, 소다회는 5~10% 정도의 용액으로 하면 사용하기가 편리하다."],a:2,e:"② 주입장소는 응집제 주입장소의 '상류측'으로 혼화가 잘 되는 장소이어야 한다. pH조정제의 주입을 위하여 체류시간 1분 정도의 별도의 혼화지를 설치할 수도 있다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:19,q:"다음 중 응집보조제에 대한 설명으로 옳지 않은 것은?",c:["응집보조제는 원수의 수질에 따라 플록형성과 침전 및 여과의 효과를 높이는 데 사용된다.","응집보조제는 강우로 인하여 원수의 탁도가 높아졌을 때 사용한다.","일반적으로 황산알루미늄을 사용할 때는 응집보조제가 필요 없으나 폴리염화알루미늄을 사용할 때는 필요로 한다.","응집보조제는 겨울철에 저수온일 때 또는 처리수량을 증가시키고자 할 때나 철, 망간, 생물제거와 분말활성탄 주입 시 등에 침전과 여과효율을 더욱 높이기 위하여 사용한다."],a:3,e:"③ 일반적으로 황산알루미늄을 사용할 때는 응집보조제가 필요하고 폴리염화알루미늄을 사용할 때는 필요로 하지 않는 경우가 많다(설명이 반대)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:20,q:"응집보조제의 주입량과 장소에 대한 설명으로 옳지 않은 것은?",c:["주입률은 응집제주입률 결정 시 동시에 정하여야 한다.","통상 활성규산은 1~5mg/L의 범위로 주입하며 활성화가 과대하면 응고하여 주입장치를 막히게 하므로 0.5% 정도 희석한 용액으로 사용하여야 한다.","알긴산소다는 0.2~2mg/L의 범위로 주입하며 1% 이하로 희석하여 사용한다.","주입량은 자테스트로 결정한다."],a:4,e:"④ 주입량은 처리수량과 주입률에 의하여 산출하여야 한다(자테스트로 결정하는 것이 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:21,q:"응집보조제의 검수 및 저장설비에 대한 설명으로 옳지 않은 것은?",c:["황산알루미늄을 액상으로 저장하는 설비는 에폭시수지라이닝, 경질 또는 연질의 염화비닐판을 붙이는 등 내산재료를 사용하거나 스테인리스클래드강 등의 내산재료를 사용하여야 한다.","액체황산알루미늄은 농도가 너무 높으면 결정이 석출하거나 점성이 높아져서 계량과 주입에 지장이 있으므로 6~8%를 사용한다.","액체황산알루미늄은 기온이 많이 떨어지는 지대에서는 석출온도 이하로 온도가 하강할 때가 있으므로 저장설비와 계량 및 주입설비에도 보온장치를 할 필요가 없다.","고형황산알루미늄은 운반이 용이하도록 저장장소를 용해조 근처에 설치하는 등 작업 동선을 고려하여야 한다."],a:3,e:"③ 액체황산알루미늄은 기온이 많이 떨어지는 지대에서는 석출온도 이하로 온도가 하강할 때가 있으므로 저장설비와 계량 및 주입설비에도 보온장치를 할 필요가 있다(불필요가 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:22,q:"응집보조제의 검수 및 저장설비에 대한 설명으로 옳지 않은 것은?",c:["가성소다는 45% 용액을 구입하여 운전하는 것이 일반적이나 액온이 5~10% 이하가 되면 결정이 석출하므로 보온설비를 하거나 용액의 농도를 20~25%로 희석하여 저장한다.","소석회는 대개 습식으로 주입한다.","응집제의 저장량은 30일분 이상으로 한다.","알칼리제는 연속 주입할 경우 30일분 이상, 간헐 주입할 경우에는 10일분 이상으로 한다."],a:2,e:"② 소석회는 습기가 많으면 탄산칼슘으로 변해 약품의 효율저하는 물론 고형화되어 투입이 곤란하므로 방습구조로 하여야 하며 일반적으로 건식으로 주입한다(습식이 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:23,q:"액체약품주입설비 중 로터미터(Rotameter)에 의한 방식으로 옳지 않은 것은?",c:["로터미터와 유량조절밸브로 약품투입량을 조절하며 과대유량은 저장탱크로 환류시켜 주는 구조이다.","구성요소는 로터미터(Rotameter), 유량조절밸브, 펌프 및 부속설비이다.","구조가 간단하고, 유지보수가 용이하여 약품을 절감할 수 있다.","유량변화에 대한 약품주입률의 변화가 쉽고, 동력소비가 적다."],a:4,e:"④ 로터미터 방식은 유량변화에 대한 약품주입률의 변화가 어렵고, 약품을 절감할 수 있으나 동력소비가 크다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:24,q:"액체약품주입설비 중 정량(Metering)펌프에 의한 방식으로 옳지 않은 것은?",c:["단위행정당의 용적변화 또는 가변속전동장치를 사용한 왕복동속도변화에 의하여 토출량을 정확하게 가감조절할 수 있는 설비로 플런저(Plunger)방식과 다이어프램(Diaphragm)방식이 있으나 약품과 가동부가 직접 접촉하지 않은 다이어프램방식이 주로 사용된다.","유독성의 액체나 부식성이 강한 약품의 이송에 적합하다.","구성요소는 정량펌프, 가변속구동장치, 밸브 및 부속설비이다.","약품이 없는 상태에서 운전하면 기계에 손상이 크다."],a:4,e:"④ 정량펌프는 펌프에 의해 가압하므로 비교적 원거리까지 주입이 가능하고 약품주입률 변화를 간단하게 조절할 수 있으며 약품이 없는 상태에서 운전하여도 기계에 손상이 없다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:25,q:"전자유량계와 제어밸브조합에 의한 방식의 특징으로 옳지 않은 것은?",c:["펌프에 의해 주입할 경우 원거리수송이 가능하다.","펌프에 의해 주입하므로 압력이 필요한 곳에도 적용이 쉽다.","토출유량 중 일부만 실주입되고 나머지는 저장탱크로 복귀되므로 약품을 절감할 수 있다.","약액과 펌프회전차가 직접 접촉되므로 누액방지를 위한 Sealless펌프가 필요하다."],a:2,e:"전자유량계와 제어밸브조합 방식: 저장탱크의 약액을 자연유하방식 또는 원심펌프에 의해 주입지점으로 이송하고 이송되는 약액은 전자유량계에 의해 계측하며, 처리공정에서 필요한 양만큼 제어밸브로 조절하여 투입하는 방식이다. 특히 자연유하방식에 의할 경우 정전 시에도 연속적인 약품투입이 가능하므로 수질관리가 용이하나, 압력이 필요한 곳에는 적용이 곤란하다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:26,q:"분체약품주입설비에서 호퍼 투입방식에 의한 분류 중 인력에 의한 방식으로 옳은 것은?",c:["포대(20~50kg/포)로 반입되는 약품을 인력에 의해 운반, 해체하여 호퍼로 충전시키는 방식으로 시설이 간단하여 설치비가 저렴하다.","인력에 의한 작업량이 감소하나 분진이 발생한다.","해체 후 포대에 잔량이 남아 약품소비가 발생한다.","시설비가 고가이다."],a:1,e:"① 인력에 의한 방식은 포대로 반입되는 약품을 인력으로 운반·해체하여 호퍼로 충전시키며 시설이 간단하여 설치비가 저렴하다. ②·③·④는 자동개포기(Bag Opening Machine)에 의한 방식의 특징이다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:27,q:"분체약품주입설비에서 호퍼 투입방식에 의한 분류 중 공기흡입에 의한 자동이송방식으로 옳지 않은 것은?",c:["설비가 간단하고 배치식에 적합하다.","완전밀폐하여 주입하므로 분진발생이 거의 없다.","포대해체의 횟수를 줄일 수 있고, 시설비가 저렴이다.","한 대의 폴라백 해체기로 여러 대의 약품투입기 호퍼에 분체를 공급할 수 있다."],a:1,e:"① 설비가 간단하고 배치식에 적합한 것은 컨테이너 백에 의한 직접 투입방식의 특징이다(공기흡입 자동이송방식이 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:28,q:"용해조이송방식에 의한 분류 중 용적계량방식에 대한 설명으로 옳지 않은 것은?",c:["주입되는 분체약품의 주입률을 호퍼로부터 공급되는 약품의 용적으로 계량하여 주입하는 방식이다.","재료의 겉보기 밀도변화를 인지할 수 없어 겉보기 밀도변화 시 정량성이 저하되므로 주기적인 조정을 실시해야 한다.","주입 정도는 ±10% 이내로 증가한다.","구조가 간단하다."],a:3,e:"③ 용적계량방식의 주입 정도는 ±10% 이내로 다소 떨어진다(증가가 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:29,q:"용적계량방식 중 Belt Feeder에 의한 방식의 특징으로 옳지 않은 것은?",c:["투입량의 조절범위는 10~30:1 정도이고 정밀도는 ±5% 정도이다.","이물질의 혼입에 의한 마모 및 장애가 거의 없다.","점착성 물질의 투입이 어렵고, 댐퍼의 조절이 정밀하지 못하다.","주로 소석회의 투입에 사용된다."],a:4,e:"Belt Feeder 방식: 이송하는 벨트 위에 약품을 중력에 의하여 낙하하여 모터의 회전수 조절 및 댐퍼의 높이 조절에 의해 투입량을 조절하며, 주로 황산알루미늄의 투입에 사용되고 밀봉이 어려워 주위가 더럽혀질 우려가 있으나 고장이 적고 설비비가 저가이다(소석회가 아님)."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:30,q:"용적계량방식 중 스크루 벨트에 의한 방식의 특징으로 옳은 것은?",c:["스크루식과 벨트식을 혼합한 형식으로 모터의 회전수와 댐퍼의 높이에 따라 약품투입량을 조절하며 소석회 투입에 주로 사용된다.","대규모 정수장에 적합하다.","계량장치가 없으므로 제어개념이 단순화되며 설비가 간단하여 고장요인이 없다.","용해조 또는 저장조의 슬러리는 이젝터를 사용하여 배관으로 압송하므로 배관 내에 약품침적현상이 없다."],a:1,e:"① 스크루 벨트 방식은 스크루식과 벨트식을 혼합한 형식으로 모터의 회전수와 댐퍼의 높이에 따라 약품투입량을 조절하며 소석회 투입에 주로 사용된다. ②·③·④는 비계량방식의 특징이다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:31,q:"주입량 결정방법 시 유량에 의한 비례제어에 대한 설명으로 옳지 않은 것은?",c:["주입지점의 유량을 실시간으로 측정하여 유량변동에 비례하여 자동으로 약품주입량을 조절하는 방식이다.","구성요소는 하드웨어, 즉 유량계와 약품주입설비이다.","비교적 정확하고, 유량변화에 실시간으로 대처가 가능하다.","주입률결정을 위한 별도의 시험을 실시하여야 한다."],a:2,e:"② 구성요소는 하드웨어(유량계+약품주입설비)와 소프트웨어(PLC Logic, 응용프로그램 등)이다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:32,q:"응집약품의 주입률 결정방법에 해당되지 않는 것은?",c:["자테스트에 의한 주입률 결정","조견표에 의한 주입률 결정","현장 수동에 의한 주입률 결정","실험실 실험에 의한 주입률 결정"],a:3,e:"응집약품 주입률 결정방법: 자테스트에 의한 주입률 결정, 조견표에 의한 주입률 결정, 인공지능에 의한 주입률 결정, 실험실 실험에 의한 주입률 결정. '현장 수동에 의한 결정'은 해당 없음."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:33,q:"액체약품투입방식 중 인공지능에 의한 유량계-전동밸브주입방식의 장단점으로 옳지 않은 것은?",c:["유량제어범위(1:60)가 넓고 정밀도가 높다.","유량계 및 전동밸브에 의해 제어하므로 유량제어범위가 넓고 주입량을 정확하게 할 수 있다.","인공지능학습법에 의한 투입량의 자동설정 및 자동주입이 가능하다.","설비가 많아 투자비용이 크다."],a:2,e:"② 유량계 및 전동밸브에 의해 제어하므로 유량제어범위가 넓고 주입량을 정확하게 할 수 있다는 것은 유량계-전동밸브 주입방식(인공지능 아님)의 특징이다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:34,q:"액체약품투입방식 중 정량펌프주입방식의 장단점으로 옳지 않은 것은?",c:["설비가 간단하고 사용실적이 가장 많다.","유량의 변화에 따라 압력변화가 적으므로 토출관로가 길어도 주입에 지장이 없다.","투자비가 적다.","유량제어범위(1:60)가 넓고 정밀도가 높다."],a:4,e:"④ 정량펌프 주입방식은 유량조절범위(1:10)가 좁고 25% 이하에서의 오차가 크다(1:60이 아님)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:1,q:"다음 혼화설비에 대한 설명으로 옳지 않은 것은?",c:["혼화지에는 응집제를 주입한 후 즉시 급속교반을 할 수 있는 혼화장치를 설치하여야 한다.","혼화방법에는 기계적 교반방식과 수리적 교반방식이 있다.","수류자체의 에너지에 의한 방식은 수로 중에 수평우류식이나 상하우류식의 조류판을 설치하여 수류방향을 급변시켜 크게 난류를 일으키는 방식 또는 관로 중에 난류를 일으키는 방식이다.","기계적 교반은 유속 1.5m/s 정도가 필요하며 파샬 플룸(Partial Flume)이나 도수현상을 이용하는 방식, 노즐에서 분사류에 의해서 난류를 일으키는 방식 등이 있다."],a:4,e:"④ '수리적' 교반은 유속 1.5m/s 정도가 필요하며 파샬 플룸이나 도수현상을 이용하는 방식, 노즐에서 분사류에 의해서 난류를 일으키는 방식 등이 있다(기계적 교반이 아님)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:2,q:"외부로부터 기계적 에너지를 작동시키는 방식에 대한 설명 중 옳지 않은 것은?",c:["플래시 믹서방식은 가장 많이 사용되며 연직축의 주위에 붙은 수개의 회전익이 주변속도 1.5m/s 이상으로 회전하여 혼화된다.","플래시 믹서방식은 회전속도를 변화시켜 교반강도를 조절할 수 있고 유량변화에 대한 적응성이 좋으나 기계고장이 많다.","펌프확산방식은 원수의 일부를 펌프로 가압하여 나머지 원수와 충돌시켜 혼화하는 방법이다.","펌프확산방식은 플래시 믹서방식에 비하여 일반적으로 소요동력이 적어 유지관리상 문제가 크다."],a:4,e:"④ 펌프확산방식은 유지관리상 문제는 적으나 플래시 믹서방식에 비하여 일반적으로 소요동력이 크다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:3,q:"수리적 교반방식의 특징에 대한 설명으로 옳지 않은 것은?",c:["대규모 시설에 적합하고 운영기술이 필요하다.","유체자체의 손실수두에 의해 운영되므로 동력이 필요 없어 유지관리가 용이하나, 처리수량의 변동에 따른 제어가 곤란하다.","혼화를 위하여 필요한 손실수두는 혼화지의 구조에 따라 다르나 약 45~60cm이다.","유입수의 교란은 유체자체 손실수두에 의해 발생한다."],a:1,e:"① 수리적 교반방식은 소규모 시설에 적합하고 운영기술 및 유지관리가 필요 없다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:4,q:"수직프로펠러형 교반기의 특징으로 옳지 않은 것은?",c:["선박의 추진 프로펠러와 유사한 교반날개가 3~6매 취부되어 있는 구조이다.","순환수량이 많고 회전수 변화에 따른 영향이 적다.","흐름방향이 축류이므로 조의 형태에 따른 영향이 크고 회전수의 제한이 없다.","프로펠러의 제작이 쉽고 구조가 간단하여 취급이 용이하다."],a:4,e:"④ 수류가 비교적 약하여 급속혼화가 용이하고 프로펠러의 제작이 난이하나 구조가 간단하여 취급이 용이하다(제작이 쉬운 것이 아님)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:5,q:"패들형 교반기의 특징으로 옳지 않은 것은?",c:["폭 100mm 정도의 길이가 긴 패들이 수직 또는 수평으로 여러 개 취부되어 있는 구조이다.","바닥지지 베어링을 제외하고는 주요부분이 지상에 있으나, 횡축패들형은 주요부분이 수중에 위치한다.","전역의 수류를 동시에 밀어냄으로써 효과적인 응집이 가능하고 저속운전이 되므로 마찰부의 마모가 적다.","바닥에 지지대가 있어 흔들림이 없고 베어링의 수명이 길며, 운영유지비 및 설치비가 저가이므로 유지관리가 쉽다."],a:4,e:"④ 수중 구조부의 보수 시에는 조 전체를 정지해야 하고, 저속회전하므로 감속기의 감속비가 높아야 하며 운영유지비 및 설치비가 고가이므로 유지관리에 어려움이 따른다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:6,q:"강제확산식 혼화장치의 특징으로 옳지 않은 것은?",c:["프로펠러, 축, 진공형성부 등으로 구성된다.","순간혼화가 가능하다.","수두손실이 많다.","저에너지 소모, 고효율이다."],a:3,e:"③ 강제확산식 혼화장치는 수두손실이 거의 없다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:7,q:"다음 기계식 수직형 응집기의 설명으로 옳은 것은?",c:["흐름의 횡단방향으로 축을 평행하게 두어 각 축에 다른 크기와 형태의 패들을 달아 교반하는 방법이다.","유지관리가 용이하고 손실수두가 거의 없으며, 주로 수직패들형 및 수직터빈형이 사용된다.","손실수두가 없고, 한 개의 축으로 여러 대를 운전할 수 있어 에너지의 절감효과가 좋으나 단락류의 발생 가능, 수중부 설치에 따른 정밀한 시공 및 유지관리에 어려움이 있다.","전체 패들면적은 관당 단면적의 10~25%가 되어야 한다."],a:2,e:"② 수직형 응집기는 유지관리가 용이하고 손실수두가 거의 없으며, 주로 수직패들형 및 수직터빈형이 사용된다. ①·③·④는 수평형에 대한 설명이다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:8,q:"다음 침전지의 구성 및 구조에 대한 설명으로 옳지 않은 것은?",c:["지수는 원칙적으로 2지 이상을 한다.","배치는 복수의 침전지에 균등하게 유출입시킬 수 있도록 수리적 고려를 통해 결정하여야 한다.","각 지를 연속하여 사용 가능한 구조로 하여야 한다.","지의 형상은 직사각형으로 하고 길이는 폭의 3~8배를 표준으로 한다."],a:3,e:"③ 지의 청소, 수리 및 검사를 할 때 유출, 유입 및 슬러지 배출 등의 각 설비가 1지마다 독립하여 사용할 수 있도록 구성하고 가동 중인 타 지에 영향을 주어서는 안 된다(연속 사용 구조가 아니라 독립 사용 구조)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:9,q:"다음 중 슬러지배출설비에 대한 설명으로 옳지 않은 것은?",c:["슬러지 배출방식은 침전지의 구조와 유지관리, 슬러지의 성상 등을 고려하여 적당한 것으로 한다.","스크레이퍼 형식은 주행식, 링크벨트식, 수중견인식, 회전식 등이 있다.","스크레이퍼의 속도는 슬러지를 혼란시키지 않도록 속도를 느리게 하며, 12m/h 정도를 기준으로 한다.","배슬러지밸브는 정전 등의 사고가 있을 때 열림상태에 있어야 한다."],a:4,e:"④ 배슬러지밸브는 정전 등의 사고가 있을 때 열림상태에 있지 않도록 한다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:10,q:"침전지 수중대차식 슬러지수집기의 설명으로 옳지 않은 것은?",c:["물속에서 주행하는 레일 위에 스크레이퍼를 갖춘 대차가 스테인리스 와이어로프에 의해 왕복운동을 하면서 슬러지를 호퍼 쪽으로 모아서 처리하는 설비이다.","물속의 구조가 대차로 간단하고 경제적이다.","내구성이 체인스크레이퍼식에 비해 짧다.","스크레이퍼가 호퍼에 도달되었을 때 슬러지가 배출되므로 고농도의 슬러지 배출이 가능하며, 불필요한 처리수의 유출이 적다."],a:3,e:"③ 수중대차식의 내구성은 체인스크레이퍼식에 비해 1.5~2배 정도 길다(짧은 것이 아님)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:11,q:"다음 침전지 수중대차식 슬러지수집기의 설명으로 옳지 않은 것은?",c:["많은 양의 슬러지처리가 쉽다.","대차 전진주행 시는 슬러지수집이 완전하며 후진 시에도 침전물을 교란시키지 않는다.","구동 동력이 다른 형식에 비해 적고, 침전지청소 시 방해가 되지 않는다.","인장에 의한 로프의 처짐이 있어 수시조정하여야 한다."],a:1,e:"① 많은 양의 슬러지처리가 어렵고, 장기간 고장 시 누적된 슬러지를 처리할 경우 기기의 과부하가 걸릴 우려가 있다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:12,q:"다음 침전지 주행보 현수식 슬러지수집기의 설명으로 옳지 않은 것은?",c:["침전지 위에서 주행하는 보에 현수되어 있는 갈퀴판에 의해 호퍼로 슬러지를 긁어 처리하고 보가 귀환할 때에는 갈퀴를 들어올려 주행하는 형식이다.","장치의 주요부가 물 위에 위치하여 보수점검이 어렵다.","고농도의 슬러지가 대량으로 누적되어 있어도 기계가 파손되지 않아 배출수처리시설에 유리하다.","수로 폭은 늘려도 대수에는 큰 지장이 없어서 경제적이다."],a:2,e:"② 장치의 주요부가 물 위에 위치하여 물속에 있는 것보다 보수점검이 쉽다(어려운 것이 아님)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:13,q:"다음 중 침전지 체인플라이트식 슬러지수집기의 특징으로 옳지 않은 것은?",c:["물속의 레일을 따라 주행하는 순환체인에 고정된 플라이트가 지내를 회전하면서 연속적으로 슬러지를 호퍼부로 모아 처리하는 형식이다.","운전이 간단하나 많은 양을 처리할 수 없는 단점이 있다.","긁어모으는 속도가 일정하고 연속적으로 저속운전이 가능하여 수집효과가 매우 좋다.","침전량 증가를 위한 침전지의 경사판 설치가 가능할 경우, 경사판 하부에서의 단락류 발생 등 설치조건을 고려하여야 한다."],a:2,e:"② 체인플라이트식은 운전이 간단하여 자동화가 적합하고 가장 많은 양을 처리할 수 있다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:14,q:"다음 침전지 체인플라이트식 슬러지수집기의 특징으로 옳지 않은 것은?",c:["체인의 강도와 수로의 폭에 제약을 받는다.","기계조작이 간단하며 보수점검이 쉽다.","침전된 슬러지가 플라이트판의 회전 및 진동에 따라 교란될 우려가 있다.","수중설치부의 고장 가능성이 높고 청소 시 플라이트가 방해된다."],a:2,e:"② 물속을 주행하는 체인은 때때로 장력을 조정할 필요가 있어 보수점검이 어려우며 기계의 장기간 고장 시 다량으로 누적된 슬러지를 처리할 경우 기기에 과부하가 걸릴 우려가 있다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:15,q:"다음 중 침전지 진공흡입식 슬러지수집기의 특징으로 옳지 않은 것은?",c:["슬러지를 직접 배출할 수 있어 슬러지 인발밸브의 설치가 필요 없다.","흡입압력과 흡입량에 제약이 있어 고형물농도가 높은 슬러지제거는 곤란하다.","저농도의 슬러지를 흡입하는 경우 슬러지의 양이 감소한다.","전원공급이 단전되었을 경우, 운영자가 임의로 설치한 운영프로그램은 새로 설정하여야 한다."],a:3,e:"③ 저농도의 슬러지를 흡입하는 경우 슬러지의 양이 증가한다(감소가 아님)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:16,q:"다음 중 월류관, 배출수관 및 슬러지배출관에 대한 설명으로 옳지 않은 것은?",c:["약품침전지에는 필요에 따라 월류관을 설치하는 것이 바람직하다.","약품침전지에는 배출수관을 설치하는 것 외에 필요에 따라서 슬러지배출관을 설치하여야 한다.","배출수 및 슬러지배출을 빠르고도 완전하게 하기 위하여 지의 저부보다 한층 얕은 위치에 배출구를 설치하고 배출관 상단은 지저보다 관경의 2배 이상 얕게 설치하여야 한다.","배출수 및 슬러지배출은 펌프를 설치하여 배출하는 것이 가장 바람직하다."],a:4,e:"④ 배출수 및 슬러지배출은 자연유하에 의한 것이 가장 바람직하나 부득이할 때는 펌프를 설치하여 배출한다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:17,q:"다음 경사판 등의 침전지에 대한 설명으로 옳지 않은 것은?",c:["횡류식 경사판 침전지의 경사각은 55~60°를 표준으로 한다.","상향류식 경사판의 경사각은 90°로 한다.","횡류식 경사판 내의 체류시간은 경사판의 간격이 100mm인 경우에는 20~40분으로 한다.","상향류식 경사판의 침강장치는 1단으로 한다."],a:2,e:"② 상향류식 경사판의 경사각은 55~60°로 한다(90°가 아님)."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:18,q:"스토크스법칙이 가장 잘 적용되는 침전형태는?",c:["단독침전","응집침전","지역침전","압축침전"],a:1,e:"스토크스법칙: 독립(단독)침전형태에서 적용되는 보통 침전지의 설계법칙"},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:19,q:"다음 중 폐수 내의 입자들이 다른 입자들의 영향을 받지 않고 독립적으로 침전하는 유형은?",c:["제1형 침전","제2형 침전","제3형 침전","제4형 침전"],a:1,e:"침전의 유형: 제1형 침전(독립침전) 비응집성 입자의 단독침전 / 제2형 침전(응집침전) 응집성 입자의 플록응집침전 / 제3형 침전(지역, 간섭침전) 입자의 농도에 의한 경계면 침전 / 제4형 침전(압축침전) 물리적인 경계면에 의한 기계적 압축, 탈수 침전"},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:20,q:"다음 중 스토크스법칙의 기본 가정이 아닌 것은?",c:["입자의 크기가 일정하다.","입자가 구형이다.","물의 흐름은 층류상태이다.","입자 간의 응집성을 고려한다."],a:4,e:"④ 스토크스법칙은 독립입자의 침전(독립침전) 가정하에 설명할 수 있는 공식으로 입자 간의 응집성을 고려하지 않는다."},
{g:"b3c2",gt:"[2권] 3과목 2장 혼화·응집설비운영",s:"설비운영",n:21,q:"정수 시 보통 침전지의 용량은 계획정수량에 대하여 몇 시간분을 표준으로 하는가?",c:["3시간분","5시간분","8시간분","10시간분"],a:3,e:"③ 보통 침전지의 용량은 계획정수량의 8시간분을 표준으로 한다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:1,q:"급속여과지에 대한 설명으로 옳지 않은 것은?",c:["급속여과지는 원수 중의 현탁물질을 약품으로 응집·분리하는 급속여과방식의 여과지를 총칭한다.","급속여과지에서는 원수 중의 현탁물질을 응집한 후 입상여과층에 비교적 빠른 속도로 물을 통과시켜 여재에 부착시키거나 여과층의 체거름작용에 의하여 탁질을 제거한다.","여층에서 현탁물질의 제거기작의 제1단계는 이송된 입자가 여재표면에 부착하여 포착되는 단계이다.","여과수량의 조절방식에 따라 유량제어형, 수위제어형, 자연평형형이 있다."],a:3,e:"여층에서 현탁물질의 제거기작 - 제1단계: 현탁입자가 유선에서 이탈되어 여재표면 근처까지 이송되는 단계로 체거름작용, 저지작용과 중력침강작용이 주로 일어난다. 제2단계: 이송된 입자가 여재표면에 부착하여 포착되는 단계."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:2,q:"급속여과지의 여과유량 조절방식에 대한 설명으로 옳지 않은 것은?",c:["정압여과방식은 광범위하게 사용되고 있는 방식으로 유량제어형과 수위제어형, 자연평형형의 3가지 방식이다.","정압여과방식은 여층의 상류측 수위와 하류측 수위, 즉 여층에 걸리는 압력차가 일정하면 여층의 폐쇄에 따라 여과유량이 서서히 감소하는 방식이다.","유량제어형은 여과수류출구측에 계량장치와 유량조절장치를 설치하여 여과유량을 일정하게 유지하는 방법이다.","수위제어형은 여과지의 수위를 검지하고 그 신호를 유량조절기에 전달하여 정속여과를 유지하는 것으로 비교적 얕은 사면 위의 수심으로 하는 것은 가능하나 기구가 복잡해진다."],a:1,e:"① 유량제어형·수위제어형·자연평형형의 3가지 방식은 '정속여과방식'에 대한 설명이다(정압여과방식이 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:3,q:"급속여과지의 여과면적, 지수 및 형상에 대한 설명 중 적합하지 않은 것은?",c:["여과면적은 계획정수량을 여과속도로 나누어서 계산한다.","1지의 여과면적은 150m² 이하로 한다.","지수는 예비지를 포함하여 2지 이상으로 한다.","형상은 원형을 표준으로 한다."],a:4,e:"④ 급속여과지의 형상은 직사각형을 표준으로 한다(원형이 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:4,q:"급속여과지의 자갈층의 두께 및 여과자갈, 수고에 대한 설명으로 옳지 않은 것은?",c:["여과자갈은 그 형상이 구형에 가깝고 경질, 청정하며 질이 균등한 것이 좋고, 먼지나 점토질 등의 불순물을 포함하지 않아야 한다.","조립여과자갈을 상층에, 세립여과자갈을 하층에 배치하는 것을 표준으로 한다.","자갈층은 모래층을 지지하는 것이 목적이며 자갈층 중에 여과사가 침입하지 않도록 상부에 세립자갈을 깔고 하층으로 갈수록 조립자갈로 하여 성층시키는 것을 기준으로 한다.","여과지의 사면상의 수심은 여과 중에 부압을 발생시키지 않도록 1m 이상으로 해야 한다."],a:2,e:"② 조립여과자갈을 하층에, 세립여과자갈을 상층에 배치하는 것을 표준으로 하며 입도가 큰 순서대로 깔아야 한다(설명이 반대)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:5,q:"급속여과에서 탁질누출현상이 일어나기까지의 순서로 옳은 것은?",c:["Air Binding → 부수압 → Scour → 탁질누출현상","Air Binding → Scour → 부수압 → 탁질누출현상","부수압 → Scour → Air Binding → 탁질누출현상","부수압 → Air Binding → Scour → 탁질누출현상"],a:4,e:"탁질누출현상: 여과가 진행되면 모래층 내에서 부수압이 생기고, 부수압의 범위가 확대되면 물속에 용존되어 있던 공기가 기포로 되어 모래층 공극에 남는데 이것을 Air Binding이라 한다. 이 현상이 일어나면 모래층 내 모관 일부가 폐색되어 물의 유속이 커지고, 유속이 한계를 넘으면 모래에 흡착되어 있던 탁질이 세류(Scour)되며, 여재층 속에 억류된 플록이 파괴되어 여과수와 같이 유출되는 것을 탁질누출(Break Through)현상이라 한다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:6,q:"급속여과지의 세척에 대한 설명으로 옳지 않은 것은?",c:["세척에는 염소가 잔류하고 있는 정수를 사용하여야 한다.","세척수량, 수압 및 시간 중 어느 것이 감소하면 세척효과가 불충분하게 되고 너무 커지면 비경제적이다.","세척탱크의 용량은 적어도 1지를 세척할 수 있는 물을 저장할 수 있는 크기로 하고 여과지수가 20지를 넘는 경우에는 2지 이상을 동시에 세척할 수 있는 것으로 하는 것이 바람직하다.","수심은 깊게 하여 세척수압의 변화를 크게 하는 것이 좋다."],a:4,e:"④ 수심은 되도록 얕게 하여 세척수압의 변화를 적게 하는 것이 바람직하다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:7,q:"급속여과지의 세척설비에 대한 설명으로 옳지 않은 것은?",c:["공기배관은 여과지 내에 물이 들어가지 않도록 여과지수면보다 높은 위치에 설치한다.","공기흡입측에는 필터소음기를 설치해 소음, 진동대책을 고려한 부속기구를 설치해야 한다.","세척배출수거와 트로프의 크기는 최대배출수량의 약 20% 여유를 두어 트로프의 상단에서 완전히 월류하는 상태가 유지되는 용량이어야 한다.","월류하는 트로프의 상단과 상단 간의 간격을 가능한 한 넓게 하는 것이 좋다."],a:4,e:"④ 트로프의 월류하는 상단과 상단 간의 간격이 너무 넓으면 탁질의 체류부가 생기고 간격이 좁으면 시간이 단축되어 좋으나 너무 좁게 하면 여과재 투입작업에 지장을 초래하고 또 트로프 수가 많아지게 되어 공사비가 높아진다(적정 간격 필요)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:8,q:"급속여과지의 세척설비에 대한 설명으로 옳지 않은 것은?",c:["구조물에 신축이음을 설치한 부분에는 관에도 반드시 밸브를 설치하여야 한다.","밸브는 여과 및 세척과정을 완전하게 전환할 수 있는 것이어야 한다.","여과지 내 각종 밸브는 가능한 여러 지점에서 조작할 수 있도록 해야 한다.","정전과 같은 긴급 시 현 상태 유지를 위해서는 통상 전동밸브가 좋다."],a:3,e:"③ 여과지 내 각종 밸브는 한 지점에서 조작할 수 있도록 조작대를 집중시키고 밸브의 개폐상황을 알기 쉽게 표시하거나 여과공정과 세척공정의 상황을 파악하기 위하여 필요한 계기류를 집중하여 설치하는 등의 확실한 조작이 가능하도록 한다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:9,q:"다층여과지에 대한 설명으로 옳지 않은 것은?",c:["다층여과지는 밀도와 입경이 다른 복수의 여과재를 사용하여 수류방향으로 큰 입경으로부터 가는 입경으로 구성된 역입도여과층을 구성한다.","모래단층여과지에 비하여 여과기능을 보다 합리적·효율적으로 발휘하기 위한 여과지이다.","무연탄과 모래여과재를 사용하는 다층여과지의 경우 모래층두께 20~50cm, 무연탄두께 20~50cm를 표준으로 한다.","여과속도는 340m/day 이하를 표준으로 한다."],a:4,e:"④ 다층여과지의 여과속도는 240m/day 이하를 표준으로 한다(340이 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:10,q:"다층여과지에 대한 설명으로 옳지 않은 것은?",c:["무연탄여과재에 대하여는 한국수자원공사에서 정한 것을 표준으로 한다.","무연탄여과재는 세장하거나 편평한 파쇄물을 포함하지 않고 유효경 0.7~1.5mm, 균등계수 1.5 이하, 세척탁도 100도 이하, 산가용률 5% 이하, 비중 1.4~1.6, 최대경 2.8mm, 최소경 0.5mm이며 부득이한 경우에는 최소 및 최대경 초과분이 1% 이내여야 한다.","팽창성 혈암 등의 점토광물을 소결하여 체로 분류한 인공경량사에 관해서는 염산가용률 1.5% 이하, 마멸률 1.5% 이하인 것이어야 한다.","석류석과 티탄철염여과재에 관해서는 불순물이 적고 염산가용률 5% 이하, 비중 3.8 이상으로 편평, 세장한 것이 적어야 한다."],a:1,e:"① 무연탄여과재에 관해서는 한국수도협회에서 정한 수도용 안트라사이트시험방법(KWWA F101) 외에 양질의 무연탄파쇄물을 체로 분류한 것으로 청정하여야 한다(한국수자원공사가 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:11,q:"자연평형형 여과지에 대한 설명으로 옳지 않은 것은?",c:["자연평형형 여과지는 자동여과지라고도 하며 유입수량과 유출수량이 자연적으로 평형을 이루는 방식이다.","형식으로 자기역류세척형, 역류세척탱크보유형, 역류세척장치이동형, 지별제어형으로 나눌 수 있다.","자연평형형 여과지의 각 형식상 공통적인 특징은 유출측에 유량조절기 등을 설치하는 것이다.","유입측에는 사이펀, 밸브 등을 설치하여 여과되지 않은 물의 차단과 유입을 확실히 제어할 수 있어야 하고 유출측에는 유량조절기구가 없으므로 배관 등을 간단하게 한다."],a:3,e:"③ 자연평형형 여과지의 각 형식상 공통적인 특징은 유출측에 유량조절기 등을 설치하지 않아 여과지로 유입된 물을 그대로 유출시킨다는 것이다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:12,q:"자기역류세척형의 단점에 해당되지 않는 것은?",c:["역세척 시 처리수량이 역세척수량보다 작은 경우에는 외부로부터 물의 보급이 필요하다.","세척 시에는 여과지 전체 처리수량의 감소로 후속의 소독용 염소의 주입제어가 어렵다.","전염소, 중간염소를 처리하지 않는 경우는 역세척이 가능하다.","진공배관은 길이가 길어지면 진공도의 저하와 수류가 발생하기 쉽고 냉한지에서는 동결되기 쉽다."],a:3,e:"③ 전염소, 중간염소를 처리하지 않는 경우 염소가 잔류하는 물로 세척하는 것은 불가능하다(이것이 단점이며, '가능하다'는 설명은 단점이 아니라 틀린 설명)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:13,q:"역세척탱크보유형에 대한 설명으로 옳지 않은 것은?",c:["자기역류세척형과 같이 유입부에서 유입수를 각지에 균등하게 분배하고 유출부에서는 유량조절을 하지 않고 유출위어에서 유출하게 되는 것이다.","역세척에서는 처리수를 펌프로 양수하여 여과지에 가깝게 설치한 저치형 세척탱크에 저수하여 사용한다.","역세척탱크를 보유하고 있으므로 지수에 대한 제약이 많다.","유출위어의 높이를 자기역류세척형보다 낮게 할 수 있으며 지 전체의 깊이를 작게 할 수 있다."],a:3,e:"③ 역세척탱크를 보유하고 있으므로 지수에 대한 제약이 없다(많은 것이 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:14,q:"직접여과에 대한 설명으로 옳지 않은 것은?",c:["직접여과는 저탁도원수를 대상으로 소량의 응집제를 주입한 후 플록형성과 침전처리를 하지 않고 여과하는 것이다.","표준적인 여과층 구성과 여과속도로 직접여과를 할 경우 원수탁도가 대체로 10도 이하이면 양호한 처리결과를 기대할 수 있다.","일반적인 처리에서 혼화지에 응집제를 주입하는 경우 여과지까지의 유로가 길어 플록이 성장할 때에는 여과지 직전에 응집제를 주입하여 혼화한다.","저탁도 시 직접여과로 할 경우에는 응집제주입량을 통상처리보다 증가시키는 것이 좋다."],a:4,e:"④ 저탁도 시 직접여과로 할 경우에는 응집제 주입량을 통상처리의 1/4~1/3까지 감소시키는 것이 좋다(증가가 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:15,q:"다음 보통침전지에 대한 설명으로 옳지 않은 것은?",c:["보통침전지는 응집처리를 하지 않은 원수를 자유침강에 의하여 현탁물질을 분리하고 완속여과지에 걸리는 부하를 경감하기 위하여 설치한다.","원수의 연간 최고탁도가 30도 이상인 경우에는 응집처리가 가능한 시설을 구비하여야 한다.","저수지나 지하수를 수원으로 하고 원수탁도가 통상 10도 이하인 경우에는 보통 침전지를 생략할 수 있다.","지수는 반드시 2지로 하여야 한다."],a:4,e:"④ 지수는 유입수탁도를 고려하여 침전지 청소기간만 일시적으로 침전지를 경유하지 않고 유입시키더라도 완속여과에 큰 지장을 초래하지 않으면 1지로 하여도 된다(반드시 2지가 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:16,q:"일차여과지에 대한 설명으로 옳지 않은 것은?",c:["세정방식은 물만으로도 충분하다.","일차여과지의 부유물질 제거율은 60~70%로 하는 것이 좋다.","여과지의 면적은 여과와 세척의 균일성을 유지하기 위해 하나의 지를 100m² 이하로 한다.","여과속도는 80~100m/day를 표준으로 한다."],a:1,e:"① 일차여과지에는 가는 자갈을 여과재로 사용하기 때문에 여과층의 세척이 물만으로는 불충분하여 공기세척을 병행한다. 보조적으로 기계 또는 인력으로 교반, 세척하는 방법도 사용된다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:17,q:"완속여과지에 대한 설명으로 옳지 않은 것은?",c:["완속여과법은 모래층과 모래층 표면에 증식하는 미생물군에 의하여 수중의 불순물을 포착하여 산화하고 분해하는 방법에 의존하는 정수방법이다.","수중의 현탁물질이나 세균뿐만 아니라 어느 한도 내에서 암모니아성 질소, 취기, 철, 망간, 합성세제, 페놀 등의 제거도 가능하다.","완속여과법은 강한 약품처리 등을 하여야 정화기능을 안정되게 얻을 수 있다.","여과지의 깊이는 하부집수장치의 높이에 자갈층과 모래층 두께, 모래면 위의 수심과 여유고를 더하여 2.5~3.5m를 표준으로 한다."],a:3,e:"③ 완속여과법은 약품처리 등을 필요로 하지 않고 정화기능을 안정되게 얻을 수 있으나, 넓은 면적을 필요로 하고 오래 사용한 여과지의 표층을 삭취해야 한다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:18,q:"모래여과 시 여과의 수두손실에 가장 영향을 미치지 않는 인자는?",c:["여과속도","여과지의 표면적","모래층의 두께","물의 점성도"],a:2,e:"여과지의 손실수두: 여과층의 깊이가 클수록·모래입자의 크기가 작을수록·여과속도가 클수록·물의 점성도가 클수록 수두손실은 크다. 공극률이 클수록 수두손실은 작다. 여과지의 표면적은 직접적 영향이 가장 적다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:19,q:"완속여과지에 대한 설명으로 옳지 않은 것은?",c:["배치는 몇 개의 여과지를 접속시켜 1열이나 2열로 하고 그 주위는 유지관리상 필요한 공간을 두어야 한다.","주위벽의 상단은 지반보다 15cm 이상 높여 여과지 내로 오염수나 토사 등의 유입을 방지해야 한다.","한랭지에서는 여과지의 물이 동결할 우려가 있으므로 여과지를 복개한다.","완속여과지의 여과속도는 10~15m/day를 표준으로 한다."],a:4,e:"④ 완속여과지의 여과속도는 4~5m/day를 표준으로 한다(10~15가 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:20,q:"완속여과지의 여과모래의 품질에 대한 설명으로 옳지 않은 것은?",c:["외관은 먼지, 점토질 등의 불순물이 없을 것","유효경은 0.3~0.45mm일 것","균등계수는 3.0 이하일 것","세척탁도는 30도 이하일 것"],a:3,e:"③ 균등계수는 2.0 이하일 것. 완속여과지의 여과모래: 산가용률 3.5% 이하, 비중 2.55~2.65, 마멸률 3% 이하, 최대경 2mm 이하."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:21,q:"완속여과지의 모래층의 두께 및 여과모래에 대한 설명으로 옳지 않은 것은?",c:["고수위에서 여과지 상단까지의 여유고는 30cm 정도로 한다.","하부집수장치의 저부경사는 주거는 1/200, 지거는 1/150 정도로 한다.","여과지를 연결하여 조절정을 설치하여야 한다.","조절정에는 유량조절장치(여과손실수두계, 여과속도 및 여과수량 지시계 외에 필요한 관이나 밸브류)를 설치해야 한다."],a:3,e:"③ 조절정은 여과지에 근접하여 설치하나 삭취 직후의 여과지와 장시간 사용하고 있는 여과지는 여과조건에 차이가 있으므로 각 여과지를 독립하여 운영할 수 있도록 각 여과지마다 조절정을 설치해야 한다(연결이 아니라 독립)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:22,q:"완속여과지의 여과수량조절에 대한 설명으로 옳지 않은 것은?",c:["여과지에 접하여 유입측에 유입주관을 설치하고 여기에 연결되는 유입지관에는 제수문이나 제수밸브를 설치한다.","여과수량을 유출측에서 조절하는 장치에는 놋지식, 텔리스코프식, 오리피스식 등이 있다.","놋지식은 가동위어에 의한 유량을 조절하는 방식이다.","텔리스코프식은 벤투리를 사용하여 유량을 계측하고 제수밸브로 이를 조절하는 방식이다."],a:4,e:"④는 오리피스식에 대한 설명이다. 텔리스코프식: 여과수 유출관의 선단을 상하로 신축할 수 있는 구조로 하고 이것을 일종의 가동위어로 유량을 조절하는 방식이다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:23,q:"정수지에 대한 설명으로 옳지 않은 것은?",c:["정수시설로는 최종단계이다.","철근콘크리트조의 경우 형상은 원칙적으로 원형으로 한다.","정수지는 사고, 고장에 대응하고 수원, 수질 이상 시의 수질변동에 대응하며 시설의 점검, 안전작업 등에 대비하여 정수를 저류하는 곳이다.","정수지는 정수처리운영관리상 발생하는 여과수량과 송수량 간의 불균형을 조절·완화하는 것이다."],a:2,e:"② 철근콘크리트조의 경우 형상은 직사각형이 일반적이나 지형, 구조 등을 고려하여 원형 등의 형상을 하기도 한다(원칙적으로 원형이 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:24,q:"정수지에 대한 설명으로 옳지 않은 것은?",c:["원칙적으로 2지 이상으로 하고 1지의 경우에는 격벽으로 2등분하여야 한다.","유효수심은 3~6m를 표준으로 한다.","바닥은 저수위보다 15cm 이상 높게 하여야 한다.","정수지의 유출관 하부 저수위 밑에 배출관을 설치하여야 한다."],a:3,e:"③ 바닥은 저수위보다 15cm 이상 낮게 하여야 한다. 장기간 저류로 물때나 찌꺼기, 모래 등의 침전물이 쌓이므로 적어도 15cm 정도까지의 수량은 사용하지 않도록 저수위를 결정한다(높게가 아니라 낮게)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:25,q:"정수지의 부대설비 등에 대한 설명으로 옳지 않은 것은?",c:["정수지를 경유하지 않고 직접 송수할 수 있도록 우회관을 설치한다.","바닥의 최저부에 배출수관을 설치하고 여기에 제수밸브를 설치한다.","환기장치는 검수실 등에 설치하며 송수량의 변동에 해당하는 공기량이 자유롭게 출입할 수 있는 환기면적을 갖는다.","출입용 계단의 출입구는 환기설비와 겸용하여서는 안 된다."],a:4,e:"④ 정수지의 출입설비는 점검과 유지관리가 용이하도록 반드시 계단시설을 갖추어야 하며 출입용 계단의 출입구는 환기설비와 겸용할 수 있다(겸용 불가가 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:26,q:"침전지에서 유입된 원수를 여과하고 역세척 및 표면세척 등의 자동조작을 위해 설치하는 밸브가 아닌 것은?",c:["원수유입밸브","여과수유출밸브","표면세척수유입밸브","제수밸브"],a:4,e:"침전지에서 유입된 원수를 여과하고 역세척 및 표면세척 등의 자동조작을 위해 설치되는 밸브는 원수유입밸브, 여과수유출밸브, 표면세척수유입밸브와 퇴수유출밸브이다. 제수밸브는 해당 없음."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:27,q:"역세척 및 표면세척설비에 대한 설명으로 옳지 않은 것은?",c:["세정방법에 따라 물세정형, 공기세정 후 물세정형, 공기·물 동시세정형으로 분류된다.","물세정방식은 설비비가 고가이고 유지관리비용이 증가한다.","물세정방식은 균등한 표면세척이 곤란하고 세정손실수량이 많다.","공기와 물 동시 세정방식은 역세정수량이 많이 소요된다."],a:4,e:"④ 공기와 물 동시세정방식은 역세정수량이 적게 소요된다. 장점: 세정개시로부터 종료 시까지 타지의 여과속도가 변하지 않음, 역세정수량이 적게 소요됨, 설비가 간단하고 경제적임, 여과지 내 설비가 없으므로 사면관리 용이, 세정효과가 높음. 단점: 역류세정용 송풍기 및 펌프설비의 설치장소가 필요, 하부집수 장치의 설치 및 관리가 정밀해야 함."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:28,q:"역세수공급방법 중 역류세척탱크에 의한 방법과 역류세척수공급펌프에 의한 방법에 대한 설명으로 옳지 않은 것은?",c:["역류세척탱크에 의한 방법의 주요설비는 펌프 및 모터(대용량), 유출입 배관, 전기설비이다.","역류세척탱크에 의한 방법은 후염소 주입제어가 용이하다.","역류세척탱크에 의한 방법은 자기역류세정방식에 비해 설비가 다소 복잡하고 탱크공사비, 유출배관공사비가 추가소요된다.","역류세척수공급펌프에 의한 방법은 자기역류세정방식에 비해 설비가 다소 복잡하다."],a:1,e:"① 역류세척수공급펌프에 의한 방법의 주요설비이다. 역류세척탱크에 의한 방법의 주요설비는 역류세척수 저장탱크, 유출입배관, 펌프 및 모터(소용량), 전기설비이다."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:29,q:"역류세척공급방법 중 역류세척수공급펌프에 의한 방식의 특징으로 틀린 것은?",c:["항상 염소처리된 물로 역세척이 가능하다.","후염소주입제어가 용이하다.","수두를 일정하게 유지하므로 균등세정이 가능하다.","세정수량조절이 곤란하다."],a:4,e:"④ 역류세척수공급펌프에 의한 방법은 세정수량조절이 용이하다(곤란이 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:30,q:"표면세척기의 회전식에 대한 장단점으로 옳지 않은 것은?",c:["배관회전부분패킹의 마모로 누수가 빈번하다.","구조가 복잡하고 설치가 어렵다.","노즐이 회전하므로 일정부분에 효과가 있다.","노즐수가 적게 들고, 세척효과가 뛰어나다."],a:4,e:"④ 회전식은 분사유량이 작아 세척강도(G)치가 작으므로 세척효과가 저하될 우려가 있다(세척효과가 뛰어난 것이 아님)."},
{g:"b3c3",gt:"[2권] 3과목 3장 여과설비운영",s:"설비운영",n:31,q:"표면세정은 역세정과 함께 여재표면에 고압으로 정수를 분사시키는 방법이다. 그 주된 목적은 무엇인가?",c:["여과수에 잔존하는 기포제거","여재의 팽창효과 증대","여층 내의 교상물질로 된 머드볼 현상 저하","여재입자 간의 상호충돌 감소"],a:3,e:"여과가 어느 정도 진행된 후의 여재표면은 각종 오염물질(주로 탁질성분)로 인해 덩어리가 형성되어 여과를 더욱 어렵게 만든다. 이것을 머드볼 현상이라 하며, 세정 시 고속분사를 실시하여 제거한다."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:1,q:"다음 중 염소제를 사용한 소독방법에 대한 설명으로 옳지 않은 것은?",c:["정수시설에는 정수방법의 종류나 시설의 규모에 상관없이 반드시 소독설비를 갖추어야 한다.","염소제에 의한 소독방법은 소독효과가 우수하고 대량의 물에 대해서도 용이하게 소독이 가능한 동시에 소독효과가 잔류한다는 장점이 있다.","트라이할로메탄 등의 유기염소화합물을 생성하고 특정물질과 반응하여 냄새를 유발하기도 하며, 암모니아성 질소와 반응하여 소독효과를 약하게 하는 등의 문제가 있을 수 있다.","오존소독은 매우 강력한 살균효과를 가지고 있어 바이러스나 원생동물의 포낭을 쉽게 무력화할 수 있으며 염소와 같은 잔류효과도 있다."],a:4,e:"④ 오존소독은 매우 강력한 살균효과를 가지고 있어 바이러스나 원생동물의 포낭을 쉽게 무력화할 수 있으나 염소와 같은 잔류효과가 없으며 수중의 유기물질과 반응하여 유해한 소독부산물을 생성할 가능성도 있다."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:2,q:"다음 중 염소제에 대한 설명으로 옳지 않은 것은?",c:["액화염소는 염소가스를 액화하여 용기에 충전한 것으로 염소가스는 공기보다 무겁고 자극성 냄새를 가진 가스로서 독성이 강하다.","차아염소산나트륨은 유효염소농도가 5~12% 정도의 담황색 액체로 알칼리성이 강하다.","차아염소산나트륨은 액화염소에 비해 위험하며 취급에 주의를 요하기 때문에 강한 법적 규제가 강하다.","차아염소산칼슘(고도표백분 포함)은 분말, 과립, 정제가 있으며, 유효염소의 농도는 60% 이상으로 보전성이 좋다."],a:3,e:"③ 차아염소산나트륨은 액화염소에 비하면 안정성과 취급성이 좋으며 법적 규제는 없으나 용액으로부터 분리되는 기포(산소)가 배관 내에 누적되어 물의 흐름을 저해할 가능성이 있다(강한 법적 규제가 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:3,q:"다음 중 액화염소의 저장설비에 대한 설명으로 옳지 않은 것은?",c:["용기는 20℃ 이하로 유지하고 직접 가열해서는 안 된다.","용기를 고정시키기 위하여 용기가대를 설치하고, 1ton 용기를 사용할 경우에는 용기의 반·출입을 위한 리프트장치를 설치한다.","액화염소저장조의 저장설비는 액화염소를 저장조에 넣기 위한 공기공급장치를 설치하여야 한다.","저장조 본체는 법령에 따라 각종 검사에 합격한 것이어야 한다."],a:1,e:"① 용기는 40℃ 이하로 유지하고 직접 가열해서는 안 된다(20℃가 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:4,q:"다음 중 액화염소의 저장실에 대한 설명으로 옳지 않은 것은?",c:["실온은 10~35℃를 유지하고 출입구 등으로부터 직사일광이 용기에 직접 닿지 않는 구조로 한다.","저장실 안에 염소주입기실을 두고 용기의 반·출입이 편리한 위치로서 감시하기 쉬운 곳에 설치한다.","습기가 많은 장소는 피하고 외부로부터 밀폐시킬 수 있는 구조로 하며 두 방향에 출입문을 설치하고 환기장치를 설치한다.","저장조가 설치된 저장실 출입구는 기밀구조로 하고 이중출입문을 설치한다."],a:2,e:"② 액화염소저장실은 염소주입기실과 분리하고 용기의 반·출입이 편리한 위치로서 감시하기 쉬운 곳에 설치한다(저장실 안에 주입기실을 두는 것이 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:5,q:"다음 중 염소(Cl₂)처리 후 살균효과에 대한 설명으로 틀린 것은?",c:["pH가 증가하면 살균력이 증가한다.","온도가 높아질수록 살균력이 증가한다.","접촉시간이 길수록 살균력이 증가한다.","염소농도가 증가하면 살균력이 증가한다."],a:1,e:"① 염소처리는 pH가 낮은 쪽이 살균효과가 높다. 즉, pH 5 정도에서 살균력이 강한 HOCl의 비율이 가장 높고 상대적으로 살균력이 약한 OCl⁻의 비율이 낮아 살균효과가 가장 좋다(pH 증가 시 살균력 감소)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:6,q:"다음 중 전염소처리로 제거할 수 없는 것은?",c:["철(Fe)","조류","암모니아성 질소","트라이할로메탄"],a:4,e:"트라이할로메탄(THM)은 염소소독으로 인해 발생되는 소독부산물로서 발암성 물질이다(제거 대상이 아니라 생성물)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:7,q:"전염소처리의 목적 중 틀린 것은?",c:["세균을 제거한다.","암모니아성 질소를 제거한다.","철, 망간 등을 제거한다.","수중의 불순물을 침전시킨다."],a:4,e:"④ 전염소처리의 목적은 세균 제거, 암모니아성 질소 제거, 철·망간 등 제거(산화), 조류 및 맛·냄새 제거 등이며, 수중의 불순물을 침전시키는 것은 응집·침전의 목적이다."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:8,q:"다음 중 차아염소산나트륨의 저장설비에 대한 설명으로 옳지 않은 것은?",c:["저장조 또는 용기로 저장하고 2기 이상 설치한다.","저장조 또는 용기는 직사일광이 닿지 않고 통풍이 좋은 장소에 설치한다.","저장조의 주위에는 방액제 또는 피트를 설치한다.","저장실은 환기장치 또는 냉방장치를 하지 않는다."],a:4,e:"④ 저장조에 온도조절장치를 설치하거나 조정실에 환기장치 또는 냉방장치를 설치한다(하지 않는 것이 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:9,q:"다음 중 염소제주입설비에 대한 설명으로 틀린 것은?",c:["염소제주입설비는 액체염소저장기, 계량저울, 기화기, 진공조절기, 염소주입기, 이젝터 및 희석수공급설비로 구성된다.","염소주입기의 용량은 일 최대공급량을 기준으로 하되 초기연도의 공급량 및 일평균공급량을 고려하여 산정한다.","용량은 최대부터 최소주입량까지 안전하고 정확하게 주입이 가능하며 예비기를 설치한다.","구조는 내부식성, 내마모성이 낮아야 한다."],a:4,e:"④ 구조는 내부식성, 내마모성이 크고 운영관리가 용이해야 한다(낮아야 하는 것이 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:10,q:"다음 중 액화염소주입기에 대한 설명으로 옳지 않은 것은?",c:["염소주입기는 용기 또는 염소기화기로부터 연속적으로 공급되는 염소가스를 안전하고 정확하게 계량하여 주입하는 장치이며 건식과 습식이 있다.","일반적으로 습식진공식 염소주입기가 많이 사용된다.","습식진공식 염소주입기는 용기 중의 액화염소를 염소가스로서 유출시켜 계량하고 가스상의 상태로 직접 처리하는 물에 주입하는 것이다.","습식압력식 염소주입기는 용기 중의 액화염소를 염소가스로서 유출시켜 계량하고 이를 진한 염소수로 처리하여 수중에 주입하는 것이다."],a:3,e:"③은 건식압력식 주입기에 대한 설명으로 가스 자체를 수중에 방출하므로 용해되지 않은 염소가 공중으로 비산하는 양이 많고, 주입률이 불균등하게 되기 쉬운 결점이 있다."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:11,q:"습식진공식 염소주입기에 대한 설명으로 옳지 않은 것은?",c:["건식주입기에 비하여 염소의 혼화가 균등하게 행해지며 관례적으로 소형 용량에 많이 사용된다.","대기압 이하의 압력에서 계량·제어하므로 염소의 누출이나 용기 내에 염소가 남는 일이 적다.","염소농도가 높고 혼합 용수의 수온이 낮을 때는 염소의 결정이 생길 염려가 많다.","인젝터의 급수압력이 저하하여 기내의 진공압력이 정압으로 되면 자동적으로 염소를 정지하는 등의 기능을 가지고 있다."],a:1,e:"①은 습식압력식 염소주입기에 대한 설명이다. 습식진공식은 대용량에 많이 사용된다."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:12,q:"다음 중 차아염소산나트륨용액의 주입기에 대한 설명으로 옳지 않은 것은?",c:["차아염소산나트륨용액의 주입기는 자연유하식, 인젝터방식, 펌프방식이 있다.","자연유하식은 저장조 등의 위치수두조절기를 갖춘 점적기 또는 오리피스관을 통하여 주입하는 방식이다.","자연유하식은 구조가 단순하기 때문에 주입량의 변동이 큰 대규모 시설에 적합하다.","인젝터방식은 압력수를 인젝터에 공급하여 차아염소산나트륨과 혼합시킨 후 주입점에 송액하는 방법이다."],a:3,e:"③ 자연유하식은 구조가 단순하기 때문에 주입량의 변동이 적은 소규모 시설에 적합하다(대규모가 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:13,q:"다음 중 염소중화설비에 대한 설명으로 옳지 않은 것은?",c:["염소중화설비는 누출되는 염소가스를 중화시켜 무해하게 하는 장치이다.","경사판방식에서 탑의 내부는 청소가 용이한 구조로 하여 사용 후에는 물로 세척하기에 가능한 구조로 하여야 한다.","염소중화탑은 충전탑방식, 회전흡수방식, 경사판방식 등이 있으나 보편적으로 사용되고 있는 것은 충전탑방식이다.","충전탑방식은 중화탑 하부로부터 염소가스를 보내고 탑 상부에서 가성소다용액을 흘려보내 탑 내부의 충전재 표면을 스쳐 지나는 사이에 서로 반응하여 중화되는 방식이다."],a:2,e:"② 경사판방식은 탑 내의 충전제 대신 경사판을 설치하여 경사판의 표면에 생기는 가성소다용액의 피막과 경사판의 작은 구멍으로부터 산포되는 가성소다용액이 염소가스와 반응하여 중화되는 방식이다(충전탑·세척 설명이 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:14,q:"염소중화설비에 대한 설명으로 옳지 않은 것은?",c:["중화설비의 처리능력은 1일에 염소가스를 무해가스로 처리할 수 있는 양(kg/day)으로 표시한다.","경사판방식은 중화탑 하부로부터 염소가스를 보내고 탑 상부에서 반응액을 보내는 것은 중화탑방식과 유사하다.","경사판방식은 탑 내의 충전제 대신 경사판을 설치하여 경사판의 표면에 생기는 가성소다용액의 피막과 경사판에 작은 구멍으로부터 산포되는 가성소다용액이 염소가스와 반응하여 중화되는 방식이다.","가성소다저장탱크의 저장량은 기준 등에서 정해진 양 이상으로 하고 중화처리되는 염소량에 의해 정해지며 농도는 10~20%의 범위이다."],a:1,e:"① 중화설비의 처리능력은 1시간에 염소가스를 무해가스로 처리할 수 있는 양(kg/h)으로 표시한다(1일/kg/day가 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:15,q:"염소주입 시 보안용구 중 방독마스크와 보호구에 대한 설명으로 옳지 않은 것은?",c:["공기호흡기 또는 송기식 마스크 2개 이상","격리식 방독마스크(전면고농도형) 3개 이상","공기 또는 산소예비용기 3개 이상","보호의(고무제) 2벌 이상"],a:1,e:"① 공기호흡기 또는 송기식 마스크 3개 이상이다(2개가 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:16,q:"다음 중 이산화염소주입설비에 대한 설명으로 옳지 않은 것은?",c:["이산화염소에 의한 소독은 최근 상수원수의 수질악화에 따라 유리염소에 의한 THM 생성을 피하기 위한 대체소독제라 할 수 있다.","염소와 같은 소독효과를 얻기 위한 이산화염소의 주입량은 염소주입량과 같다.","페놀화합물을 분해하며 정수의 이취미와 색도의 제거에도 효과적이고 클로로페놀까지도 어느 정도 제거가 가능하다.","염소로부터 생성된 황화수소(H₂S)나 R-SH 등 황화합물로 인한 냄새제거가 가능하다."],a:2,e:"② 염소와 같은 소독효과를 얻기 위한 이산화염소의 주입량은 염소주입량의 반으로 한다. 즉, 1mg/L의 이산화염소는 2mg/L의 염소와 같은 효과가 있다."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:17,q:"정수처리에서 염소소독을 실시할 경우 물이 산성일수록 살균력이 커지는 이유는?",c:["수중의 OCl⁻ 증가","수중의 OCl⁻ 감소","수중의 HOCl 증가","수중의 HOCl 감소"],a:3,e:"염소소독의 성질: 낮은 pH(산성)의 경우 Cl₂+H₂O ↔ HOCl=H⁺+OCl⁻. 물이 산성일수록 수중의 HOCl(차아염소산) 증가로 살균력이 커짐."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:18,q:"다음 중 음용수의 소독 시 클로라민(Chloramine)을 이용한 소독방법이 유리염소보다 좋은 이유는?",c:["소독력이 강하다.","잘 휘발한다.","취미가 강하다.","살균작용이 오래 지속된다."],a:4,e:"클로라민: 살균(소독) 후 물에 취미(臭味)를 주지 않고 살균작용이 오래 지속되는 특징이 있다. 그러나 소독력은 유리염소보다 약한 단점이 있다."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:19,q:"다음 중 이산화염소주입설비의 효과에 대한 설명으로 틀린 것은?",c:["잔류효과가 양호하다.","맛과 냄새의 제거 효과가 있다.","THM의 생성을 감소시킨다.","약품이 다량 필요하다."],a:4,e:"④ 염소와 같은 소독효과를 얻기 위해서는 염소주입량의 1/2 정도만 주입한다(다량 필요가 아님)."},
{g:"b3c4",gt:"[2권] 3과목 4장 소독(살균)설비운영",s:"설비운영",n:20,q:"다음 중 전염소·중간염소처리에 대한 설명으로 옳지 않은 것은?",c:["전염소처리는 응집, 침전 이전의 처리과정에서 주입하는 경우이다.","중간염소처리는 침전지와 여과지의 사이에서 주입하는 경우이다.","전염소·중간염소처리의 목적은 세균(일반세균, 대장균군), 철, 망간의 제거이다.","전염소처리의 염소제 주입지점은 침전지와 여과지 사이에서 잘 혼화되는 장소로 한다."],a:4,e:"④는 중간염소처리의 염소제 주입장소이다. 전염소처리의 염소제 주입지점은 취수시설, 도수관로, 착수정, 혼화지, 염소혼화지 등에서 교반이 잘 일어나는 지점으로 한다."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:1,q:"다음 중 분말활성탄흡착설비에 대한 설명으로 옳지 않은 것은?",c:["활성탄은 형상에 따라 분말활성탄과 입상활성탄으로 나누어지며 처리형태에 따라 사용이 구분되나 활성탄으로서 물성 및 흡착기작 등은 동일하다.","처리대상은 통상적인 정수처리로 제거되지 않는 맛·냄새 원인물질, 합성세제, 페놀류, 트라이할로메탄과 그 전구물질(부식질 등), 트라이클로로에틸렌 등의 휘발성 유기화합물질, 농약 등의 미량유해물질, 상수원의 사고 등에 의하여 일시적으로 유입되는 화학물질, 그 밖의 유기물 등이다.","활성탄의 원료는 목탄, 석탄, 기타 등이 있다.","분말활성탄처리는 여과지를 만들 필요가 있다."],a:4,e:"④ 분말활성탄처리는 기존시설을 사용하여 처리가 가능하나 입상활성탄은 여과지를 만들 필요가 있다."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:2,q:"다음 중 분말활성탄처리와 입상활성탄처리의 비교로 옳지 않은 것은?",c:["처리 및 관리성 - 분말활성탄: 어려움 / 입상활성탄: 용이함","미생물의 번식 - 분말활성탄: 없음 / 입상활성탄: 가능성 있음","폐기 시의 어려움 - 분말활성탄: 문제없음 / 입상활성탄: 탄분을 포함한 흑색슬러지는 공해의 원인임","장기간 처리 시 - 분말활성탄: 경제성이 향상되지 않음 / 입상활성탄: 경제적임"],a:3,e:"③ 분말활성탄처리는 폐기 시 탄분을 포함한 흑색슬러지는 공해의 원인이 되나 입상활성탄처리는 슬러지가 발생하지 않아 문제가 되지 않는다(설명이 반대로 짝지어짐)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:3,q:"다음 중 분말활성탄주입설비에 대한 설명으로 옳지 않은 것은?",c:["주입지점은 혼화와 접촉이 충분히 이루어지고 또 전염소처리과정과 동시에 한다.","주입률은 원수수질 등에 따라 다른 실례 등을 참조하고 기본적으로 처리하고자 하는 원수와 제거목표물질에 대한 실험에 근거하여 정한다.","슬러리 농도는 2.5~5%(건조환산한 값)를 표준으로 한다.","주입량은 처리수량과 주입률로 결정한다."],a:1,e:"① 주입지점은 혼화와 접촉이 충분히 이루어지고 또 전염소처리의 효과에 영향을 주지 않도록 선정하며 필요에 따라 접촉지를 별도로 설치한다(전염소처리와 동시에 하는 것이 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:4,q:"다음 중 분말활성탄의 검수 및 저장에 대한 설명으로 틀린 것은?",c:["분말활성탄의 성상 및 운반방식과 수량을 고려하여 적절한 검수용 계량장치를 설치한다.","저장설비의 사용량은 가능한 최대용량으로 한다.","반입된 분말활성탄을 저장설비에 이송하기 위한 설비를 설치한다.","저장설비를 설치하는 건물은 내화성 구조로 하고 방진 및 방화대책을 강구한다."],a:2,e:"② 저장설비는 사용량과 수급관계를 고려하여 적절한 용량으로 한다(가능한 최대용량이 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:5,q:"다음 중 입상활성탄에 대한 설명으로 옳지 않은 것은?",c:["입상활성탄흡착설비는 흡착탑 또는 흡착지에 입상활성탄을 충전하고 여기에 처리할 물을 통과시켜 처리대상물질인 오염물질을 흡착하여 제거하는 것이다.","입상활성탄처리방법은 잘 발달된 활성탄 내부 세공 표면에 오염물질이 이동하여 흡착됨으로써 액상의 용존상태에서 고체상의 흡착상태로 상을 변환시켜 오염물질을 제거하는 공정이다.","입상활성탄은 처리목적에 따라 최적의 것을 선정하며 규격은 분말활성탄 규격과 KS M 1421을 참고로 한다.","전염소 또는 중간염소처리에 의한 배열은 지하수 → 입상활성탄 → 후염소처리이다."],a:4,e:"④는 원수를 직접 활성탄처리하는 배열로서 지하수 등의 오염도가 낮은 원수의 처리에 적용된다. 전염소 또는 중간염소처리의 경우 배열은 전염소 → 응집침전 → 중간염소 → 여과 → 입상활성탄처리 → 후염소 순이다."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:6,q:"다음 중 입상활성탄흡착설비에 대한 설명으로 옳지 않은 것은?",c:["고정상흡착지는 설비규모, 수위 등을 고려하여 중력식 또는 압력식 중에서 선택한다.","중력식은 비교적 대규모 시설에 적합하며 점검이 용이하고 철근콘크리트지의 경우에는 내구성이 있다.","중력식은 소규모의 설비에 적합하며 강판제로 할 수 있고, 선속도(LV)를 크게 할 수 있는 장점이 있다.","흡착지의 구조는 효과적인 흡착과 역세척이 가능하고 또 활성탄의 교체 등이 용이하도록 한다."],a:3,e:"③은 압력식에 대한 장점이다(중력식이 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:7,q:"다음 중 입상활성탄흡착설비의 세척설비에 대한 설명으로 옳지 않은 것은?",c:["세척의 목적은 탄층에 축적된 현탁물질에 의하여 일어나는 흐름의 저항을 감소시키는 것이다.","탄층의 세척은 역세척에 적당한 보조세척을 추가한 것으로 활성탄의 누출방지를 고려해야 한다.","세척에는 활성탄 처리수 또는 정수를 사용한다.","정전기에 의한 전기충격이나 스파크에 대비해 입상활성탄의 설비는 모두 적절한 접지(어스)를 한다."],a:4,e:"④는 저장설비에 대한 주의사항이다(세척설비가 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:8,q:"다음 중 오존처리설비에 대한 설명으로 옳지 않은 것은?",c:["오존처리는 염소보다 훨씬 강한 오존의 산화력을 이용하여 소독과 함께 맛·냄새물질 및 색도의 제거, 소독부산물의 저감 등을 목적으로 한다.","오존은 유기물과 반응하여 부산물을 생성하므로 일반적으로 오존처리와 활성탄처리는 병행해야 된다.","오존처리는 타처리공정에 비하여 유기물질의 생분해성을 감소시킨다.","오존처리는 타처리공정에 비하여 맛·냄새물질 및 색도제거의 효과가 우수하다."],a:3,e:"③ 오존처리는 유기물질의 생분해성을 증가시킨다. 즉, 난분해성 유기물의 생분해성을 증대시켜 후속공정인 입상활성탄(생물활성탄)으로 운전 시의 처리성을 향상시킨다(감소가 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:9,q:"다음 중 상수의 오존처리에 대한 장점으로 틀린 것은?",c:["냄새, 색도제거에 효과가 크다.","효과의 지속성이 있다.","바이러스의 불활성화에 우수한 효과를 갖고 있다.","병원균에 대한 살균효과가 크다."],a:2,e:"② 오존은 염소보다 산화력 및 살균력이 뛰어나 유기물 분해와 소독작용이 강하나 살균효과의 지속성이 없는 단점이 있다(효과의 지속성이 없음)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:10,q:"다음 중 오존처리의 주입설비에 대한 설명으로 옳지 않은 것은?",c:["설비용량은 처리수량과 주입률로부터 산출된 주입량을 기본으로 하여 결정한다.","설비는 원료가스공급장치, 오존발생기, 접촉지, 배오존처리설비, 잔류오존제거시설 및 오존재이용설비 등으로 구성된다.","주요기기류는 1계통으로 통일하여 유지관리가 용이하도록 한다.","오존처리를 효과적으로 실시하고 또 비상시에도 필요한 조치가 용이하게 이루어질 수 있도록 적절한 제어방식을 선정한다."],a:3,e:"③ 주요기기류는 2계통 이상으로 분리하고 예비계통을 설치하며 유지관리가 용이하도록 한다(1계통 통일이 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:11,q:"다음 중 오존발생기에 대한 설명으로 옳지 않은 것은?",c:["발생효율이 높고 내구성과 안전성이 충분해야 한다.","용량, 대수, 주입계통의 구성은 수온에 따른 오존소모특성과 제거대상물질을 고려하여 최소주입량에서 최대주입량 조정이 가능하도록 하여야 한다.","오존발생기에서 주입장소에 이르는 배관은 적절한 내경과 재질을 가지며 유량계, 압력 등을 구비한다.","배관의 유지관리를 용이하게 하기 위하여 지중부분은 측관 내에 위치하도록 한다."],a:4,e:"④ 배관의 유지관리를 용이하게 하기 위하여 지중부분은 콘크리트덕트 내에 설치하는 것으로 한다(측관 내가 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:12,q:"다음 배출오존설비 중 가열분해법과 촉매분해법에 대한 설명 중 옳지 않은 것은?",c:["가열분해법은 수천 ppm의 농도에서 오존의 반감기가 상온에서는 수십 시간 이상이나 200℃에서는 수초 이내이다.","가열분해법은 실용적으로는 200℃에서 1초 정도 체류시킴으로써 배출오존의 파괴가 충분히 가능하다.","촉매분해법은 금속표면에서 오존이 촉매분해되는 것을 이용한 것이다.","촉매분해법은 오존의 열분해보다 저온에서 일어나므로 비용면에서 유리하며 널리 이용되고 있다."],a:2,e:"② 가열분해법은 실용적으로는 350℃에서 1초 정도 체류시킴으로써 배출오존의 파괴가 충분히 가능하다(200℃가 아님)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:13,q:"심하게 오염되어 보통의 정수법만으로는 정수가 되지 않는 지표수의 처리방법으로 적당하지 않은 것은?",c:["조류처리","전염소처리","활성탄처리","슬러지처리"],a:4,e:"특수정수처리: 보통의 정수법인 침전, 여과, 소독법만으로 음료수를 얻을 수 없을 때 사용되는 방법이며 철, 망간, 중금속, 미량 유기물질 등을 제거하는 데 사용된다. 조류처리, 전염소처리, 활성탄처리, 생물처리, 오존처리 등이 있다(슬러지처리는 해당 없음)."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:14,q:"다음 중에서 냄새 및 맛을 제거하는 데 효과적인 반면 가격이 비싸고 잔류효과가 없는 것이 단점인 살균제는 어느 것인가?",c:["염소","적외선","이산화염소","오존"],a:4,e:"④ 오존(O₃)은 냄새, 맛을 제거하는 능력이 뛰어나고 살균효과도 염소보다 좋다. 그러나 가격이 비싸고 잔류효과가 없는 단점이 있다."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:15,q:"음용수를 위한 정수처리 시의 일반적인 살균방법으로 우리나라에서 가장 많이 사용되는 것은?",c:["오존살균","염소소독","자외선 살균","산소주입"],a:2,e:"② 염소(Cl₂)소독은 상수의 살균(소독)방법 중 가장 널리 사용되는 방법이다."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:16,q:"상수를 처리한 후에 치아의 충치를 예방하기 위해 주입되는 물질은?",c:["염소","플루오린","산소","비소"],a:2,e:"치아의 충치를 예방하기 위해 주입하는 것은 플루오린(F)이다. 그러나 플루오린이 과다하게 함유될 경우 반상치아(반점치아)를 발생시킬 수 있다."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:17,q:"상수원수 중에 포함된 암모니아성 질소(NH₃-N)를 제거하는 처리방법 중 일반적으로 효과가 가장 적은 방법은?",c:["폭기방법(Aeration)","염소주입","오존처리","생물활성탄"],a:3,e:"암모니아성 질소(NH₃-N)를 제거하는 처리방법: 불연속점 염소처리, 생물학적 처리(생물활성탄 포함), 폭기 또는 Air Stripping. 오존처리는 암모니아성 질소 제거 효과가 가장 적다."},
{g:"b3c5",gt:"[2권] 3과목 5장 미량 유·무기물질 설비운영",s:"설비운영",n:18,q:"영구경도의 원인인 황산염(CaSO₄)이나 황산마그네슘(MgSO₄)이 함유될 경수를 연쇄시키려면 원칙적으로 어떻게 하는가?",c:["폭기한다.","활성탄으로 처리한다.","소다회(Na₂CO₃)와 소석회(Ca(OH)₂)로 처리한다.","알루미늄과 나트륨으로 구성된 규산염으로 처리한다."],a:3,e:"황산염의 제거에는 소다회를 가하고, 황산마그네슘의 제거에는 소석회와 소다회를 합쳐 가하면 화학적 변화를 일으켜 제거된다."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:1,q:"생물학적 전처리에 영향을 주는 인자에 해당하지 않는 것은?",c:["세척방법","영양염류 및 산소","수온, pH","접촉시간"],a:1,e:"생물학적 전처리에 영향을 주는 인자: 수온, pH, 영양염류 및 산소, 저해물질(중금속, 기름성분, 농약 등), 접촉시간 등. 세척방법은 해당 없음."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:2,q:"다음 처리대상 원수의 수질조건에 대한 설명으로 옳지 않은 것은?",c:["처리대상 원수수질조건에는 수온, 무기성 질소, 알칼리도 등이 있다.","수온은 저수온에서는 제거능력이 현저하게 저하하므로 약 10℃ 이상이 좋다.","무기성 질소의 총농도는 10mg/L 이하이어야 한다.","홍수 등에 의한 고탁도 시에는 중요한 처리대상이 된다."],a:4,e:"④ 홍수 등에 의한 고탁도 시에는 처리대상 외로 한다(중요한 처리대상이 아님)."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:3,q:"다음 중 침적여과상장치(허니콤방식)에 대한 설명으로 옳지 않은 것은?",c:["설비는 접촉지, 순환장치, 허니콤튜브, 세척장치로 구성된다.","처리계열은 1계열로 통일하고 각 계열은 접촉지를 병렬로 배치한다.","접촉지의 용량은 실험 등을 참고로 하여 원수수질이나 처리목표수질에 적합하도록 결정한다.","접촉지의 형상 및 크기는 균등한 지내 유속을 유지할 수 있도록 한다."],a:2,e:"② 처리계열은 2계열 이상으로 하여 각 계열은 복수의 접촉지를 직렬로 배치한다. 또 복수계열에 균등하게 유입될 수 있도록 수리적인 고려가 필요하다."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:4,q:"다음 중 침적여과상장치(허니콤방식)에 대한 설명으로 옳지 않은 것은?",c:["허니콤튜브의 충전 깊이는 2~6m를 표준으로 한다.","허니콤튜브의 충전율은 접촉지 용적의 80% 이상으로 한다.","허니콤튜브는 내구성이 좋고 원수수질에 적합한 셀크기를 가지며 세척이 용이한 것을 선정한다.","원수수질에 따라 차광이 가능하도록 하고 소포용(消泡用) 샤워장치를 해야 한다."],a:2,e:"② 허니콤튜브의 충전율은 접촉지 용적의 50% 이상으로 한다(80%가 아님). 허니콤튜브 기준: 폐색을 방지하기 위하여 세척장치를 적절히 설치, 충전깊이 2~6m 표준, 충전율 접촉지 용적의 50% 이상, 내구성이 좋고 적합한 셀(Cell) 크기."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:5,q:"다음 생물제거설비 중 약품처리설비 및 이단응집처리설비에 대한 설명으로 옳지 않은 것은?",c:["약품처리설비는 발생한 장애생물을 유효하게 제거할 수 있어야 한다.","약품의 사용량은 생물의 종류나 수질 등을 고려하여 정해야 한다.","이단응집처리설비는 여과지 뒤에 설치하고 응집제 주입 후 곧바로 혼화한다.","이단응집이란 통상 응집처리한 처리수에 다시 응집제를 주입하는 처리법이다."],a:3,e:"③ 이단응집처리설비는 침전지와 여과지 사이에 설치하고 응집제주입 후 곧바로 혼화한다(여과지 뒤가 아님). 이단응집처리: 미세 플랑크톤·조류 등이 보통의 응집침전처리에서 충분히 제거되지 않고 여름에도 포착할 수 없으므로 여과수에 누출 시 냄새가 나고 탁도를 상승시킬 때 침전처리수에 응집제를 추가 주입하여 제거하는 방법이다."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:6,q:"철·망간제거설비에 대한 설명으로 옳지 않은 것은?",c:["철은 지하수에서는 제2철염 형태로 존재한다.","약품산화처리는 전염소처리 또는 과망간산칼륨처리에 의한 것으로 한다.","염소의 주입률은 여과수 중에 유리잔류염소의 양을 0.5~1.0ppm 정도로 한다.","지하수 등 탁질을 포함하지 않은 물로부터 망간을 제거할 때는 전염소처리 후에 망간접촉여재로 여과할 수 있다."],a:1,e:"① 철의 형태는 지하수에서는 중탄산제1철[Fe(HCO₃)₂], 하천수에서는 산화되어 제이철염, 온천이나 광산·공장폐수 등의 혼입에 따라 황산제1철로 존재할 수 있다(제2철염이 아님)."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:7,q:"철박테리아이용법에 대한 설명으로 옳지 않은 것은?",c:["철박테리아이용법은 철박테리아를 이용하여 현탁물이 많은 원수 중의 철, 망간을 제거하는 것이다.","원수는 수질변동이 적은 지하수 등으로 한다.","철박테리아의 종류 및 존재를 확인한다.","여과속도는 10~30m/day를 표준으로 한다."],a:1,e:"① 철박테리아이용법은 철박테리아를 이용하여 현탁물이 적은 원수 중의 철, 망간의 제거를 목적으로 하며, 원수를 철박테리아와 접촉시켜 철, 망간을 흡착 후 모래여과로 철박테리아와 물을 분리시키는 것이다(현탁물이 많은 원수가 아님)."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:8,q:"침식성 유리탄산, 플루오린 주입 등의 제거에 대한 설명으로 옳지 않은 것은?",c:["침식성 유리탄산을 많이 포함한 물은 상수도시설에 대하여 pH가 낮은 경우와 같은 장해를 준다.","침식성 유리탄산은 원수에서는 지하수와 호소의 정체기 시 저층수에, 정수에서는 전염소 및 응집제를 다량으로 사용한 경우에 많이 나타난다.","치아우식증 예방을 위하여 정수장에 플루오린을 투입할 경우 플루오린 투입기 등 관련 시설을 설치하여 플루오린화합물을 주입한다.","색도가 높을 경우에는 그 제거를 위하여 약품산화처리를 한다."],a:4,e:"④ 색도가 높을 경우에는 그 제거를 위하여 응집침전처리, 활성탄처리, 오존처리를 한다(약품산화처리가 아님)."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:9,q:"트라이할로메탄, 트라이클로로에틸렌 등의 대책에 대한 설명으로 옳지 않은 것은?",c:["트라이할로메탄 전구물질을 다량으로 포함한 경우에는 그 저감을 위해 활성탄처리 또는 전염소처리를 대신하여 중간염소처리한다.","트라이할로메탄은 정수처리공정의 염소처리공정에서 부식질 등의 유기물과 유리염소가 반응하여 생성되는 것이다.","트라이할로메탄의 제거방법은 전구물질이 현탁성인지 용해성인지에 따라 적절하게 선택한다.","현탁성 전구물질의 제거에는 입상활성탄처리, 분말활성탄처리 등을 행한다."],a:4,e:"④ 현탁성 전구물질의 제거에는 응집침전, 용해성 전구물질의 제거에는 분말활성탄처리, 입상활성탄처리 등을 행한다."},
{g:"b3c6",gt:"[2권] 3과목 6장 생물·철망간 처리설비운영",s:"설비운영",n:10,q:"트라이클로로에틸렌 대책, 음이온 계면활성제의 제거에 대한 설명으로 옳지 않은 것은?",c:["폭기에 의한 방법은 트라이클로로에틸렌 등이 물에 대하여 용해도가 낮고 휘발성 물질이라는 성질을 이용하여 수중(액상)에서 대기(기상) 중에 휘산시키는 것이다.","트라이클로로에틸렌 대책 중 입상활성탄에 의한 방법은 접촉시간을 대략 15분 정도를 목표로 하여 탄층의 두께 및 여과속도를 정하면 좋다.","음이온 계면활성제를 다량으로 포함한 경우에는 그 제거를 위해 활성탄처리, 생물처리를 한다.","입상활성탄은 분말활성탄에 비하여 단위질량당 표면적이 크고 음이온 계면활성제의 흡착량도 많다."],a:4,e:"④ 분말활성탄은 입상활성탄에 비하여 단위질량당 표면적이 크고 음이온 계면활성제의 흡착량도 많다(입상이 아니라 분말). 또 분말활성탄이 갖는 흡착능력을 충분히 이용하기 위해서는 장시간 접촉시키는 것이 제거효과를 높이는 방법이다."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:1,q:"배출수처리설비의 구성과 기능에 대한 설명으로 옳지 않은 것은?",c:["배출수처리는 조정, 농축, 탈수 및 처분의 4단계로 구분되고 그 전부 또는 일부로서 구성된다.","조정시설은 배슬러지량의 조정과정을 행하는 것이며 배출수지와 배슬러지지로 구성된다.","배출수지, 배슬러지지는 배수의 시간적 변화를 조정하고 농축 이후의 일정처리로 연결된 시설이며 또 상징수의 재이용 또는 방류를 행하기 위한 처리시설도 된다.","조정시설은 농축슬러지로부터 수분을 다시 감소시킴으로써 케이크화하여 운반 및 취급이 편리하도록 하는 것을 목적으로 한다."],a:4,e:"④는 탈수시설에 대한 설명이다(조정시설이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:2,q:"배출수처리설비의 구성과 기능에 대한 설명으로 옳지 않은 것은?",c:["통상 슬러지는 배슬러지지로부터 농축조 중앙에 위치한 슬러지조로 보내고 농축 슬러지는 중앙 저부로부터 배출되며 상징수는 농축조의 상부로부터 유출된다.","현재 통상 사용되고 있는 정수방법은 침전 및 여과이나 이들은 부유물질의 제거를 목적으로 한 것이다.","슬러지 탈수성 조사는 실용기를 사용하여 행하는 것이 필요하나 탈수성의 근사치를 알기 위하여 실린더테스트 등을 하여 비저항치를 구한다.","처리대상 슬러지량의 결정에 있어서 슬러지처리시설이 처리대상으로 하는 원수 부유물질량(탁도)을 설정해 둘 필요가 있다."],a:3,e:"③ 슬러지 탈수성 조사는 리프테스트 등을 하여 비저항치를 구하고, 슬러지의 침강농축특성을 조사하기 위해서는 통상 실린더테스트 방법을 사용한다."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:3,q:"다음 중 배슬러지지의 용량과 구조에 대한 설명으로 옳지 않은 것은?",c:["배출수지펌프의 용량은 여과지의 지수, 최소여과계속시간, 배출수지의 용량 등에 비추어 과부족이 없도록 하여야 한다.","지수는 2지 이상이 바람직하다.","배출수지의 형상은 사용목적에 적합해야 하고 유효수심은 2~4m, 고수위에서 주벽상단까지 여유고는 60cm 이상이 표준이다.","배출수지에는 배출수관만 설치하여도 된다."],a:4,e:"④ 배출수지에는 회수수관, 회수펌프, 슬러지배출관, 슬러지배출 펌프를 설치하여야 한다(배출수관만이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:4,q:"다음 중 정수장에서 배출수처리의 대상이 아닌 것은?",c:["침전슬러지","여과지 역세척수","응집물질","잔류염소"],a:4,e:"정수장에서 배출수되는 슬러지는 주로 침전슬러지, 여과지 역세척수, 응집·침전된 플록 등으로 구성된다. 잔류염소는 해당 없음."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:5,q:"배슬러지지의 용량과 구조에 대한 설명으로 옳지 않은 것은?",c:["배슬러지지(조정조)는 침전지 및 배출수지에서 발생하는 슬러지의 양과 질을 혼합조정하고 침강분리시키기 위한 설비이다.","배슬러지지설비는 유출게이트, 슬러지인발밸브, 슬러지이송펌프 등으로 구성된다.","배출수의 침강분리 시에는 슬러지수집기를 설치하고, 침강분리하지 않을 때에는 교반장치를 설치한다.","내마모성을 갖춘 슬러지이송펌프를 설치한다."],a:2,e:"② 배출수지설비는 유입 및 유출게이트, 슬러지수집기, 슬러지인발밸브, 슬러지이송펌프 등으로 구성된다(유출게이트만이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:6,q:"슬러지수집기 및 이송펌프의 선정기준에 대한 설명으로 옳지 않은 것은?",c:["슬러지수집기는 슬러지 중의 협잡물 등에 의해 Impeller 등의 막힘이 없을 것","슬러지수집기는 슬러지의 퇴적에 따른 과부하의 영향이 없을 것","슬러지수집기는 경제적이고 침전지 청소 시에 발생하는 다량의 슬러지처리에 유리할 것","슬러지이송펌프는 운전·유지·보수관리가 용이할 것"],a:1,e:"① 슬러지 중의 협잡물 등에 의해 Impeller 등의 막힘이 없을 것은 슬러지이송펌프에 대한 설명이다(수집기가 아님)."},
