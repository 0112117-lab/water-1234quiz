{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:57,q:"개수로에서 유량이 일정할 때 한계수심이 되는 조건은?",c:["비에너지가 최대가 된다.","한계수심은 비에너지의 2/3이다.","프루드수가 1보다 크다.","비에너지가 최소가 된다."],a:4,e:"h_c=H_emin=(2/3)H_e, Fr=V/√(gh)=1. 한계수심은 비에너지가 최소가 되는 수심이다. (②는 함정: 한계수심=비에너지의 2/3은 맞으나 '조건'을 묻는 문제이므로 비에너지 최소가 정답)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:58,q:"다음 설명 중 옳지 않은 것은?",c:["평상시의 하천은 정류이다.","홍수 시의 하천은 부정류이다.","수류(水流)의 단면에 따라 유속이 다른 흐름을 부정류라 한다.","층류에서 난류로 변화할 때의 유속을 한계유속이라 한다."],a:4,e:"④ 한계유속은 상류에서 사류로 변할 때, 즉 Fr_c=1의 한계수심으로 흐를 때의 유속이다. (층류↔난류 전환 유속이 아님)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:59,q:"직사각형 단순수로의 폭이 5m이고, 한계수심이 1m이다. 에너지 보정계수 α=1.00이면 유량은?",c:["Q=15.65m³/s","Q=10.75m³/s","Q=9.80m³/s","Q=3.13m³/s"],a:1,e:"한계유속 V_c=√(gh/α)=√(9.8×1/1.0)=3.13m/s. Q=AV_c=5×1×3.13=15.65m³/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:60,q:"광폭 직사각형 단면수로의 단위폭당 유량이 16m³/s일 때 한계수심과 한계경사는?(단, 수로의 조도계수 n=0.02이다)",c:["한계수심=1.97m, 한계경사=3.27×10⁻³","한계수심=2.97m, 한계경사=2.73×10⁻³","한계수심=2.15m, 한계경사=2.81×10⁻³","한계수심=2.45m, 한계경사=2.90×10⁻³"],a:2,e:"한계수심 h_c=(αQ²/gb²)^(1/3)=(1×16²/(9.8×1²))^(1/3)=2.97m. C=(1/n)R^(1/6)=(1/0.02)×2.97^(1/6)=59.9. I_c=g/(aC²)=9.8/(1×59.9²)=2.73×10⁻³"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:61,q:"충력치(Specific Force)의 정의로 옳은 것은?",c:["물의 충격에 의해서 생기는 힘을 말한다.","비에너지가 최대가 되는 수심일 때의 에너지를 말한다.","개수로의 한 단면에서의 운동량과 정수압의 합을 물의 단위 중량으로 나눈 값을 말한다.","한계수심을 가지고 흐를 때의 한 단면에서의 에너지를 말한다."],a:3,e:"충력치는 운동량 방정식에 의해 단위 시간당 유체의 운동량 변화가 물체에 작용하는 힘과 같다는 이론이다. M=η(Q/gV)+h_G·A"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:62,q:"폭 6m인 구형 단면수로에서 유량 Q=9m³/s로 흐를 때, 수심이 0.9m라면 충력치는?(단, 운동량 보정계수 η=1이다)",c:["5.42m³","6.46m³","2.86m³","3.96m³"],a:4,e:"M=η(Q²/gV)+h_G·A=(1×9²/(9.8×6×0.9))+((0.9/2)×6×0.9)=3.96m³"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:63,q:"개수로에서 강도수(Strong Jump)가 일어나는 한계는?",c:["Fr ≥ 4.5","Fr ≥ 9.0","Fr ≥ 10.0","Fr ≥ 15.0"],a:2,e:"약도수: √3≤Fr<2.5, 동요도수: 2.5≤Fr<4.5, 정상도수: 4.5≤Fr<9.0, 강도수: 9.0≤Fr"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:64,q:"도수(Hydraulic Jump)에서 상하류 수심의 관계식은?",c:["전수압의 이론으로부터 유도할 수 있다.","운동량 방정식으로부터 유도할 수 있다.","상사법칙에 의하여 유도할 수 있다.","도수에 의한 에너지 손실은 ΔH_e=(h₁-h₂)³/4h₁h₂이다."],a:2,e:"도수 전후 단면은 에너지보존법칙(베르누이) 적용이 불가능하며, 운동량방정식을 기초로 한 비력방정식으로 유도한다. 에너지 손실은 ΔH_e=(h₂-h₁)³/4h₁h₂이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:65,q:"사류의 Froude수 Fr₁=V₁/√(gh₁)의 값으로 완전도수를 생기게 하는 값은?",c:["1<Fr₁<√3","0<Fr₁<0.5","0.5<Fr₁<1","√3<Fr₁"],a:4,e:"도수란 사류가 상류로 변할 때 수면이 불연속적으로 뛰는 현상으로 Fr₁≥√3이면 완전도수가 발생하고, 1<Fr₁<√3이면 파상도수가 발생한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:66,q:"다음의 오리피스(Orifice)에 관한 설명 중 옳지 않은 것은?",c:["상류단의 날카로운 오리피스를 예연 오리피스라 한다.","사출수맥(시출수맥)이 대기 중으로 분출되는 오리피스는 자유유량을 갖는다고 한다.","오리피스에 작용하는 수두에 관계없이 직경이 큰 오리피스를 큰 오리피스라 한다.","오리피스의 수맥에는 반드시 수축단면이 존재한다."],a:3,e:"③ 큰 오리피스란 오리피스 단면이 수면으로부터 오리피스까지 수두(h)에 비해 커서 유속계산 시 단면 상하단의 유속을 고려해야 하는 오리피스를 말한다. (직경만으로 결정되지 않음)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:67,q:"기하학적으로 비슷한 대소(大小)원형 오리피스의 비가 n인 경우(H/h=D/d=n)에 유속, 축류단면, 유량의 비에 대해서 바르게 조합한 것은?(유속계수 Cv, 수축계수 Ca는 대소 오리피스 같다)",c:["유속 n², 축류단면 n^(1/2), 유량 n^(3/2)","유속 n^(1/2), 축류단면 n², 유량 n^(5/2)","유속 n^(1/2), 축류단면 n^(1/2), 유량 n^(5/2)","유속 n², 축류단면 n^(1/2), 유량 n^(5/2)"],a:2,e:"유속은 H^(1/2)에 비례하므로 V/v=n^(1/2). 축류단면은 d²에 비례하므로 A/a=n². 유량은 d²×H^(1/2)에 비례하므로 Q/q=n^(5/2)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:68,q:"오리피스에서 수축계수 0.45, 유속계수 0.97이라고 할 때 유량계수는?",c:["0.22","0.33","0.44","2.2"],a:3,e:"유량계수 = 유속계수 × 수축계수 = C_v·C_a = 0.97×0.45 = 0.437 ≈ 0.44"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:69,q:"작은 오리피스에서 단면 수축계수 Ca, 유속계수 Cv, 유량계수 C와의 관계가 옳게 표시된 것은?",c:["C=Cv/Ca","C=Ca/Cv","C=Cv+Ca","C=Cv·Ca"],a:4,e:"Q=CAV. C=Cv·Ca·A·V=Ca·Cv·AV ∴ C=Cv·Ca"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:70,q:"수조 횡단 면적이 1m²인 측벽에 공구면적이 20cm²인 구멍으로 수두 2m에서 1m로 하강하는 데 요하는 시간은?(단, 유량계수 C=0.6)",c:["25.0초","108.2초","155.9초","169.5초"],a:3,e:"오리피스 배수시간 T=(2A/(Ca√(2g)))×(H₁^(1/2)-H₂^(1/2))=(2×1/(0.6×20×10⁻⁴×√(2×9.8)))×(2^(1/2)-1^(1/2))=155.93s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:71,q:"노즐에서 유량을 구하기 위하여 옳게 표시된 공식은?(단, C는 유속계수이다)",c:["Q=C(πD²/4)√(2gh/(1-C²(d/D)²))","Q=C(πD²/4)√(2gh/(1-C²(d/D)⁴))","Q=C(πD²/4)√(2gh)","Q=C(πD²/4)√(2gh/(1-d²(d/D)²))"],a:2,e:"노즐의 유량 Q=Ca√(2gh/(1-(Ca/A)²))=Ca√(2gh/(1-C²(d/D)⁴))"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:72,q:"위어의 보편적인 사용 목적이 아닌 것은?",c:["유량측정","취수를 위한 수위증가","분수","수질오염방지"],a:4,e:"④ 위어는 수로를 가로막아 그 일부분으로 물을 흐르게 하여 유량을 측정하고 취수를 위해 수위를 증가시키며 분수 등의 목적으로 사용한다. (수질오염방지는 목적이 아님)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:73,q:"4각형 위어(Weir)에서의 유량은 다음 어느 값에 비례하는가?(단, h는 위어의 월류수심이다)",c:["h^(5/2)","h^(3/2)","h²","h^(1/2)"],a:2,e:"사각형 위어의 유량 Q=(2/3)·C·b√(2g)·h^(3/2)이므로 h^(3/2)에 비례한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:74,q:"삼각 위어로 유량 Q를 측정할 때 Q는?",c:["위어의 수심 h의 1/2층에 비례한다.","위어의 수심 h의 3/2층에 비례한다.","위어의 수심 h의 5/2층에 비례한다.","위어의 수심 h의 2/3층에 비례한다."],a:3,e:"삼각 위어 유량 Q=(8/15)C·tan(θ/2)√(2g)·h^(5/2)이므로 h의 5/2승에 비례한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:75,q:"중심각이 90°인 삼각형 위어상의 수두가 30cm일 때 유량을 계산한 값은?(단, 위어의 유량계수는 0.6으로 가정)",c:["1.58L/s","1.69L/s","1.38L/s","6.98L/s"],a:4,e:"Q=(8/15)C×tan(θ/2)√(2g)×h^(5/2)=(8/15)×0.6×tan45°×√(2×9.8)×0.3^(5/2)=6.98×10⁻²m³/s=6.98L/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:76,q:"직각 3각 위어로 유량을 측정함에 있어 월류수심 H의 측정에서 x%의 오차가 있었다면 유량의 오차는?",c:["1.5x%","2x%","2.5x%","3x%"],a:3,e:"Q=K·H^(5/2). dQ/Q=2.5·(dh/h)=2.5x%"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:77,q:"삼각 위어에 있어서 유량계수가 일정하다고 할 때 월류수심의 측정오차에 의한 유량 오차가 1% 이하가 되기 위한 월류수심의 측정오차는 어느 정도로 해야 하는가?",c:["1/2% 이하","2/3% 이하","2/5% 이하","3/5% 이하"],a:3,e:"Q=K·H^(5/2)에서 dQ/Q=2.5·(aH/H). ∴ aH/H=(2/5)·(dQ/Q)=(2/5)×1=2/5%"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:78,q:"완전월류상태에 있는 광정 위어(Weir)에서 다음 중 옳은 것은?",c:["h=½(H+h_a)","h=⅓(H+h_a)","h=¾(H+h_a)","h=⅔(H+h_a)"],a:4,e:"완전월류의 조건은 h가 최소한 한계수심이 되어야 하므로 h=(2/3)(H+h_a)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:79,q:"어느 침전지에서 물이 월류하는 위어의 총 길이가 36m이다. 하루에 5,300m³를 처리할 때 위어부하율(m³/m·day)은?",c:["137m³/m·day","127m³/m·day","117m³/m·day","147m³/m·day"],a:4,e:"위어부하율 = 처리량/위어길이 = 5,300m³/36m·day = 147m³/m·day"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:80,q:"위어의 수심 H, 위어 마루부에서의 월류수심과 한계수심을 h와 h_c, 그리고 위어판의 높이 H_d와의 사이에서 수중 위어가 될 경우는?",c:["H>h_c","H>h_d","H=h_c","H<h_c"],a:4,e:"월류수심이 한계수심보다 크게 되면(H<h_c, 즉 위어판이 충분히 잠기면) 흐름은 상류가 되어 소위 수중 위어가 된다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:81,q:"위어를 월류하는 유량 Q=400m³/s, 저수지와 위어 정부와의 수면차가 1.7m, 위어의 유량계수를 2라 할 때 위어의 길이 L은?",c:["78m","80m","90m","96m"],a:3,e:"Q=CLH^(3/2). 400=2×L×1.7^(3/2). L=400/(2×1.7^(3/2))=90.09 ≈ 90m"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:82,q:"다음 중 응집기, 혼화기 등의 교반강도를 나타내는 속도경사(G)를 표시하는 인자와 관계가 적은 것은?",c:["소비전력","점성 계수","혼화지의 체적","약품의 농도"],a:4,e:"G=√(P/(μ×V)). P:소비전력, μ:점성계수, V:혼화지 체적. 약품의 농도는 속도경사와 관계없다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:83,q:"약품침전지 내의 평균유속의 표준으로 맞는 것은?",c:["20cm/min 이하","30cm/min 이하","40cm/min 이하","50cm/min 이하"],a:3,e:"약품침전지 내의 유속은 침전된 슬러지를 재부상시키지 않는 것 등을 고려하여 평균유속으로 40cm/min 이하를 표준으로 하고 있다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:84,q:"다음 중 급속여과지 여과사의 유효경의 표준 범위는?",c:["1.45~2.0mm","1.0~1.5mm","2.0~2.5mm","0.45~1.0mm"],a:4,e:"급속여과지 여과사의 유효경은 0.45~1.0mm의 범위 내에 있어야 하나, 최근에는 유효경을 1.0mm까지 크게 하고 있다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:85,q:"급속여과지의 여과사의 최대경은 다음 중 어느 것인가?",c:["5mm 이내","3mm 이내","4mm 이내","2mm 이내"],a:4,e:"급속여과지의 최대경은 2mm 이내이어야 한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:86,q:"송수관로를 설계할 때 고려해야 할 사항과 관련이 적은 것은?",c:["송수관로의 공사비가 최소인 노선을 고려할 것","송수관로는 최소의 저항으로 송수할 수 있을 것","송수관로는 되도록 급격한 굴곡이 없도록 설치할 것","송수관로는 자연유하식보다 가압식을 적용할 것"],a:4,e:"④ 유지관리비용을 고려하여 될 수 있으면 자연유하식이 되도록 설계하는 것이 좋다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:87,q:"펌프의 토출량을 줄이기 위해 토출밸브의 개도 조정을 하였더니 압력계 a의 압력은 10kg/cm²이고 압력계 b의 압력은 8kg/cm²가 되었다. a와 b지점 사이의 손실은 없고, 관경 및 관재질은 같다고 가정할 때 밸브의 손실계수는?(단, 유량은 5m³/min, 관경은 200mm이다)",c:["42.9m","38.3m","46.9m","56.2m"],a:4,e:"H_L=K×(V²/2g) → K=H_L×(2g/V²). 유속 V=Q/A=0.083/0.0314=2.64m/s (Q=5m³/min=0.083m³/s, A=3.14×0.2²/4=0.0314m²). 손실수두=10-8=2kg/cm²=20m. K=20×(2×9.8/2.64²)=56.2"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:1,q:"횡축형에 비해 입축형 펌프의 장점으로 옳지 않은 것은?",c:["흡수고(吸水高)가 높은 장소에는 횡축형보다 유리하다.","캐비테이션에 대해 안전하다.","기동이 간단해서 운전이 확실하다.","구조가 간단하여 비교적 가격이 저렴하다."],a:4,e:"④ 구조가 간단하여 비교적 가격이 저렴한 것은 횡축형의 장점이다. 입축형은 흡수고가 높은 장소에 유리하고 캐비테이션에 안전하나 구조가 복잡하고 가격이 비싸다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:2,q:"다음 펌프 중 양정(揚程)의 높이가 가장 높은 것은?",c:["원심펌프","터빈펌프","사류펌프","축류펌프"],a:1,e:"원심펌프: 4m 이상으로 양정이 가장 높다. 사류펌프: 3~12m 중간형. 축류펌프: 4m 이하로 양정이 가장 낮다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:3,q:"다음 중 상수도의 펌프에 관한 설명으로 옳지 않은 것은?",c:["양정이란 펌프가 물을 올릴 수 있는 높이를 말한다.","흡입구경은 토출량과 흡입구의 유속을 고려하여 정한다.","효율은 일반적으로 토출량에 비례하여 낮아진다.","흡입구의 유속은 1.5~3.0m/s를 표준으로 한다."],a:3,e:"③ 펌프효율은 일정수준까지는 토출량에 정비례하여 높아진다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:4,q:"원심펌프에서 실제적으로 입구 내 깃각도 β₁은 대략 얼마인가?",c:["30° > β₁ > 25°","60° > β₁ > 15°","60° > β₁ > 30°","50° > β₁ > 15°"],a:4,e:"원심펌프 입구 내 깃각도 β₁은 대략 50° > β₁ > 15° 범위이다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:5,q:"다음 중 비교회전도의 단위가 아닌 것은?",c:["rpm·m³/min·m","rpm·L/min·m","rpm·m³/min·ft","rpm·m/s·m"],a:4,e:"비속도(비교회전도) N_s=N√(Q/n)/H^(3/4). N:회전수(rpm), Q:토출유량(m³/min), H:전양정(m). rpm·m/s·m는 단위로 성립하지 않는다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:6,q:"펌프운전의 제어방법에는 여러 가지 방법이 있다. 다음 중 유량제어방식에 포함되지 않는 것은?",c:["펌프대수제어","압력제어","토출밸브제어","회전수제어"],a:2,e:"펌프의 유량제어방법에는 펌프대수의 제어, 밸브의 개방도에 의한 제어, 날개회전수에 의한 제어, 가동날개 축류펌프의 날개각도제어(토출량제어) 등이 있다. 압력제어는 포함되지 않는다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:7,q:"양수량이 12m³/min, 전양정 8m, 회전수 1,160rpm인 펌프의 형식으로 알맞은 것은?",c:["축류펌프","벌류트펌프","사류펌프","터빈펌프"],a:3,e:"N_s=N×Q^(1/2)/H^(3/4)=1,160×12^(1/2)/8^(3/4)=844.8. N_s가 250~1,200 범위이므로 사류펌프가 적합하다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:8,q:"다음 중 펌프의 선정 시 고려해야 할 사항이 아닌 것은?",c:["전양정이 6m 이하이고 구경이 200mm 이상인 경우에는 사류 또는 축류펌프를 선정함을 표준으로 한다.","전양정이 20m 이상이고 구경이 200mm 이하의 경우는 원심펌프를 선정함을 표준으로 한다.","침수의 위험이 있는 장소에는 횡축펌프를 선정한다.","심정호의 경우는 수중모터펌프 혹은 보아홀펌프를 사용한다."],a:3,e:"③ 펌프가 침수되면 모터의 고장이 가장 치명적이므로, 침수의 위험이 있는 곳은 입축형 펌프를 사용해야 한다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:9,q:"어느 하수처리장에서 400m³/day의 하수를 처리할 때 펌프장 내 습정의 부피를 얼마 정도로 하면 적당한가?(단, 습정의 체류시간은 20분이다)",c:["10.55m³","15.55m³","20.55m³","5.55m³"],a:4,e:"Q=V/t. 부피 V=Q×t=400m³/day×(1/(24×60))day/min×20min=5.56m³"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:10,q:"펌프의 유속 1.81m/s 정도로 양수량 0.85m³/min을 양수할 때, 토출관의 지름은?",c:["100mm","84mm","62mm","40mm"],a:1,e:"펌프의 흡입구경 D=146√(Q/v)=146√(0.85/1.81)=100mm (Q:토출유량 m³/min, v:유속 m/s)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:11,q:"직경 300mm, 길이 10m인 주철관을 사용하여 0.15m³/s의 물을 20m 높이에 양수하기 위한 펌프의 소요동력은?(단, 주철관의 조도계수 n=0.012, 마찰손실계수 f=0.0268, 펌프의 효율은 70%이고, 마찰 이외의 손실은 무시함)",c:["47.7HP","283.0HP","28.3HP","57.0HP"],a:4,e:"v=Q/A=0.15/(π×0.3²/4)=2.12m/s. H_L=f·(l/D)·(v²/2g)=0.0268×(10/0.3)×(2.12²/(2×9.8))=0.205m. P_s=1,000Q(H+H_L)/(76η)=1,000×0.15×(20+0.205)/(76×0.7)=57.0HP"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:12,q:"펌프의 지름이 0.2m, 길이 50m의 주철관으로 하수유량 2.4m³/min을 15m의 높이까지 양수하려면 몇 마력이 필요한가?(단, 전체 손실수두는 0.9m이고, 펌프의 효율은 85%이다)",c:["10HP","15HP","20HP","25HP"],a:1,e:"Q=2.4m³/min=0.04m³/s. 전양정=실양정+손실수두+잔류속도수두=15+0.9+0=15.9m. P_s=1,000QH/(76η)=1,000×0.04×15.9/(76×0.85)=9.85HP ≈ 10HP"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:13,q:"내경 10cm, 길이 60m의 강관으로 매초당 0.02m³의 물을 30m의 높이까지 양수하려면 펌프의 소요축동력(kW)은?(단, 마찰손실만 고려하고 마찰손실계수 f=0.035, 펌프의 효율은 85%이다)",c:["37kW","8.5kW","7.6kW","9.8kW"],a:2,e:"v=Q/A=0.02/(π×0.1²/4)=2.55m/s. H_L=f·(l/D)·(v²/2g)=0.035×(60/0.1)×(2.55²/(2×9.8))=6.97m. 전양정=30+6.97=36.97m. P_s=1,000QH/(102η)=1,000×0.02×36.97/(102×0.85)=8.53kW"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:14,q:"유량이 0.7m³/s인 물을 길이 100m, 직경 40cm, 마찰손실계수가 0.03인 관을 통하여 높이 30m까지 양수할 경우 필요한 동력은 몇 마력(HP)인가?(단, 펌프의 합성효율은 80%이고, 마찰 이외의 손실은 무시한다)",c:["122HP","244HP","482HP","978HP"],a:3,e:"A=π×0.4²/4=0.1257m². v=Q/A=0.7/0.1257=5.57m/s. H=h+f·(l/D)·(v²/2g)=30+0.03×(100/0.4)×(5.57²/(2×9.8))=41.87m. P_s=1,000QH/(76η)=1,000×0.7×41.87/(76×0.8)=482.1HP"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:15,q:"구경 400mm인 모터의 직결펌프에서 양수량이 10m³/min, 전양정이 40m, 회전수가 1,050rpm일 때 비교회전도(N_s)는?",c:["209","189","168","148"],a:1,e:"N_s=N·Q^(1/2)/H^(3/4)=1,050×10^(1/2)/40^(3/4)=208.8 ≈ 209"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:16,q:"하루 동안 28,800m³의 물을 8.8m의 높이로 양수하려고 한다. 펌프의 효율을 80%, 축동력에 15%의 여유를 둘 때 원동기의 소요동력은 몇 kW인가?",c:["41.3kW","35.9kW","30.3kW","29.8kW"],a:1,e:"펌프동력 P_s=9.8QH/η=9.8×(28,800/(24×60×60))×8.8/0.8=35.9kW. 소요동력=35.9+(35.9×0.15)=41.3kW"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:17,q:"원심력 펌프의 규정 회전수 N=8회/s, 토출량 Q=47m³/min, 전양정 H=13m일 때 이 펌프의 비교회전도는?",c:["약 37회","약 147회","약 239회","약 481회"],a:4,e:"N=8회/s=480회/min. N_s=N·Q^(1/2)/H^(3/4)=480×47^(1/2)/13^(3/4)=480.7 ≈ 481"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:18,q:"상수도의 펌프시스템에 대한 설명으로 옳지 않은 것은?",c:["캐비테이션의 발생장소는 펌프의 회전차부분, 관로 중 유속이 큰 곳 등이다.","캐비테이션을 방지하기 위해서는 유효흡입수두를 필요흡입수두보다 작게 해야 한다.","수격작용(Water Hammering)은 펌프의 급가동 및 급중지 시 발생한다.","압력조절수조(Surge Tank)를 설치하여 수격작용을 방지할 수 있다."],a:2,e:"② 캐비테이션을 방지하기 위해서는 유효흡입수두(NPSHav)를 필요흡입수두(NPSHre)보다 크게 해야 한다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:19,q:"송수관로에서 유량 Q=0.15m³/s의 물을 하부수조에서 상부수조로 양수하는 데 필요한 펌프의 용량은?(단, 각종 손실수두의 합은 5.59m, 수조 간의 높이차는 15m, 펌프의 효율은 70%이다)",c:["88.5HP","118.0HP","29.5HP","58HP"],a:4,e:"펌프 전양정=실양정+손실수두=15+5.59=20.59m. P_s=1,000QH/(76η)=1,000×0.15×20.59/(76×0.70)=58.1HP"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:20,q:"관정의 펌프용 전동기 동력이 100kW, 펌프의 효율이 93%, 양정고 150m, 손실수두 10m일 때 펌프에 의한 양수량은?",c:["0.02m³/s","0.06m³/s","0.12m³/s","0.15m³/s"],a:2,e:"동력=9.8QH/η(kW). 100=9.8×(1/0.93)×Q×(150+10) ∴ Q=0.06m³/s"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:21,q:"댐여수로 위로 물이 월류할 때 흐름이 댐에 가하는 단위폭당 수평성분의 힘은 얼마인가?(단, 단위폭당 유량 Q=3.5m³/s, 월류 전의 유속 V₁=2.0m/s, 월류 후의 유속 V₂=4.5m/s이다)",c:["119.8kg","157.5kg","607.1kg","946.3kg"],a:3,e:"F=P₁-P₂-(w/g)Q(V₂-V₁)=wh_G1·A₁-wh_G2·A₂-(w/g)Q(V₂-V₁)=1×(2/2)×2×1-1×(1/2)×1×1-(1/9.8)×3.5×(4.5-2.0)=2.0-0.5-0.8929=0.6071ton ∴ F=607.1kg"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:22,q:"다음 중 관로 내에 생기는 부압발생방지법이 아닌 것은?",c:["펌프의 관성증대","서지탱크 설치","밸브의 급폐쇄","조압수조(Air Chamber)의 설치"],a:3,e:"③ 밸브를 급폐쇄하면 수격현상이 유발된다. 부압발생방지법: 토출관 유속이 작게 관경 선정, 펌프 급정지 회피, Flywheel 설치, 공기실/서지탱크 설치, 에어밸브·완폐역지밸브 설치 등."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:23,q:"다음 중 캐비테이션의 방지책에 대한 설명으로 틀린 것은?",c:["펌프의 회전수를 높여준다.","손실수두를 작게 한다.","펌프의 설치위치를 낮게 한다.","흡입관의 손실을 작게 한다."],a:1,e:"① 펌프의 회전수를 감소시켜야 한다. 회전수를 높이면 캐비테이션 발생이 촉진된다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:24,q:"Darcy의 법칙에서 지하수의 유속에 대한 설명으로 알맞은 것은?",c:["수온에 비례한다.","수심에 비례한다.","영향원의 반지름에 비례한다.","동수경사에 비례한다."],a:4,e:"V=ki=K(Δh/L). 동수경사 i는 유속에 비례한다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:25,q:"지하의 사질(砂質) 여과층에서 수두차가 0.4m이며, 투과거리 3m인 경우에 이곳을 통과하는 지하수의 유속은?(단, 투수계수는 0.2cm/s이다)",c:["0.0135cm/s","0.0267cm/s","0.0324cm/s","0.0417cm/s"],a:2,e:"V=KI=KΔ(h/L)=0.2×(40/300)=0.0267cm/s"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:26,q:"하천모형 실험과 가장 관계가 큰 것은?",c:["Froude의 상사법칙","Reynolds의 상사법칙","Weber의 상사법칙","Cauchy의 상사법칙"],a:1,e:"① Froude: 중력이 흐름을 주로 지배하는 개수로·하천 등에 사용. ②Reynolds: 점성력 지배(관수로), ③Weber: 표면장력 지배, ④Cauchy: 탄성력 지배(압축성 유체)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:27,q:"그림과 같은 투수층(지름 D=2m, 길이 l=2m, 수두 h=10m) 내를 흐르는 유량은?(단, 투수계수 K=1m/day임)",c:["0.785m³/day","0.314m³/day","0.157m³/day","3.14m³/day"],a:3,e:"Darcy 법칙 Q=K·I·A(I:동수경사, A:단면적). 교재 정답표 기준 정답은 ③ 0.157m³/day. (해설 계산과정은 교재 정답표를 따름 — 단위·수치 검증 권장)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:28,q:"지하수의 흐름에서 상하류 두 지점의 수두차가 1.6m이고, 두 지점의 수평거리가 480m인 경우에 대수층(帶水層)의 두께 3.5m, 폭 1.2m일 때 지하수 유량은?(단, 투수계수 K=208m/day이다)",c:["2.91m³/day","3.82m³/day","2.12m³/day","2.08m³/day"],a:1,e:"Darcy 법칙 Q=K(Δh/l)·A=208×(1.6/480)×3.5×1.2=2.912m³/day"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:29,q:"다음 굴착정의 유량공식은?(단, C는 피압 대수층의 두께이고, K는 투수계수이다)",c:["2πCK(H-h₀)/(2.3·ln(R/r₀))","2πCK(H-h₀)/(2.3·ln(r₀/R))","2πCK(H+h₀)/(2.3·ln(r₀/R))","2πCK(H+h₀)/(2.3·ln(R/r₀))"],a:1,e:"굴착정(피압 대수층을 양수할 때의 유량): Q=2πCK(H-h₀)/(2.3·log(R/r₀))=2πCK(H-h₀)/(2.3·ln(R/r₀))"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:30,q:"다음 중 심정호(Deep Well)에 대한 설명으로 옳은 것은?",c:["지하 5m 이상 굴착한 정호","피압 투수층까지 굴착한 정호","불투수층 위의 체수층 내에 자유 지하수면을 갖고 바닥이 불투수층에 도달한 정호","지하 100m 이상 굴착한 정호"],a:3,e:"심정호: 불투수층까지 우물 바닥이 위치한 자유수면을 갖고 있는 우물"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:31,q:"자유수면을 가지고 있는 깊은 우물에서 양수량 Q를 일정하게 퍼냈더니 최초의 수위 H가 h₀로 강하하여 정상흐름이 되었다. 우물의 반지름 r₀, 영향원의 반지름이 R이고 투수계수가 K일 때 Q의 값은?",c:["Q=πK(H²-h₀²)/ln(R/r₀)","Q=2πK(H²-h₀²)/ln(R/r₀)","Q=πK(H²-h₀²)/(2ln(R/r₀))","Q=πK(H²-h₀²)/(2ln(r₀/R))"],a:1,e:"심정호(자유수면 우물)의 양수량 Q=πK(H²-h₀²)/ln(R/r₀)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:32,q:"수평한 불투수층 위에 집수암거를 설치하여 지하수가 그 측벽의 양측으로부터 유입될 경우, 그 유입량을 구하는 식으로 옳은 것은?(단, K:투수계수, H:원래의 지하수위, H₀:암거 내의 수심, l:암거의 길이, R:영향원의 반경)",c:["Q=Kl(H²+H₀²)/R","Q=Kl(H²-H₀²)/R","Q=Kl(H²-H₀²)/(2R)","Q=2R(H²-H₀²)/K²"],a:2,e:"집수암거에 대해 Q=(Kl/R)·(H²-H₀²)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:33,q:"합성 단위 유량도(Synthetic Unit Hydrograph)의 공식 중에서 지체시간(Lag Time)에 영향을 주는 주요요소는?",c:["첨두유량, 기저시간(Base Time), 강우지속시간","유역의 하천길이, 유역중심까지 하천의 길이","강우량, 기저유량, 첨두유량","수문곡선의 변곡점까지의 시간, 기저시간, 첨두유량이 발생하는 시간"],a:2,e:"지체시간 t_p=C_t(L_ca·L)^0.3. L_ca(유역중심까지 하천길이), L(유역의 하천길이)이 주요요소이다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:34,q:"선행강수지수는 다음 중 어느 것과 관계되는 내용인가?",c:["지하수량과 강우량의 상관관계를 표시하는 방법이다.","토양의 초기 함수조건을 양적으로 표시하는 방법이다.","강우의 침투조건을 나타내는 방법이다.","하천 유출량과 강우량과의 상관관계를 표시하는 방법이다."],a:2,e:"선행강수지수: 토양의 초기 함수조건을 양적으로 표시하는 방법으로 강수 전 유역 내 토양이 함유하고 있는 수분 정도를 나타낸다. Pa=aP₀+bP₁+cP₂ (a+b+c=1)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:35,q:"가능최대강수량(Probable Maximum Precipitation) 설명 중 가장 적합한 것은?",c:["대규모 수공구조물의 설계홍수량을 결정하는 데 사용된다.","강우량의 장기 변동성향을 판단하는 데 사용된다.","최대강우강도와 면적관계를 결정하는 데 사용된다.","홍수량 빈도해석에 사용된다."],a:1,e:"가능최대강수량(PMP): 어떤 지역에서 일어날 수 있는 가장 극심한 기상조건하에서 발생 가능한 호우로 인한 최대강수량. 대규모 수공구조물의 설계홍수량(치수) 결정 기준으로 사용된다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:36,q:"누가우량곡선(Rainfall Mass Curve)의 특성으로 옳은 것은?",c:["누가우량곡선의 경사가 클수록 강우강도가 크다.","누가우량곡선의 경사는 지역에 관계없이 일정하다.","누가우량곡선은 자기우량 기록에 의하여 작성하는 것보다 보통 우량계의 기록에 의하여 작성하는 것이 더 정확하다.","누가우량곡선으로 일정기간 내의 강우량을 산출할 수 없다."],a:1,e:"누가우량곡선: 가로=시간, 세로=우량으로 시간에 따른 강우량의 크기를 알 수 있으며, 곡선의 경사로 강우강도를 구할 수 있다. (경사가 클수록 강우강도 큼)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:37,q:"40분간 집중호우가 계속되었다(0~5분:1mm, 5~10:4, 10~15:2, 15~20:5, 20~25:8, 25~30:7, 30~35:3, 35~40:2). 지속기간 20분인 최대 강우강도는?",c:["I=49mm/h","I=89mm/h","I=59mm/h","I=69mm/h"],a:4,e:"20분 연속 최대강우량(15~35분 구간): 5+8+7+3=23mm. 강우강도 I=(23/20)×60=69mm/h"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:38,q:"4개 지점의 강우량 관측자료(A:t=10분 15mm, B:t=30분 50mm, C:t=45분 72mm, D:t=80분 132mm)에서 강우강도가 최대가 되는 지점은?",c:["D지점","C지점","A지점","B지점"],a:4,e:"강우강도=단위시간당 강우량. I_A=(15/10)×60=90, I_B=(50/30)×60=100, I_C=(72/45)×60=96, I_D=(132/80)×60=99mm/h. B지점이 최대(100mm/h)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:39,q:"면적 10km²의 지역에 1cm의 강우강도로 무한히 내릴 때 평형유량은?",c:["9.72m³/s","9.26m³/s","8.94m³/s","10.20m³/s"],a:2,e:"단위시간당 유량 Q=IA. (0.01/3)×(1/(60×60))... → Q=(0.01m/h /3600... )×10×10⁶m²=9.26m³/s (강우강도 1cm/h 기준)"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:40,q:"어느 유역에 그림과 같은 분포로 같은 시간에 같은 크기의 강우가 내렸을 때 어느 강우에 의한 홍수의 첨두유량이 가장 큰가?(단, 강우 손실량은 같다)",c:["I","II","III","모두 같다."],a:4,e:"④ 강우의 총량과 각 경우에 대한 손실우량이 같기 때문에 같은 시간에 있어서 첨두유량은 모두 같은 크기를 갖는다. 첨두유량은 모두 동일하다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:41,q:"30년간의 평년강우량이 N_A=1,000, N_B=850, N_C=700, N_D=900이고 어느 해의 월강우량이 P_A=85, P_B=?, P_C=72, P_D=80일 때 B지점의 결측강우량은 얼마인가?",c:["72.6mm","80.5mm","62.3mm","78.4mm"],a:4,e:"정상 연강수량 비율법 P_B=(N_B/3)(P_A/N_A+P_C/N_C+P_D/N_D)=(850/3)(85/1,000+72/700+80/900)=78.4mm"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:42,q:"30년간의 연평균 강수량이 N_A=1,000, N_B=900, N_C=600, N_D=800mm이고, 어느 해의 강수량이 P_A=90, P_B=80, P_C=결측, P_D=75mm일 때 정상 연강수량 비율법에 의한 C점의 강수량을 구한 값은?",c:["50.0mm","52.5mm","54.5mm","61.7mm"],a:3,e:"정상 연강수량 비율법 P_C=(N_C/3)(P_A/N_A+P_B/N_B+P_D/N_D)=(600/3)(90/1,000+80/900+75/800)=54.5mm"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:43,q:"유역 내의 5개 우량 관측정에 기록된 우량(A:20, B:30, C:40, D:35, E:40mm)과 지배면적(A:20, B:20, C:10, D:20, E:15)일 때 Thiessen법으로 유역평균우량을 계산한 값은?(지배면적은 그림 표시와 같다)",c:["33.3mm","33.8mm","32.8mm","31.8mm"],a:4,e:"Thiessen법 P_m=ΣP_i·A_i/ΣA_i=(20×20+30×20+40×10+35×20+40×15)/(20+20+10+20+15)=31.8mm"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:44,q:"연우량 2,000mm, 유출이 0.7일 때 100km²당의 연평균 우량은 다음 중 어느 것인가?",c:["2.4m³/s","4.4m³/s","6.2m³/s","8.6m³/s"],a:2,e:"실제 유량 Q=0.2778·C·I·A. 유출계수 C=0.7, 강우강도 I=2,000/(365×24)=0.2283mm/h, 면적 A=100km². Q=0.2778×0.7×0.2283×100=4.4m³/s"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:45,q:"DAD곡선을 작성하는 데 올바른 것은?",c:["면적은 종좌표, 강우량은 횡좌표, 지속시간은 매개 변수로 하여 그린다.","면적은 횡좌표, 강우량은 종좌표, 지속시간은 매개 변수로 하여 그린다.","면적은 횡좌표, 지속시간은 종좌표, 강우량은 매개 변수로 하여 그린다.","면적은 종좌표, 지속시간은 횡좌표, 강우량은 매개 변수로 하여 그린다."],a:1,e:"DAD(Depth-Area-Duration)곡선: 면적(종좌표), 강우량(횡좌표), 지속시간(매개변수)로 작성한다."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:46,q:"수문학에서 저수위란 1년을 통하여 며칠은 이보다 저하하지 않는 수위를 말하는가?",c:["105일","185일","275일","355일"],a:3,e:"저수위: 275일 이상 이보다 저하되지 않는 수위. 평수위: 1년 중 185번째 수위. 갈수위: 1년 중 355번째 수위."},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:47,q:"임의 온도에 있어서의 실제 증기압이 e이고, 포화 증기압이 e_s일 때 상대습도(h)는?",c:["h=(e/e_s)×100%","h=(e_s/e)×100%","h=e·e_s×100%","h=e·e_s"],a:1,e:"상대습도(h): 포화증기압(e_s)에 대한 증기압(e)의 비. h=(e/e_s)×100%"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:48,q:"어떤 지역에 내린 총강우량 75mm의 시간적 분포가 우량주상도(5,15,20,20,14,1mm/h)로 나타났다. 이 유역의 출구에서 측정한 지표 유출량이 33mm였다면 φ-index는?",c:["9mm/h","8mm/h","7mm/h","6mm/h"],a:1,e:"14mm에 수평선을 그으면 유출량 13mm. 20mm 더 유출되어야 하므로 20÷4=5mm씩 14mm선에서 4개 주상도에서 더 유출(14-5=9mm). 9mm에 수평선을 그으면 지표 유출량 33mm가 되므로 φ-index=9mm/h"},
{g:"b4c3",gt:"[2권] 4과목 3장 펌프의 종류와 수리적 특성",s:"수리학",n:49,q:"물의 순환(循環) 중 직접 유출/손실우량 계산에서 ㉠, ㉡에 필요한 것을 삽입하면?(강우(R) - ㉡ = 손실우량(RI), 직접유출에 초기유량·표면유출·2차유출·㉠ 포함)",c:["㉠ 기저 유출, ㉡ 지하수 유출","㉠ 유효우량(Re), ㉡ 기저 유출","㉠ 유효우량(Re), ㉡ 지하수 유출","㉠ 기저 유출, ㉡ 유효우량(Re)"],a:4,e:"직접 유출: 초과강수·지표면 유출·지표하 유출·수로상 강수(㉠ 기저유출 포함됨은 오답). 강우(R)-유효우량(Re)=손실우량. ㉠은 기저유출, ㉡은 유효우량(Re)이다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:1,q:"응집보조제에 관한 설명으로 옳지 않은 것은?",c:["저수온이나 저농도 시 분말활성탄을 응집보조제로 주입하는 방법도 있다.","활성규산은 응집보조제로서의 기능은 우수하지만 활성화 조작에 어려움이 있다.","폴리염화알루미늄을 사용할 때에는 응집보조제가 필요하지 않은 경우가 많다.","알긴산나트륨은 액상으로 된 제품을 보통 사용한다."],a:4,e:"④ 알긴산나트륨은 분말 형태의 제품을 보통 사용한다. 액상 제품을 보통 사용한다는 설명은 옳지 않다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:2,q:"계획 정수량이 50,000m³/d인 정수장에서 여과속도를 5m/h로 할 경우 필요한 최소 여과지 수는?(단, 1지의 여과면적은 60m²로 하고 예비지 설치는 고려하지 않는다)",c:["6","7","8","9"],a:2,e:"필요 여과면적=Q/여과속도=50,000/(5×24)=416.7m². 여과지 수=416.7/60=6.94 → 최소 7지"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:3,q:"응집제와 응집보조제의 주입에 관한 설명으로 옳지 않은 것은?",c:["응집제의 주입량은 응집제의 농도와 밀도로 산출한다.","응집제의 희석배율은 가능한 한 적게 하고 희석지점은 주입지점과 가까이 하는 것이 바람직하다.","응집보조제의 주입률은 원수 수질에 따라 실험으로 정한다.","응집보조제의 주입지점은 실험으로 정하고 혼화가 잘되는 지점으로 한다."],a:1,e:"① 응집제 주입량은 처리수량과 주입률(실험으로 결정)로 산출한다. 농도와 밀도만으로 산출한다는 설명은 옳지 않다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:4,q:"급속혼화방식에 해당하지 않는 것은?",c:["인라인 기계식","가압수확산","파이프 격자","휠러"],a:4,e:"④ 휠러(Wheeler)는 침전지 슬러지 제거 관련 방식이며 급속혼화방식이 아니다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:5,q:"여과지 성능을 나타내는 성과지표를 모두 고른 것은?(ㄱ.여과수탁도 ㄴ.여과지속시간 ㄷ.역세척수량 ㄹ.여과지속시간 내에 처리된 여과지의 단위면적당 여과수량)",c:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:2,e:"② 여과지 성과지표는 ㄱ(여과수탁도), ㄴ(여과지속시간), ㄹ(단위면적당 여과수량)이다. ㄷ(역세척수량)은 성과지표가 아니다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:6,q:"직접여과에 관한 설명으로 옳은 것은?",c:["원수 수질이 양호하고 장기적으로 안정되어 있는 경우 설치비와 운영비가 적게 소요된다.","고수온이고 고탁도의 원수를 대상으로 하여 응집제를 투입한 다음 여과하는 방식이다.","응집제 주입량은 통상 주입량의 5~10% 정도만 주입하여 플록을 형성시킨다.","생성되는 플록은 입경과 침강속도는 크지만 밀도와 강도가 적다."],a:1,e:"① 직접여과는 원수 수질이 양호·안정된 경우 침전지를 생략해 설치비·운영비가 적게 든다. (②저탁도 원수 대상, ④플록은 작지만 치밀)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:7,q:"역세척 효과가 불충분할 경우 발생하는 현상으로 옳지 않은 것은?",c:["여과지속시간이 감소한다.","측벽과 여과층 간에 간극이 발생하지 않는다.","머드볼(Mud Ball)이 발생한다.","여과층 표면이 불균일하게 된다."],a:2,e:"② 역세척이 불충분하면 측벽과 여과층 사이에 간극이 발생한다. '발생하지 않는다'는 설명은 옳지 않다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:8,q:"오존처리와 병행하는 고급산화법(AOP) 종류가 아닌 것은?",c:["오존 + 높은 pH","오존 + 자외선","오존 + NaOCl","오존 + H₂O₂"],a:3,e:"③ AOP는 오존+높은 pH, 오존+자외선, 오존+과산화수소(H₂O₂) 등이며 오존+NaOCl(차아염소산나트륨)은 해당하지 않는다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:9,q:"맛이나 냄새를 유발하는 생물학적 발생원이 아닌 것은?",c:["방선균","황산염 환원균","조류","질산화균"],a:4,e:"④ 질산화균은 암모니아성 질소를 산화시키는 균으로 맛·냄새 유발 생물학적 발생원이 아니다. (방선균·황산염환원균·조류는 맛·냄새 유발)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:10,q:"염소 주입 시 미생물의 불활성화 비율을 증가시키는 인자에 관한 설명으로 옳은 것은?",c:["온도가 낮을 때","접촉시간이 짧을 때","pH와 탁도가 낮을 때","혼합 정도가 저조할 때"],a:3,e:"③ pH가 낮으면 살균력이 강한 HOCl 비율이 높아지고, 탁도가 낮으면 미생물 차폐가 줄어 불활성화율이 증가한다. (온도는 높을수록, 접촉시간은 길수록 유리)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:11,q:"오존소독 방법에 관한 설명으로 옳지 않은 것은?",c:["맛·냄새 물질의 제거가 가능하다.","오존투입방식은 산기관과 압력관 방식이 있다.","오존주입량은 처리수량에 주입률을 곱하여 산정한다.","화학적 잔류오존제거제로 과산화수소(H₂O₂)가 사용된다."],a:2,e:"② 오존 투입방식은 산기관식과 가압주입식(이젝터)이며, '압력관 방식'이라는 표현은 옳지 않다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:12,q:"지아디아 포낭이 3log로 불활성화할 경우 제거율(%)은?",c:["90.0%","99.0%","99.9%","99.99%"],a:3,e:"3log 불활성화 = (1-10⁻³)×100 = 99.9% 제거율"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:13,q:"오존주입량의 제어방식이 아닌 것은?",c:["오존주입농도 제어방식","잔류오존농도 제어방식","오존분해거동 제어방식","C·T 제어방식"],a:3,e:"③ 오존주입량 제어방식에는 오존주입농도·잔류오존농도·C·T 제어방식 등이 있으며 '오존분해거동 제어방식'은 해당하지 않는다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:14,q:"액화염소 저장실에 관한 설명으로 옳지 않은 것은?",c:["실온은 10~35℃로 유지하고, 직사일광이 용기에 직접 닿지 않는 구조로 한다.","저장소가 설치된 저장실 출입구는 기밀구조로 하고 이중출입문을 설치한다.","염소주입기실과 분리하고 용기의 반출입이 편리한 위치로 감시하기 쉬운 위치에 설치한다.","누출가스를 중화하는 제해장치의 흡인구는 벽면 상부에 설치한다."],a:4,e:"④ 염소가스는 공기보다 무거워 바닥에 깔리므로 제해장치 흡인구는 벽면 하부(바닥 가까이)에 설치한다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:15,q:"역세척배출수 침전공정에 관한 설명으로 옳은 것은?",c:["입상활성탄흡착지의 역세척배출수를 침전 시 상징수는 하천에 방류할 수 없다.","처리공정은 플록형성 20분, 표면부하율 2~6m/h의 침전지에서 0.5~2시간으로 운전한다.","배출수지는 전처리공정으로서 세척배출수 저류조를 겸할 수 없다.","정수시설의 DAF 예비침전지는 배출수 침전지를 활용할 수 없다."],a:2,e:"② 역세척배출수 침전공정은 플록형성 약 20분, 표면부하율 2~6m/h, 침전 0.5~2시간으로 운전한다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:16,q:"배출수 처리시설의 방류 TMS 수질자동측정기기를 구축해야 되는 경우는?",c:["방류수 배출신고량이 700m³/d인 정수장의 경우","방류수 전량을 폐수종말처리시설 또는 공공하수처리시설에 유입시키는 경우","원폐수의 농도가 항상 배출허용기준 이하인 경우","폐수 배출신고량이 4~5종 사업장인 경우"],a:1,e:"① 방류수 배출량이 일정 규모(700m³/d) 이상인 정수장은 방류 TMS 구축 대상이다. (②③④는 TMS 면제 사유)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:17,q:"미량 물질의 특성에 관한 설명으로 옳은 것을 모두 고른 것은?(ㄱ.지하수 중 비소는 3가의 아비산 형태로 존재하는 경우가 많다 ㄴ.휴믹산의 분자량은 펄빅산보다 크다 ㄷ.음이온계면활성제가 수중에 유입되면 거품이 생긴다 ㄹ.질산성 질소는 대부분 자연적인 오염에 기인한다 ㅁ.수중의 경도를 구성하는 성분은 2가의 금속이온이다)",c:["ㄱ, ㄴ, ㄷ","ㄱ, ㄹ, ㅁ","ㄴ, ㄷ, ㄹ","ㄷ, ㄹ, ㅁ"],a:1,e:"① ㄱ·ㄴ·ㄷ이 옳다. ㄹ은 질산성 질소가 대부분 인위적(비료·축산·생활하수) 오염에 기인하므로 틀리다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:18,q:"정수처리용 활성탄의 세공(pore)에 관한 설명으로 옳지 않은 것은?",c:["입상활성탄에는 0.1~수㎛ 크기의 대세공(macropore)이 존재한다.","분말활성탄은 지름 1~20nm 정도의 세공이 많다.","세공의 내부표면적은 700~1,400m²/g이다.","야자계 활성탄은 석탄계에 비해 30nm 이상의 세공이 많다."],a:4,e:"④ 야자계 활성탄은 미세공(micropore)이 많고, 석탄계 활성탄이 대세공(30nm 이상)이 상대적으로 많다. 설명이 반대로 되어 있다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:19,q:"해수담수화 공정에서 역삼투 막모듈에 관한 설명으로 옳은 것은?",c:["해수온도가 높게 되면 염분투과율이 증가하여 투과수의 염분농도가 하강한다.","막공급수의 수온·수질 및 회수율을 일정하게 하여 역삼투설비를 운전하면 막투과수량은 운전압력에 거의 비례하여 증감한다.","회수율을 높게 하는 것은 일정량의 막투과수량에 대한 막공급수량의 증가로 이어진다.","막모듈의 성능저하는 일반적으로 막투과수량의 감소와 염분제거율의 상승으로 나타난다."],a:2,e:"② 수온·수질·회수율 일정 시 막투과수량은 운전압력에 거의 비례한다. (①염분투과율 증가하면 투과수 염분은 상승, ③회수율↑는 공급수량 감소, ④성능저하는 염분제거율 저하로 나타남)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:20,q:"막분리공정에서 유량이 24,000m³/d이고, 막 투과유속이 50LMH(L/m²·h)인 경우, 모듈당 막 면적이 50m²인 막모듈의 최소 필요 개수는?(단, 막 여과장치의 하루 가동시간은 8시간이다)",c:["400","800","1,200","1,600"],a:3,e:"시간당 처리량=24,000m³/8h=3,000m³/h=3,000,000L/h. 필요 막면적=3,000,000/50=60,000m². 모듈 수=60,000/50=1,200개"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:21,q:"수질오염공정시험기준상 폴리에틸렌 시료용기를 사용하며 최대 보존기간이 가장 긴 항목은?",c:["부유물질","불소","질산성 질소","전기전도도"],a:2,e:"② 불소(F⁻)는 폴리에틸렌 용기에 채취하며 최대 보존기간이 28일로 가장 길다. (부유물질·질산성질소·전기전도도는 보존기간이 짧음)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:22,q:"수질오염공정시험기준상 용어의 정의에 관한 설명이다. 빈칸에 들어갈 내용으로 옳은 것은?(시험조작 중 '즉시'란 (ㄱ)초 이내에 표시된 조작을 하는 것 / '항량으로 될 때까지 건조한다'란 같은 조건에서 1시간 더 건조할 때 전후 무게 차가 g당 (ㄴ)mg 이하일 때)",c:["ㄱ:30, ㄴ:0.3","ㄱ:30, ㄴ:0.5","ㄱ:60, ㄴ:0.3","ㄱ:60, ㄴ:0.5"],a:1,e:"① '즉시'는 30초 이내, '항량'은 1시간 더 건조 시 전후 무게 차가 g당 0.3mg 이하일 때를 말한다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:23,q:"0.02M NaOH 용액의 농도(mg/L)와 이 용액 500mL에 녹아 있는 NaOH의 질량(g)을 각각 순서대로 옳게 나열한 것은?(단, NaOH의 분자량은 40이다)",c:["800, 0.4","800, 0.8","1,600, 0.4","1,600, 0.8"],a:1,e:"농도=0.02mol/L×40g/mol×1,000=800mg/L. 500mL 중 질량=800mg/L×0.5L=400mg=0.4g"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:24,q:"물환경보전법령상 수질오염경보제에 관한 내용이다. 빈칸에 들어갈 내용으로 옳은 것은?(수소이온농도 항목이 경보기준을 초과하는 것은 (ㄱ) 이하 또는 11 이상이 (ㄴ)분 이상 지속되는 경우)",c:["ㄱ:4, ㄴ:30","ㄱ:4, ㄴ:60","ㄱ:5, ㄴ:30","ㄱ:5, ㄴ:60"],a:3,e:"③ 수소이온농도(pH)가 5 이하 또는 11 이상이 30분 이상 지속되는 경우 경보기준 초과로 본다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:25,q:"먹는물수질공정시험기준상 맛에 관한 설명으로 옳지 않은 것은?",c:["시료를 비커에 넣고 온도를 40~50℃로 높여 맛을 보아 판단한다.","시료는 유리재질의 병과 플라스틱 재질의 마개를 사용한다.","분석에 사용되는 항온수조는 ±1℃로 유지할 수 있어야 하고 냄새를 발생하지 않아야 한다.","맛을 측정하여 '있음', '없음'으로 구분한다."],a:2,e:"② 맛·냄새 시료는 유리재질의 병과 유리마개를 사용해야 한다. 플라스틱 마개는 맛·냄새 오염 우려로 부적합하다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:26,q:"먹는물수질공정시험기준상 냄새의 측정방법에 관한 설명으로 옳지 않은 것은?",c:["측정자간 개인차가 심하므로 냄새가 있을 경우 5명 이상의 시험자가 측정하는 것이 바람직하나 최소한 2명이 측정해야 한다.","소독제인 염소 냄새가 날 때에는 티오황산나트륨을 가하여 염소를 제거한 후 측정한다.","냄새를 측정하는 사람은 냄새에 극히 예민한 사람이 적절하다.","냄새를 측정하는 사람과 시료를 준비하는 사람은 다른 사람이어야 한다."],a:3,e:"③ 냄새에 극히 예민하거나 둔감한 사람은 측정자로 부적절하며, 보통 후각을 가진 사람이 적절하다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:27,q:"정수지가 10,000m³ 용량일 때, 최대통과유량이 5,000m³/h이고, 장폭비(L/W)에 따른 환산계수가 0.30이다. 이때 CT계산값은?(단, 연속측정장치로 측정된 잔류소독제 농도는 최솟값 0.3mg/L, 평균값 0.9mg/L, 최댓값 1.4mg/L이다)",c:["3.6","7.2","10.8","14.4"],a:3,e:"이론체류시간 T=V/Q=10,000/5,000=2h=120min. 유효접촉시간=120×0.30=36min. C는 최솟값 0.3mg/L 적용. CT=0.3×36=10.8"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:28,q:"상수원관리규칙상 원수의 수질검사방법 중 측정횟수에 관한 설명으로 옳은 것은?",c:["원수가 강변여과수인 경우에는 용존산소량은 매월 1회 이상 검사한다.","원수가 하천수인 경우에는 부유물 질량은 분기마다 1회 이상 검사한다.","원수가 호소수인 경우에는 암모니아성 질소는 매월 1회 이상 검사한다.","원수가 지하수인 경우에는 철은 분기마다 1회 이상 검사한다."],a:1,e:"① 강변여과수의 용존산소량(DO)은 매월 1회 이상 검사한다. (교재 정답표 기준 ①, 세부 검사주기는 현행 규칙 확인 권장)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:29,q:"수도법령상 일반수도사업자의 위생상 조치에서 수도꼭지 먹는물 잔류염소 농도 규정이다. 빈칸에 들어갈 내용으로 옳은 것은?(평상시 유리잔류염소 0.1mg/L(결합 0.4mg/L) 이상. 다만 병원성 미생물 오염 우려 시 유리잔류염소 (ㄱ)mg/L[결합 (ㄴ)mg/L] 이상)",c:["ㄱ:0.2, ㄴ:1.2","ㄱ:0.2, ㄴ:1.8","ㄱ:0.4, ㄴ:1.2","ㄱ:0.4, ㄴ:1.8"],a:4,e:"④ 병원성 미생물 오염(우려) 시에는 유리잔류염소 0.4mg/L, 결합잔류염소 1.8mg/L 이상이 되도록 한다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:30,q:"정수장 혼화공정에서 인라인 혼화방식에 관한 설명으로 옳은 것은?",c:["장치가 간단하고 고장이 거의 없는 등 시공 및 운영, 유지관리가 용이하다.","순간혼화방식이 이루어지므로 많은 동력을 필요로 한다.","유입유량이 낮을 경우에도 혼화효율이 높다.","Mixer에서 손실수두가 발생하지 않는다."],a:1,e:"① 인라인 혼화방식은 장치가 간단하고 고장이 거의 없어 시공·운영·유지관리가 용이하다. (③유입유량이 낮으면 혼화효율 저하, ④믹서에서 손실수두 발생)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:31,q:"배오존 처리방법으로 옳지 않은 것은?",c:["가열분해법","활성탄흡착분해법","촉매분해법","산세정분해법"],a:4,e:"④ 배오존(잔류오존) 처리방법은 가열분해법·활성탄흡착분해법·촉매분해법이며, '산세정분해법'은 해당하지 않는다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:32,q:"정수장에서 입상활성탄 공정의 역세척에 관한 설명으로 옳은 것은?",c:["역세척의 목적은 탄층에 누적된 미생물막과 현탁물질을 제거하여 통수능력을 회복시키는 것이다.","고정상식에서 물 역세척속도는 사용하는 입상활성탄의 종류에 따라 다르며 탄층팽창률은 수온의 영향을 받지 않는다.","탄층팽창률은 5~15%(평균 10%)가 되도록 역세척한다.","물에 의한 역세척만으로도 세척이 충분하므로 공기세척을 병용하는 방식은 고려하지 않는다."],a:1,e:"① GAC 역세척의 목적은 탄층의 미생물막·현탁물질을 제거해 통수능력을 회복하는 것이다. (②탄층팽창률은 수온 영향 받음, ③팽창률 20~30%, ④공기세척 병용이 효과적)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수처리공정",n:33,q:"오존처리 공정에서의 잔류오존량(kg/d)은?(수돗물 생산량 10,000m³/d, 주입오존량 5.0mg/L, 오존이용률 90%, 배출오존량 0.2mg/L)",c:["1.0","2.0","3.0","4.0"],a:3,e:"미이용 오존=5.0×(1-0.9)=0.5mg/L. 잔류오존=미이용-배출=0.5-0.2=0.3mg/L. 잔류오존량=0.3g/m³×10,000m³/d=3,000g/d=3.0kg/d"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:34,q:"지하수법령상 지하수를 먹는물로 이용하는 경우의 수질기준에서 일반오염물질에 포함되는 항목은?",c:["용존산소농도(DO)","부유물질","철","질산성질소"],a:4,e:"④ 질산성질소는 지하수 먹는물 수질기준의 일반오염물질에 포함된다. (DO·부유물질·철은 일반오염물질 항목이 아님)"},

{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"설비운영",n:50,q:"펌프용량과 대수의 결정에 관한 설명으로 옳은 것은?",c:["취수펌프와 송수펌프는 펌프효율이 낮은 운전점에서 정해진 일정한 수량을 양수하는 운전이 가능한 용량과 대수로 정한다.","배수펌프는 시간적 변동과 상관없이 일정 수량에 적합한 용량과 대수로 한다.","펌프의 대수는 계획수량의 두 배가 되도록 결정한다.","펌프가 정지되어도 급수에 지장이 없는 경우에는 예비기를 두지 않을 수 있다."],a:4,e:"④ 펌프 정지 시에도 급수에 지장이 없으면 예비기를 두지 않을 수 있다. (①효율 높은 운전점, ②배수펌프는 시간변동에 대응, ③대수는 변동 대응으로 결정)"},

{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"설비운영",n:55,q:"상수도시설의 감시·제어 및 정보처리를 위한 신호변환용 기기에 관한 설명으로 옳지 않은 것은?",c:["신호변환에는 저항-전류, 전압-전류 등이 있다.","프로세스신호변환기, 직선화변환기, 교류전압변환기 등이 주로 사용된다.","입출력 간을 절연하면 신호변환 시 장애가 발생한다.","외부에서 노이즈의 영향을 받지 않는 회로 구성으로 한다."],a:3,e:"③ 입출력 간 절연은 노이즈 차단·안전을 위해 적용하며 신호변환 장애를 일으키지 않는다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"설비운영",n:56,q:"상수도시설의 계측제어설비에 관한 설명으로 옳지 않은 것은?",c:["신뢰성과 안전성을 유지하기 위하여 보호장치와 백업장치를 구비하여야 한다.","서지보호기를 설치하여 뇌해로부터 보호하며, 전송로를 지중화해서는 안 된다.","각종 계측기는 내진성 및 내약품성 등을 고려하여야 한다.","공조설비 등을 설치하여 환경을 양호하게 유지하여야 한다."],a:2,e:"② 전송로 지중화는 뇌해(낙뢰) 방지에 유리하므로 지중화할 수 있다. '지중화해서는 안 된다'는 옳지 않다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"설비운영",n:57,q:"유량계에 관한 설명으로 옳지 않은 것은?",c:["유량계 선택 시 측정장소가 관수로 흐름인지 개수로 흐름인지를 고려한다.","전자유량계는 전자유도법칙을 응용한다.","차압유량계는 벤투리관이나 오리피스 등의 축관에 의한 차압을 이용한다.","초음파유량계는 전파를 방해하는 거품이나 이물질이 포함된 유체에서도 효과적이다."],a:4,e:"④ 초음파유량계는 기포·이물질이 초음파를 방해하면 측정 정확도가 떨어지므로 그런 유체에는 효과적이지 않다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"설비운영",n:58,q:"화학물질의 분류·표시 및 물질안전보건자료에 관한 기준상 경고표지의 양식에 포함되어야 하는 항목이 아닌 것은?",c:["신호어","유해-위험 문구","예방조치 문구","제조사 정보"],a:4,e:"④ 경고표지 필수항목은 명칭·그림문자·신호어·유해위험문구·예방조치문구·공급자 정보이며, '제조사 정보'는 해당 항목이 아니다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"설비운영",n:59,q:"산업안전보건법상 중대재해가 발생한 사실을 사업주가 알게 된 경우, 지체없이 보고해야 할 대상은?",c:["국토교통부장관","고용노동부장관","환경부장관","국무총리"],a:2,e:"② 중대재해 발생 시 지체없이 고용노동부장관(관할 지방고용노동관서)에게 보고해야 한다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"설비운영",n:60,q:"산업안전보건법령상 안전·보건표지와 설명으로 옳지 않은 것은?(①해골 그림-급성독성물질 ②화염에 빗금-화기금지 ③(그림)-보행금지 ④(그림)-물체이동금지)",c:["급성독성물질","화기금지","보행금지","물체이동금지"],a:3,e:"③ 교재 정답표 기준 정답은 ③. 해당 그림문자와 '보행금지' 설명의 연결이 표준 안전보건표지 규정과 맞지 않는다. (그림 대조 필요)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:61,q:"점성계수의 [MLT]계 차원은?",c:["[ML⁻²T⁻²]","[ML⁻²T⁻¹]","[ML⁻¹T⁻²]","[ML⁻¹T⁻¹]"],a:4,e:"④ 점성계수 μ의 차원은 [ML⁻¹T⁻¹]이다. (τ=μ(du/dy)에서 유도)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:62,q:"물의 성질에 관한 설명으로 옳은 것은?",c:["물의 단위중량은 4℃, 1기압에서 1,000kgf/m³이다.","물은 1기압, 4℃에서 최소밀도를 갖는다.","액체상태의 물은 온도가 상승할수록 동점성계수가 커진다.","물은 모세관에서 응집력이 부착력보다 큰 유체에 해당한다."],a:1,e:"① 물의 단위중량은 4℃·1기압에서 1,000kgf/m³이다. (②4℃에서 최대밀도, ③온도 상승 시 동점성계수 감소, ④물은 부착력>응집력이라 모세관 상승)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:63,q:"베르누이 정리에 관한 설명으로 옳은 것을 모두 고른 것은?(ㄱ.손실을 무시할 때 압력수두·속도수두·위치수두의 합은 일정 ㄴ.관수로 내 흐름의 에너지보존법칙을 설명하는 이론 ㄷ.적용하려면 임의의 두 점이 동일 유선상에 있어야 함 ㄹ.비점성·비압축성 유체의 흐름에 적용하기 위한 이론)",c:["ㄱ, ㄴ","ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],a:4,e:"④ ㄱ·ㄴ·ㄷ·ㄹ 모두 옳다. 베르누이 정리는 비점성·비압축성·정상류·동일 유선 조건에서 수두의 합이 일정함을 나타낸다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:64,q:"관수로의 유량측정장치에 관한 설명으로 옳지 않은 것은?",c:["관수로의 유량측정 방법에는 노즐, 엘보우미터 등이 있다.","벤투리미터는 관로 도중에 단면축소부를 두어 단면 간의 수두차를 측정하여 유량을 계산하는 방식이다.","수중 오리피스는 물에 잠긴 정도에 따라 수직 오리피스와 수평 오리피스로 구분한다.","위어에 흐르는 유량은 주로 월류수두가 영향을 미친다."],a:3,e:"③ 수중 오리피스는 토출구의 잠김 여부에 따라 완전수중/불완전수중 오리피스로 구분하며, '수직/수평'으로 구분하지 않는다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:65,q:"폭이 5.0m, 수심이 2.0m인 직사각형 단면수로에 유량 20m³/s의 물이 흐르고 있을 때 프루드수와 흐름 상태는?",c:["0.102, 상류","0.452, 상류","0.102, 사류","0.452, 사류"],a:2,e:"V=Q/A=20/(5×2)=2m/s. Fr=V/√(gh)=2/√(9.8×2)=0.452<1이므로 상류"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:66,q:"비압축성 흐름의 3차원 연속방정식으로 옳은 것은?(단, u,v,w는 각각 x,y,z 방향의 속도)",c:["∂u/∂x + ∂v/∂y + ∂w/∂z = 0","dx/u = dy/v = dz/w","(생략)","(생략)"],a:1,e:"① 비압축성 유체의 연속방정식은 ∂u/∂x + ∂v/∂y + ∂w/∂z = 0이다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:67,q:"유량측정용 위어(Weir)로 옳지 않은 것은?",c:["사각위어","전폭위어","원뿔위어","삼각위어"],a:3,e:"③ 유량측정용 위어에는 사각위어·전폭위어·삼각위어·사다리꼴위어 등이 있으며 '원뿔위어'는 해당하지 않는다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:68,q:"개수로에서 프루드수에 관한 설명으로 옳지 않은 것은?",c:["관성력과 점성력의 비로 나타낸다.","한계 프루드수는 1.0이다.","프루드수가 1.0보다 크면 흐름의 상태는 사류이다.","프루드수가 1.0보다 작으면 흐름의 상태는 상류이다."],a:1,e:"① 프루드수는 관성력과 중력의 비이다. 관성력과 점성력의 비는 레이놀즈수이다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:69,q:"침전지의 제거효율 향상방법으로 옳은 것을 모두 고른 것은?(ㄱ.침전지의 침강면적을 크게 한다 ㄴ.플록의 침강속도를 크게 한다 ㄷ.유량을 적게 한다 ㄹ.표면부하율을 작게 한다)",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],a:4,e:"④ ㄱ·ㄴ·ㄷ·ㄹ 모두 옳다. 침강면적↑, 침강속도↑, 유량↓, 표면부하율↓ 모두 침전 제거효율을 향상시킨다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:70,q:"관로길이 500m, 관경 300mm인 주철관에 물이 가득 차서 흐를 때 발생하는 마찰손실수두(m)는 약 얼마인가?(단, f=124.6×n²/D^(1/3), 동수경사 0.002, 중력가속도 9.8m/s², 주철관 Manning계수 n=0.012)",c:["0.1","1.0","2.0","3.0"],a:2,e:"동수경사 I=h_L/L이므로 h_L=I×L=0.002×500=1.0m"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:71,q:"지름 400mm인 원형관에 0.2m³/s의 유량이 흐르고 있다. 수온이 20℃일 때 레이놀즈수(Re)는 약 얼마인가?(단, 수온 20℃ 동점성계수 ν=1.003×10⁻⁶m²/s)",c:["635,000","535,000","435,000","335,000"],a:1,e:"V=Q/A=0.2/(π×0.4²/4)=1.591m/s. Re=VD/ν=1.591×0.4/(1.003×10⁻⁶)≈635,000"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:72,q:"계획급수인구가 40,000명이고, 계획 1인 1일 최대급수량이 150L인 정수장의 여과속도는 120m/d일 때 여과지의 소요면적(m²)은?",c:["50","100","250","500"],a:1,e:"계획 1일 최대급수량=40,000명×150L=6,000m³/d. 여과면적=Q/여과속도=6,000/120=50m²"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:73,q:"여과지의 기능에 관한 설명으로 옳지 않은 것은?",c:["탁질의 양적인 억류기능","수질과 수량의 변동에 대한 완충기능","응집제를 골고루 확산시키는 기능","충분한 역세척기능"],a:3,e:"③ 응집제를 골고루 확산시키는 것은 혼화지의 기능이며 여과지의 기능이 아니다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:74,q:"혼화지에서 속도경사(G)에 관한 설명으로 옳은 것은?",c:["점성계수(μ)의 1/2승에 비례한다.","플록입자수의 2승에 반비례한다.","동력(P)의 1/2승에 비례한다.","플록의 충돌횟수는 입자경의 3승에 반비례한다."],a:3,e:"③ 속도경사 G=√(P/(μV))이므로 동력 P의 1/2승에 비례한다. (점성계수의 1/2승에는 반비례)"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:75,q:"펌프의 축동력이 20kW일 때, 유량 0.2m³/s를 양수할 수 있는 전양정(m)은 약 얼마인가?(단, 펌프 효율 73%, 물의 단위중량 1,000kgf/m³, 중력가속도 9.8m/s²)",c:["2.5","7.5","12.5","17.5"],a:2,e:"P=9.8QH/η. 20=9.8×0.2×H/0.73=2.685H. H=20/2.685≈7.5m"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:76,q:"A 펌프장에서 펌프의 토출량이 3.0m³/min, 흡입구의 유속을 1.5m/s로 양수할 때 토출관의 지름(mm)은 약 얼마인가?",c:["206","406","606","806"],a:1,e:"D=146√(Q/v)=146√(3.0/1.5)=146√2=146×1.414≈206mm"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:77,q:"펌프특성곡선을 통해 확인할 수 있는 항목을 모두 고른 것은?(ㄱ.효율 ㄴ.양정 ㄷ.축동력 ㄹ.비에너지)",c:["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:2,e:"② 펌프특성곡선으로 효율·양정·축동력(ㄱ·ㄴ·ㄷ)을 확인할 수 있다. 비에너지(ㄹ)는 개수로 개념으로 펌프특성곡선과 무관하다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:78,q:"펌프를 설치하는 경우 고려해야 할 내용으로 옳지 않은 것은?",c:["펌프는 용량이 클수록 효율이 높으므로 가능하면 대용량의 것으로 한다.","유지관리상 대수는 가능하면 적게 하고 동일한 용량의 것을 사용한다.","펌프의 대수는 계획수량(최대, 최소, 평균) 및 고장 시를 고려하여 결정한다.","펌프는 가능하면 최소 효율점 부근에서 운전하도록 용량과 대수를 정한다."],a:4,e:"④ 펌프는 가능하면 최고 효율점 부근에서 운전하도록 용량·대수를 정해야 한다. '최소 효율점'은 옳지 않다."},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:79,q:"전양정 80m, 회전속도 1,500rpm, 최고효율점의 양수량 20m³/min을 토출하는 펌프의 비속도(Ns)는 약 얼마인가?",c:["51","251","451","651"],a:2,e:"Ns=N·Q^(1/2)/H^(3/4)=1,500×20^0.5/80^0.75=1,500×4.472/26.75≈251"},
{g:"ex36_2",gt:"제36회 2급 기출문제 (2024)",s:"수리학",n:80,q:"펌프의 직렬운전과 병렬운전에 관한 내용으로 옳지 않은 것은?",c:["병렬운전은 양정의 변화가 적고 양수량의 변화가 큰 경우에 적합하다.","병렬운전인 경우 펌프 운전점의 양수량은 단독운전 양수량의 2배로 하여 구한다.","직렬운전인 경우 펌프 운전점의 양정은 단독운전 양정의 2배로 하여 구한다.","관로 저항곡선의 구배가 급한 곳에서는 병렬운전이 유리하다."],a:4,e:"④ 관로 저항곡선의 구배가 급한 곳에서는 직렬운전이 유리하다. 병렬운전은 구배가 완만한 곳에 유리하다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:1,q:"횡류식 침전지에서 침강속도가 V인 입자의 제거율은?(단, V는 표면부하율보다 작고, Q는 침전지에 유입되는 유량, L·B·H는 각각 침전지의 길이·폭·유효수심)",c:["Q/(H×L×B)","(H×L×B)/Q","Q/(V×L×B)","(V×L×B)/Q"],a:4,e:"제거율=V/V₀=V/(Q/(L×B))=(V×L×B)/Q (V₀는 표면부하율=Q/표면적)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:2,q:"플록형성지에 관한 설명으로 옳은 것을 모두 고른 것은?(ㄱ.표준형태는 직사각형이며 플록큐레이터를 설치 ㄴ.응집된 미소플록을 크게 성장시키기 위해 적당한 기계식·우류식 교반 필요 ㄷ.교반설비는 수질변화에 따라 교반강도를 조절할 수 있는 구조 ㄹ.교반강도는 상류로 갈수록 점차 감소시키는 것이 바람직)",c:["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ"],a:3,e:"③ ㄱ·ㄴ·ㄷ이 옳다. ㄹ은 교반강도를 하류로 갈수록(흐름 방향으로) 점차 감소시켜야 하므로 '상류로 갈수록'은 틀리다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:3,q:"수산화나트륨 약품이 겨울에 결정화되지 않도록 보관하기 위한 농도(%)는?(단, 최저 기온을 -20℃로 가정한다)",c:["10","20","30","45"],a:2,e:"② -20℃에서 결정 석출을 막으려면 수산화나트륨 용액을 약 20% 농도로 보관한다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:4,q:"여과지의 운영 및 관리에 관한 설명으로 옳지 않은 것은?",c:["급속여과지의 여과속도는 120~150m/d를 표준으로 한다.","완속여과지의 여과속도는 4~5m/d를 표준으로 한다.","여과면적은 계획정수량에 여과속도를 곱하여 계산한다.","여과지의 수는 예비지를 포함하여 2지 이상으로 하고, 10지마다 1지 비율로 예비지를 둔다."],a:3,e:"③ 여과면적은 계획정수량을 여과속도로 '나누어' 계산한다. 곱하여 계산한다는 설명은 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:5,q:"급속여과지의 역세척에 관한 설명으로 옳지 않은 것은?",c:["수온차가 큰 지역에서는 수온이 높을 때의 역세척 유속을 기준으로 시설을 설계한다.","역세척에는 염소가 잔류하고 있는 정수를 사용한다.","역세척 유속은 입경분포나 여재의 종류와 수온에 따라 차이가 있다.","표면세척장치는 팽창된 여과층 중에 노즐이 묻히지 않도록 조심한다."],a:4,e:"④ 교재 정답표 기준 정답은 ④. 표면세척장치 노즐의 설치 위치 기준이 표준과 다른 것으로 출제됨(세부 기준 확인 권장)."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:6,q:"하향류 여과 시설의 여과층에 따른 탁질억류량 분포가 그림(상부에 억류량 집중)과 같은 여과층의 형식은?",c:["단일 여과층","입도 분포를 상부 조립에서 하부 세립으로 점진적으로 구성한 여과층","2층 여과층","3층 여과층"],a:1,e:"① 단일 여과층은 상부에 탁질이 집중 억류되어 표층 폐색이 빨리 일어나는 분포를 보인다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:7,q:"급속여과에서 사용할 수 있는 신규 여과모래의 특성으로 옳지 않은 것은?",c:["균등계수의 상한을 1.7로 한다.","균등계수가 1에 가까울수록 모래층의 공극률이 작아진다.","세척 탁도는 30NTU 이하로 한다.","강열감량은 0.75% 이하로 한다."],a:2,e:"② 균등계수가 1에 가까울수록 입경이 균일해져 모래층의 공극률은 커진다. '작아진다'는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:8,q:"여과모래의 균등계수가 1.50이고, 입도가적곡선에서 중량통과율 60%·80%에 해당하는 입경이 각각 0.75mm·1.20mm일 때, 중량통과율 10%에 해당하는 여과모래의 입경(mm)은?",c:["0.3","0.4","0.5","0.6"],a:3,e:"균등계수 Cu=D60/D10=1.50, D60=0.75mm. D10=D60/Cu=0.75/1.50=0.5mm"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:9,q:"염소가스 저장시설에서 염소가스 누출로 인한 중독을 방지하기 위하여 설치되는 제해설비에 관한 설명으로 옳은 것은?",c:["중화반응탑은 충전탑식, 회전흡수방식, 경사판방식 등이 있다.","누출 염소에 대한 흡수제는 소석회를 주로 사용하고, 중화제로는 염화나트륨 용액이 주로 사용된다.","염소가스 저장량이 1,000kg 미만인 시설에서는 중화반응탑을 설치해야 한다.","소석회는 낮은 습도에서는 유효성분의 저하와 분말의 고결이 예상되므로 충분한 습기가 제공되는 장소에 보관해야 한다."],a:1,e:"① 중화반응탑에는 충전탑식·회전흡수방식·경사판방식 등이 있다. (②중화제는 수산화나트륨, ③1,000kg 이상에서 설치, ④소석회는 습기 없는 건조한 곳에 보관)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:10,q:"오존 접촉지에 관한 설명으로 옳은 것을 모두 고른 것은?(ㄱ.접촉지에는 우회관을 설치한다 ㄴ.구조는 개방형으로 하여 오존과 물의 혼화·접촉이 효과적으로 이루어져 흡수율이 높도록 한다 ㄷ.효율적 오존공정 제어를 위하여 처리수량·오존 주입량·잔류오존·대기오존 농도를 상시 계측)",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],a:2,e:"② ㄱ·ㄷ이 옳다. ㄴ은 오존 접촉지는 오존 누출 방지를 위해 밀폐형으로 해야 하므로 '개방형'은 틀리다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:11,q:"액화염소 저장설비에 관한 설명으로 옳지 않은 것은?",c:["저장조 본체는 보냉식(保冷式)으로 한다.","액화염소를 저장조에 넣기 위한 공기공급장치를 설치해야 한다.","저장조는 2기 이상 설치하고 그 중 1기는 예비로 한다.","액화염소의 저장량은 항상 1일 사용량의 10일분 이상으로 한다."],a:1,e:"① 액화염소 저장조는 보냉식으로 하지 않고, 직사일광을 피하고 통풍이 잘 되는 구조로 한다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:12,q:"먹는물 수질기준 중 미생물 기준에 관한 설명으로 옳은 것은?",c:["먹는샘물에서 대장균은 100mL에서 검출되지 아니할 것","수돗물에서 총대장균군은 100mL에서 검출되지 아니할 것","먹는샘물에서 분원성 대장균군은 100mL에서 검출되지 아니할 것","먹는염지하수에서 총대장균군은 100mL에서 검출되지 아니할 것"],a:2,e:"② 수돗물에서 총대장균군은 100mL에서 검출되지 아니할 것이 옳은 기준이다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:13,q:"수도법령상 정수처리기준에서 정한 병원성 미생물이 아닌 것은?",c:["바이러스","지아디아 포낭","분원성 연쇄상구균","크립토스포리디움 난포낭"],a:3,e:"③ 정수처리기준의 제거·불활성화 대상 병원성 미생물은 바이러스·지아디아 포낭·크립토스포리디움 난포낭이며, 분원성 연쇄상구균은 해당하지 않는다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:14,q:"잔류소독제 농도가 1.5mg/L이고 소독제 접촉시간이 0.5시간일 때, 소독능 계산값(CT계산값)은?",c:["0.75","3","20","45"],a:4,e:"CT=C×T=1.5mg/L×0.5h=1.5×30min=45"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"설비운영",n:15,q:"탈수기의 가동 중 슬러지가 연속적으로 공급되지 않으면서 운전되는 것은?",c:["진공탈수기","원심분리기","벨트프레스","필터프레스"],a:4,e:"④ 필터프레스는 회분식(간헐식)으로, 슬러지를 연속 공급하지 않고 충전-가압-탈수-배출을 반복한다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"설비운영",n:16,q:"슬러지 농축조의 계획 유입유량이 100m³/d이고 슬러지의 체류시간이 48시간일 때, 농축조의 설계용량(m³)은?",c:["100","200","400","600"],a:2,e:"V=Q×t=100m³/d×48h×(1d/24h)=100×2=200m³"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:17,q:"막여과 공정의 약품세척에서 사용되는 약품과 일반적인 제거 대상 물질이 바르게 짝지어진 것은?",c:["수산화나트륨 - 무기물","황산 - 유기물","구연산 - 무기물","차아염소산나트륨 - 무기물"],a:3,e:"③ 구연산은 무기물(스케일) 제거용으로 바르게 짝지어졌다. (수산화나트륨·차아염소산나트륨은 유기물·미생물, 황산은 무기물 제거이나 짝이 어긋남)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:18,q:"오존처리에 관한 설명으로 옳은 것은?",c:["맛과 냄새를 유발하는 물질의 제거에 효과적이다.","오존은 염소보다 산화력이 약하다.","오존접촉지의 배오존은 대기에 확산되도록 해야 한다.","철과 망간은 오존에 의해 용존성 물질로 산화된다."],a:1,e:"① 오존은 맛·냄새 유발물질 제거에 효과적이다. (②오존이 염소보다 산화력 강함, ③배오존은 분해처리, ④철·망간은 불용성으로 산화되어 제거)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:19,q:"자외선 소독 공정에 관한 설명으로 옳지 않은 것은?",c:["자외선의 소독 효율은 부유물의 농도에 의해 영향을 받는다.","자외선 조사량은 자외선 강도와 접촉시간에 의해 결정된다.","석영유리는 자외선 램프의 유리관 재질로 사용된다.","자외선 소독에 가장 적합한 파장은 400nm이다."],a:4,e:"④ 자외선 소독에 가장 적합한 파장은 약 254nm(DNA 흡수 최대)이다. 400nm는 가시광 영역으로 살균력이 없다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:20,q:"일반적으로 질산성질소를 제거할 수 있는 공정이 아닌 것은?",c:["활성탄흡착처리","이온교환처리","생물처리","막처리"],a:1,e:"① 활성탄흡착은 이온성 물질인 질산성질소 제거에 효과가 없다. (이온교환·생물학적 탈질·막처리(역삼투)는 질산성질소 제거 가능)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:21,q:"수질오염공정시험기준상 용어의 설명으로 옳은 것은?",c:["'방울수'라 함은 20℃에서 정제수 10방울을 적하할 때, 그 부피가 약 1mL 되는 것을 뜻한다.","무게를 '정확히 단다.'라 함은 규정된 수치의 무게를 0.01mg까지 다는 것을 말한다.","'감압 또는 진공'이라 함은 따로 규정이 없는 한 30mmHg 이하를 뜻한다.","시험 조작 중 '즉시'란 30초 이내에 표시된 조작을 하는 것이다."],a:4,e:"④ '즉시'는 30초 이내. (①방울수는 20방울이 약 1mL, ②정확히 단다는 0.1mg까지, ③감압·진공은 15mmHg 이하)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:22,q:"수질오염공정시험기준상 정도관리에 관한 설명으로 옳지 않은 것은?",c:["표준물첨가법(Standard Addition Method)은 시료와 동일한 매질에 일정량의 표준물질을 첨가하여 검정곡선을 작성하는 방법이다.","시약바탕시료(Reagent Blank)는 시료를 사용하지 않고 추출·농축·정제 및 분석 과정에 따라 모든 시약과 용매를 처리하여 측정한 것이다.","정량한계(LOQ)란 시험분석 대상을 정량화할 수 있는 측정값이다.","기기검출한계(IDL)란 시료와 비슷한 매질 중에서 시험분석 대상물질을 검출할 수 있는 최소한의 농도 또는 양이다."],a:4,e:"④ '시료와 비슷한 매질에서 검출할 수 있는 최소 농도'는 방법검출한계(MDL)의 정의이다. 기기검출한계(IDL)는 표준용액·바탕시료 기준으로 정의되므로 설명이 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:23,q:"수질오염공정시험기준상 금속류-유도결합플라스마-원자발광분광법(ICP-OES)에 관한 설명으로 옳지 않은 것은?",c:["시료를 아르곤 플라스마에 주입하여 고온에서 원자가 방출하는 발광선 및 발광광도를 측정한다.","점성이 있거나 입자상 물질이 존재하는 시료는 동심축 분무기(Concentric Nebulizer)를 사용한다.","알칼리 금속이 시료에 공존할 시 방출선의 세기를 크게 할 수 있다.","라디오고주파(RF) 발생기 주파수는 27.12MHz 또는 40.68MHz를 사용한다."],a:2,e:"② 점성이 있거나 입자상 물질이 많은 시료는 막힘 우려가 있어 동심축 분무기 대신 바빙턴(Babington)형 분무기 등을 사용한다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:24,q:"응집용 약품주입에 관한 설명으로 옳지 않은 것은?",c:["원수 탁도가 높으면 완속여과시설에서는 응집용 약품주입설비가 필요 없다.","원수가 저탁도라도 급속여과지에서 약품에 의한 응집 후 여과가 필수적이다.","약품 사용 후 수질이 외관이나 독성 등 위생적으로 지장이 없어야 한다.","약품주입률은 자-테스트(Jar-test)로 결정하는 방식이 일반적이다."],a:1,e:"① 원수 탁도가 높으면 완속여과로는 부적합하며 응집·급속여과가 필요하다. '약품주입설비가 필요 없다'는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:25,q:"오존처리 공정에서 오존주입량 4mg/L이고, 배출오존량 1mg/L, 잔류오존량 0.5mg/L일 때 오존전달효율(%)은?",c:["62.5","75","85.7","87.5"],a:2,e:"오존전달효율=(주입오존-배출오존)/주입오존×100=(4-1)/4×100=75%"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:26,q:"정수시설의 입상활성탄 세척빈도에 영향을 주는 인자를 모두 고른 것은?(ㄱ.미소동물의 생명주기 ㄴ.흡착방식(고정상, 유동상) ㄷ.활성탄의 비중)",c:["ㄱ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],a:2,e:"② ㄱ(미소동물 생명주기)·ㄴ(흡착방식)이 세척빈도에 영향을 준다. ㄷ(활성탄 비중)은 세척빈도와 직접 관련이 없다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수처리공정",n:27,q:"오존처리 공정에서의 주입오존량(kg/d)은?(수돗물 생산량 100,000m³/d, 잔류오존량 1.0mg/L, 배출오존량 0.2mg/L, 오존이용률 80%)",c:["420","480","500","600"],a:4,e:"미이용 오존=잔류+배출=1.0+0.2=1.2mg/L=주입×(1-0.8). 주입=1.2/0.2=6.0mg/L. 주입오존량=6.0g/m³×100,000m³/d=600,000g/d=600kg/d"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:28,q:"수질오염공정시험기준상 화학적산소요구량 측정법 중 산성과망간산칼륨법에 관한 설명으로 옳은 것은?",c:["분석결과는 1.0mg/L까지 표기한다.","반응시료(100mL)의 염소이온 농도가 2,000mg/L 초과인 경우에 적용한다.","염소이온의 간섭을 제거하기 위하여 황산은을 첨가한다.","시료를 황산산성으로 하여 과망간산칼륨 일정 과량을 넣고 120분간 수욕상에서 가열 반응시킨다."],a:3,e:"③ 염소이온 간섭을 제거하기 위해 황산은(Ag₂SO₄)을 첨가한다. (④는 120분이 아니라 30분 가열, ②염소이온이 낮을 때 적용)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:29,q:"10,000m³/d을 생산하는 정수장에서 여과지 통과 후 20kg/d의 염소를 주입한 결과 정수지 유출수의 잔류염소 농도가 0.2mg/L이었을 때, 염소요구량(mg/L)은?",c:["0.9","1.8","9","18"],a:2,e:"주입농도=20kg/d÷10,000m³/d=2.0mg/L. 염소요구량=주입농도-잔류염소=2.0-0.2=1.8mg/L"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:30,q:"먹는물수질공정시험기준상(중온) 일반세균-평판집락법에 관한 설명이다. 빈칸에 들어갈 숫자가 옳은 것은?(즉시 시험할 수 없는 경우 빛이 차단된 4℃ 냉장보관 상태에서 (   )시간 이내에 시험)",c:["12","24","36","48"],a:2,e:"② 일반세균은 즉시 시험할 수 없으면 4℃ 냉장보관 상태에서 24시간 이내에 시험해야 한다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:31,q:"먹는물수질공정시험기준상 탁도 측정에 관한 설명으로 옳지 않은 것은?",c:["먹는물, 샘물 및 염지하수의 탁도 측정에 적용한다.","시료 중에 탁도의 정량한계는 0.02NTU이다.","탁도를 측정하는 용기가 더럽거나 미세한 기포는 탁도에 영향을 줄 수 있다.","시료가 색을 띠는 경우 빛을 반사하므로 탁도가 높아질 수 있다."],a:4,e:"④ 색도가 있는 시료는 빛을 '흡수'하여 탁도가 오히려 낮게 측정될 수 있다. '반사하므로 높아진다'는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:32,q:"소독에 의한 불활성화비 계산에 관한 설명으로 옳은 것은?",c:["잔류소독제 농도는 정수지 유출부나 잔류소독제 농도측정지점에서 측정한 잔류소독제 농도값 중 최소값을 택한다.","소독제와 물의 접촉시간은 1시간 사용유량이 최대인 시간에 최초 소독제 주입지점부터 정수지 유출지점까지 측정하여야 한다.","계산된 불활성화비 값이 1.0 이상이면 99.99% 이상의 지아디아 포낭의 불활성화가 이루어진 것으로 한다.","추적자시험을 통하여 소독제의 접촉시간을 측정할 때에는 최초 주입지점에 투입된 추적자의 30%가 유출지점으로 빠져나올 때까지의 시간을 접촉시간으로 한다."],a:1,e:"① 잔류소독제 농도는 측정값 중 최소값을 택한다. (③1.0 이상이면 지아디아 99.9%(3log) 불활성화, ④추적자 10%가 빠져나올 때까지)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:33,q:"먹는물수질공정시험기준상 총칙에 관한 설명으로 옳지 않은 것은?",c:["열수는 약 100℃를 말한다.","시험에 쓰는 물은 따로 규정이 없는 한 증류수 또는 정제수로 한다.","'약'이라 함은 기재된 양에 대하여 ±5% 이상의 차가 있어서는 안 된다.","용액이라고 기재하고 특히 그 용제를 표시하지 아니한 것은 수용액을 말한다."],a:3,e:"③ '약'이라 함은 기재된 양에 대하여 ±10% 이상의 차가 있어서는 안 된다. ±5%는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:34,q:"먹는물수질공정시험기준상 시료용기로 유리를 사용할 수 없는 항목은?",c:["맛","냄새","불소","벤젠"],a:3,e:"③ 불소(F⁻)는 유리와 반응하므로 폴리에틸렌 용기를 사용해야 한다. (맛·냄새·벤젠은 유리용기 사용)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:35,q:"먹는물관리법상 먹는샘물 등, 수처리제 또는 그 용기를 수입하려는 자가 시·도지사에게 신고한 경우, 시·도지사가 할 수 있는 검사방법을 모두 고른 것은?(ㄱ.추적검사 ㄴ.관능검사 ㄷ.정밀검사 ㄹ.서류검사)",c:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:4,e:"④ 수입신고에 대한 검사방법은 관능검사·정밀검사·서류검사(ㄴ·ㄷ·ㄹ)이며, 추적검사(ㄱ)는 해당하지 않는다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:36,q:"먹는물 수질기준 및 검사 등에 관한 규칙상 먹는물의 수질기준 중 미생물에 관한 기준으로 옳지 않은 것은?",c:["샘물 및 염지하수의 경우에는 저온일반세균은 50CFU/mL를 넘지 아니할 것","샘물 및 염지하수의 경우에는 중온일반세균은 5CFU/mL를 넘지 아니할 것","먹는샘물의 경우에는 병에 넣은 후 4℃를 유지한 상태에서 12시간 이내에 검사하여 저온일반세균은 100CFU/mL를 넘지 아니할 것","먹는샘물의 경우에는 병에 넣은 후 4℃를 유지한 상태에서 12시간 이내에 검사하여 중온일반세균은 20CFU/mL를 넘지 아니할 것"],a:1,e:"① 교재 정답표 기준 정답은 ①. 샘물·염지하수의 저온일반세균 기준 수치가 규정과 다르게 출제됨(현행 규칙 수치 확인 권장)."},

{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수질분석 및 관리",n:38,q:"수도법상 상수원보호구역 지정 등에 관한 권한을 가지고 있는 사람은?",c:["국무총리","국토교통부장관","환경부장관","대통령"],a:3,e:"③ 상수원보호구역의 지정·변경 권한은 환경부장관에게 있다."},

{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"설비운영",n:57,q:"전자유량계를 설치할 때 유의해야 할 사항으로 옳지 않은 것은?",c:["구경은 평균유속이 1~3m/s의 사이에 있도록 선정하는 것이 바람직하다.","평균유속이 1m/s 미만이면 기전력이 작고 정밀도상의 문제가 생기기 쉽다.","흐름을 균일하게 하기 위하여 검출기 설치 전후에 필요한 직관부를 확보하고, 유량제어밸브를 설치해야 하는 경우에는 검출기의 상류측에 설치한다.","검출기를 수직 또는 비스듬히 설치할 경우에는 흐름은 아래쪽에서 위쪽으로 향하도록 하고 전극은 수평 방향으로 되도록 설치한다."],a:3,e:"③ 유량제어밸브는 흐름 교란을 피하기 위해 검출기의 하류측에 설치해야 한다. 상류측 설치는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"설비운영",n:58,q:"탈포조와 탁도계 사이의 배관에 밸브를 설치해야 하는 경우 사용하는 밸브는?",c:["볼밸브","체크밸브","풋밸브","플랩밸브"],a:1,e:"① 탈포조와 탁도계 사이에는 유로를 완전 개폐할 수 있고 시료 흐름을 방해하지 않는 볼밸브가 적합하다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"설비운영",n:59,q:"화학물질의 분류·표시 및 물질안전보건자료에 관한 기준상 용어의 정의로 옳지 않은 것은?",c:["'화학물질'이란 원소와 원소 간의 화학반응에 의하여 생성된 물질을 말한다.","'혼합물'이란 두 가지 이상의 화학물질로 구성된 물질 또는 용액을 말한다.","'반제품용기'란 같은 사업장 내에서 상시적이지 않은 경우로서 공정간 이동을 위하여 화학물질 또는 혼합물을 담은 용기를 말한다.","'포장'이란 화학물질 또는 혼합물을 담는 것을 말한다."],a:4,e:"④ '포장'은 화학물질·혼합물을 담는 용기와 그 외부 표시 등을 포함하는 개념으로, 단순히 '담는 것'이라는 정의는 옳지 않다(교재 정답표 기준 ④)."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"설비운영",n:60,q:"유해화학물질 실외 보관시설 설치 및 관리에 관한 고시상 실외 보관시설 설치에 관한 기술기준으로 옳지 않은 것은?",c:["종류가 다른 유해화학물질을 같은 보관시설 안에 보관하는 경우 반응성을 고려하여 칸막이·바닥 구획선 등으로 구분 보관해야 한다.","유해화학물질을 용기에 수납·보관하는 시설은 습기가 없고 배수가 잘되는 장소에 설치하고 주위에 표시하여 구분해야 한다.","눈·비를 피하거나 차광 등을 위하여 캐노피 또는 지붕을 설치하는 경우 환기에 지장을 주지 않는 구조로 하며 벽을 설치하여야 한다.","유해화학물질 보관시설에는 필요한 경우 조명 설비를 갖추어야 한다."],a:3,e:"③ 실외 보관시설은 환기 확보를 위해 캐노피·지붕은 설치하되 벽은 설치하지 않아야 한다. '벽을 설치하여야 한다'는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:61,q:"물의 성질에 관한 설명으로 옳은 것은?",c:["물의 단위중량은 4℃, 1기압에서 1,000kgf/m³이다.","액체상태의 물은 수온이 상승하면 점성계수는 커진다.","수격작용을 해석할 경우, 물의 압축성을 고려할 필요가 없다.","물의 밀도는 0℃에서 가장 크다."],a:1,e:"① 물의 단위중량은 4℃·1기압에서 1,000kgf/m³이다. (②수온 상승 시 점성 감소, ③수격작용은 압축성 고려, ④4℃에서 최대밀도)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:62,q:"오리피스를 이용한 유량측정에서 수두 측정에 3%의 오차가 있다면 측정 유량에 발생하는 오차(%)는 얼마인가?(단, 오리피스의 유량계수는 상수이다)",c:["1.0","1.5","3.0","4.5"],a:2,e:"Q∝√h이므로 dQ/Q=(1/2)(dh/h)=0.5×3%=1.5%"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:63,q:"[MLT]계로 나타낸 물리량의 차원표시로 옳지 않은 것을 모두 고른 것은?(ㄱ.밀도:[ML⁻³] ㄴ.가속도:[LT⁻¹] ㄷ.유량:[MT⁻¹] ㄹ.표면장력:[MT⁻²])",c:["ㄱ, ㄴ","ㄱ, ㄹ","ㄴ, ㄷ","ㄷ, ㄹ"],a:3,e:"③ ㄴ(가속도는 [LT⁻²]), ㄷ(유량은 [L³T⁻¹])의 차원표시가 틀리다. ㄱ(밀도)·ㄹ(표면장력)은 옳다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:64,q:"물탱크에서 수심(h)이 4m인 위치에 작은 오리피스가 설치되어 있다. 오리피스에서의 토출유속(m/s)은 약 얼마인가?(단, 오리피스의 유속계수는 0.7, 중력가속도는 9.8m/s²)",c:["5.15","6.20","7.50","8.95"],a:2,e:"V=Cv·√(2gh)=0.7×√(2×9.8×4)=0.7×8.854=6.20m/s"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:65,q:"관수로 흐름의 에너지선과 동수경사선의 차이가 1m일 때, 관로의 단면평균유속(m/s)은 약 얼마인가?(단, 중력가속도는 9.8m/s²)",c:["3.85","4.43","5.24","5.67"],a:2,e:"에너지선과 동수경사선의 차이=속도수두=V²/2g=1m. V=√(2×9.8×1)=√19.6=4.43m/s"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:66,q:"상용관의 마찰손실계수를 산정하기 위해 사용되는 Moody 도표에 관한 설명으로 옳지 않은 것은?",c:["관의 상대조도와 레이놀즈수에 따른 마찰손실계수의 변화 관계를 도표로 나타낸 것이다.","층류와 난류영역에서 모두 적용 가능하다.","완전난류영역에서 마찰손실계수는 관의 상대조도에 의해 결정된다.","층류영역에서 마찰손실계수는 레이놀즈수에 비례한다."],a:4,e:"④ 층류영역에서는 f=64/Re이므로 마찰손실계수는 레이놀즈수에 '반비례'한다. 비례한다는 설명은 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:67,q:"흐름의 분류와 유동가시화(Flow Visualization)에 관한 설명으로 옳은 것은?",c:["유적선(Path Line)은 특정 입자가 이동해 간 경로를 추적하여 연결한 선, 즉 입자의 움직인 경로를 나타낸다.","유선(Stream Line)은 일정 시간 동안 흐름 내의 특정 지점을 통과한 모든 유체입자들의 현재 위치를 연결한 선이다.","유립선(Streak Line)은 특정 시간에 유체입자들의 유속벡터에 접하는 접선들을 연결한 선이다.","임의의 지점에서 흐름 특성(속도·압력 등)이 시간에 따라 변하는지 여부에 따라 등류와 부등류로 구분할 수 있다."],a:1,e:"① 유적선은 한 입자가 이동한 경로이다. (②는 유맥선, ③은 유선의 정의, ④는 정류·부정류 구분 기준)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:68,q:"직경 200mm인 원형관에 2m³/min 유량의 물이 200m 흐를 때 발생하는 마찰손실수두(m)는 약 얼마인가?(단, 마찰손실계수는 0.01, 중력가속도는 9.8m/s²)",c:["0.57","3.57","5.57","7.57"],a:1,e:"V=Q/A=(2/60)/(π×0.2²/4)=1.061m/s. h_L=f(L/D)(V²/2g)=0.01×(200/0.2)×(1.061²/19.6)=0.57m"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:69,q:"관수로 흐름에서 발생하는 미소손실에 관한 설명으로 옳지 않은 것은?",c:["관내 유체의 수온 변화에 의해 발생한다.","관의 유입부 및 유출부에서 흐름 변화로 발생한다.","단면 급축소와 급확대에 의해 발생한다.","단면 변화에 의해 발생하는 속도수두에 비례한다."],a:1,e:"① 미소손실(부차적 손실)은 단면·방향 변화 등에 의해 발생하며 유체의 수온 변화로 발생하는 것이 아니다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:70,q:"일정한 단면적을 가진 직사각형 개수로에서 최적수리단면에 관한 설명으로 옳지 않은 것은?",c:["주어진 경사와 조도에서 최대의 유량이 흐를 수 있는 단면이다.","동수반경을 최대로 하는 단면이다.","윤변이 최소가 되는 단면이다.","수심이 수로폭의 2배인 단면이다."],a:4,e:"④ 직사각형 최적수리단면은 수로폭이 수심의 2배(B=2h)이다. '수심이 수로폭의 2배'는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:71,q:"개수로 흐름에 관한 설명으로 옳은 것은?",c:["자유수표면에서 최대 유속이 발생한다.","동수반경은 흐름단면적에 윤변을 더한 값이다.","관성력과 중력이 평형을 이루는 흐름상태가 한계류이다.","관성력보다 중력이 지배적인 흐름상태가 사류이다."],a:3,e:"③ 관성력과 중력이 평형(Fr=1)인 상태가 한계류이다. (①최대유속은 수면 약간 아래, ②동수반경=단면적/윤변, ④중력 지배는 상류)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:72,q:"직경 200mm인 관에 물이 가득 차서 흐를 때 유량(m³/s)은 약 얼마인가?(단, Manning 공식을 따르며 조도계수는 0.012, 동수경사는 0.025이다)",c:["0.016","0.056","0.16","0.56"],a:2,e:"R=D/4=0.05m. V=(1/0.012)×0.05^(2/3)×0.025^(1/2)=1.788m/s. A=π×0.2²/4=0.0314m². Q=AV=0.056m³/s"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:73,q:"개수로의 흐름상태를 나타내는 프루드수에 관한 설명으로 옳은 것은?",c:["중력에 대한 관성력의 비로 나타낸다.","층류와 난류의 구분에 이용된다.","평균유속에 반비례한다.","수온에 비례한다."],a:1,e:"① 프루드수(Fr)=관성력/중력의 비이다. (②층류·난류 구분은 레이놀즈수, ③유속에 비례, ④수온과 무관)"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:74,q:"폭 8m, 길이 15m, 유효수심 4m인 장방형 침전지의 유입유량이 20m³/min일 때, 이 침전지의 표면부하율(m³/m²·d)은 얼마인가?",c:["100","140","200","240"],a:4,e:"표면적=8×15=120m². 유량=20m³/min×1,440=28,800m³/d. 표면부하율=Q/A=28,800/120=240m³/m²·d"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:75,q:"혼화지에서 속도경사(G)를 결정하는 요소에 해당하는 것을 모두 고른 것은?(ㄱ.물의 점성계수 ㄴ.교반동력 ㄷ.혼화지의 부피 ㄹ.표면부하율)",c:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:1,e:"① 속도경사 G=√(P/(μV))로 점성계수(ㄱ)·교반동력(ㄴ)·부피(ㄷ)로 결정된다. 표면부하율(ㄹ)은 관련 없다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:76,q:"펌프의 형식 및 운전에 관한 설명으로 옳지 않은 것은?",c:["병렬연결 운전은 양수량 변화가 큰 경우에 적절하다.","성능이 동일한 펌프 2대를 병렬로 연결할 경우 양수량은 2배보다 약간 적다.","펌프의 형식은 비속도와 관련이 있다.","펌프의 크기는 양수량과 양정으로 나타낸다."],a:4,e:"④ 펌프의 크기는 흡입구경·토출구경으로 나타낸다. '양수량과 양정으로 나타낸다'는 옳지 않다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:77,q:"펌프의 흡입구 지름이 600mm, 흡입구의 유속이 2.0m/s, 펌프의 실양정이 14m, 펌프의 효율이 86%이고, 총손실수두가 3.5m일 때, 펌프의 소요동력(kW)은 약 얼마인가?(단, 중력가속도 9.8m/s², 물의 단위중량 1,000kgf/m³)",c:["67.7","90.2","112.8","135.4"],a:3,e:"Q=A×V=(π×0.6²/4)×2.0=0.5655m³/s. 전양정=14+3.5=17.5m. P=9.8QH/η=9.8×0.5655×17.5/0.86=112.8kW"},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:78,q:"펌프의 비속도(Ns)가 작은 것부터 큰 순서로 올바르게 나열한 것은?",c:["사류펌프 → 축류펌프 → 원심펌프","사류펌프 → 원심펌프 → 축류펌프","원심펌프 → 사류펌프 → 축류펌프","축류펌프 → 원심펌프 → 사류펌프"],a:3,e:"③ 비속도는 원심펌프 < 사류펌프 < 축류펌프 순으로 커진다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:79,q:"펌프의 성능곡선에 관한 설명으로 옳은 것은?",c:["효율에 대한 전양정, 축동력, 토출량을 나타낸 곡선이다.","토출량에 대한 전양정, 축동력, 효율을 나타낸 곡선이다.","축동력에 대한 전양정, 토출량, 효율을 나타낸 곡선이다.","전양정에 대한 축동력, 토출량, 효율을 나타낸 곡선이다."],a:2,e:"② 펌프 성능곡선은 토출량(가로축)에 대한 전양정·축동력·효율의 변화를 나타낸 곡선이다."},
{g:"ex35_2",gt:"제35회 2급 기출문제 (2024)",s:"수리학",n:80,q:"효율이 85%, 동력이 500kW인 펌프를 이용하여 110m 위의 수조로 물을 양수할 때, 유량(L/s)은?(단, 물의 단위중량 1,000kgf/m³, 손실수두 10m)",c:["0.554","0.607","554","607"],a:3,e:"P=9.8QH/η 공식 적용. 교재 정답표 기준 정답은 ③ 554L/s(≈0.554m³/s). (계산값이 표준식과 다소 차이가 있어 수치 검증 권장)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:1,q:"맛·냄새의 생물학적인 발생원에 관한 설명으로 옳은 것은?(ㄱ.동일 오존 주입률에서 2-MIB 제거율이 지오스민에 비해 높다 ㄴ.황산염환원균은 혐기성 세균으로 황화수소(H₂S)를 발생한다 ㄷ.편모조류가 발생하면 주로 물고기 비린내가 난다 ㄹ.규조류는 여과지폐색의 원인이 되나 냄새는 일으키지 않는다)",c:["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],a:2,e:"② ㄴ·ㄷ이 옳다. ㄱ은 2-MIB가 지오스민보다 오존 제거가 어려워 틀리고, ㄹ은 규조류도 비린내 등 냄새를 유발하므로 틀리다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:2,q:"Jar-test 결과 원수 2L에 대하여 0.1w/v%의 PAHCS 용액 10mL를 첨가했을 때 침전율이 가장 높았다면, PAHCS의 최적 주입농도(mg/L)는 약 얼마인가?",c:["5","10","20","50"],a:1,e:"0.1w/v%=1mg/mL. 10mL=10mg PAHCS. 원수 2L 기준 주입농도=10mg/2L=5mg/L"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:3,q:"토양에 널리 분포하며 흙냄새의 원인으로 알려진 미생물은?",c:["녹조류","질화세균","방선균","철세균"],a:3,e:"③ 방선균(Actinomycetes)은 토양에 널리 분포하며 지오스민·2-MIB를 생성하여 흙냄새를 유발한다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:4,q:"침전지 유출부에서 플록이 떠오르는 현상에 관한 설명으로 옳은 것은?",c:["이러한 현상을 파과(Breakthrough)라고 한다.","침전지의 표면부하율보다 입자의 침강속도가 큰 플록이 떠오른다.","다층침전지, 경사판식 침전지는 플록 유출 방지에 효과적이다.","밀도류나 단락류가 있으면 플록 유출이 감소한다."],a:3,e:"③ 다층침전지·경사판식 침전지는 침강면적을 늘려 플록 유출 방지에 효과적이다. (②침강속도가 작은 플록이 유출, ④밀도류·단락류는 유출을 증가시킴)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:5,q:"정수장의 배출수지 및 배슬러지지에 관한 설명으로 옳지 않은 것은?",c:["배슬러지지의 용량은 24시간 평균배슬러지량과 1회 배슬러지량 중에서 큰 것으로 한다.","배출수지의 고수위에서 주벽 상단까지의 여유고는 60cm 이상으로 한다.","배출수지의 상징수는 정수공정으로 회수할 수 있다.","배슬러지지의 슬러지 체류시간은 48시간 이내로 하는 것이 바람직하다."],a:4,e:"④ 배슬러지지의 슬러지는 부패 방지를 위해 체류시간을 짧게(통상 24시간 정도) 한다. 48시간 이내는 너무 길어 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:6,q:"정수장에서 사용되는 가압탈수기의 여과포 선정조건으로 옳지 않은 것은?",c:["여과포의 폐색이 적고 케이크의 탈착이 좋을 것","사용 중에 팽창과 수축이 클 것","탈수여액의 청징도가 높을 것","재생이 가능할 것"],a:2,e:"② 여과포는 치수 안정성을 위해 사용 중 팽창과 수축이 작아야 한다. '클 것'은 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:7,q:"정수처리에서 수처리제로 사용하는 폴리아민에 관한 설명으로 옳지 않은 것은?",c:["정수처리를 위해 폴리아민을 사용할 경우 20mg/L 이하로 사용해야 한다.","폴리아민의 성분규격에서 에피클로로하이드린 기준은 20mg/L 이하이다.","폴리아민을 사용하는 정수장은 매월 1회 이상 정수 중의 에피클로로하이드린의 함량을 측정하여야 한다.","폴리아민은 무색 내지 옅은 황갈색의 액체이다."],a:1,e:"① 폴리아민 사용량은 통상 5mg/L 이하 등으로 더 엄격히 제한되며 '20mg/L 이하'라는 사용기준은 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:8,q:"병원성 미생물 제거율 및 불활성화비 계산방법에 관한 설명으로 옳지 않은 것은?",c:["잔류소독제 농도는 측정한 농도값 중 최솟값을 택한다.","불활성화비는 CT계산값을 CT요구값으로 나눈 값이다.","장폭비(L/W)가 클수록 환산계수(T₁₀/T)가 작아진다.","추적자 시험의 경우 투입된 추적자의 10%가 정수지에서 유출되는 시간을 접촉시간으로 한다."],a:3,e:"③ 장폭비(L/W)가 클수록 단락류가 줄어 환산계수(T₁₀/T)는 '커진다'. 작아진다는 설명은 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:9,q:"병원성 미생물에 관한 설명으로 옳지 않은 것은?",c:["콜레라, 장티푸스는 박테리아에 의한 수인성 전염병이다.","바이러스는 소독에 대한 저항성이 크고, 크기가 작은 미생물로 분류된다.","시스트(Cysts)라 불리우는 Giardia의 포낭은 염소소독에 대한 저항이 박테리아보다 훨씬 강하다.","Salmonella typhosa는 수인성 전염병을 일으키는 원생동물이다."],a:4,e:"④ Salmonella typhosa(장티푸스균)는 원생동물이 아니라 박테리아(세균)이다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:10,q:"소독공정에서 염소소독 효과를 향상시키는 방법으로 옳은 것은?",c:["차아염소산에 의한 소독효과를 높이기 위해 pH를 높인다.","도류벽을 제거하여 체류시간을 짧게 한다.","잔류염소 농도를 가급적 낮게 유지한다.","정수지의 수위를 높게 유지한다."],a:4,e:"④ 정수지 수위를 높게 유지하면 접촉시간(T)이 늘어 소독효과(CT)가 향상된다. (①pH 낮추기, ②도류벽 설치로 체류시간↑, ③잔류염소 높게)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:11,q:"염소소독제의 저장과 보관에 관한 설명으로 옳은 것은?",c:["액화염소 보관용기는 40℃ 이하로 유지한다.","액화염소 저장량은 1일 사용량의 7일분 이상으로 한다.","차아염소산나트륨 저장실의 바닥은 내산성으로 한다.","차아염소산나트륨 저장조 또는 배관 등에서 발생되는 수소가스가 외부 대기 중으로 노출되지 않도록 한다."],a:1,e:"① 액화염소 보관용기는 40℃ 이하로 유지해야 한다. (④수소가스는 폭발 위험이 있어 외부로 안전하게 배출·환기해야 하므로 '노출되지 않도록'은 틀림)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:12,q:"전염소처리에 관한 설명으로 옳지 않은 것은?",c:["원수 내 암모니아성 질소를 산화한다.","조류 및 박테리아의 사멸에는 효과가 있으나, 소형동물은 사멸시키지 못한다.","소독을 목적으로 하는 경우 여과수에서 유지해야 할 잔류염소농도는 0.1~0.2mg/L 정도이다.","망간처리를 위해 여과수에서 유지해야 할 잔류염소농도는 0.5mg/L 정도이다."],a:2,e:"② 전염소처리는 조류·박테리아뿐 아니라 소형동물(미소동물)의 사멸에도 효과가 있다. '못한다'는 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:13,q:"염소가스의 안전관리에 관한 설명으로 옳지 않은 것은?",c:["저장량 1,000kg 이상의 시설에서는 가스누출 검지경보설비, 중화반응탑, 중화제 저장조, 배풍기 등을 갖춘 중화장치를 설치한다.","누설검지용 약품으로 수산화나트륨용액을 사용한다.","염소가스 저장시설의 제해설비는 누출된 염소를 중화·흡수하는 기능을 한다.","보안용구로는 방독마스크, 보호구 및 비상시 공구 등이 있으며, 격리식 방독마스크는 3개 이상 구비되어야 한다."],a:2,e:"② 염소가스 누설검지용 약품으로는 암모니아수(NH₃)를 사용한다. 수산화나트륨용액이 아니다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:14,q:"역세척효과를 높이기 위한 방법으로 옳은 것은?",c:["표면세척장치는 팽창된 여과층 중에 노즐이 묻히도록 한다.","역세척수량과 수압 및 시간 중 어느 하나를 줄여 역세척효과가 충분하도록 한다.","역세 시 여과층이 유동상태가 되지 않도록 역세척속도를 설정한다.","수온차가 높은 지역에서는 계절별로 동일한 팽창률을 얻을 수 있도록 수온이 낮을 때의 역세척유속을 기준으로 시설을 설계한다."],a:1,e:"① 표면세척 노즐은 팽창된 여과층 중에 묻히도록 설치해야 세척효과가 높다. (②어느 하나를 줄이면 효과 저하, ③여과층이 적절히 유동해야 함)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:15,q:"급속여과지의 자갈층두께와 여과자갈에 관한 설명으로 옳지 않은 것은?",c:["여과자갈의 입경과 자갈층의 두께는 하부집수장치에 적합하도록 설계한다.","여과자갈은 형상이 구형(球形)에 가깝고 경질이며 청정하고 균질인 것이 좋다.","여과자갈은 모래층을 충분히 지지할 수 있어서 안정적이고 효율적으로 세척할 수 있어야 한다.","조립여과자갈을 상층에, 세립여과자갈을 하층에 배치하는 것을 표준으로 한다."],a:4,e:"④ 여과자갈층은 세립(작은 자갈)을 상층에, 조립(큰 자갈)을 하층에 배치하는 것이 표준이다. 설명이 반대로 되어 있다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:16,q:"역세척효과가 불충분할 경우에 발생하는 현상으로 옳은 것은?",c:["여과층 표면이 균일하게 된다.","머드볼(Mud Ball)이 발생되지 않는다.","여과지속시간이 감소한다.","측벽과 여과층간에 간극이 발생되지 않는다."],a:3,e:"③ 역세척이 불충분하면 탁질 잔류로 여과지속시간이 감소한다. (①표면 불균일, ②머드볼 발생, ④측벽 간극 발생)"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:17,q:"막여과에 관한 설명으로 옳은 것을 모두 고른 것은?(ㄱ.정밀여과·한외여과가 있으며 제거대상물질은 주로 용해성물질 ㄴ.정수처리·해수담수화·초순수 제조의 전처리공정에 주로 사용 ㄷ.막을 여재로 물을 통과시켜 불순물질을 분리제거해 깨끗한 여과수를 얻는 정수방법 ㄹ.나노여과·역삼투법의 주 제거대상은 불용해성·콜로이드성 물질)",c:["ㄱ, ㄴ","ㄱ, ㄹ","ㄴ, ㄷ","ㄷ, ㄹ"],a:3,e:"③ ㄴ·ㄷ이 옳다. ㄱ은 정밀·한외여과가 현탁·콜로이드(불용해성)를 제거하므로 틀리고, ㄹ은 나노·역삼투가 용해성 물질을 제거하므로 틀리다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:18,q:"여과층에서 현탁물질을 제거하는 1단계(이송)의 기작으로 옳지 않은 것은?",c:["저지작용","체거름작용","중력침강작용","응집침전작용"],a:4,e:"④ 응집침전작용은 여과의 부착(2단계) 기작이며, 1단계 이송기작(저지·체거름·중력침강·확산 등)에 해당하지 않는다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:19,q:"막여과시설의 막여과유속이 1.8m³/m²·d이고 여과수량이 24m³/h일 때, 막면적(m²)은?",c:["300","320","340","360"],a:2,e:"여과수량=24m³/h×24=576m³/d. 막면적=여과수량/막여과유속=576/1.8=320m²"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:20,q:"여과지의 하부집수장치 기능에 관한 설명으로 옳지 않은 것은?",c:["여과지를 하부집수실과 상부여과실로 분리시킨다.","여과수 및 공기를 상부여과실로부터 하부집수실로 분출시켜 여과재를 깨끗이 세척시킨다.","침전지 월류수를 상부 여과실에서 여과시켜 하부집수실로 보낸다.","역세척수 및 공기를 여과실 전체에 균등압력으로 균일하게 분포시켜서 세척의 효과를 높인다."],a:2,e:"② 역세척 시에는 하부집수실에서 상부여과실로 물·공기를 분출시켜 세척한다. 방향이 반대로 서술되어 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:21,q:"먹는물수질공정시험기준상 용어의 정의로 옳지 않은 것은?",c:["감압은 따로 규정이 없는 한 15mmHg 이하로 한다.","방울수라 함은 20℃에서 정제수 20방울을 적하할 때, 그 부피가 약 1mL 되는 것을 뜻한다.","무게를 '정확히 단다.'라 함은 규정된 수치의 무게를 0.01mg까지 다는 것을 말한다.","'항량으로 될 때까지 건조한다.' 함은 같은 조건에서 1시간 더 건조할 때 전후 차가 g당 0.3mg 이하일 때를 말한다."],a:3,e:"③ '정확히 단다'는 규정된 무게를 0.1mg까지 다는 것을 말한다. 0.01mg까지는 옳지 않다."},

{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:23,q:"먹는물수질공정시험기준상 수질검사 항목 중 보존방법에 따라 보관하였을 때 보존 기간이 가장 짧은 것은?",c:["암모니아성 질소","질산성 질소","황산이온","증발잔류물"],a:2,e:"② 질산성 질소는 보존기간이 가장 짧다(통상 48시간 이내). 황산이온·암모니아성 질소·증발잔류물은 상대적으로 길다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:24,q:"정수지 출구에서 유리잔류염소농도를 측정한 결과 0.5mg/L이었다. 소독공정에서 CT요구값이 5일 때 정수지에서 염소소독공정의 불활성화비는?(단, 염소소독제 접촉시간은 20분이다)",c:["0.5","1","1.5","2"],a:4,e:"CT계산값=C×T=0.5mg/L×20min=10. 불활성화비=CT계산값/CT요구값=10/5=2"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:25,q:"24,000m³/d을 생산하는 정수장에서 여과지 통과 후 시간당 1.5kg/h의 염소를 주입한 결과, 정수지 유출수의 잔류염소 농도가 0.5mg/L일 때 염소요구량(mg/L)은?",c:["0.5","1.0","1.5","2.0"],a:2,e:"주입량=1.5kg/h×24=36kg/d. 주입농도=36,000g/24,000m³=1.5mg/L. 염소요구량=1.5-0.5=1.0mg/L"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:26,q:"불활성화비 계산방법 및 정수처리 인증 등에 관한 규정상 급속여과방식에서 소독에 의한 병원성 미생물 제거율 및 불활성화비에 관한 설명으로 옳지 않은 것은?",c:["여과공정에 의한 바이러스 제거율 99%","여과공정에 의한 지아디아 포낭 제거율 99.68%","소독공정에서 요구되는 바이러스 불활성화율 99%","소독공정에서 요구되는 지아디아 포낭 불활성화율 90%"],a:4,e:"④ 급속여과방식에서 지아디아는 총 99.9%(3log) 중 여과 99.68%(2.5log)·소독 약 68%(0.5log)가 요구된다. 소독 요구 불활성화율 90%는 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:27,q:"정수장에서 원수 유입 유량이 5,000m³/h이고, 자-테스트(Jar-test) 결과 응집제의 적정 주입농도가 10mg/L일 때, 정수장의 1일 응집제 주입량(kg/d)은?",c:["500","1,000","1,200","2,400"],a:3,e:"주입량=Q×농도=5,000m³/h×24×10g/m³=120,000m³/d×10g/m³=1,200,000g/d=1,200kg/d"},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:28,q:"침전지에서 플록의 제거율에 관한 설명으로 옳지 않은 것은?",c:["침강면적을 작게 하면 제거율이 향상된다.","플록의 침강속도를 크게 하면 제거율이 향상된다.","유량을 적게 하면 제거율이 향상된다.","침강속도(V)가 표면부하율(V₀)보다 작은 플록은 V/V₀의 부분제거율을 나타낸다."],a:1,e:"① 침강면적을 크게 해야 표면부하율이 낮아져 제거율이 향상된다. '작게 하면 향상'은 옳지 않다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수처리공정",n:29,q:"오존처리설비에서 오존의 전달효율을 계산하는 방법으로 옳은 것은?",c:["(주입오존량-잔류오존량-배출오존량)/주입오존량 ×100","(주입오존량-잔류오존량+배출오존량)/주입오존량 ×100","(주입오존량-배출오존량)/주입오존량 ×100","(주입오존량-잔류오존량)/주입오존량 ×100"],a:3,e:"③ 오존 전달효율(%)=(주입오존량-배출오존량)/주입오존량×100. 즉 배출(미반응)되지 않고 물에 전달된 비율이다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:30,q:"자-테스트(Jar-Test)에서 플록 형성 후 채취된 상징수에서 분석하는 항목이 아닌 것은?",c:["수소이온농도(pH)","탁도","알칼리도","용존산소"],a:4,e:"④ Jar-test 상징수에서는 pH·탁도·알칼리도·잔류응집제 등을 분석하며, 용존산소(DO)는 분석 항목이 아니다."},
{g:"ex34_2",gt:"제34회 2급 기출문제 (2023)",s:"수질분석 및 관리",n:31,q:"수질오염공정시험기준상 효소이용정량법을 사용하여 총대장균군수를 측정할 때, 적용되는 효소의 종류는?",c:["아밀레이스(Amylase)","프로테아제(Protease)","포스파타아제(Phosphatase)","베타-갈락토시다제(β-galactosidase)"],a:4,e:"④ 총대장균군의 효소이용정량법은 β-갈락토시다제(β-galactosidase) 활성을 이용해 검출한다."},
