{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:7,q:"슬러지이송펌프 중 무폐쇄전속력(Spurt)펌프의 장단점에 대한 설명으로 틀린 것은?",c:["효율이 비교적 낮고 슬러지 농도변화에 성능의 저하가 크다.","경도가 높은 내마모성 재질을 사용하므로 슬러지 중의 모래 등에 의한 마모가 적다.","공동발생현상에 대한 내성과 내마모성이 높으며, 침사 등에 의한 마모가 극히 적다.","강력한 무손상, 무폐쇄형으로 막힘이 없으며, 장섬유질에 대한 임펠러 감김이나 결정 없이 이송이 가능하다."],a:1,e:"① 효율이 비교적 높고 슬러지 농도변화에 성능의 저하가 적다. 또 고형물 농도 최대 10%까지의 슬러지 이송이 가능하다(효율이 낮은 것이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:8,q:"슬러지이송펌프 중 추진공동형 펌프의 장단점에 대한 설명으로 틀린 것은?",c:["로터에 나사산이 많으므로 유체가 로터와 스테이터 간격으로부터 누설이 적어 높은 토출압을 얻을 수 있다.","정량성이 좋고, 마모성이 적다.","효율이 우수하고 운전 중 유체의 각반, 공기의 혼입이 없다.","내약품성이 우수하고 고점성액에 대해서도 원활한 이송이 가능하다."],a:2,e:"② 정량성이 좋으나 슬러지 중의 모래 등에 의한 스테이터의 마모가 있다(마모성이 적은 것이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:9,q:"슬러지이송펌프 중 트윈펌프의 장단점에 대한 설명으로 틀린 것은?",c:["반구름운동으로 마모가 작다.","슬러지 누액현상이 있다.","토출량 조절이 용이하다.","건식자흡식이다."],a:2,e:"② 트윈펌프는 슬러지 누액현상은 없으나 최근 기기의 개발로 인해 사용실적이 적다(누액현상이 있다는 것은 틀림)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:10,q:"다음 중 농축조에 대한 설명으로 옳은 것은?",c:["농축조는 공급슬러지농도, 슬러지의 농축성 및 탈수방식 등에 따라서 소정의 슬러지농도가 안정하게 유지될 수 있는 것이어야 한다.","슬러지공급장치의 구조는 슬러지공급에 의한 혼란이 조내의 수류에 영향을 주지 않도록 슬러지를 유출시킬 수 있어야 한다.","농축조의 고수위로부터 주벽 상단까지의 여유고는 50cm 이상으로 하고 바닥면 경사는 1/10 이상으로 한다.","농축조의 용량은 계획슬러지량의 25~48시간분을 표준으로 하고 3조 이상으로 하는 것이 바람직하다."],a:1,e:"① 농축조는 공급슬러지농도, 농축성, 탈수방식 등에 따라 소정의 슬러지농도가 안정하게 유지될 수 있어야 한다. ② 혼란이 영향을 주지 않도록 슬러지를 '유입'시킬 수 있어야 한다, ③ 여유고는 30cm 이상·바닥면 경사 1/10 이상, ④ 용량은 25~48시간분·고형물부하 10~20kg/m²/day 표준·2조 이상."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:11,q:"원형 슬러지수집기 중 중심구동현수형의 특징으로 옳지 않은 것은?",c:["조의 지름을 따라 설치된 보(점검발판 겸용)의 중앙에 구동장치를 설치하고, 여기에 갈퀴팔을 매달아 회전시킨 후, 갈퀴로써 슬러지를 중앙으로 긁어모은다.","구조가 복잡하고 수집능력이 떨어진다.","바닥 마감이 정밀하지 않으면 수집기의 손상 우려가 높다.","평형을 정확히 맞추어야 한다."],a:2,e:"② 중심구동현수형은 구조가 간단하고 수집능력이 우수하다(복잡하고 떨어지는 것이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:12,q:"다음 중 중심구동지주형 원형 슬러지수집기의 특징으로 옳지 않은 것은?",c:["수집능력이 우수하고 구동 토르크가 적다.","사용 가능한 조의 지름이 일반적인 크기보다 크다.","가장 보편적으로 사용되는 기종이다.","구동부의 베어링장치가 많으며, 평형을 정확히 맞추어야 한다."],a:2,e:"② 중심구동지주형은 사용 가능한 조의 지름이 일반적인 크기이다(보다 큰 것이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:13,q:"원형 슬러지수집기 중 주변구동형의 특징으로 옳지 않은 것은?",c:["수집능력이 저하(사각지대 발생 가능)된다.","기계적 장치가 간단(베어링장치가 상대적으로 적음)하고 조의 크기에 제한이 없다.","바닥 마감의 정밀도가 약간 떨어져도 기계적 손상이 적다.","평형상태의 정밀도가 엄격히 요구된다."],a:4,e:"④ 주변구동형은 평형상태의 정밀도가 상대적으로 덜 요구된다(엄격히 요구되는 것이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:14,q:"다음 중 탈수전처리시설에 대한 설명으로 옳지 않은 것은?",c:["고분자응집제처리설비는 배출수 중 아크릴아미드모노머 농도를 항상 0.03ppm 이하가 되도록 첨가율을 제어하여야 한다.","석회첨가처리설비는 슬러지의 탈수시험에 기초하여 경제성, 처분조건 등을 배려하여 적절한 첨가율에 따라 석회가 안정하게 첨가될 수 있도록 한다.","석회첨가처리설비는 석회의 혼합조, 용해조는 각기 2조 이상 설치하여야 한다.","석회첨가처리설비는 내알칼리구조로 하여야 한다."],a:1,e:"① 고분자응집제처리설비는 정수장으로부터 배출수 중 아크릴아미드모노머 농도를 항상 0.01ppm 이하가 되도록 첨가율을 제어하여야 한다(0.03ppm이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:15,q:"가압형 탈수기, 원심분리기 및 조립탈수기에 대한 설명으로 옳지 않은 것은?",c:["가압형 탈수기 필터프레스에는 여포세척장치 등을 설치하여야 한다.","조립탈수기는 응집보조제의 첨가를 전제로 한다.","원심분리기에는 쉽게 공기를 뺄 수 있는 분리액 배출관을 설치하여야 한다.","조립탈수기 드럼의 소요단면적은 고형물처리량 60~130kg/m²/h를 표준으로 한다."],a:2,e:"② 조립탈수기는 고분자응집제의 첨가를 전제로 한다(응집보조제가 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:16,q:"다음 중 탈수기의 기종선정 시 유의할 점으로 옳지 않은 것은?",c:["연간 운전비용이 저렴할 것","탈수효과가 좋고 탈수케이크량이 많을 것","운전조작이 간편하고 자동화에 유리할 것","유지관리 및 보수가 용이할 것"],a:2,e:"② 탈수효과가 좋고 탈수케이크량이 적어야 하며, 내구성이 좋고 운전 중 소음 및 진동이 작아야 한다(케이크량이 많은 것이 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:17,q:"다음 중 벨트탈수기에 대한 설명으로 옳지 않은 것은?",c:["고분자응집으로 인하여 원수로 이용 불가하므로 농축조로 회수하고 상징수를 방류한다.","연속운전이 가능하며 주입슬러지의 농도변화에 따라 약품의 주입량을 변화시켜야 하므로 최적 상태의 유지가 어렵다.","고분자응집제의 농도 및 주입량의 점검유지가 필요하다.","각 여실의 여포 사이에 슬러지를 유입, 우선 여과탈수한 후 여포 내측의 다이아프램을 팽창시켜 압착탈수한다."],a:4,e:"④는 가압탈수기에 대한 설명이다(벨트탈수기가 아님)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:18,q:"다음 중 가압탈수기의 장단점에 대한 설명으로 틀린 것은?",c:["케이크의 함수율이 낮고 발생량이 적다.","약품을 사용하지 않는다.","케이크의 보관 및 처분이 용이하다.","유지관리비가 가장 많이 소요된다."],a:4,e:"④ 가압탈수기는 유지관리비가 가장 적게 소요된다. 가압탈수기의 단점: 탈수기의 체적과 중량이 큼, 슬러지공급이 곤란, 여포 및 다이아프램의 교환 필요, 초기투자비가 가장 많이 소요됨, 국산화율이 낮음."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:19,q:"가압탈수기, 벨트탈수기, 원심분리탈수기를 비교 설명한 것으로 틀린 것은?",c:["가압탈수기의 부속설비는 유압설비, 공기압축기, 제습기, 압착수펌프, 여포세정수펌프, 진공펌프이다.","벨트탈수기의 부속설비는 여포세정수펌프, 제습기, 공기압축기이다.","원심분리탈수기의 부속설비는 세정펌프이다.","가압탈수기는 초기투자비가 크고 벨트탈수기, 원심분리탈수기는 작다."],a:4,e:"④ 가압탈수기와 원심분리탈수기는 초기투자비가 크고, 벨트탈수기는 작다(원심분리탈수기도 큼)."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:20,q:"다음 슬러지탈수방법 중 슬러지케이크의 함수율 55~70% 정도로 생산하는 탈수기는 어느 것인가?",c:["진공탈수기","가압탈수기","원심탈수기","진공탈수기와 원심탈수기"],a:2,e:"슬러지탈수방법별 최종 슬러지케이크 함수율: 진공탈수기 60~80%, 가압탈수기 55~70%, 원심탈수기 60~80%, 슬러지건조상 50% 정도."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:21,q:"다음의 슬러지처분방법 중 가장 경비가 적게 소요되고 바람직한 것은?",c:["퇴비활용","매립처분","소각","해양투기"],a:1,e:"퇴비활용은 탈수처리된 슬러지를 토지개량제나 비료로 사용하므로 경비가 가장 적게 소요되고, 또한 자원으로 재활용하는 의미를 가지므로 바람직한 처분방법이다."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:22,q:"배출수처리시설 중 농축조의 용량 및 고형물부하는 어느 정도를 표준으로 하는가?",c:["계획슬러지량의 12~24시간분, 10~20kg/m²/day","계획슬러지량의 24~48시간분, 10~20kg/m²/day","계획슬러지량의 12~24시간분, 30~40kg/m²/day","계획슬러지량의 24~48시간분, 30~40kg/m²/day"],a:2,e:"농축조 용량은 계획슬러지량의 24~48시간분이고, 고형물부하는 10~20kg/m²/day를 표준으로 한다."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:23,q:"농축된 슬러지의 탈수성 개선을 위하여 탈수 전에 실시하는 전처리방법이 아닌 것은?",c:["동결용해처리","열처리","고분자응집제처리","슬러지건조상"],a:4,e:"전처리방법: 슬러지의 탈수성 개선을 위하여 탈수과정 전에 실시하는 전처리방법에는 산처리, 열처리, 고분자응집제처리, 석회처리, 동결용해처리 등이 있다. 슬러지건조상은 탈수(처분)방법이다."},
{g:"b3c7",gt:"[2권] 3과목 7장 배출수처리설비운영",s:"설비운영",n:24,q:"다음 중 배출수처리에 대한 설명으로 옳지 않은 것은?",c:["배출수처리시설을 계획할 때 고려조건은 케이크의 처분방법 또는 유효하게 이용하는 방법과 처리능력이다.","배출수처리시설은 영속적으로 필요한 시설이므로 10년 정도의 목표로 계획하는 것이 바람직하다.","배출수처리시의 슬러지는 수질오염이나 토양오염을 고려하여 재활용하지 않아야 한다.","배출수처리시설의 방법은 정수처리시설과의 관계, 원수수질, 배출수의 양과 질, 슬러지의 성상, 유지관리, 용지면적, 건설비, 지역의 환경을 고려하여 적절한 방식으로 선정되어야 한다."],a:3,e:"③ 슬러지의 이용방안은 매립성 토재, 유기질비료, 일반점토벽돌, 경량골재, 건축재료, 요업재료 및 화분용 경석 등 여러 가지로 시도하고 있으며, 농업용 흙으로 이용하는 것이 가장 바람직하다(재활용하지 않아야 하는 것이 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:1,q:"펌프의 용량 및 대수결정에 대한 설명으로 옳지 않은 것은?",c:["계획수량의 경우 취수장은 계획 1일 최대취수량을, 가압장 및 송수펌프장은 계획 1일 최대급수량을 기준으로 한다.","펌프용량이 클수록 펌프의 효율은 낮아진다.","대수분할과 용량결정 시 물이 도달되는 지점의 시설이 대형 저수조나 댐과 같이 유량조절기능이 불필요한 경우에는 대수를 되도록 적게 한다.","펌프대수를 크게 하면 수요량의 변동에 대처하여 효율적 운전이 가능하지만, 반면에 펌프장의 면적이 커지고 배관이 복잡해진다."],a:2,e:"② 펌프의 용량이 클수록 펌프의 효율은 높아진다(낮아지는 것이 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:2,q:"다음 중 펌프의 전양정에 관한 설명으로 옳은 것은?",c:["실양정과 그 개념이 같다.","토출만 고려하면 된다.","실양정만 알면 구할 수 있다.","실양정과 손실수두를 합한 것이다."],a:4,e:"펌프의 전양정: 전양정은 실양정과 총손실수두를 합한 것이며 실양정은 흡입양정과 토출양정을 합한 값이다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:3,q:"다음 중 펌프의 형식 및 선정에 대한 설명으로 옳지 않은 것은?",c:["침수의 위험이 있는 장소에서는 횡축펌프를 선정한다.","전양정이 6m 이하이고, 구경이 200mm 이상인 경우는 사류 혹은 축류펌프를 선정함을 표준으로 한다.","전양정이 20m 이상이고, 구경이 200mm 이하인 경우는 원심펌프의 선정을 표준으로 한다.","흡입실양정이 6m 이상이고, 구경이 1,500mm를 초과하는 사류 혹은 축류펌프는 입축펌프의 선정을 표준으로 한다."],a:1,e:"① 침수의 위험이 있는 장소에서는 입축펌프를 선정한다(횡축펌프가 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:4,q:"다음 중 펌프의 일반적인 기종별 특성과 형식에 대한 설명으로 옳지 않은 것은?",c:["원심펌프는 펌프의 중량이 크고 사류펌프는 작다.","원심펌프는 펌프의 효율이 높고 사류펌프는 낮다.","원심펌프는 펌프의 동력이 크고 사류펌프는 작다.","원심펌프는 펌프의 설치면적이 크고 사류펌프는 작다."],a:3,e:"③ 원심펌프는 펌프의 동력이 작고 사류는 크다(반대)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:5,q:"양정이 2~3m인 배수펌프로서 가장 많이 쓰이는 펌프는?",c:["터빈펌프","사류펌프","축류펌프","방사식펌프"],a:3,e:"축류펌프는 양정이 4m 이하인 경우에 가장 많이 사용되는 펌프이다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:6,q:"펌프선정 시의 고려사항으로 가장 적당하지 않은 것은?",c:["펌프의 특성","펌프의 효율","펌프의 동력","펌프의 중량"],a:4,e:"펌프선정 시 고려사항: 펌프의 특성, 펌프의 효율, 펌프의 동력, 펌프의 양정, 펌프의 종류. 펌프의 중량은 주요 고려사항이 아니다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:7,q:"펌프에 관한 비교설명 중 틀린 것은?",c:["원심펌프 - 공동현상의 발생이 적다.","사류펌프 - 수위변동이 작은 곳에 적합하다.","축류펌프 - 사류펌프에 비해 회전수가 높다.","스크루펌프 - 구조가 간단하고 회전수가 작다."],a:2,e:"② 사류펌프는 수위변화에 따른 효율저하가 작으므로 우수용 펌프와 같이 수위변화가 있는 곳에 적합하다(수위변동이 작은 곳이 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:8,q:"다음 중 횡축펌프의 장점으로 맞지 않은 것은?",c:["주요부분이 옥내에 설치되어 보수점검이 편리하고 분해수리가 용이하다.","전동기는 일반적으로 횡축이며, 펌프와의 연결 접속이 편리하다.","구조적으로 견고하여 안전성이 높다.","하중 분포가 균일하여 단위면적당 기계하중이 크다."],a:4,e:"④ 하중 분포가 균일하여 단위면적당 기계하중이 작다. 횡축펌프의 단점: 캐비테이션 대책 요구, 설치소요면적 다소 넓음, 기동 시 자흡작용이 안 되므로 별도 흡입장치 필요, 홍수 시 침수대비 필요, 자동운전이 복잡."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:9,q:"다음 중 캐비테이션에 대비한 설명으로 옳지 않은 것은?",c:["공동현상을 발생시키지 않는 위치에 펌프를 설치하기 위하여 펌프의 흡입양정은 -5m까지를 표준으로 하고 가급적 작게 한다.","펌프는 운전여건에 따라 최소전양정에서 가동되는 경우가 있으며, 이때의 유량은 정격유량의 120%에서 캐비테이션의 발생 여부를 검토하여야 한다.","캐비테이션으로부터 안전하기 위해서는 유효흡입수두가 필요흡입수두보다 1m 이상 또는 1.3배 이상 크게 확보되어야 한다.","캐비테이션에 대해서 안전하기 위해서는 펌프에서 필요로 하는 필요흡입수두(NPSHre)가 이용할 수 있는 유효흡입수두(NPSHav)보다 커야 한다."],a:4,e:"④ 캐비테이션에 대한 안전을 위해서는 이용할 수 있는 유효흡입수두(NPSHav)가 펌프에서 필요로 하는 필요흡입수두(NPSHre)보다 커야 한다. 일반적으로 NPSHav - NPSHre > 1m가 좋다(반대로 설명됨)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:10,q:"다음 중 펌프의 회전수제어에 대한 설명으로 옳지 않은 것은?",c:["회전수제어는 필요한 수량이 상시 변화하는 경우 또는 비교적 단시간 내에 변화하는 경우에 유용한 방법이며, 어떤 제어방식이더라도 밸브 교축에 의한 유량제어보다는 동력절감이 가능하다.","손실수두성분보다는 전양정 중 실양정이 큰 경우에 유용하다.","직결식 중간가압장에서 유입측과 토출측의 동수두 변화가 커서 저양정용 회전차를 설치한 경우, 펌프 운전범위를 만족하기 어려운 경우에 적절하다.","변속펌프를 적용할 경우에는 소용량의 조절용 펌프를 적용할 필요성이 낮아지게 되어, 펌프의 대수가 감소되므로 설비비가 절약될 수 있다."],a:2,e:"② 전양정 중 실양정보다는 손실수두성분이 큰 경우에 유용하다. 회전수제어방식은 관로저항곡선이 펌프운전 범위보다 상당히 아래쪽에 위치하고 있으며 기울기가 큰 경우에 적절하다(반대)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:11,q:"다음 중 기계식인 유체커플링변속의 특징을 설명한 것으로 옳지 않은 것은?",c:["모터와 펌프 사이의 유체커플링과 냉각설비의 공간이 필요하다.","부대설비는 냉각설비이다.","모터를 포함한 모든 회전구동기기(모터, 터빈, 디젤엔진 등)에 적용된다.","유체에 의해 동력전달이 되므로 마모가 많고 유지보수가 어렵다."],a:4,e:"④ 유체에 의해 동력전달이 되므로 마모가 없고 유지보수가 용이하다(마모가 많고 어려운 것이 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:12,q:"다음 중 인버터변속의 특징으로 옳지 않은 것은?",c:["부하변화에 따른 전체적 효율이 우수하다.","정밀한 속도제어가 가능하고 속도제어범위가 크다.","모터 및 펌프 사이의 설치공간이 필요없다.","보수유지가 어렵다."],a:4,e:"④ 소형 동력전달의 경우 설치 및 보수유지가 간단하다. 인버터변속의 단점: 속도조절 시 진동 및 동력전달계통에 대한 충격발생 우려, 전기설비의 많은 보호장비 필요, 시스템이 복잡하여 전문가 필요, 모터수명이 단축(전기 쇼크), 기동 시 시간 소요(120초), 냉난방·항습·방진시설 필요."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:13,q:"부압 및 상승압의 방지를 위한 수충격 방지대책으로 옳지 않은 것은?",c:["Flywheel을 설치하면 관성효과를 증가시켜 회전수와 유속의 변화를 느리게 한다.","펌프 토출측에 Air Chamber를 설치하면 축적하고 있는 압력에너지를 방출하여 압력강하를 방지함과 동시에 압력상승도 흡수한다.","관경을 크게 하면 관 내 유속을 저하시켜, 관로정수를 작게 함으로써 압력강하를 방지한다.","펌프를 지나 흡입수조와 토출관 사이에 자동개폐변을 설치하면 부압발생장소에 공기를 자동적으로 흡입시켜 이상부압을 경감한다."],a:4,e:"④는 공기변을 설치했을 경우이다(자동개폐변이 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:14,q:"배수펌프의 계획수량이 시간당 125m³라면 예비펌프를 포함하여 몇 대 정도 설치하는 것이 표준인가?",c:["2대","3대","4대","5대"],a:2,e:"배수펌프의 기준수량: 계획시간 최대급수량이며, 시간당 125m³일 경우에 대형 2대(예비펌프 1대를 포함)와 소형 1대가 필요하다. 즉, 총 3대가 필요하다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:15,q:"다음은 펌프의 명칭과 용도를 설명한 것이다. 잘못된 것은?",c:["저양정펌프는 수원의 물 또는 하수를 처리장으로 양수하는 데 이용된다.","고양정펌프는 가압식 배수관로에 정수를 양수하는 데 이용된다.","가압펌프는 배수시설의 관 내 수압을 높이는 데 이용된다.","재순환 또는 이송펌프는 처리장과 처리장 간의 물의 이송에 이용된다."],a:4,e:"④ 재순환 및 이송펌프는 처리장 내에서 처리된 물을 보내는 데 이용된다(처리장 간 이송이 아님). 펌프장 종류: 저양정펌프장(수원→정수장 취수), 고양정펌프장(정수된 물 송·배수), 가압펌프장(송수·배수관 내 수압 증가)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:16,q:"계획오수량이 0.5~1.5m³/s일 때 오수펌프의 설치대수는?(단, 예비 1대를 포함)",c:["1~2대","3~5대","5~7대","7~8대"],a:2,e:"오수펌프의 설치대수: 계획오수량 0.5m³/s 이하 2~4대(예비 1대 포함), 0.5~1.5m³/s 3~5대(예비 1대 포함), 1.5m³/s 이상 4~6대(예비 1대 포함)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:17,q:"다음 펌프 중 가장 큰 비교회전도(Ns)를 나타내는 것은?",c:["터빈펌프","사류펌프","축류펌프","벌류트 펌프"],a:3,e:"형식별 비교회전도(Ns): 원심력펌프 100~250(터빈펌프), 100~750(벌류트펌프) / 사류펌프 700~1,200 / 축류펌프 1,200~2,000. 축류펌프가 가장 크다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:18,q:"운전 중에 있는 펌프의 토출량을 조절하는 방법으로 부적절한 것은?",c:["펌프의 운전대수를 조절한다.","펌프의 흡입측 밸브를 조절한다.","펌프의 회전수를 조절한다.","펌프의 토출측 밸브를 조절한다."],a:2,e:"② 운전 중인 펌프의 토출량을 조절하기 위하여 흡입측 밸브를 사용해서는 안 된다. 흡입측 밸브를 조절할 경우 공동현상이 발생할 우려가 있다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:19,q:"펌프의 흡입관에 대한 다음 사항 중 틀린 것은?",c:["충분한 흡입수두를 가질 수 있도록 한다.","흡입관은 가능하면 수평으로 설치되도록 한다.","흡입관에는 공기가 유입되지 않도록 한다.","펌프 한 대에 하나의 흡입관을 설치한다."],a:2,e:"② 흡입관은 가능한 한 수평으로 설치하는 것을 피한다. 부득이한 경우에는 가능한 한 짧게 하고 펌프를 향하여 1/50 이상의 경사로 한다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:20,q:"펌프에서 발생되는 수격작용을 방지하기 위한 방법이 아닌 것은?",c:["펌프에 플라이휠을 부착한다.","토출관 쪽에 압력조절수조를 설치한다.","관내 유속을 증가시키거나 관거상황을 변경한다.","토출측 관로에 안전밸브 또는 공기밸브를 설치한다."],a:3,e:"③ 펌프의 수격작용방지방법: 펌프에 플라이휠을 부착시켜 관성 증가, 토출관에 압력조절수조 설치, 관내의 유속 저하, 토출관로에 안전밸브 또는 공기밸브 설치, 펌프의 급정지 피함, 관거의 상황 변경. 유속을 '증가'시키는 것이 아니라 저하시켜야 한다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:21,q:"수격현상의 발생을 경감시킬 수 있는 방안이 아닌 것은?",c:["펌프의 속도가 급격히 변화하는 것을 방지한다.","관내의 유속을 저하시킨다.","밸브를 펌프 송출구에서 먼 곳에 설치한다.","압력조정수조를 설치한다."],a:3,e:"③ 밸브는 펌프 송출구에서 가까운 곳에 설치해야 한다. 수격현상의 발생원인: 관내 압력의 과도한 상승·저하(급배수관 내 수류를 급속하게 닫거나 응축수 등이 남아 식힌 증기기관에 다시 증기를 보내는 경우), 관내 압력 상승으로 관로 파손."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:22,q:"다음 중 토출밸브에 대한 설명으로 옳지 않은 것은?",c:["펌프의 토출측 또는 토출관로 중간에 반드시 차단용 밸브를 설치해야 한다.","토출관 밸브로 토출량을 조절할 경우는 유량조절용 밸브를 설치하여야 한다.","토출관측 밸브에는 개도지시계를 설치하여야 한다.","토출관의 직경은 일반적으로 펌프의 토출구경보다 한 단계 작은 것으로 결정한다."],a:4,e:"④ 토출밸브의 크기(직경)는 토출관의 직경으로 결정되는데 토출관의 직경은 일반적으로 펌프의 토출구경과 같거나 한 단계 큰 것으로 결정한다(작은 것이 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:23,q:"다음 중 체크밸브에 대한 설명으로 옳지 않은 것은?",c:["다른 밸브는 동력 또는 수동조작에 의해 개폐되는 반면에 체크밸브는 정·역류의 유체력에 의해 개폐된다.","역류방지용 밸브는 통상 버터플라이밸브를 사용한다.","저양정으로 역류 개시시간이 늦은 펌프 토출측에는 보통형 스윙체크밸브를 설치한다.","회전체의 관성효과가 작고 관로길이가 짧아 역류 개시시간이 매우 짧은 경우에는 스프링식 급폐형 체크밸브를 사용한다."],a:2,e:"② 역류방지용 밸브는 통상 체크밸브를 사용한다. 이에는 완폐식과 급폐식이 있으며 또한 차단용 밸브에 역류방지의 기능을 갖게 할 수도 있다(버터플라이밸브가 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:24,q:"다음 중 펌프의 흡입배관에 사용되는 기구는?",c:["풋밸브","체크밸브","게이트밸브","압력계"],a:1,e:"① 토출관에는 체크밸브와 게이트밸브를, 흡입관에는 풋밸브를 사용한다. ② 체크밸브는 유체를 한 방향으로만 흐르게 하여 역류를 방지, ③ 게이트밸브는 유량조절용, ④ 압력계는 압력 측정용 계기이다."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:25,q:"펌프(Pump)에 대한 기술 중 옳은 것은?",c:["펌프는 구경이 클수록 효율이 감소된다.","흡입양정은 낮추는 것이 효율에 좋다.","풋밸브(흡입구)는 수면 위에서 관경의 1배 정도 잠기게 설치한다.","배관의 굴곡부를 증대시켜 압력을 줄인다."],a:2,e:"② 펌프는 되도록 흡입양정을 낮추어 설치한다. ① 구경이 클수록 효율이 증가, ③ 풋밸브는 수면 위에서 관경의 2배 정도 잠기게 설치, ④ 굴곡부를 증대시키면 압력이 늘어난다(손실)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:26,q:"다음은 각종 펌프와 관련된 사항을 연결한 것이다. 옳지 않은 것은?",c:["기어펌프 - 기름반송용","제트펌프 - 소화용","논클로그펌프 - 상수도급수용","워싱턴펌프 - 보일러급수용"],a:3,e:"③ 논클로그펌프는 오수·배수용 펌프이다(상수도급수용이 아님)."},
{g:"b3c8",gt:"[2권] 3과목 8장 펌프설비운영",s:"설비운영",n:27,q:"급수배관이나 기구구조의 불비(不備), 불량의 결과 급수관 내에 오수가 역출해서 음료수를 오염시키는 상태를 무엇이라고 하는가?",c:["사이어미즈 커넥션","헤머","크로스 커넥션","드레인"],a:3,e:"크로스 커넥션: 급수배관의 잘못된 연결이나 기구불량으로 급수관 내 오수가 역류하여 음료수를 오염시키는 상태로 연결관을 해체하거나 진공방지기를 부착하여 방지한다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:1,q:"다음 몰드변압기에 대한 특징으로 옳지 않은 것은?",c:["화재의 위험이 있다.","내흡습성, 내오손성이 우수하다.","설치면적이 작다.","소음이 유입변압기보다 크다."],a:1,e:"① 몰드변압기는 난연성이므로 재해 시 유리하다(화재의 위험이 있는 것이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:2,q:"건식변압기에 대한 특징으로 옳지 않은 것은?",c:["난연성이므로 재해 시 유리하다.","흡습 및 오손되기 쉽다.","재운전 시 건조작업이 요구된다.","소음이 적다."],a:4,e:"④ 건식변압기는 가격이 유입변압기에 비해 고가이고 소음이 가장 크다(소음이 적은 것이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:3,q:"전기설비에 대한 설명 중 틀린 것은?",c:["우리나라의 교류전기주파수는 60사이클이다.","전화, 전기시계를 비롯한 통신설비는 직류를 쓴다.","보통 건물의 전등 및 전열에는 주로 직류를 쓴다.","1kW의 전력량은 860kcal/h이다."],a:3,e:"③ 일반적으로 전등, 전열, 동력 등 대부분의 전기설비에는 교류가 쓰인다(직류가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:4,q:"다음 중 전기설비에 관한 설명으로 옳지 않은 것은?",c:["가정용 전등 및 콘센트에는 일반적으로 단상 2선식 220V를 사용할 수 있다.","전압의 종별 중 저압이란 직류, 교류 모두 200V 이하의 것을 말한다.","옥내변전설비를 설치하는 경우 변전실의 환기는 필요하다.","전기배선의 금속덕트에는 접지공사를 할 필요가 있다."],a:2,e:"② 전압의 경우 직류는 750V 이하, 교류는 600V 이하의 것을 말한다(모두 200V 이하가 아님). ※ 현행 기준으로는 변경되었을 수 있으므로 최신 KEC 확인 필요."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:5,q:"전기설비에서 역률을 개선하기 위해 사용하는 기기는?",c:["축전지","콘덴서","변압기","차단기"],a:2,e:"교류에서는 역률을 개선하기 위해서 콘덴서(진상콘덴서)를 사용한다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:6,q:"다음 중 전기설비에 관한 기초지식들로 옳은 것은?",c:["조도란 빛을 받고 있는 면의 밝기를 말하며 단위는 lm이다.","전기방식에는 단상 2선식, 단상 3선식, 3상 2선식, 3상 3선식이 있다.","약전설비에는 전화, 인터폰, 표시 및 호출장치, 화재경보기, 방송장치, 전기시계 등이 있다.","피뢰침의 보호각은 보통 건물은 60°, 위험물저장고는 50° 이내이다."],a:3,e:"③ 약전설비에는 전화, 인터폰, 표시 및 호출장치, 화재경보기, 방송장치, 전기시계 등이 있다. ① 조도의 단위는 lx, ② 전기방식에는 단상 2선식·단상 3선식·3상 3선식·3상 4선식, ④ 피뢰침의 보호각은 보통 건물 60° 이하·위험물저장고 45° 이하."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:7,q:"전기설비의 기기에 대한 용도설명이 잘못된 것은?",c:["배전반은 각종 계기류, 계전기류 및 개폐기류를 1개소에 집중시켜 놓기 위한 것이다.","콘덴서는 과전류로부터 기기를 보호하기 위한 것이다.","변압기는 고압의 인입전기를 기기의 정격전압으로 낮추기 위한 것이다.","간선이란 인입개폐기와 분기점에 설치된 분기개폐기를 연결하기 위한 것이다."],a:2,e:"② 콘덴서는 전기설비에서 역률개선목적으로 사용되는 기기이다(과전류 보호가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:8,q:"다음 중 전력부하산정의 수용률로 옳은 것은?",c:["(최대수요전력/부등률) × 100%","(부등률/설비용량) × 100%","(최대수요전력/설비용량) × 100%","(평균수요전력/최대수용전력) × 100%"],a:3,e:"수용률 = (최대수요전력/설비용량) × 100%. 부등률 = (부하 각개의 최대수요전력의 합계 / 각 부하를 종합한 최대수요전력) × 100%."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:9,q:"각각 50kW, 100kW, 200kW 용량의 전기부하설비가 설치되어 있고 수요율이 80%인 경우 최대사용전력에 가장 가까운 값은?",c:["140kW","280kW","350kW","560kW"],a:2,e:"최대전력량 = (50+100+200) × 0.8 = 280kW"},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:10,q:"다음의 개폐기 또는 차단기 중에서 무부하(회로분리)개폐만 할 수 있는 것은?",c:["진공차단기(VCB)","단로기(DS)","부하개폐기","전자접촉기"],a:2,e:"단로기(DS)는 회로분리에 의한 개폐만이 가능하다(부하전류 차단 불가)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:11,q:"다음 중 회로의 부하상태에 의해 자동적으로 작동한 후 원상태로 복귀가 가능한 개폐기는?",c:["나이프스위치(Knife Switch)","서킷브레이커(Circuit Breaker)","컷아웃스위치(Cut Out Switch)","버튼스위치(Push Button Switch)"],a:2,e:"② 서킷브레이커(노퓨즈차단기)는 회로의 과부하상태에 의해 자동적으로 동작하고 다시 원상태로 복귀가 가능한 개폐기이다. ① 절연대 위에 칼과 칼받이를 조합시켜 설치한 개폐기, ③ 자기제로 그 내측에 퓨즈를 부착하고 뚜껑의 개폐로 회로를 개폐하는 스위치, ④ 버튼을 눌러 회로의 절단 또는 접속을 하는 스위치."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:12,q:"다음 비상사태발생을 대비한 자가발전설비에 관한 규정 중 틀린 것은?",c:["비상사태발생 후 30초 이내에 시동해야 한다.","규정전압을 유지하며 30분 이상 전력공급이 가능해야 한다.","충전기를 갖춘 축전지와 병용했을 때는 45초 이내에 시동해도 된다.","축전지설비는 충전함이 없이 20분 이상 방전할 수 있어야 한다."],a:1,e:"① 자가발전설비는 비상사태발생 후 10초 이내에 시동하여 30분 이상 방전할 수 있어야 한다(30초가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:13,q:"다음 중 진공차단기에 대한 특징으로 옳지 않은 것은?",c:["차단성이 우수하고 접촉자 소모가 적다.","소음이 적다.","수명이 짧다.","소형 경량이며 가스차단기에 비하여 저가이다."],a:3,e:"③ 진공차단기는 수명이 길고 보수가 거의 필요치 않다(수명이 짧은 것이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:14,q:"다음 중 차단기의 점검사항으로 옳지 않은 것은?",c:["개폐 표기, 표시등 표시상태","이상음, 이취 등의 발생 유무","과열, 변색 유무","압력계의 정상상태"],a:4,e:"④ 압력계의 정상상태는 가스차단기의 점검사항이다. ①, ②, ③ 외에 차단기의 점검사항으로 단자조임상태, 녹·변형·오손유무 등이 있다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:15,q:"낙뢰 또는 개폐서지(Switching Surge) 등의 이상전압을 일정값 이하로 제한하여 전기기기 등의 절연파괴를 방지하는 장치는?",c:["피뢰침","보호계전기","서지계전기","피뢰기"],a:4,e:"피뢰기: 낙뢰 또는 개폐서지 등의 이상전압을 일정값 이하로 제한하여 전기기기 등의 절연파괴를 방지하는 장치이다(피뢰침은 건축물 보호)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:16,q:"다음 중 피뢰침 설치대상으로 맞지 않는 것은?",c:["건축물의 높이가 30m를 넘는 건물","굴뚝, 광고탑, 고가수조 등으로 높이가 20m를 넘는 공작물","위험물안전관리법에 의한 위험물 제조소","낙뢰 다습지역의 건축물 또는 공작물(높은 탑, 굴뚝, 외딴 건물 등)"],a:1,e:"① 건축물의 높이가 20m를 넘는 건물이 설치대상이다(30m가 아님). 피뢰침설치대상: 높이 20m 넘는 건축물, 높이 20m 넘는 공작물, 위험물 제조소, 낙뢰 다습지역 건축물·공작물, 낙뢰 피해 예상 건물(학교·백화점·극장·목욕탕·축사·박물관 등)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:17,q:"다음 중 피뢰침 설치사항으로 옳지 않은 것은?",c:["고층건물의 파라피트에는 수평도체를 설치한다.","수평도체의 지지간격은 2m 이내로 하고 인하도선은 50m 이하마다 분기하여 접지한다.","피뢰침용 접지극 및 접지선은 타 접지와 2m 이상 이격한다.","피뢰침용 접지는 제2종 접지공사로 한다."],a:4,e:"④ 피뢰침용 접지는 제1종 접지공사로 한다(제2종이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:18,q:"다음 용어에 관한 설명으로 옳지 않은 것은?",c:["콘덴서는 부하에 병렬 또는 회로에 직렬로 삽입하여 부하역률의 개선과 전압의 조정 등에 사용된다.","방전코일은 회로개방 시 잔류전하를 제거하기 위해 의무적으로 설치(콘덴서에 내장되어 있는 방전코일 유도)해야 한다.","절연협조는 전전력계통에 대해 피뢰기나 보호캡 등의 제한전압과의 협조를 도모한다.","피뢰기는 전동기 등의 전력기나 전로를 감시하여 고장이나 이상이 있을 시 즉시 검출하여 판별한 후 신호를 차단기나 경보장치 등에 보내어 동작시키고 고장부분을 신속히 분리시킴으로써 사고확대방지 및 최소한의 손실확대를 억제하는 기능이 있다."],a:4,e:"④는 보호계전기에 대한 설명이다. 피뢰기는 보통 보호되는 기기의 단자와 대지 간을 접속하여 전로에 이상전압이 내습한 경우 전로와 대지 간에 방전로를 형성하여 이상전압의 파고치를 저감시켜 기기의 손상 및 플래시오버를 막고 이상전압 소멸 후에는 즉시 방전전류의 속류를 차단하여 전로의 절연을 정상으로 복귀시키는 장치이다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:19,q:"다음 중 수전회로와 과부하보호 등에 대한 설명으로 옳지 않은 것은?",c:["자가용 수변전설비의 구성을 크게 나누면 수전회로, 변압기 회로, 변압기 2차 모선, 인출선 회로 및 구내용 설비로 구성되어 있다.","수전회로란 인입구의 변전소부터 변압기 1차 모선까지를 말한다.","수전회로의 보호는 수전회로의 단락사고와 지락사고를 전력회사 계통에 파급시키지 않는 것은 물론 변압기회로 이후의 후비보호를 겸해야 하는 것이 포인트이다.","전로의 과부하보호는 원칙적으로 모든 전기설비에 대해 그것을 구성하는 도체가 허용온도에 도달할 때까지 전류를 자동차단하면 된다."],a:2,e:"② 수전회로란 인입구의 책임분계점부터 변압기 1차 모선까지를 말하며 수전전력 계량이나 수배전 조작 및 구내 사고에 대한 보안상의 책임한계를 명확하게 하기 위한 설비이다(변전소부터가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:20,q:"단상 2선식에 비한 단상 3선식의 특징으로 옳지 않은 것은?",c:["전압강하, 전력손실이 평형 부하의 경우 배로 증가한다.","소요전선량이 적어도 된다.","110V 부하 외에 220V 부하의 사용이 가능하다.","상시의 부하에 불평형이 있으면 부하전압은 불평형으로 된다."],a:1,e:"① 전압강하, 전력손실이 평형 부하의 경우 1/4로 감소한다. 또 중성점과 전압선(외선)이 단락하면 단락하지 않은 쪽의 부하전압이 상승한다(배로 증가가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:21,q:"다음 수전설비의 일상점검사항으로 옳게 묶인 것은?\n㉠ 지지애자 붓싱, 절연물의 파손, 오손상태  ㉡ 통전 접촉부의 접속 및 변색상태  ㉢ 안전클러치의 걸림 상태  ㉣ 조작장치의 부식파손, 오손상태  ㉤ 개폐표시장치의 명판, 지침 등 표시상태  ㉥ 접지상태",c:["㉠, ㉡, ㉢","㉠, ㉡, ㉣, ㉥","㉢, ㉣, ㉤, ㉥","㉠, ㉡, ㉣, ㉤, ㉥"],a:4,e:"수전설비의 일상점검사항: ㉠ 지지애자 붓싱·절연물 파손·오손상태, ㉡ 통전 접촉부 접속 및 변색상태, ㉣ 조작장치 부식파손·오손상태, ㉤ 개폐표시장치 명판·지침 표시상태, ㉥ 접지상태. ㉢ 안전클러치 걸림 상태는 해당 없음."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:22,q:"전동기 및 기동에 대한 설명으로 옳지 않은 것은?",c:["전동기에는 직류전동기, 유도전동기, 동기전동기 등이 있다.","직류전동기는 속도의 가감속제어 등이 필요한 장소에 사용한다.","유도전동기는 일반적으로 소용량부터 대용량까지 생산되고 있고, 운전, 유지관리가 쉬워 널리 사용되고 있다.","저압전동기 기동방식에는 직입기동, 리액터기동, 콘돌파기동, Soft Start기동 등이 있다."],a:4,e:"④는 고압전동기 기동방식이며, 저압전동기 기동방식에는 전전압기동, Y-△기동, Reactor기동, Resister기동, Soft Start기동 등이 있다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:23,q:"저전압기동방법의 특징에 대한 설명으로 옳지 않은 것은?",c:["전전압 - 가속토크가 커서 기동시간이 길다.","Y-△ - 가속토크가 작아 부하를 걸어서 기동이 어렵다.","Reactor - 탭 전환에 따라 최대 기동전류, 최소 기동토크가 조정가능하다.","Resister - 리액터기동과 거의 같으나 리액터기동보다 가속토크의 증대가 적다."],a:1,e:"① 전전압은 가속 토크가 커서 기동시간이 짧다(길다가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:24,q:"다음 중 광원에 관한 설명으로 옳지 않은 것은?",c:["광원에는 방사방식에 따라 열방사, 화학방사, 루미네센스, 유도방사로 나누어진다.","전구는 백열등, 연소등, 방전등, 전계발광램프, 레이저발광램프 등으로 나누어진다.","형광등은 저압방전등의 하나로서 휘도가 적고, 효율이 높으며 수명이 길다. 따라서 전반조명이나 국부조명에 사용하여 명시적인 양질의 조명을 얻을 수 있다.","수은램프, 메탈할라이드램프, 고압나트륨램프는 고압방전등(HID-lamp)이라고 한다."],a:2,e:"②는 광원의 발광원리에 따른 분류이다. 전구의 종류에는 백열전구, 특수전구, 할로겐전구 등이 있으며 온도 방사체이며, 고휘도광원이고 배광제어가 용이하나 효율이 낮고 수명이 비교적 짧아 소형장소의 전반조명·분위기 조명용으로 많이 사용된다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:25,q:"다음 중 보안등 점멸장치에 대한 설명으로 옳지 않은 것은?",c:["점멸장치는 시간기록기에 의한 자동점멸장치와 수동점멸장치를 구성하여 필요시 또는 자동점멸장치의 오동작에 대비한다.","광전식 점멸기는 주로 보안등에 사용한다.","컴퓨터점멸방식은 전파가 미치지 않는 산악지역 및 비교적 소규모인 단지에 사용한다.","무선점소등방식은 광도체를 사용하여 자연광의 밝기에 따라 회로를 개폐하는 방식으로 가격은 저렴하나 점소등에 문제가 있다."],a:4,e:"④는 광전식 점멸기에 대한 설명이다. 무선점소등방식: 송신소의 무선원격조정장치에 의해 일괄점소등이 가능한 방식이며 송신소 설치 등 초기투자비가 따르며 주로 서울시 보안 등을 운영하는 방식. 컴퓨터점멸방식: 컴퓨터에 일몰·일출 등 일정한 Data를 내장시켜 정확한 시간에 점소등이 가능한 방식이나 일정한 기간마다 Data 및 Time Setting을 할 필요가 있음."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:26,q:"조명설계의 순서로 옳은 것은?",c:["전등종류결정 → 소요조도결정 → 조명방식결정 → 광원계산 → 광원배치","조명방식결정 → 전등종류결정 → 소요조도결정 → 광원배치 → 광원계산","소요조도결정 → 전등종류결정 → 조명방식결정 → 광원계산 → 광원배치","광원배치 → 광원계산 → 소요조도결정 → 전등종류결정 → 조명방식결정"],a:3,e:"조명설계순서: 실내소요조도의 결정 → 광원선정 → 조명방식·조명기구 및 실내면의 마무리선정 → 광원의 계산 → 광원크기와 배치 → 실내면의 광속발산도계산."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:27,q:"다음의 내용을 참조하여 일반적인 실내조명설계의 순서를 가장 바르게 나타낸 것은?\n㉠ 조명기구의 배치계획 수립  ㉡ 소요조도의 결정  ㉢ 광원 및 조명방식의 결정  ㉣ 소요광속의 계산",c:["㉡ → ㉢ → ㉣ → ㉠","㉠ → ㉢ → ㉣ → ㉡","㉢ → ㉡ → ㉠ → ㉣","㉣ → ㉢ → ㉡ → ㉠"],a:1,e:"실내조명설계의 순서: 소요조도의 결정(㉡) → 광원 및 조명방식의 결정(㉢) → 소요광속의 계산(㉣) → 조명기구의 배치계획 수립(㉠)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:28,q:"형광등에 관한 설명 중 옳지 않은 것은?",c:["저온에 적당하다.","임의의 광색을 얻을 수 있다.","백열전구에 비하여 수명이 길다.","효율이 높다."],a:1,e:"① 형광등은 저온에 부적당하다. 형광등의 단점: 가격이 비쌈, 깜박거림(1등만 사용할 때), 저온에 부적당, 전압 80V 이하에서는 점등이 안 됨. 장점: 효율 높음, 광색 양호, 광원 큼, 수명 길고, 저휘도."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:29,q:"형광램프를 옥외등으로 잘 사용하지 않는 이유로 옳은 것은?",c:["주위의 온도에 따라 특성변화가 달라지므로 광속이 증가한다.","형광램프의 수명이 짧아지기 때문이다.","램프전류 및 전력이 증가하기 때문이다.","주위온도에 따라 특성변화가 달라지므로 광속이 떨어진다."],a:4,e:"형광램프는 수명도 길고 효율도 양호하지만, 외부온도의 영향을 받아 0℃에서는 점등이 어려우며 20~25℃ 사이에서 가장 효율이 좋다. 옥외 저온에서는 광속이 떨어진다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:30,q:"다음의 전구 중 종합효율(안정기손실을 포함한 lm/W)이 가장 좋은 전구는?",c:["백열전구 100W","형광구백색 40W","고압수은전구 400W","고압나트륨전구 400W"],a:4,e:"효율이 가장 우수한 램프는 나트륨램프이다(고압나트륨전구)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:31,q:"램프의 광색 중에서 연색성이 가장 좋은 것은?",c:["나트륨등","고압수은등","형광등","백열등"],a:4,e:"연색성: 조명이 물체의 색감에 영향을 미치는 현상. 연색성이 좋은 순서: 백열등 > 형광등 > 메탈할라이드등 > 고압수은등 > 나트륨등."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:32,q:"도로조명 또는 터널조명에 가장 적합한 조명기구는?",c:["나트륨램프","형광램프","고압수은램프","저압수은램프"],a:1,e:"① 나트륨램프는 투과력이 좋아 도로조명·터널조명에 가장 적합하다. ② 형광램프는 옥내외 전반조명 또는 국부조명에 적합, 수은램프는 1등당 큰 광속을 얻을 수 있고 수명이 길어 높은 천장·투광조명에 적합."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:33,q:"항공장애 표시등이 필요한 건물의 지표면으로부터의 높이는?",c:["20m 이상","30m 이상","50m 이상","60m 이상"],a:4,e:"지표 또는 수면으로부터 60m 이상의 물체에는 항공장애 표시등과 항공장애 주간표지를 설치해야 한다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:34,q:"다음 접지설비에 대한 설명으로 옳지 않은 것은?",c:["접지의 목적은 기기의 보호와 절연물의 열화손상에 의한 누설전류로부터 인체를 보호하는 것, 즉 감전방지를 위해서 접지를 하는 것이다.","접지형태에는 독립접지, 공용접지 또는 혼합접지가 있다.","독립접지는 2개의 접지전극이 있는 경우에, 한쪽 전극에 접지전류가 아무리 흘러도 다른 쪽 접지극에 전혀 전위상승을 일으키지 않는 경우이다.","통신, 계측, 정보기기는 공용 1그룹에 속한다."],a:4,e:"④ 통신, 계측, 정보기기는 공용 3그룹에 속한다. 공용접지의 분류: 공용 1그룹(피뢰침과 전력회사 수전측 피뢰기, 3.3kV급 피뢰기), 공용 2그룹(공용 1그룹 이외 전력용 접지), 공용 3그룹(통신, 계측, 정보기기)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:35,q:"다음 접지공사방법 중 틀린 것은?",c:["분전반-제3종 접지공사","금속관공사-제3종 접지공사","고압전동기-제1종 접지공사","피뢰기-제2종 접지공사"],a:4,e:"④ 피뢰기는 제1종 접지공사이다(제2종이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:36,q:"다음 예비전원설비에 대한 설명 중 옳지 않은 것은?",c:["자가발전설비용량은 수전설비용량의 20% 정도로 한다.","예비전원으로서의 축전지는 30분 이상 계속 방전할 수 있어야 한다.","자가발전설비는 비상사태 후 10초 이내에 가동하여 30분 이상 전력을 공급할 수 있어야 한다.","가능한 한 부하의 중심에서 멀리 떨어져야 한다."],a:4,e:"④ 발전기실은 내화, 방음, 방진구조로 하며, 가능한 한 부하의 중심 가까이에 둔다(멀리 떨어지는 것이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:37,q:"옥내배선의 설계순서로서 옳은 것은?\n㉠ 전선굵기의 결정  ㉡ 배선방법결정  ㉢ 부하결정  ㉣ 전기방식선정",c:["㉠ → ㉡ → ㉢ → ㉣","㉢ → ㉣ → ㉡ → ㉠","㉡ → ㉠ → ㉣ → ㉢","㉣ → ㉡ → ㉠ → ㉢"],a:2,e:"옥내배선의 설계순서: 부하용량결정(㉢) → 전기방식결정(㉣) → 배선방식결정(㉡) → 전선 및 전선관의 굵기결정(㉠)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:38,q:"전기배선 시 분전반의 위치로서 적당하지 않은 것은?",c:["고층빌딩은 파이프샤프트 부근에 둔다.","가능한 한 매층에 설치한다.","전화용 단자함이나 소화전 박스와 조화있게 한다.","가능한 한 부하의 중심에서 멀리 설치한다."],a:4,e:"④ 분전반은 가능한 한 부하의 중심에서 가까이 설치한다(멀리가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:39,q:"감시제어반에 있어서 감시를 위한 표시법이 옳지 않은 것은?",c:["전원표시-백색램프","고장표시-버저 또는 벨","운전표시-적색램프","정지표시-청색램프"],a:4,e:"④ 정지표시는 녹색램프이다(청색이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:40,q:"계단실의 위와 아래에서 자유롭게 점등할 수 있는 스위치는?",c:["서킷브레이커","나이프스위치","3로스위치","컷아웃스위치"],a:3,e:"③ 3로스위치는 계단, 복도의 전등을 위와 아래에서 자유롭게 점등 가능한 스위치이다. ① 과전류가 흐를 때 자동적으로 회로를 끊어서 보호하는 자동차단기, ② 칼받이와 칼로 구성되어 있는 전원개폐기, ④ 스위치와 보완장치를 겸비한 소용량의 보완개폐기."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:41,q:"다음 중 사용용도를 잘못 짝지은 것은?",c:["응접실-마그넷스위치","계단실-3로스위치","양수펌프-플로트스위치","배전반-나이프스위치"],a:1,e:"① 마그넷스위치(전자개폐기)는 전류의 과부 시 부하기기보호를 위하여 자동차단장치를 설치하여 일반회로의 자동개폐조작이나 전동기회로의 제어에 사용된다(응접실용이 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:42,q:"긴 복도의 양면에 또는 계단실의 위와 아래에서 자유롭게 점등을 할 수 있는 스위치는?",c:["나이프스위치","3로스위치","텀블러스위치","로터리스위치"],a:2,e:"② 3로스위치는 3개의 단자를 구비한 전환용 스위치로 2개소 이상을 동시점멸하는 스위치이다. ① 절연대 위에 칼과 칼받이를 조합시켜 설치한 개폐기(보통 600V 이하의 교류회로 개폐), ③ 노출형과 매입형이 있으며 레버를 상하 또는 좌우로 넘어뜨려 점멸하는 스위치, ④ 손잡이의 회전에 의하여 개폐를 행하는 스위치."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:43,q:"다음 중 습기·물기가 있는 곳의 전기공사로 적합한 것은?",c:["금속덕트공사","경질비닐관공사","목재몰드공사","금속몰드공사"],a:2,e:"② 경질비닐관공사는 내식성과 절연성이 우수하여 습기·물기가 있는 곳에 적합하다."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:44,q:"비상용 콘센트는 몇 층 이상의 건축물에 설치하여야 하는가?",c:["9층","11층","15층","16층"],a:2,e:"비상용 콘센트의 설치대상: 11층 이상인 건축물."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:45,q:"다음 중 안테나설비에 관한 설명 중 옳지 않은 것은?",c:["안테나는 풍속 40m/s에 견디도록 고정한다.","안테나는 피뢰침 보호각 내에 들어가도록 한다.","원칙적으로 강전류선으로부터 1.5m 높이로 한다.","정합기 설치 높이는 일반적인 경우 바닥 위 30cm 높이로 한다."],a:3,e:"③ 원칙적으로 강전류선으로부터 3m 이상의 거리를 두어야 한다(1.5m가 아님)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:46,q:"접지 접속방법의 장단점에 대한 설명으로 옳지 않은 것은?",c:["직렬접속은 시공이 간편하고, 경제적이다.","직렬접속은 접지전위차가 발생하고 인접기기의 영향을 받게 된다.","병렬접속은 접지전위차를 최소화할 수 있고 인접 기기로부터 영향을 받지 않는다.","조합형 접속은 직·병렬 접속이 갖는 장점을 모두 갖출 수 있다."],a:4,e:"④ 병렬접속은 시공이 어렵고 비용이 많이 든다(조합형이 모든 장점을 갖추는 것이 아님 — 병렬접속의 단점 존재)."},
{g:"b3c9",gt:"[2권] 3과목 9장 전기설비운영",s:"설비운영",n:47,q:"다음 수전설비의 운전·정지조작에 대한 설명으로 옳지 않은 것은?",c:["수전계통 중에서 책임분계점의 개폐기를 조작할 필요가 있는 경우에는 전기책임자가 개폐조작을 한다.","구내의 배전계통 또는 부하설비를 정전하는 경우에는 사전에 관계자에게 연락하여 필요한 조치를 취할 수 있도록 하여야 한다.","주회로의 개폐조작은 원칙적으로 2명이 하는데, 1명이 조작을 하고 1명은 그 감시를 맡아서 오조작을 방지한다.","차단기, 단로기, 개폐기 등을 조작하는 경우에는 손가락지시에 의한 확인이나 복창에 의해 확실하게 조작한다."],a:1,e:"① 수전계통 중에서 책임분계점의 개폐기를 조작할 필요가 있는 경우에는 사전에 한전의 급전소 또는 영업소에 연락하여 개폐조작을 의뢰한다(전기책임자가 직접 조작이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:1,q:"계측제어설비의 적용조건 중 거리가 먼 것은?",c:["사후감시 및 공정 관련 협의","확장성 및 호환성","감시조작의 용이성","자동화를 통한 무인화 운전"],a:1,e:"계측제어설비의 적용조건에는 사전조사 및 공정 관련 협의, 확장성 및 호환성, 감시조작의 용이성, 자동화를 통한 무인화 운전, 최신기술의 도입 및 유지보수대책, 인간공학적 배려 등이 있다. '사후감시'가 아니라 '사전조사'이다."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:2,q:"다음 정수처리지의 계측항목으로 옳지 않은 것은?",c:["배수지 - 수위, 유량, 탁도, 잔류염소량, pH","배수펌프 - 유량, 농도","배출수지 - 수위, 유량, 탁도, pH","회수조 - 수위, 유량"],a:2,e:"② 배수펌프의 계측항목은 유량과 수압이며, 유량과 농도는 탈수기동의 계측항목이다."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:3,q:"다음 정수처리지의 제어항목으로 옳지 않은 것은?",c:["취수장 - 취수게이트제어, 취수유량제어, 밸브개도제어","착수정 - 배수펌프제어, 배수유량제어, 배수압력제어","침전지 - 침전지수위제어, 침전지슬러지제어","여과지 - 여과지수위제어, 여과지유량제어, 여과지세정제어"],a:2,e:"② 착수정의 제어항목은 착수유량·수위제어, 전염소주입제어이며 ②는 배수펌프제어항목이다."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:4,q:"pH계의 지시에 이상이 있을 경우의 조치로 옳지 않은 것은?",c:["전원 Fuse가 끊어졌을 때는 전원점검 및 Fuse 교환을 한다.","측정액의 pH가 눈금을 넘어서고 있을 때는 측정액의 pH를 확인한다.","전극에 녹 등이 부착되어 있을 때는 물 또는 묽은 염산으로 세정한다.","전극이 절연불량 또는 파손되었을 때는 점검한다."],a:4,e:"④ 전극이 절연불량 또는 파손되었을 때는 교환해야 한다(점검이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:5,q:"알칼리도계, 잔류 염소계에 이상이 있을 경우의 조치로 옳지 않은 것은?",c:["변환기의 부하가 허용치를 초과하는 경우에는 부하 임피던스를 확인하고 허용치 이하로 한다.","댐핑조정이 부적절한 경우에는 각 부의 점검 및 조정을 한다.","시약조정이 부적절한 경우에는 시약을 교환한다.","전극이 접촉불량 및 회전불량일 경우에는 점검 조정 및 수리를 한다."],a:3,e:"③ 시약조정이 부적절한 경우에는 시약농도를 체크 및 재조정한다(시약을 교환하는 것이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:6,q:"가압장 및 분기점감시 및 제어방법에 대한 설명으로 옳지 않은 것은?",c:["가압펌프는 원격수동운전방식으로 운전할 수 있도록 하여야 한다.","무인화 사업장은 시설물보호를 위한 각종 부대설비(소화설비, 가로등, 방호설비 등)에 대한 감시 및 제어도 포함되어야 한다.","무인화 사업장과 원격감시제어사업장 간 전용회선장에서 백업망으로 절체되어 원격감시제어사업장으로 취득되는 무인화 사업장의 데이터가 정수장의 중앙조정실로 자동 또는 수동으로 절체되어 데이터전송되어야 한다.","관로분기점 및 후단배수지에는 TM/TC 및 TM을 설치, 분기압력, 분기유량, 분기밸브개도, 배수지수위 등을 지정된 사업소에서 감시할 수 있도록 해야 한다."],a:1,e:"① 가압펌프는 원격수동운전과 자동운전의 2가지 방식으로 운전할 수 있도록 하여야 한다(원격수동운전방식만이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:7,q:"유체를 정지시켜도 유량계 지시가 '0'이 되지 않을 경우의 조치에 대한 설명으로 옳지 않은 것은?",c:["배선 이상의 경우 교환을 한다.","변환기 고장의 경우 수리 또는 교환을 한다.","전극 오염(전자식)의 경우 취급설명서에 따라 청소한다.","유체가 충만되지 않을 경우 충만시키고 점검한다."],a:1,e:"① 배선 이상의 경우 점검수리를 한다(교환이 아님). 유량계 유체가 흘러도 지시가 '0'인 경우: 전원 Fuse 절단 시 전원선 점검·수리 및 Fuse 교환, 배선 단선·단락 시 점검·수리, 변환기 고장 시 수리 또는 교환, 기록계·지시계 고장 시 수리 또는 교환, 여자코일 단선(전자식) 시 수리 또는 교환, 도압관 막힘(차압식) 시 폐색물 제거."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:8,q:"다음 중 초음파식 수위계의 특징으로 옳지 않은 것은?",c:["비접촉측정이 가능하고 점도, 밀도에 의한 영향이 없다.","가동부분이 없으므로 비교적 수명이 길다.","액체, 분체, 입체 모두 측정 가능하나, 측정액에 기포가 있으면 오차의 원인이 된다.","피측정체의 밀도의 영향을 받는다."],a:4,e:"④ 피측정체의 밀도의 영향을 받는 것은 차압식, 투입식, 정전용량식이다(초음파식은 밀도 영향 없음)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:9,q:"투입식 수위계의 특징으로 옳지 않은 것은?",c:["피측정체의 밀도의 영향을 받는다.","각종의 탱크에 특별한 공사가 필요없어 간단히 취부할 수 있다.","내식성 환경 내에서는 사용이 곤란하다.","급격한 유체의 흐름이 있는 장소에는 주의를 필요로 한다."],a:3,e:"③ 투입식 수위계는 보수가 간단하고 용이하며 내식성 환경 내에서도 사용이 가능하다(곤란한 것이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:10,q:"수위계 지침이 (-)쪽으로 치우칠 경우의 조치에 대한 설명으로 옳지 않은 것은?",c:["전원(Fuse)이 절단되었을 때는 수위계를 교환한다.","배선이 단선, 단락되었을 때는 점검 및 수리를 한다.","변환기 고장일 때는 수리 또는 교환을 한다.","도압관 내에 공기가 남아 있을 때는 공기를 제거한다."],a:1,e:"① 전원(Fuse)이 절단되었을 때는 전원의 점검, 수리 및 Fuse를 교환한다(수위계 교환이 아님). 수위계 지침이 (+)쪽으로 치우칠 때의 조치: 최대눈금 이상으로 수위가 높을 때 확인, 변환기 고장 시 수리 또는 교환, 영점·억제기구가 동작불량(압력식)일 경우 점검 및 정비."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:11,q:"다음 중 반도체 압력계의 특징으로 옳지 않은 것은?",c:["장기간 안전성이 미약하다.","저압에서 고압까지 측정범위가 넓다.","정전유도 등의 전기적 외란에 대하여 안정성이 있다.","위험성이 있는 곳에서의 사용은 방폭을 고려할 필요가 있다."],a:1,e:"① 반도체 압력계(확산형 반도체식)는 고정도이므로 장기간 안전성이 우수하고 정전유도에 의한 전기적 외란에 대하여 안정성이 있다(미약한 것이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:12,q:"수질계측기의 중앙집중식에 대한 특징으로 옳지 않은 것은?",c:["측정하고자 하는 측정수 펌프 1대를 이용하여 샘플링관에 의해 중앙관리실의 각 수질계측기에 보내어 수질을 계측하고 지시한다.","주로 하·폐수의 측정에 많이 사용된다.","샘플링 관내의 체류시간에 의해 시간지연이 제어계의 문제가 될 수 있으며 특히 약품주입제어계는 보정되어야 한다.","샘플링 관내의 체류에 의한 수질의 변화가 측정오차의 원인이 되므로 정기적으로 관세정을 하여야 한다."],a:2,e:"② 주로 상수측정에 사용된다(하·폐수가 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:13,q:"수질계측기의 측정방식에 대한 설명으로 옳지 않은 것은?",c:["물질정수를 측정하는 것에는 광학측정법, 초음파측정법, 중량측정법이 있다.","전기적 성질을 이용하는 것에는 도전율법, 전극전위법, Polargraph법이 있다.","화학반응을 이용하는 것에는 염소법, 적정법, 생물화학적 반응 등이 있다.","광학측정법에서 수질계기는 오니농도계, 오니계면계가 있다."],a:4,e:"④ 오니농도계, 오니계면계는 초음파측정법의 수질계기이다(광학측정법이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:14,q:"수소이온농도계(pH-Meter)에 대한 설명으로 옳지 않은 것은?",c:["pH는 정수장에서 원수, 혼화수, 여과수 및 정수의 감시와 제어량 및 약품주입의 지표로 사용된다.","자동측정법에 의한 pH계의 방식은 유리전극법과 안티몬전극법이 있으나, 유리전극법이 유지관리가 용이하며 상수도 Process에 사용된다.","유리전극법은 유리전극, 비교전극, 온도보상전극 중 하나가 고장나도 측정이 가능하다.","유리전극법은 유리전극, 비교전극, 온도보상전극이 일체화되어 있어 유지보수 시 간단하다."],a:3,e:"③ 유리전극법은 유리전극, 비교전극, 온도보상전극 중 하나가 고장나면 측정이 불가능하다(가능한 것이 아님). 또 KCl용액을 주입하여야 하고 자동온도보상을 필요로 한다."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:15,q:"탁도계(Turbidity-Meter)에 대한 설명으로 옳지 않은 것은?",c:["탁도는 물의 탁한 정도를 광학적으로 측정하는 기기이며 정수장에서는 원수에 대하여 응집제의 주입비율을 결정하는 인자이다.","표면산란광 측정방식은 시료의 착색에 의한 영향이 크다.","자동측정법에 의한 탁도계의 방식은 투과광측정법, 표면산란광측정법, 투과광산란광 비교측정법, 산란광측정법, 전분구식 측정법이 있다.","표면산란광 측정방식은 유지관리가 용이하고, 상수도 Process에 많이 이용된다."],a:2,e:"② 표면산란광 측정방식은 시료의 착색에 의한 영향이 적다(큰 것이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:16,q:"표면산란방식의 장단점으로 옳지 않은 것은?",c:["입자경에 의한 영향이 크다.","진동에 약하다.","광원변화의 영향을 받지 않는다.","셀룰로이드창이 없으므로 오염에 의한 영향이 없다."],a:3,e:"③ 광원변화의 영향을 받지 않는 것은 투과광산란광방식의 장점이다. 투과광산란광방식의 장점: 시료의 착색에 의한 영향이 적음, 측정액 중 기포가 혼입되지 않도록 주의, 정밀도가 우수, 광원변화의 영향을 받지 않음, 셀룰로이드창이 오염에 의한 영향을 받을 수 있어 자동세정장치 필요."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:17,q:"다음 잔류염소계(Residual Chlorine-Meter)에 대한 설명으로 옳지 않은 것은?",c:["잔류염소계에는 시약식과 무시약식이 있다.","시약식은 유리잔류염소와 결합잔류염소를 시약을 바꿈으로써 분리측정이 가능한 계기이고, 무시약식은 유리잔류염소만을 직접 측정하는 계기이다.","무시약식은 측정수의 pH값 및 전기전도율의 값이 일정한 범위 내에 있어 시약식에 비해 수질에 의한 정도의 제한을 받으므로 주로 여과수 이후의 정수의 측정에 쓰이고 있다.","잔류염소의 측정법에는 토리젠측정법, 요소적정법, 전류적정법 및 Polarograph법이 있으나, 상수도 Process에는 자동측정법에 의한 요소적정법이 이용되고 있다."],a:4,e:"④ 상수도 Process에는 자동측정법에 의한 Polarograph법이 이용되고 있다(요소적정법이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:18,q:"알칼리도계(Alkalinity-Meter)에 대한 설명으로 옳지 않은 것은?",c:["알칼리도계는 전기분해에서 생성된 적정시약을 일정량의 시료수에 반응시켜 당량점에 도달하는 데까지 요구되는 전기량에서 분석치를 구하는 중화적정법을 이용하여 알칼리도를 연속적으로 측정한다.","알칼리도는 수중의 알칼리분의 탄산칼슘에 대한 환산지표이다.","정수장에서는 원수와 침전수 또는 정수를 측정대상으로 한다.","상수도 Process에는 전위차적정방식이 많이 이용된다."],a:4,e:"④ 상수도 Process에는 연속 전량적정법에 의한 중화적정방식을 이용한 알칼리도계방식이 쓰인다(전위차적정방식이 아님). 중화적정 방법: 시료수를 측정조에 보내어 pH 전극으로 측정, 측정조 내 pH가 4.8이 될 때까지 전해를 계속하여 전해에 소요된 전기량을 통해 측정, 전해액 조정 밀도는 ±30% 이내, 정확한 중지점 구하기 어려움."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:19,q:"수온계(Temperature-Meter)에 대한 설명으로 옳지 않은 것은?",c:["상수도시설에서의 수온의 측정은 후처리계통에서 응집제의 주입을 효과적으로 하기 위하여 필요한 계측기이다.","상수도시설의 Process에 많이 이용되는 수온계는 열전대온도계와 저항온도계로 구분된다.","애자형의 특징은 소선이 굵어서 내열성이 크나 급열, 급랭에 약하다.","열전대온도계의 원리는 이중금속의 접속에 온도의 변화에 따라 발생하는 기전력(제백효과)을 측정한다."],a:3,e:"③ 애자형의 특징은 소선이 굵어서 내열성이 크고 급열, 급랭에 강하다. 소선의 기전력 정도는 절연형에 비해 양호하고 소선의 교환이 간단하다는 장점이 있지만 응답의 지연이 있고 소선이 산화되기 쉽다는 단점이 있다(급열·급랭에 약한 것이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:20,q:"열전대온도계의 절연형의 특징으로 옳지 않은 것은?",c:["열전대소선이 금속절연에 의해 보호되므로 소선이 화학반응에 의해 노화되는 경우가 없다.","100℃ 이상의 고온용에서도 반영구적이다.","굴곡이 자유로워 취부에 제약조건이 없다.","MgO으로 인해 절연물의 흡습이 빨라지고 분원기에 의해서 절연저하를 일으키기 쉽다."],a:2,e:"② 절연의 두께가 얇으므로 기계적 강도가 부족해지고, 100℃ 이상의 고온용에서 수명이 짧아진다(반영구적이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:21,q:"화학적 산소요구량계(COD)에 대한 설명으로 거리가 먼 것은?",c:["COD법은 측정대상수 내에 포함된 모든 유기물(몇몇 난분해성 유기물은 제외)을 산화제에 의해 강제분해하는 방법이다. 그러나 미생물의 생체를 구성하는 유기물의 측정은 불가능하다.","산화제로는 과망간산칼륨과 중크롬산칼륨을 사용하는데, 현재 국내에서는 과망간산칼륨을 사용한 방법을 채택하고 있다.","수질오염방지법의 수질총량규제 제도화로 지정지역 내의 사업장의 배수에 대해서 오탁농도와 배출유량에 의한 오탁부하량 측정이 의무 시되고 있다.","총량규제에 있어서는 지정계측법(JIS K0102)에 의한 과망간산칼륨을 사용한 COD값이 오탁농도의 기준이 되고 있다."],a:1,e:"① COD법은 측정대상수 내에 포함된 모든 유기물을 산화제에 의해 강제분해하는 방법이기 때문에 미생물의 생체를 구성하는 유기물도 측정이 가능하다. 그 결과 분해과정에서 산소를 소모하게 되는 현재 유기물과 미래에 산소를 소모하게 될 원인이 되는 미생물 생체를 포함하여 오염물의 농도를 반영할 수 있다(측정 불가능이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:22,q:"박막식 염소가스누출검지기의 특징으로 옳지 않은 것은?",c:["집적회로기술을 이용하여 알루미나 기판의 편면에 백금의 박막히터, 다른 쪽에 백금의 박막전극을 설치하여 이 전극면상에 반도체 박막이 형성되어 있다.","반도체식 센서에 비하여 고감도이며 전계액의 교환이 없이 보수에 우수하다.","비교적 고온으로 동작하고 있어 표면에 자기정화작용이 있고, 재현성과 장기안정성이 우수하다.","유기실리콘을 사용하는 분위기에서도 측정 가능하다."],a:4,e:"④ 유기실리콘을 사용하는 분위기에서는 측정이 불가능하다."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:23,q:"광학식 염소가스누출검지기의 특징으로 옳지 않은 것은?",c:["기밀을 위해 염소를 포함한 공기는 제어기기에 접촉하지 않는다.","공기채취배관 및 배출배관의 총연장이 약 60m를 넘지 않는 범위로 염소농도를 검지하고자 하는 장소에 취부한다.","배관거리가 길어지면 누설에서 검지까지의 시간이 길어진다.","시험지를 정기적으로 교환할 필요가 없다."],a:4,e:"④ 시험지를 정기적으로 교환할 필요가 있다."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:24,q:"감시제어설비의 주요기능에 대한 설명으로 옳지 않은 것은?",c:["감시제어설비의 기능은 맨-머신기능(표시운전부), 프로세스제어기능(감시제어부), 데이터전송기능(시설운영부)으로 분류된다.","맨-머신인터페이스기능은 운영요원의 각 시설의 상황파악은 가능하나 원격조작은 불가능하다.","프로세스제어기능은 시퀀스제어, 대상설비의 프로세스량을 제어하는 연산제어 등의 설비의 구성이나 기능, 운전의 신뢰성을 좌우한다.","데이터전송기능은 각 부하설비와 제어장치, 중앙감시실의 맨-머신기기 간, 제어장치 간 상호의 데이터수집을 행하는 기능을 말한다."],a:2,e:"② 맨-머신인터페이스기능은 운영요원이 감시실에서 각 시설(설비, 기기)의 정보를 수집하여 상황파악과 원격조작을 하는 기능이다(원격조작 불가능이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:25,q:"감시제어설비의 CRT화면의 일반적인 종류와 기능으로 옳지 않은 것은?",c:["그래픽표시 - 시설플로우도, 단선결선도, 설비의 운전, 고장, 이상상태 및 관련된 프로세스값의 표시","그룹화면표시 - 이상, 고장발생 시에 그 공정에 관계되는 모든 데이터를 동일화면에 표시한다.","경보표시 - 조작방법의 설명, 이상, 고장발생 시의 대처방법을 설명·표시한다.","계측값표시 - 시설의 처리상황을 파악하기 위해 관련된 프로세스값을 한 화면에 여러 항목을 동시에 표시한다."],a:3,e:"③ Guide Message표시이다. 경보표시는 설비의 이상, 고장의 내용을 발생시각과 동시에 표시하는 화면이다(조작방법 설명·대처방법은 Guide Message)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:26,q:"다음 중 감시제어설비의 감시방식에 대한 설명으로 옳지 않은 것은?",c:["주요설비의 운전 및 프로세스데이터는 프린터출력이 되도록 하면 되고 영구히 보관할 필요는 없다.","감시반이 있을 경우 전체 계통 및 세부사항을 심벌을 사용하여 표시하고, 주요측정자료는 지시계로 표시한다.","계통의 모든 감시제어항목은 KS 및 수처리 관련 규격에 준한 심벌을 사용하여 표시한다.","주요설비의 기동·정지시는 음성방송 또는 경보음으로 인식할 수 있도록 해야 한다."],a:1,e:"① 주요설비의 운전 및 프로세스데이터는 유지관리의 편의 및 조사연구를 위해 일보, 월보, 연보로 작성되어 프린터출력이 되도록 하고, 그 데이터는 영구히 보관할 수 있도록 한다(보관 불필요가 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:27,q:"감시제어설비의 조작방식으로 맞지 않는 것은?",c:["1단계조작방식은 기측조작반에서 운전조작하는 경우 또는 중앙감시실의 운전조작항목이 적은 경우에 적용한다.","Computer나 감시제어설비의 Operator's Station에서 Keyboard에 의한 운전은 1단조작을 원칙으로 한다.","비상정지, 긴급차단은 기기의 정지조건의 확립에 관계없이 정지·차단되기 때문에 오조작 방지대책을 수립한다.","다단계조작방식은 중앙감시실의 운전조작항목이 비교적 많은 경우에 채용한다."],a:2,e:"② Computer나 감시제어설비의 Operator's Station에서 Keyboard에 의한 설비의 운전은 안전을 위하여 2단조작을 원칙으로 한다(1단조작이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:28,q:"중앙감시제어시스템 중 중앙제어반의 구성에 대한 설명으로 틀린 것은?",c:["정보처리장치로 사용되는 컴퓨터는 데이터처리규모에 따라 퍼스널(Personal)컴퓨터, 워크스테이션(Workstation) 등이 있고, 이용형태에 따라 미니(Mini)컴퓨터, 마이크로(Micro)컴퓨터 등이 있다.","소프트웨어는 감시, 제어, 기록 등의 정보처리에 목적이 있다.","제어용 계산기의 OS(Operating System)는 데이터처리와 병행하여 입출력처리를 하는 멀티태스크(Multi-task)기능과 외부로부터의 처리요구에 고속응답하는 실시간(Real-time)기능이 필요하며 서버형 Window계열이 유리하다.","그래픽판넬감시는 시설의 전반적인 운전상황감시를 주체로 한다."],a:1,e:"① 정보처리장치로 사용되는 컴퓨터는 데이터처리규모에 따라 미니(Mini)컴퓨터, 마이크로(Micro)컴퓨터 등으로 구성되고, 이용형태에 따라 퍼스널(Personal)컴퓨터, 워크스테이션(Workstation) 등으로 구성된다(규모/형태 분류가 뒤바뀜)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:29,q:"텔레메터·텔레컨트롤장치(TM/TC: 원격감시제어장치)에 대한 설명으로 옳지 않은 것은?",c:["원격감시제어장치의 전송방식은 상시 디지털사이클방식, 포링디지털방식을 표준으로 한다.","전송로는 유선식의 경우 자영선, KT전용회선, KT일반회선을 표준으로 한다.","중앙감시제어설비와 용이하게 결합될 수 있는 것으로서, 유무선 백본(Backbone) 지원이 가능하여야 한다.","전송항목이 많으면 장치의 가격이 저렴하므로 피제어소의 규모, 중요도 등에 따라 적절한 운전이 될 수 있도록 한다."],a:4,e:"④ 전송항목이 많으면 그것으로부터 각 부의 상황이 판단되는 것이지만 장치의 가격이 비싸지므로 피제어소의 규모, 중요도 등에 따라 충분한 항목을 선정하여 적절한 운전이 될 수 있도록 해야 한다(가격이 저렴한 것이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:30,q:"취수장감시 및 제어방법에서 자동운전에 대한 설명으로 옳지 않은 것은?",c:["전력피크(Peak)가 초과되지 않도록 최소운전대수는 설정이 가능하여야 한다.","각 대수별 원단위요금을 계산하여 최적의 유량에 설정·운전할 수 있도록 해야 한다.","전기공급카운터를 감안한 수요예측프로그램에 따라서 자동으로 펌프운전시간 설정표가 작성되어야 한다.","펌프운전시간 설정표는 누구나 쉽게 이해할 수 있는 양식이나 그림으로 작성하여야 하며, 필요시 근무자가 쉽게 변경할 수 있도록 작성되어야 한다."],a:1,e:"① 전력피크(Peak)가 초과되지 않도록 최대운전대수는 설정이 가능해야 하며, 최대운전대수 이상을 가동할 경우는 경보음이 울리면서 기동되지 않도록 하여야 한다(최소운전대수가 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:31,q:"취수장 감시 및 제어방법 중 운전에 대한 설명으로 옳지 않은 것은?",c:["펌프의 운전대수제어에 따른 기동·정지순서는 Cyclic Running Sequence Control의 방법으로 이행되어야 한다.","펌프의 최대동시운전은 설계 시 정해진 최대운전대수 이상이 되어야 한다.","자동 시퀀스에서 최초로 정지되는 펌프는 가장 먼저 기동한 펌프이어야 한다.","펌프의 운전 중 이상이 발생하면 그 정도에 따라 운전정지, 경보 혹은 고장을 표시하도록 하여야 한다."],a:2,e:"② 펌프의 최대동시운전은 설계 시 정해진 최대운전대수를 초과해서는 안 된다(이상이 되어야 하는 것이 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:32,q:"약품주입감시제어방법에 대한 설명으로 옳지 않은 것은?",c:["현장수동감시제어방법의 구성품은 약품주입설비(약품펌프, 유량계, 조절밸브, 인버터), 약품주입설비제어Unit(Controller)이다.","현장수동감시제어란 유량변화 및 수질의 변화에 관계없이 현장에서 수동으로 주입량을 설정하여 약품을 주입하는 방식이다.","원격제어감시란 주입률을 현장(RTU 또는 주입설비제어Unit)에서 입력하고, 주입률을 기준으로 유량 및 수질값에 대하여 변화된 양에 비례하여 자동으로 주입량이 결정·주입되는 방식이다.","현장자동감시제어의 설비구성품은 약품주입설비(약품펌프, 유량계, 조절밸브, 인버터), 약품주입설비제어Unit(Controller), 주입지점유량값 전송설비(또는 SCD), RTU(PLC, DCS 등)이다."],a:3,e:"③은 현장자동감시제어에 대한 설명이다(원격제어감시가 아님)."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:33,q:"정수장감시 및 제어의 운전방법으로 옳지 않은 것은?",c:["활성탄은 응급적으로 단기간 사용하고, 중앙제어실에서 자동운전할 수 있도록 하여야 한다.","수동운전은 중앙제어실에서 근무자가 투입기 On-Off조작 및 투입량조절을 임의로 할 수 있어야 한다.","자동운전은 유량값과 수질에 따라 컴퓨터가 자동으로 투입량을 결정제어할 수 있어야 한다.","응집제(ALUM, PAC)는 유입유량, 유입수탁도, 알칼리도, 수온, pH, 침전수탁도 등을 고려하여 미리 프로그램된 패턴(통계 그래프)으로 약품을 투입할 수 있어야 한다."],a:1,e:"① 활성탄은 응급적으로 단기간 사용하고 제거대상 물질의 종류, 농도, 활성탄 흡착 특성 등이 달라 미리 프로그램된 패턴을 사용하기가 곤란하므로 자동운전은 고려치 않고 중앙제어실에서 수동운전할 수 있도록 하여야 한다."},
{g:"b3c10",gt:"[2권] 3과목 10장 계측제어설비운영",s:"설비운영",n:34,q:"염소투입 및 회수펌프제어에 대한 설명으로 옳지 않은 것은?",c:["계측제어기기는 환경조건에 적합한 것으로 필요부분은 내식성을 가지는 것으로 한다.","소독설비의 보안으로는 염소저장소 및 염소주입기실 등에 염소누출검지기 등을 설치하여야 한다.","전염소주입률은 유입유량과 회수유량에 따라 미리 선정된 주입률(임의 선정)에 따라 투입할 수 있도록 하여야 하며, 후염소주입률은 일정잔류염소가 되도록 제어하여야 한다.","회수펌프, 흡입측밸브, 토출측밸브는 탈수기동조정실과 중앙조정실에서 수동이나 자동으로 운전할 수 있도록 하여야 하며 자동운전 시에는 배출수지 수위 - 펌프 - 밸브 간에 연동운전이 되어야 한다."],a:4,e:"④ 회수펌프, 흡입측밸브, 토출측밸브의 자동운전 시에는 배출수지 수위 - 펌프 - 밸브 간에 독립적인 운전이 이루어져야 한다(연동운전이 아님)."},
{g:"b3c11",gt:"[2권] 3과목 11장 안전관리",s:"설비운영",n:1,q:"안전수칙에 대한 설명으로 옳지 않은 것은?",c:["일기조건으로 작업수행이 곤란한 경우에는 작업을 하지 아니한다.","위험한 작업 시에는 안전관리책임자가 입회하도록 하며 특별교육을 실시한다.","작업에 지장을 주는 요인이 있을 경우 작업실시 후에 관리주체의 협조를 얻어 안전조치를 취한 후에 작업을 실시한다.","공공의 안전과 관계가 있을 경우에는 적절한 조치(출입금지, 접근금지 등의 표지판 설치, 교통신호수, 감시인배치 등)를 한다."],a:3,e:"③ 작업에 지장을 주는 요인이 있을 경우에는 작업실시 전에 관리주체의 협조를 얻어 안전조치를 취한 후에 작업을 실시한다(작업실시 후가 아님)."},
{g:"b3c11",gt:"[2권] 3과목 11장 안전관리",s:"설비운영",n:2,q:"산업재해의 보고대상으로 맞는 것은?",c:["사망자가 발생하거나 3일 이상의 휴업이 필요한 부상을 입거나 질병에 걸린 사람이 발생한 경우","사망자가 발생하거나 30일 이상의 휴업이 필요한 부상을 입거나 질병에 걸린 사람이 발생한 경우","사망자가 발생하거나 60일 이상의 휴업이 필요한 부상을 입거나 질병에 걸린 사람이 발생한 경우","사망자가 발생하거나 100일 이상의 휴업이 필요한 부상을 입거나 질병에 걸린 사람이 발생한 경우"],a:1,e:"사업주는 산업재해로 사망자가 발생하거나 3일 이상의 휴업이 필요한 부상을 입거나 질병에 걸린 사람이 발생한 경우에는 해당 산업재해가 발생한 날부터 1개월 이내에 산업재해조사표를 작성하여 관할 지방고용노동관서의 장에게 제출(전자문서로 제출하는 것을 포함)해야 한다(산업안전보건법 시행규칙 제73조)."},
{g:"b3c11",gt:"[2권] 3과목 11장 안전관리",s:"설비운영",n:3,q:"다음 중 안전관리자의 업무가 아닌 것은?",c:["산업안전보건위원회 또는 노사협의체에서 심의·의결한 업무와 해당 사업장의 안전보건관리규정 및 취업규칙에서 정한 업무","안전인증대상기계 등과 자율안전확인대상기계 등 구입 시 적격품의 선정에 관한 보좌 및 지도·조언","해당 사업장 안전교육계획의 수립 및 안전교육 실시에 관한 보좌 및 지도·조언","물질안전보건자료의 게시 또는 비치에 관한 보좌 및 지도·조언"],a:4,e:"④ 물질안전보건자료의 게시 또는 비치에 관한 보좌 및 지도·조언은 보건관리자의 업무이다(산업안전보건법 시행령 제18조, 제22조)."},
{g:"b3c11",gt:"[2권] 3과목 11장 안전관리",s:"설비운영",n:4,q:"다음 중 시설물의 안전 및 유지관리에 관한 특별법의 제정목적으로 볼 수 없는 것은?",c:["국민의 복리증진에 기여","공중의 안전확보","시설물이용자의 편의제공","재해와 재난예방"],a:3,e:"이 법은 시설물의 안전점검과 적정한 유지관리를 통하여 재해와 재난을 예방하고 시설물의 효용을 증진시킴으로써 공중의 안전을 확보하고 나아가 국민의 복리증진에 기여함을 목적으로 한다(시설물의 안전 및 유지관리에 관한 특별법 제1조). '이용자의 편의제공'은 해당 없음."},
{g:"b3c11",gt:"[2권] 3과목 11장 안전관리",s:"설비운영",n:5,q:"MSDS의 작성원칙으로 옳지 않은 것은?",c:["물질안전보건자료는 한글로 작성하는 것을 원칙으로 하되 화학물질명, 외국기관명 등의 고유명사는 영어로 표기할 수 있다.","MSDS는 화학물질로부터의 사고를 미연에 방지하기 위한 것으로 화학물질의 개별성분에 관한 정보가 잘 나타나 있어야 한다.","외국어로 되어 있는 MSDS를 번역하는 경우에는 자료의 신뢰성이 확보될 수 있도록 최초 작성기관명 및 시기를 함께 기재하여야 한다.","다른 형태의 관련 자료를 활용하여 물질안전보건자료를 작성하는 경우에는 참고문헌의 출처를 기재하여야 한다."],a:2,e:"② MSDS는 화학물질로부터의 사고를 미연에 방지하기 위한 것으로 화학물질의 개별성분에 관한 정보보다 혼합물 전체의 관련 정보가 잘 나타나 있어야 한다(화학물질의 분류·표시 및 물질안전보건자료에 관한 기준 제11조)."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:1,q:"유체의 정의를 올바르게 설명한 것은?",c:["유동하는 물질은 모두 유체라고 한다.","유동하는 물질 중에 전단력이 생기지 않고 비압축성인 물질을 유체라고 한다.","극히 작은 전단력이라 할지라도 물질 내부에 전단력이 생기면 정지 상태로 있을 수 없는 물질을 유체라고 한다.","용기 안에 충만될 때까지 항상 팽창하는 물질을 말한다."],a:3,e:"유체의 정의: 흐르는 물질이며, 액체와 기체를 일괄하여 유체라고 한다. 압축이나 인장력 하에서만 고체와 같은 탄성을 가지고, 아무리 작은 전단응력을 받을지라도 항상 연속적으로 변형하는 물질을 유체라고 한다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:2,q:"다음 중 L·atm은 무엇을 나타내는 단위인가?",c:["힘","에너지","체적","표면장력"],a:2,e:"w(에너지) = Δv(부피) × p(압력). 1L=10⁻³m³, 1atm=1,013hPa=101,325Pa=101,325N/m³. 따라서 L·atm은 에너지의 단위이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:3,q:"물의 용매성에 대한 설명이 바르게 된 것은?",c:["고체는 물의 온도가 높을수록 용해도가 감소한다.","기체는 물의 온도가 높을수록 용해도가 감소된다.","고체, 기체 모두 물의 온도가 높을수록 용해도가 증가된다.","고체, 기체 모두 물의 온도가 높을수록 용해도가 감소된다."],a:2,e:"② 대체로 고체, 액체는 온도가 높을수록 용해도가 높지만 기체의 용해도는 그렇지 않다. 온도가 높으면 기체의 운동에너지가 증가하고 용매에서 더 많은 기체가 빠져 나오게 하기 때문에 높은 온도에서 액체에 녹는 기체의 용해도는 감소된다. 헨리의 법칙."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:4,q:"중력가속도가 9.5m/s²인 곳에서 5kg의 질량은 얼마인가?",c:["7.16kg","8.16kg","9.16kg","5.16kg"],a:4,e:"m = (5kg × 9.8m/s²)/(9.5m/s²) = 5.16kg"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:5,q:"다음 중 물의 점성과 관계없는 것은?",c:["완전유체","유동성","내부마찰","압력과 온도"],a:1,e:"물의 점성은 유체분자가 상대적인 운동을 할 때 유체분자 간 또는 유체분자와 고체경계면 사이에 마찰력을 유발시키는 성질이다. 완전유체(이상유체)는 비점성, 비압축성인 가상적인 유체이다(점성과 무관)."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:6,q:"다음 중 물의 압축성과 가장 관계가 적은 것은 어느 것인가?",c:["공기함유량","온도","압력","단위중량"],a:4,e:"물의 압축성은 공기함유량, 온도, 압력에 관계된다. 단위중량은 압축성과 가장 관계가 적다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:7,q:"실제유체에서만 발생하는 현상이 아닌 것은 어느 것인가?",c:["박리현상(Seperation)","경계층","마찰에 의한 에너지손실","압력의 전달"],a:4,e:"④ 압력의 전달은 모든 유체에서 발생한다. 실제유체에서는 경계면으로부터 이탈하는 박리현상이 일어나고, 점성 때문에 마찰전단응력이 생겨 경계면에서 유속이 0이 되며, 경계층이 형성된다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:8,q:"다음 중 수리학적 계산에서 보통 취급하는 물의 성질에 대한 설명으로 틀린 것은?",c:["물의 비중은 기름의 비중보다 크다.","해수도 담수와 같은 단위무게로 취급한다.","물은 보통 완전유체로 취급한다.","물의 비중량은 보통 1g/cc = 1,000kg/m³ = 1t/m³를 쓴다."],a:2,e:"② 해수는 담수와 다른 단위무게로 취급한다(해수 비중 약 1.025). 물은 극성분자로서 좋은 용매이며 녹는점(0℃) 부근에서 고체(얼음)보다 액체(물)의 밀도가 더 크다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:9,q:"깊이 8,000m의 바다 밑에서 물의 압력은 몇 kg/cm²인가?(단, 바닷물의 비중은 1.03임)",c:["8.24×10⁶","84×10⁶","824","800"],a:3,e:"P = γ·H = 1.03 × 1,000kg/m³ × 8,000m = 8.24×10⁶(kg/m²) = 824kg/cm²"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:10,q:"밀도 84lb/ft³의 액체의 비중은 얼마인가?",c:["2.35g/cm³","3.35g/cm³","2.85g/cm³","1.35g/cm³"],a:4,e:"1lb=454g, 1ft=30.48cm, 4℃ 물의 밀도는 1g/cm³\n∴ 비중 = (84×454)/(30.48)³ = 1.35g/cm³"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:11,q:"표준대기압은 평균해면에서 대기가 지구표면을 누르는 평균압력을 말하는데, 1기압의 크기를 표현한 것으로 알맞지 않은 것은?",c:["760mmHg","1.033kg/cm²","101,332N/m²","145psi"],a:4,e:"1atm(표준대기압): 760mmHg, 10,332mmH₂O, 1.0332kg/cm², 14.5psi, 101,332N/m², 1,013hPa, 1,013mbar. 145psi가 아니라 14.5psi이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:12,q:"다음 중 상온에 있는 물의 성질로 틀린 것은?",c:["온도가 증가하면 동점성 계수는 감소한다.","온도가 증가하면 점성 계수는 감소한다.","온도가 증가하면 표면장력은 증가한다.","온도가 증가하면 체적탄성 계수는 증가한다."],a:3,e:"③ 온도가 증가하면 분자의 운동이 활발해지므로 점성 계수, 표면장력 등이 감소하게 된다(표면장력 증가가 아님)."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:13,q:"다음 중 물의 점성 계수에 대한 설명으로 옳은 것은?",c:["수온이 높을수록 점성 계수는 크다.","수온이 낮을수록 점성 계수는 크다.","4℃에 있어서 점성 계수는 가장 크다.","수온에는 관계없이 점성 계수는 일정하다."],a:2,e:"점성 계수는 수온과 반비례한다(수온이 낮을수록 점성 계수가 크다)."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:14,q:"어떤 액체의 동점성 계수가 0.0019m²/s이고, 비중이 1.2일 때 이 액체의 점성계수는?",c:["228kg/m·s","228kg·s²/m²","0.233kg/m²·s","0.233kg·s/m²"],a:4,e:"비중 = 물체의 단위중량/물의 단위중량, 1.2 = w/1 ∴ w=1.2ton/m³\nν = μ/ρ = μ/(w/g), 0.0019m²/s = μ/(1.2ton·m³ ÷ 9.8m/s²)\nμ = (0.0019×1,200)/9.8 = 0.233kg·s/m²"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:15,q:"다음 중 무차원량(無次元量)이 아닌 것은?",c:["프루드수(Froude Number)","에너지보정계수","동점성계수","레이놀즈수"],a:3,e:"③ 동점성계수 ν = μ/ρ cm²/s = (ML⁻¹T⁻¹)/(ML⁻³) = L²T⁻¹로 차원을 가지므로 무차원량이 아니다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:16,q:"질량 1g의 물체에 1cm/s²의 가속도를 일으키게 하는 힘의 크기는 어느 것인가?",c:["1dyne","1N","1poundal","1erg"],a:1,e:"① 1dyne은 질량 1g의 물체에 1cm/s²의 가속도를 일으키게 하는 힘이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:17,q:"용적 V=4.8m³인 유체의 중량 W=6.38ton일 때 이 유체의 밀도(ρ)를 구하면?",c:["135.6kg·s²/m⁴","125.6kg·s²/m⁴","115.6kg·s²/m⁴","105.6kg·s²/m⁴"],a:1,e:"ρ = m/V = w/g, w = W/V = 6.38/4.8 = 1.329ton/m³\n∴ ρ = w/g = 1.329/9.8 = 135.6kg·s²/m⁴"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:18,q:"물의 밀도를 공학단위로 표시하면?",c:["1,000kg/m³","9,800kg/m³","1,000kg·s²/m⁴","102kg·s²/m⁴"],a:4,e:"ρ = w/g = 1,000kg/m³ ÷ 9.8m/s² = 102kg·s²/m⁴"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:19,q:"20m×10m의 직사각형 선박의 중앙에 코끼리를 태웠더니 1cm 만큼 가라앉았다. 코끼리의 무게는?(단, 해수의 비중은 1.025임)",c:["1.85ton","2.00ton","2.05ton","2.25ton"],a:3,e:"W = 20 × 10 × 0.01 × 1.025 = 2.05ton (부력 = 잠긴 부피 × 해수 비중)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:20,q:"어떤 물체가 공기 중에서 27kg이고, 물속에서는 18kg일 때 이 물체의 비중은?",c:["2.95","3.0","3.17","2.0"],a:2,e:"W = W' + B에서 B(부력) = W - W' = 27 - 18 = 9kg\n∴ s = 27/9 = 3.0 (비중 = 공기중무게/부력)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:21,q:"부피 V cm³의 돌이 물속에서 무게가 Wg이었다면 이 돌의 비중은?(단, W₀: 물의 단위중량)",c:["(V+W·W₀)/(V·W₀)","(V·W₀+W)/(V·W₀)","(W·W₀)/(V·W₀+W)","(V·W₀)/(V·W₀+W)"],a:2,e:"돌의 비중 = 돌의 무게/물의 무게 = (돌의 수중무게+부력)/물의 무게 = (V·W₀+W)/(V·W₀)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:22,q:"다음 중 단위중량이 물보다 큰 것은?",c:["메틸벤젠","사염화탄소","톨루엔","알코올"],a:2,e:"염화물질은 단위중량이 1보다 크다. 사염화탄소 밀도 1.6g/cm³ > 물(4℃) 1.0g/cm³. 톨루엔·알코올·아세톤 등은 1보다 작다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:23,q:"모세관현상에서 유리관을 통하여 하강한 수은의 설명으로 옳은 것은?",c:["응집력보다 부착력이 크다.","응집력보다 내부저항력이 크다.","부착력보다 응집력이 큰 경우이다.","접촉각 < θ/2이며, h>0인 경우이다."],a:3,e:"부착력 > 응집력: 수은이 유리관벽에 상승한 경우 / 부착력 < 응집력: 수은이 유리관벽에 하강한 경우. 수은 하강은 응집력이 부착력보다 큰 경우이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:24,q:"어떠한 경우라도 전단응력 및 인장력이 발생하지 않으며 전혀 압축되지도 않고 h_L=0인 유체를 무엇이라 하는가?",c:["소성 유체","점성 유체","탄성 유체","완전유체"],a:4,e:"④ 완전유체(Perfect Fluid)는 비점성, 비압축성 유체이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:25,q:"다음 중 이상유체의 정의를 옳게 내린 것은?",c:["점성이 없고 PV=RT를 만족하는 유체","점성이 없는 모든 유체","점성이 없고 비압축성인 유체","τ=μ·(dV/dY)를 만족하는 비압축성인 유체"],a:3,e:"이상유체(완전유체): 비점성, 비압축성 유체 / 실제유체: 점성, 압축성 유체."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:26,q:"완전유체에 대한 베르누이의 정리에 있어서 필요 없는 것은?",c:["속도수두","위치수두","손실수두","압력수두"],a:3,e:"완전유체는 비점성 유체로서 흐름이 있을 때 에너지의 손실이 일어나지 않으므로 손실수두는 0이 된다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:27,q:"물(H₂O)의 끓는점이 황화수소의 끓는점보다 높은 주된 이유는?",c:["황화수소가 물보다 분자량이 크기 때문이다.","분자 간의 반데르발스 힘의 차이 때문이다.","분자 간의 용해도의 차이 때문이다.","분자 간의 수소결합 세기의 차이 때문이다."],a:4,e:"물분자는 황화수소분자보다 극성이 더 강하다. 따라서 물분자 사이에는 강한 정전기적 인력이 작용하므로 더 강한 수소결합으로 분자들이 결합되어 있어 끓는점이 높다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:28,q:"액체와 기체와의 경계면에 작용하는 분자 간의 인력에 의한 힘은?",c:["모관현상","점성력","표면장력","내부마찰력"],a:3,e:"③ 표면장력: 보통 액체표면에 나타나는 현상이며 액체와 기체 또는 액체와 액체 간에도 일어난다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:29,q:"물방울의 지름을 d, 표면장력의 크기를 σ, 물방울 내외부의 압력차를 ΔP라고 할 때 그 상관식이 옳은 것은?",c:["ΔP = σ/d","ΔP = 2σ/d","ΔP = 4σ/d","ΔP = σ/πd"],a:3,e:"σπd = ΔP·(πd²/4)에서 ΔP = 4σ/d"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:30,q:"다음 중 차원방정식으로 옳지 않은 것은?",c:["밀도 - FL⁻⁴T²","동점성 계수 - L²T⁻¹","점성 계수 - ML⁻¹T⁻¹","일, 에너지 - ML"],a:4,e:"④ 일, 에너지의 차원방정식은 FL(=ML²T⁻²)이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:31,q:"다음 중 차원방정식 [LMT]계를 [LFT]계로 고치고자 할 때 이용되는 식은 어느 것인가?",c:["M = LFT","M = L⁻¹FT²","M = LFT²","M = L²FT"],a:2,e:"Newton의 제2법칙 F=ma에서 F = M(LT⁻²) = MLT⁻² ∴ M = L⁻¹FT²"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:32,q:"점도의 CGS단위는 어느 것인가?",c:["dyne·cm/s²","kg/m³·s","dyne·cm/s","g/cm·s"],a:4,e:"점도의 단위, 즉 1poise = 1g/cm·s"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:33,q:"비중 0.8인 유체의 동점도가 2stokes라면 절대점도는 몇 poise인가?",c:["2.6poise","1.9poise","1.7poise","1.6poise"],a:4,e:"ν = μ/ρ에서 μ = νρ = 2 × 0.8 = 1.6poise"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:34,q:"다음은 수압강도 p의 차원이다. 옳은 것은?",c:["MLT⁻²","ML²T⁻²","MLT⁻³","ML⁻¹T⁻²"],a:4,e:"수압강도 p = w·h이다. 차원으로 표시하면 FL⁻³×L = FL⁻². FLT계를 MLT계로 바꾸면 F=MLT⁻²이므로 FL⁻² = MLT⁻²×L⁻² = ML⁻¹T⁻²"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:35,q:"다음 중 유량의 차원은 어느 것인가?",c:["LT⁻¹","ML⁻³","L³T⁻¹","L²T⁻¹"],a:3,e:"유량 Q = A·V = L²·LT⁻¹ = L³T⁻¹"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:36,q:"다음 중 국제표준단위(SI단위)의 기본단위가 아닌 것은?",c:["길이 - m(미터)","힘 - kgf(킬로그램중)","시간 - s(초)","질량 - kg(킬로그램)"],a:2,e:"② 힘은 m·kg·s²(N)을 사용한다. kgf는 SI 기본단위가 아니다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:37,q:"A, B, C, D 점에서의 압력강도를 각각 Pa, Pb, Pc, Pd라 할 때의 사항으로 옳지 않은 것은?",c:["Pc > Pd","Pc > Pa","Pa > Pb","Pd > Pb"],a:1,e:"수압 P = w·h이므로 수심 h가 클수록 수압이 크다. Pd > Pc > Pa > Pb이므로 ①(Pc > Pd)은 틀리다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:38,q:"대기압을 무시한 압력을 무엇이라 하는가?",c:["정압력","부압력","절대압력","계기압력"],a:4,e:"④ 계기압력: 대기압을 무시한 압력기계에 의해 측정이 가능한 압력"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:39,q:"관로의 어느 지점에서 압력계의 압력이 1.5kg/cm²일 때 이 지점의 절대압력은 얼마인가?(단, 표준대기압 = 1.033kg/cm²)",c:["15.33ton/m²","5.33ton/m²","1.53ton/m²","25.33ton/m²"],a:4,e:"절대압력 = 대기압력 + 계기압력 = 1.033kg/cm² + 1.5kg/cm² = 2.533kg/cm² = 25.33ton/m²"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:40,q:"그림과 같은 수압기에서 A, B의 단면의 지름이 각각 30cm, 120cm이다. A에서 P₁=1.0ton으로 누르면 B에는 얼마만한 힘이 생기겠는가?",c:["P₂ = 1/16 ton","P₂ = 4.0ton","P₂ = 3.0ton","P₂ = 16.0ton"],a:4,e:"P₁/A₁ = P₂/A₂ ∴ P₂ = (A₂/A₁)×P₁ = (π/4×120²)/(π/4×30²)×1 = 16ton"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:41,q:"그림에서 2ton의 자동차를 들어 올리는 데 필요한 힘은?(단, 피스톤의 단면적은 각각 400cm², 10cm²이고 피스톤의 마찰은 무시된다)",c:["49.0kg","50.0kg","52.5kg","55.0kg"],a:2,e:"P₁/A₁ = P₂/A₂에서 P₂ = (A₂/A₁)P₁ = (10/400)×2,000 = 50kg"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:42,q:"정수압의 성질을 설명한 것으로 틀린 것은?",c:["정수 중에 작용하는 힘은 마찰력과 압력이다.","정수압의 크기는 단위면적에 작용하는 힘의 크기로 표시한다.","정수 중의 임의의 한 점에 작용하는 정수압의 강도는 방향에 관계없이 동일하게 작용한다.","정수압은 작용면에 대하여 물체표면에 수직으로만 작용한다."],a:1,e:"① 정수 중의 유체는 상대적인 운동 및 점성이 없으므로 마찰력이 없다. 정수압은 수심에 비례하고, 면에 수직으로 작용하며, 한 점에 작용하는 정수압은 방향에 관계없이 크기가 일정하다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:43,q:"다음 중 정지하고 있는 수중에 작용하는 정수압의 성질로 옳지 않은 것은?",c:["정수압의 크기는 깊이에 비례한다.","한 점의 정수압은 방향에 따라 다르다.","정수압은 단위면적에 작용하는 압력의 크기로 나타낸다.","정수압은 물체의 면에 직각으로 작용한다."],a:2,e:"② 한 점에 작용하는 정수압은 모든 방향에서 크기가 같다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:44,q:"그림과 같은 삼각형의 단면(폭 3.0m, 수면에서 정점까지 1.0m, 높이 3.0m)이 받는 총수압의 크기는?",c:["11.25ton","13.50ton","16.01ton","21.32ton"],a:2,e:"P = w·h_G·A = 1×(1+2)×(½×3×3) = 13.50ton (삼각형 도심은 정점에서 아래로 2m, 수면에서 1+2=3m)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:45,q:"어느 지점에서 압력계를 이용하여 압력을 측정한 결과 1.5kg/cm²이었다. 이 지점의 압력수두는 얼마인가?",c:["25m","150m","0.15m","15m"],a:4,e:"수두 = 압력/단위중량 = 1.5kg/cm²/(1,000kg/m³) = 15,000kg/m²/(1,000kg/m³) = 15m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:46,q:"관로 내 어느 지점에서 압력계를 측정한 결과 압력이 2.0kg/cm²이고 표고가 10.0m일 때 이 지점에서의 동수두는?",c:["25m","50m","20m","30m"],a:4,e:"동수두 = 압력수두 + 위치수두 = 20.0m + 10.0m = 30.0m (압력수두 = 2kg/cm²/1,000kg/m³ = 20.0m)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:47,q:"관로 내 어느 지점에서 압력계를 측정한 결과 압력이 2.0kg/cm², 유속이 3.1m/s이고 표고가 10.0m일 때 이 지점에서의 전수두(또는 에너지수두)는?",c:["25m","50m","20.5m","30.5m"],a:4,e:"전수두 = 압력수두 + 위치수두 + 속도수두 = 20.0 + 10.0 + 0.5 = 30.5m (속도수두 = V²/2g = 3.1²/19.6 ≈ 0.5m)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:48,q:"유체 속에 잠겨진 곡면에 작용하는 수평분력은?",c:["곡면의 연직상방에 실려 있는 액체의 무게와 같다.","곡면에 의해 배제된 액체의 무게와 같다.","곡면중심에서의 압력과 면적의 곱과 같다.","곡면에 대해 수직인 면의 투영한 면에 작용하는 힘과 같다."],a:4,e:"전수압의 수평분력은 수평방향의 연직투영면에 작용하는 전수압과 동일하며, 연직분력은 경사평면을 밑면으로 하는 물기둥의 무게와 같다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:49,q:"수면의 높이가 10m로 항상 일정한 탱크의 바닥에 5mm의 구멍이 났을 경우 이 구멍을 통한 유체의 유속은 몇 m/s인가?",c:["12m/s","13m/s","15m/s","14m/s"],a:4,e:"유속 u = √(2gH) = √(2×9.8×10) = 14m/s (토리첼리 정리)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:50,q:"직경이 800mm인 관로를 통하여 1일 50,000m³의 물을 공급할 경우 관로의 평균유속(m/s)은 얼마인가?",c:["4.15m/s","3.15m/s","2.15m/s","1.15m/s"],a:4,e:"A = πD²/4 = 3.14×0.8²/4 = 0.5024m². Q = 50,000÷86,400s/day = 0.5787m³/s. V = Q÷A = 0.5787÷0.5024 = 1.1518 ≈ 1.15m/s"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:51,q:"2종류의 혼합되지 않는 액체가 들어 있고 폐합단에는 공기가 남아 있는 용기에서 각 점에 대한 수압계산식이 잘못된 것은?",c:["P_B = w₁h₁","P_C = P_D = w₁h₁ + w₂h₂","P_E = w₁h₁ + w₂(h₂-h₁)","P_A = 0"],a:3,e:"③ P_E = w₁(h₁ + h₂ - h₃)이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:52,q:"수면과 경사각이 45°를 이루는 제방의 측면에서 수면에서 도심까지 5m가 되는 원통형 수문(지름 4m, 폭 2m)이 있을 때 이에 작용하는 전수압은?",c:["10.01ton","11.45ton","12.11ton","11.10ton"],a:4,e:"수문은 경사지게 설치되어 있으나 전수압은 일반적인 경우와 마찬가지이다. P = w·h_G·A = 1×5×sin45°×(π·2²/4) = 11.10ton"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:53,q:"물이 들어 있는 뚜껑이 없는 수조가 4.9m/s²으로 수직상향으로 가속되고 있을 때 깊이 3m에서의 압력을 구한 값은?",c:["3.0ton/m²","2.0ton/m²","1.5ton/m²","4.5ton/m²"],a:4,e:"연직상향의 가속도를 받는 수압 P = w·h·(1 + a/g) = 1×3×(1 + 4.9/9.8) = 4.5ton/m²"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:54,q:"지름이 20cm인 노즐에서 20m/s의 유속으로 물이 수직판에 직각으로 충돌할 때 판에 주는 압력은?(단, 수평분력 P_H, 수직분력 P_V임)",c:["P_H = 1.28ton, P_V = 0ton","P_H = 2.28ton, P_V = 0ton","P_H = 1.28ton, P_V = 1.0ton","P_H = 2.28ton, P_V = 1.0ton"],a:1,e:"Q = (π×0.2²/4)×20 = 0.628m³/s. P_H = ρ·Q·(V₂ₓ - V₁ₓ) = (1/9.8)×0.628×20 = 1.28ton, P_V = 0ton"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:55,q:"높이 5m, 폭 4m의 직사각형 수문이 수직으로 설치되어 있다. 물이 수문의 윗단까지 차 있다고 하면 이 수문에 작용하는 전수압은?",c:["55ton","52.5ton","50ton","40ton"],a:3,e:"P = w·h_G·A = 1×(5/2)×5×4 = 50ton"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:56,q:"직사각형 평면에 작용하는 정수압에 적당한 평면의 폭은?(단, P는 정수압, w₀는 물의 단위중량, H는 평면의 높이, b는 평면의 폭임)",c:["b = w₀·H_G·A","b = w₀·H_C·A","b = 2P/(w₀·H_C²)","b = 2P/(w₀·H²)"],a:4,e:"전수압의 크기는 수압 분포도의 면적과 같으므로 P = w₀·H_G·A = w₀·(H/2)·bH ∴ b = 2P/(w₀·H²)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:57,q:"직경이 10cm인 단면에 유속 40m/s의 분류가 관에 충돌하여 90°로 구부러질 때 관에 작용하는 힘은?",c:["1.30ton","1.32ton","1.8ton","1.28ton"],a:4,e:"F = (w/g)QV = (w/g)AV² = (1/9.8)×(π×0.1²/4)×40² = 1.28ton"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:58,q:"1/4원의 벽면에 면하여 유량 Q=0.05m³/s로 A₁=A₂=200cm²인 단면에 따라 흐를 때 벽면에 작용하는 힘은?",c:["0.012ton","0.018ton","0.12ton","0.18ton"],a:2,e:"V = Q/A = 0.05/(200×10⁻⁴) = 2.5m/s. P_x = (1/9.8)×0.05×2.5 = 0.013ton, P_y = -0.013ton. P = √(P_x²+P_y²) = √(0.013²+0.013²) = 0.018ton"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:59,q:"면적비 A/a=1,000, L/l=5로 하며, P=1kg의 힘이 가해질 때 Q의 힘은?",c:["4.0ton","4.3ton","5.3ton","5.0ton"],a:4,e:"단면적 a에 작용하는 힘을 P'라 하면 PL=P'l에서 P'=(L/l)P. Q/A=P'/a에서 Q=(A/a)P'=(A/a)×(L/l)×P = 1,000×5×1 = 5,000kg = 5.0ton"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:60,q:"직경 4m의 원판이 연직으로 수중에 잠겨 있다. 원판의 상단이 수면의 1m 아래에 위치해 있을 경우 원판에 작용하는 전수압과 중심위치는?",c:["P=37.68ton, h_c=3.33m","P=25.12ton, h_c=3.33m","P=37.68ton, h_c=2.5m","P=40.28ton, h_c=2.8m"],a:1,e:"P = w·h_G·A = 1×3×(π·4²/4) = 37.68ton (도심 h_G = 1+2 = 3m). h_C = h_G + I₀/(h_G·A) = 3 + (π·4⁴/64... )/(3·πd²/4) = 3.33m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:61,q:"다음 중 부체에 대한 설명으로 틀린 것은?",c:["경심은 부심과 물체의 중심선과의 교점이다.","수중 물체는 부심이 중심보다 상부에 있을 경우 안정하다.","경심이 중심보다 상부에 있을 때 안정하다.","수면에 떠 있는 물체의 경우 경심이 중심보다 아래에 있을 때 불안정하다."],a:2,e:"② 물체의 안정은 경심이 무게중심보다 위에 위치할 때 가능하다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:62,q:"다음 중 부체의 안정성을 조사할 때 사용하는 용어로 틀린 것은?",c:["경심","수심","부심","중심"],a:2,e:"부체 안정조건 용어: 경심(M), 부심(C), 중심(G). 안정: MG>0(M이 G 위), 중립: MG=0, 불안정: MG<0(M이 G 아래). '수심'은 부체 안정성 용어가 아니다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:63,q:"비중이 0.92인 빙산이 비중 1.025의 해수에 떠 있다. 수면 위로 나온 빙산의 체적이 180m³이면 빙산 전체의 체적은?",c:["1,464m³","1,757m³","976m³","876m³"],a:2,e:"wV = w'(V-180)에서 0.92V_t = 1.025(V_t-180) ∴ V_t = (1.025×180)/(1.025-0.92) = 1,757m³"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:64,q:"빙산의 해수면 윗부분 체적이 102.45m³일 때 빙산 전체의 체적은?(단, 빙산의 비중은 0.92, 해수의 비중은 1.025이다)",c:["850m³","878m³","1,000m³","1,932m³"],a:3,e:"0.92×V = 1.025×(V-102.45) ∴ V = (1.025×102.45)/0.105 = 1,000m³"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:65,q:"길이 5m인 원기둥(비중 0.6)을 수중에 수직으로 띄웠을 때, 원기둥이 전도되지 않도록 하는 데 필요한 지름은?",c:["2m 이상","4m 이상","7m 이상","9m 이상"],a:3,e:"부체 안정조건 I_x/V > GC. d = (r/w)·h = (0.6/1)×5 = 3.0m, GC = ½×(5-3) = 1m. I_x/V = (πD⁴/64)/((πD²/4)·d) = D²/(16d) = D²/48 > 1 ∴ D > 4√3 ≈ 7m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:66,q:"폭 4m, 길이 5m, 무게 40ton의 물체가 해수 중에 떠 있을 경우 흘수는?(단, 해수의 비중은 1.025)",c:["1.731m","1.824m","1.951m","2.004m"],a:3,e:"W=B에서 rAh=wAd, d = W/(wA) = 40/(1.025×4×5) = 1.951m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:67,q:"부체가 안정한 경우의 조건에 대한 설명으로 알맞은 것은?(단, C는 부심, V는 배수용적, I_x는 부양면에 대한 단면 2차 모멘트이다)",c:["경심 M이 부체의 중심 G와 같은 경우","부양면에 대한 단면 2차 모멘트가 CG와 같은 경우","I_x/V > CG인 경우","부양면에 대한 단면 2차 모멘트가 가장 작은 경우"],a:3,e:"부체안정 판별식 - 안정조건: I_x/V > CG, 중립조건: I_x/V = CG, 불안정조건: I_x/V < CG"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:68,q:"부체는 일반적으로 어떤 경우에 기울어지기 쉬운가?",c:["부양면에 대한 단면 1차 모멘트가 작을수록","부양면에 대한 단면 1차 모멘트가 클수록","부양면에 대한 단면 2차 모멘트가 작을수록","부양면에 대한 단면 2차 모멘트가 클수록"],a:3,e:"③ 부양면에 대한 단면 2차 모멘트(I_x)가 작을수록 I_x/V가 작아져 불안정해지므로 기울어지기 쉽다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:69,q:"유속 1.5m/s로 10,000m³/day의 물을 흐르게 하는 데 필요한 원형관의 직경(내경)을 구한 것으로 옳은 것은?",c:["253mm","213mm","153mm","313mm"],a:4,e:"Q = AV = (πD²/4)·V. 10,000m³/86,400s = (πD²/4)×1.5 ∴ D = 0.313m = 313mm"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:70,q:"다음 중 유적선에 대한 설명으로 옳은 것은?",c:["물의 분자가 이동하는 운동경로를 그렸을 때 이것을 유적선이라 한다.","정류흐름에서 유선형의 시간적 변화가 없기 때문에 유적선과 유선은 일치하지 않는다.","부정류에서는 운동상태가 변화하므로 유적선과 유선은 일치한다.","흐름 중에 하나의 폐곡선을 생각하고 그 곡선상의 각 점에서 유선을 그리면 유선은 하나의 관모양이 되며, 이때의 가상적인 관을 말한다."],a:1,e:"① 유적선: 물의 분자가 이동하는 운동경로. ②정류 흐름에서는 유적선과 유선이 일치, ③부정류에서는 일치하지 않음, ④는 유관에 대한 설명."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:71,q:"A지역의 급수용 배수본관의 직경은 1m이다. 급수인구가 4배로 증가하여 총급수량도 4배로 증가할 때 급수용 배수본관의 직경은?(단, 유속은 변경하지 않는다고 생각함)",c:["0.5m","1.0m","2.0m","3.0m"],a:3,e:"4Q₁ = Q₂. 4·(π·1²/4)×V₁ = (π·D²/4)×V₂. V₁=V₂이므로 D²=4 ∴ D=2m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:72,q:"다음 중 정류에 대한 설명으로 옳지 않은 것은?",c:["흐름의 상태가 시간에 관계없이 일정하다.","어느 단면에서나 유속이 균일해야 한다.","유선과 유적선이 일치한다.","유선에 따라 유속은 다를 수 있다."],a:2,e:"② 정류(Steady Flow)는 어느 한점에서 시간이 경과함에 따라 흐름의 특성(유속·압력·밀도)이 변하지 않는 흐름이며, 단면마다 유속이 균일할 필요는 없다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:73,q:"어떤 유체의 유선을 그려서 흐름의 모양을 알 수 있는 경우는?",c:["정류에 한한다.","정류와 부정류 모두 해당된다.","흐름상태가 시작되면 유선과 유적선은 일치하지 않는다.","물의 각 입자에 대한 속도벡터를 말한다."],a:1,e:"① 정류는 시간에 따라 유체의 특성이 변하지 않으므로 유선으로 흐름의 모양을 알 수 있다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:74,q:"유속 V, 시간 t, 위치로 표시하는 요소를 l이라고 할 때 옳지 않은 것은?",c:["∂V/∂t=0, ∂V/∂l≠0 (부등류)","∂V/∂t≠0, ∂V/∂l=0 (부정류)","∂V/∂t=0, ∂V/∂l=0 (등류)","∂V/∂t=0 (정류)"],a:2,e:"② ∂V/∂t≠0이면 부정류이지만 ∂V/∂l=0은 등류조건이므로 결합이 잘못됐다. (부정등류로 표기해야 옳음)"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:75,q:"층류와 난류를 구분할 수 있는 것은?",c:["Reynolds수","한계구배","한계수심","Mach수"],a:1,e:"층류와 난류는 Reynolds수에 의해 구별된다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:76,q:"지름 10cm의 관에 물이 흐를 때 층류가 되자면 관의 평균유속이 몇 cm/s 이하를 유지하여야 하는가?(단, 동점성 계수는 0.012cm²/s이다)",c:["10cm/s","8cm/s","6.4cm/s","2.4cm/s"],a:4,e:"층류영역은 Re ≤ 2,000. Re = V·D/ν = V×10/0.012 ≤ 2,000 ∴ V ≤ 2.4cm/s"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:77,q:"지름 10cm의 관내를 유량 Q가 100cm³으로 흐를 경우 레이놀즈(Reynolds)수를 구한 값은?(단, 점성 계수 μ=0.0123g/cm·s, 밀도 ρ=1g/cm³)",c:["946","1,036","2,086","2,256"],a:2,e:"Re = VD/ν = ρVD/μ. V = Q/A = 100/(π×10²/4). Re = (100/(π×10²/4))×10×1/0.0123 = 1,036"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:78,q:"관로 내 유체흐름이 다음과 같은 경우 Reynolds수는?[관경 D=0.1m, 유속 V=3m/s, 유체(물)밀도 ρ=1,000kg/m³, 유체(물)점성 계수 μ=0.001kg/m·s]",c:["200,000","400,000","150,000","300,000"],a:4,e:"Re = ρVD/μ = (1,000×3×0.1)/0.001 = 300,000"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:79,q:"내경이 2cm의 관 내를 수온 20℃ 물이 25cm/s의 유속을 갖고 흐를 때 이 흐름의 상태는?(단, 20℃일 때 물의 동점성 계수는 0.01cm²/s이다)",c:["상류","층류","난류","불완전층류"],a:3,e:"Re = VD/ν = (25×2)/0.01 = 5,000 ∴ Re > 4,000이므로 난류이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:80,q:"유체가 관속을 흐를 때 마찰계수가 가장 큰 경우는?",c:["음속으로 흐를 때","난류로 흐를 때","과도류로 흐를 때","Creeping류로 흐를 때"],a:4,e:"마찰계수 = 16/Re. Creeping류는 Re<1인 경우이므로 마찰계수가 가장 크다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:81,q:"다음 중 베르누이의 정리를 유도하는 데 이용되는 관계식이 아닌 것은?",c:["에너지불변의 법칙","물의 연속방정식","운동량방정식","운동에너지, 위치에너지"],a:3,e:"베르누이의 정리는 에너지불변의 법칙을 기본으로 하고 있고, 연속방정식, 운동에너지, 위치에너지, 압력에너지와 관계가 깊다. 운동량방정식은 직접 이용되지 않는다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:82,q:"관로의 유체흐름에서 어느 지점의 유속이 1.5m/s, 압력이 3.5kg/cm²이고 관 중심부의 해발고도가 40.0m였다면 이 지점에서의 유체가 갖고 있는 총에너지수두는 얼마인가?",c:["45.115m","55.115m","65.115m","75.115m"],a:4,e:"베르누이 정리 p/γ + u²/2g + z = h. 35,000/1,000 + 1.5²/(2×9.8) + 40 = 75.115m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:83,q:"기준면으로부터 5m인 곳에 유속 5m/s인 물이 흐르고 있다. 이때 압력을 재어보니 0.5kg/cm²이었다. 이 지점의 총수두는 얼마인가?",c:["6.3m","8.0m","10.3m","11.3m"],a:4,e:"총수두 H = p/γ + V²/2g + Z = 5 + 5²/(2×9.8) + 5 = 11.3m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:84,q:"관수로에서 동수경사선에 대한 설명으로 옳은 것은?",c:["수평기준선에서 손실수두와 속도수두를 가산한 수두선이다.","관로중심선에서 압력수두와 속도수두를 가산한 수두선이다.","총수두에서 손실수두를 제외한 수두선이다.","에너지선에서 속도수두를 제외한 수두선이다."],a:4,e:"동수경사선 = 위치수두 + 압력수두. 에너지선과는 속도수두(V²/2g)만큼의 차이가 있다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:85,q:"관로 내 어느 지점에서 압력수두가 20.0m이고, 표고(E.L)가 50.0m였다면 이 지점에서의 동수두는 얼마인가?",c:["52.0m","60.0m","62.0m","70.0m"],a:4,e:"동수두 = 위치수두(표고) + 압력수두 = 50.0m + 20.0m = 70.0m"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:86,q:"길이가 1,000m인 관로에서 압력을 측정하여 조사한 결과 한 구간에서 손실이 1m 발생하였다면 그 구간의 동수경사(동수구배)는 얼마인가?(단, ‰=1/1,000)",c:["10%","100%","10‰","1‰"],a:4,e:"동수경사 I = 손실수두(h_L)/관길이(L) = 1m/1,000m = 0.001 = 1‰"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:87,q:"정상적인 흐름 내 1개의 유선에서 동수경사선과 연결한 선의 기울기는?",c:["V²/2g + P/w₀","V²/2g + Z","V²/2g + P/w₀ + Z","P/w₀ + Z"],a:4,e:"동수경사선은 기준 수평면에서 위치수두와 압력수두의 합을 연결한 선이다. H = P/w₀ + Z"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:88,q:"다음 중 옳지 않은 것은?",c:["벤투리미터는 관 내의 유량을 측정할 때 사용한다.","V=√(2gh)를 토리첼리의 정리라고 한다.","수조의 수면에서 깊이 h인 곳에 단면적 a인 작은 구멍에서 물이 유출할 경우 베르누이의 정리를 적용한다.","피토관은 파스칼의 원리를 응용하여 압력을 측정하는 기구이다."],a:4,e:"④ 피토관은 정압력과 정체압력의 관계를 이용하여 유속을 측정하는 장치이다."},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:89,q:"다음 중 운동에너지의 보정계수는 어느 경우에 적용되어야 하는가?",c:["모든 유체운동에 적용된다.","이상유체흐름에 적용된다.","실제유체흐름에 적용된다.","유동단면이 원형일 때만 적용된다."],a:3,e:"에너지보정계수(α)와 운동량보정계수(β)는 점성 유체인 실제유체의 유속과 통상 사용되는 평균유속과의 관계를 보정해주는 계수이다. 층류 α=2, β=4/3 / 난류 α=1.01~1.1, β=1.0~1.05"},
{g:"b4c1",gt:"[2권] 4과목 1장 수리학의 기본원리",s:"수리학",n:90,q:"지름 d의 구가 밀도 ρ의 유체속을 유속 V로서 침강할 때 구의 항력은?",c:["D = C_D·πσ²·V²/2g","D = C_D·(πσ²/4)·ρV²","D = (1/8)·C_D·πd²·ρV²","D = (1/18)·C_D·πd²·ρV²"],a:3,e:"D = C_D·A·(ρV²/2) = C_D·(πd²/4)·(ρV²/2) = (1/8)·C_D·πd²·ρV²"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:1,q:"관수로 흐름에 관한 설명으로 틀린 것은?",c:["미끄러운 관에서 마찰손실계수 f는 레이놀즈수의 함수이다.","거친 관에서 완전히 발달된 흐름의 유속은 상대조도와 마찰속도의 함수이다.","자유수면을 갖지 않고 흐르는 수로를 관수로라 한다.","거친 관은 벽면이 거친 관을 말한다."],a:4,e:"④ 거친 관이란 층류 저층의 두께가 관벽 요철의 평균 높이보다 작은 경우를 말한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:2,q:"관수로 흐름의 에너지 보존법칙을 이용한 것은?",c:["Chezy공식","베르누이의 정리","Manning공식","운동량 방정식"],a:2,e:"② 베르누이의 정리는 에너지 보존법칙을 이용한 것이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:3,q:"관수로 내의 흐름을 밸브(Valve)에 의해서 급히 차단하면 어떤 작용을 하는가?",c:["손상작용","수격작용","공동현상","서징"],a:2,e:"수격작용: 밸브의 급속차단에 의해 순간적으로 유속이 0이 되고 이로 인해 압력증가가 생기며, 이는 관내를 일정한 전파속도로 왕복하면서 충격을 준다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:4,q:"수격작용이 발생하였을 경우, 관로 내에 진공상태가 발생할 수 있다. 이때 진공에 대한 설명으로 옳은 설명은?",c:["계기압력이 0인 상태","계기압력이 부(-)로 표시되는 압력","절대압력이 부(-)로 표시되는 압력","절대압력이 0인 상태"],a:4,e:"④ 진공이란 절대압력, 즉 대기압과 계기압력 모두가 0인 상태를 말한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:5,q:"긴 관로상의 유량조절밸브를 갑자기 폐쇄시키면 관로 내의 유량은 갑자기 크게 변화하게 되며 관 내 물의 질량과 운동량 때문에 관벽에 큰 힘을 가하게 되어 정상적인 동수압보다 몇 배나 큰 압력의 상승이 일어난다. 이와 같은 현상을 무엇이라 하는가?",c:["공동현상","도수현상","수격작용","배수현상"],a:3,e:"③ 수격작용(Water Hammer): 밸브 급폐쇄로 유속 변화에 의해 큰 압력상승이 발생하는 현상."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:6,q:"다음 중 수격작용의 방지 및 경감대책이 잘못된 것은?",c:["토출관 내의 유속이 크게 관경을 선정한다.","완폐역지밸브를 설치한다.","펌프에 플라이 휠을 설치한다.","펌프의 급정지를 피한다."],a:1,e:"① 유속이 커지면 압력이 상승하여 수격작용이 발생한다. 따라서 유속이 작게 관경을 선정해야 한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:7,q:"직경이 1,000mm인 관이 2개가 있을 경우 같은 길이의 어느 직경의 관과 같은가?",c:["1,500mm","2,000mm","2,500mm","1,414mm"],a:4,e:"A₁+A₂=A. (π/4)D₁²+(π/4)D₂²=(π/4)D². 1²+1²=D² ∴ D=2^(1/2)=1.414m=1,414mm"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:8,q:"직경이 0.3m인 관로를 통하여 1일 20,000m³의 물을 공급할 경우 관로의 평균 유속(m/s)은 얼마가 되겠는가?",c:["0.44m/s","0.11m/s","0.55m/s","3.3m/s"],a:4,e:"A = (π/4)D² = 3.14×0.3²/4 = 0.07m². Q = 20,000m³/day×(1/86,400) = 0.23m³/s. V = Q/A = 0.23/0.07 = 3.3m/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:9,q:"관수로에서 흐름이 층류인 경우 마찰계수 f는?",c:["조도에만 영향을 받는다.","레이놀즈수에만 영향을 받는다.","조도와 레이놀즈수에 영향을 받는다.","항상 0.2778의 값이다."],a:2,e:"Re < 2,000인 층류영역에서는 f = 64/Re이므로 레이놀즈수에만 영향을 받는다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:10,q:"관수로의 마찰손실수두에 대한 다음 설명으로 옳지 않은 것은?",c:["관의 지름(D)에 비례한다.","관내 조도에 비례한다.","관의 길이(l)에 비례한다.","관내 유속(V)의 2승에 비례한다."],a:1,e:"① h_L = f·(l/D)·(v²/2g)로 관의 지름에 반비례한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:11,q:"개수로의 단면이 축소되는 부분의 흐름에 관한 설명 중 옳지 않은 것은?",c:["상류흐름이 상류이면 수심은 감소한다.","상류흐름이 사류이면 수심은 증가한다.","상류흐름의 속도가 아주 크면 파동이 일어난다.","상류흐름이 상류이면 수심은 증가한다."],a:4,e:"④ 상류흐름이 상류이면 축소된 부분에서의 수심은 감소하고 사류이면 축소된 부분의 수심은 증가한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:12,q:"개수로에 일정한 유량이 흐르는 경우의 비에너지 곡선에서 동일 단면에 다른 크기의 유량이 흐르는 경우 A, B, C 세 점의 흐름상태를 순서대로 바르게 나타낸 것은?",c:["사류, 한계류, 상류","상류, 사류, 한계류","사류, 상류, 한계류","상류, 한계류, 사류"],a:3,e:"③ 비에너지 곡선에서 A(곡선 하단부)는 사류, B(상단부)는 상류, C(한계점)는 한계류이다. 순서: 사류, 상류, 한계류"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:13,q:"관 내의 흐름이 층류일 때 τ와 τ₀의 관계로 옳은 것은?",c:["τ₀ = τ(1-r)","τ₀ = τ(r-1)","τ = τ₀(r/r₀)","τ = τ₀(r₀/r)"],a:3,e:"τ는 r에 대해서 1차식(직선식)으로 변화하므로 r=0이면(관의 중심) τ=0이고, r=r₀이면(관벽) τ=τ₀이다. 따라서 τ = τ₀(r/r₀)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:14,q:"폭 1.5m인 직사각형 수로에 유량 1.8m³/s의 물이 항시 수심 1m로 흐르는 경우 이 흐름의 상태는?(단, a=1.1)",c:["상류","한계류","사류","부정류"],a:1,e:"Fr = aV/√(gh). V = Q/A = 1.8/(1.5×1) = 1.2m/s. Fr = 1.1×1.2/√(9.8×1) = 0.42 < 1 ∴ 상류이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:15,q:"구형 단면수로에서 유량 50m³/s, 수로폭 10m, 수심 0.4m일 때의 프루드수(Froude Number)는?",c:["5.3","6.3","7.3","8.3"],a:2,e:"V = Q/A = 50/(10×0.4) = 12.5m/s. Fr = 12.5/√(9.8×0.4) = 6.31"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:16,q:"수로폭 4m, 수심 1.5m인 직사각형 수로에서 유량 24m³/s가 흐를 때 프루드수와 흐름의 상태는?",c:["1.74, 상류","0.74, 상류","0.74, 사류","1.04, 사류"],a:4,e:"Fr = aV/√(gh) = [24/(4×1.5)]/√(9.8×1.5) = 1.04, Fr>1이므로 사류"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:17,q:"상대조도를 바르게 설명한 것은?",c:["원관 내의 난류흐름에서 마찰손실계수와 관계가 없는 값이다.","절대조도를 관경으로 곱한 값이다.","거친 원관 내의 사류인 흐름에서 속도분포에 영향을 준다.","관직경과 관벽면 요철과의 상대적 크기를 말한다."],a:4,e:"상대조도(e/D)란 관의 직경 D에 대한 조도 e의 비를 말하는 것으로 난류의 흐름에 영향을 주며 유속이 클수록 그 영향은 크다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:18,q:"날카로운 모서리의 유입부를 가진 관로에 버터플라이 밸브가 50% 열린 상태로 있다. 관로 내의 유속은 1.5m/s이며, 두 지점 간의 거리는 1,000m, 관경은 400mm일 때, 두 지점 간의 전체 손실수두를 구하시오(단, f=0.0135, 관로유입부 K_L1=0.5, 버터플라이 밸브에 의한 K_L2=24.9).",c:["9.9m","5.9m","8.9m","6.9m"],a:4,e:"h_L = K_L1·(v²/2g) + f·(L/d)·(v²/2g) + K_L2·(v²/2g) + (v²/2g) = (0.5 + 0.0135×1,000/0.4 + 24.9 + 1)×(v²/2g) = 60.15×(1.5²/19.6) = 6.9m"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:19,q:"거리가 8,000m 떨어져 있고 표고차가 60.00m인 두 저수지 사이를 0.55m³/s 유량을 송수하는 관로의 관경은?(용접강관을 부설하는 것으로 가정하며, C값은 120을 적용, V=0.35464CD^0.63·I^0.54 식을 이용)",c:["300mm","400mm","500mm","600mm"],a:4,e:"Q=AV=(π×D²/4)×0.35464×C×D^0.63×I^0.54. 0.55=(3.14D²/4)×0.35464×120×D^0.63×(60/8,000)^0.54. D^2.63=0.55/2.3786=0.2312. D=(0.2312)^(1/2.63)=0.573m=573mm ∴ 알맞은 관경은 600mm이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:20,q:"직경 20m의 배수지에서 직경 500mm의 관으로 배수할 때 관 내 유속이 1.5m/s라면 배수지의 시간당 수면 강하속도는?",c:["2.4m/h","3.8m/h","4.4m/h","3.4m/h"],a:4,e:"A₁V₁=A₂V₂에서 V₁=(A₂/A₁)V₁=(D₂/D₁)²V=(0.5/20)²×1.5=0.0009375m/s. 시간당 수면강하속도 V=3.375m/h ≈ 3.4m/h"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:21,q:"내경 5cm의 원활한 관 내로 50cm/s의 유속으로 물이 흐르고 있을 때 관의 단위 길이당(1m당) 손실수두는?(단, 마찰손실 수두계수 f=0.02)",c:["0.05m","0.003m","0.001m","0.005m"],a:4,e:"h_L = f·(l/D)·(V²/2g) = 0.02×(100/5)×(50²/(2×980)) = 0.51cm = 0.0051m ≈ 0.005m"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:22,q:"상업용 관손실 계수의 특성 중 옳은 것은?",c:["Moody도표로 표시되며 레이놀즈수와 절대조도의 함수이다.","Moody도표로 표시되며 레이놀즈수와 상대조도의 함수이다.","Stanton도표로 표시되며 레이놀즈수와 상대조도의 함수이다.","Stanton도표로 표시되며 레이놀즈수와 절대조도의 함수이다."],a:2,e:"② 상업용 관의 손실계수(f)는 Moody도표로 표시가 가능하며, Re와 상대조도(e=e/D)의 함수이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:23,q:"Darcy-Weisbach의 마찰손실계수 f=64/Re(Re:레이놀즈수)라 할 때 지름 0.2cm인 유리관 속을 0.8cm²/s의 물이 흐를 때 관의 길이 1.0m의 손실수두는?(단, 동점성 계수 ν=1.12×10⁻²cm²/s)",c:["h_L=11.6cm","h_L=23.3cm","h_L=2.33cm","h_L=1.16cm"],a:2,e:"Re=VD/ν=(D/ν)(Q/A)=(0.2/(1.12×10⁻²))×(0.8/(π×0.2²/4))=454.9. f=64/454.9=0.1407. h_L=0.1407×(100/0.2)×(1/(2×980))×(0.8/(π×0.2²/4))²=23.3cm"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:24,q:"직경 D=2cm, l=1,000m인 원관에서 V=2cm/s의 유속으로 흐를 때의 손실수두를 측정해 보았더니 h_L=2.24cm였다. 이 관의 마찰손실계수는?",c:["0.042","46.5","0.022","4.45"],a:3,e:"h_L = f·(l/D)·(V²/2g). f = (h_L·D·2g)/(l·V²) = (2.24×2×2×980)/(1,000×10²×2²) = 0.02195 ≈ 0.022"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:25,q:"경심이 10m이고 동수경사가 1/100인 관로의 마찰손실계수 f=0.04일 때의 유속은?",c:["20m/s","10m/s","24m/s","14m/s"],a:4,e:"V=C√(RI), C=√(8g/f)이므로 C=√(8×9.8/0.04)=44.27m/s. V=44.27√(10×1/100)=13.99m/s ≈ 14m/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:26,q:"레이놀즈수(Reynolds)가 1,000인 관에 대한 마찰손실계수 f의 값은?",c:["0.018","0.023","0.045","0.064"],a:4,e:"층류, 즉 Re ≤ 2,000인 경우 f = 64/Re = 64/1,000 = 0.064"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:27,q:"직경이 1,000mm인 관에서 초당 1.2m³의 물을 공급할 때 관로 내 평균 유속은?",c:["1.0m/s","2.5m/s","2.0m/s","1.5m/s"],a:4,e:"Q=AV. V=Q/A=1.2m³/s/((π×1²/4)m²)=1.5m/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:28,q:"폭이 4m, 수심 2m의 구형 수로에서 수면경사 I=4/1,000, n=0.02일 때 유속 V는?",c:["2.5m/s","1m/s","0.5m/s","3.16m/s"],a:4,e:"V=(1/n)R^(2/3)·I^(1/2). R=A/P=(2×4)/(4+2×2)=1. V=(1/0.02)·(8/8)^(2/3)·(4/1,000)^(1/2)=3.16m/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:29,q:"Chezy의 평균유속공식에 있어서 유속계수 C의 값은?(단, g:중력가속도, f:마찰손실계수임)",c:["8g/f","√(8g/f)","3√(8g/f)","√(f/8g)"],a:2,e:"C = √(8g/f) (g는 중력가속도로서 9.8m/s²)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:30,q:"직경이 D인 한 개의 관으로 송수하던 유량을 직경이 d인 4개의 관으로 송수하려면 D/d의 비는?(Chezy공식을 적용할 것)",c:["2^(2/5)","4^(2/5)","6^(2/5)","2^(5/2)"],a:2,e:"직경 D 관: Q=AV=A·C√(RI), 직경 d 관×4개: Q=4a·C√(ri). (πD²/4)·C√(D/4)·I=4·(πd²/4)·C√(d/4)·I. D^(5/2)=4d^(5/2) → D/d=4^(2/5)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:31,q:"Darcy-Weisbach의 마찰손실수두공식의 f와 Chezy의 평균유속공식의 C와의 관계를 나타내는 식으로 맞는 것은?(단, g는 중력가속도이다)",c:["C²=8g/f","C²=f/8g","C²=f/4g","C²=4g/f"],a:1,e:"C=√(8g/f) ∴ C²=8g/f"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:32,q:"한계구배(I_c)를 구하는 식이 옳은 것은?(단, n:조도계수, α:에너지 보정계수, R:경심)",c:["I_c=ng/(αR^(1/2))","I_c=n²g/(αR^(1/2))","I_c=ng/(αR^(1/3))","I_c=n²g/(αR^(1/3))"],a:4,e:"한계동수구배 I_c=g/(αC²). C=(1/n)R^(1/6)이므로 I_c=n²g/(αR^(1/3))"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:33,q:"Manning의 평균유속공식 중 마찰손실계수 f의 값을 바르게 적은 것은?",c:["f=8g/C","f=124.6n/D^(1/3)","f=124.6n²/D^(1/3)","f=√(C/8g)"],a:3,e:"f = (12.7×g·n²)/D^(1/3) = 124.6·n²/D^(1/3)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:34,q:"구형단면 개수로(폭 4m, 수심 2m)의 유량을 매닝(Manning)의 평균유속공식을 사용하여 구한 값은?(단, 수로경사 I=1/100, 수로의 조도계수 n=0.025)",c:["12m³/s","32m³/s","128m³/s","160m³/s"],a:2,e:"Q=A·V=A·(1/n)·(A/P)^(2/3)·I^(1/2)=4×2×(1/0.025)×((2×4)/(4+4))^(2/3)×(1/100)^(1/2)=32m³/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:35,q:"내경 60cm의 송수관 내에 유량이 2m³/s로 흐를 때 관 내의 평균유속은?",c:["4.8m/s","6.2m/s","7.1m/s","8.7m/s"],a:3,e:"Q=AV. 2=(π×0.6²/4)×V ∴ V=7.07m/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:36,q:"주어진 단면과 수로경사에서 최대 유량이 흐르는 조건 중 옳은 것은?",c:["윤변이 최대이거나 경심이 최소일 때","윤변이 최소이거나 경심이 최대일 때","수심이 최소이거나 경심이 최대일 때","수심이 최대이거나 수로폭이 최소일 때"],a:2,e:"Q=AV=√(RI)=AC√((A/P)I)이므로 Q_max의 조건은 R_max이거나 P_min이다. (윤변 최소이거나 경심 최대)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:37,q:"배수(背水)에 대한 설명 중 옳은 것은?",c:["개수로의 어느 곳에 댐업(Dam Up)함으로써 수위가 상승되는 영향이 상류쪽으로 미치는 현상을 말한다.","수자원 개발을 위하여 저수지에 물을 가두어 두었다가 홍수 부족 시에 사용하는 물을 말한다.","홍수 시에 제내지에 만든 유수지의 수면이 상승되는 현상이다.","관수로 내의 물을 급격히 차단할 경우 관내의 상승압력으로 습파가 생겨서 상류 측으로 습파가 전달되는 현상이다."],a:1,e:"① 배수(Back Water)란 상류의 흐름이 하류에 위치한 구조물의 영향으로 하류측으로부터 수심이 증가하여 점차 상류측으로 전달되는 현상이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:38,q:"다음 중 물의 흐름에 대한 설명으로 옳지 않은 것은?",c:["개수로 흐름은 하천 또는 강에서 자유표면을 가진 흐름이다.","밀폐된 터널에서 2/3 가량 차서 흐르는 흐름은 관수로 흐름이다.","관수로 흐름은 밀폐된 수로에 유체가 가득 차서 흐르는 흐름이다.","관수로 흐름은 압력 및 중력에 의한 에너지차에 의해 흐른다."],a:2,e:"② 밀폐된 관에서의 흐름일지라도 가득 차서 흐르지 않으면 개수로의 흐름이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:39,q:"댐의 상류부에서 발생되는 수면곡선은?",c:["배수곡선","저하곡선","수리특성곡선","유사량곡선"],a:1,e:"① 배수곡선: 댐의 상류부에서 발생되는 수면곡선. ②저하곡선은 하천단락부 또는 낙하 시의 상류부 수면곡선, ③수리특성곡선은 단면의 흐름 특성, ④유사량곡선은 유사의 이송량을 나타냄."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:40,q:"개수로에서 지배단면이란 무엇을 뜻하는가?",c:["비에너지가 최대로 되는 지점의 단면","사류에서 비에너지가 가장 큰 지점의 단면","층류에서 난류로 변하는 지점의 단면","상류에서 사류로 변하는 지점의 단면"],a:4,e:"지배단면이란 상류의 흐름이 사류로 변화하는 부분이며 Fr=1이 되는 단면을 말한다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:41,q:"구형 단면을 가진 개수로에서 수리상 유리한 단면은 다음 중 어느 것인가?(단, 수로 폭 B, 수심 h이다)",c:["B=h^(1/2)","B/2=h","B=h","B=½h"],a:2,e:"수리상 유리한 단면은 반원에 외접하는 단면이므로 B=2h, 즉 B/2=h"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:42,q:"작은 오리피스에서 유출할 때 에너지 손실이 없을 경우 유속과 유량은?(단, 오리피스의 단면적은 a이다)",c:["V=√(gh), Q=aV=a√(gh)","V=gh^(2/3), Q=agh³","V=√(2gh), Q=aV=a√(2gh)","V=√(gh²), Q=agh²"],a:3,e:"실제유속 V=Cr√(2gh)에서 손실이 없으므로 Cr=1 ∴ V=√(2gh), Q=aV=a√(2gh)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:43,q:"관단면적이 4m²인 관수로에서 물이 정지하고 있을 때 압력을 측정했더니 5kg/cm²였고 물을 흐르게 했을 때 압력을 측정했더니 4.2kg/cm²였다. 이때, 유속(V)과 유량(Q)을 구한 값은?",c:["V=12.522m/s, Q=50.09m³/s","V=12.0m/s, Q=46.0m³/s","V=10.0m/s, Q=40.0m³/s","V=15.22m/s, Q=60.88m³/s"],a:1,e:"h=P/W=(5-4.2)kg/cm³/(0.001kg/cm³)=800cm. V=√(2gh)=√(2×980×800)=12.522m/s. Q=A·V=4×12.522=50.088m³/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:44,q:"관 중심을 흐르는 물의 유속 V를 피토관(Pitot tube)으로 측정하고, 동시에 관벽에 액주계를 세워 정압을 측정하니 동압관 내의 수면이 액주계의 수면보다 10cm 더 올라갔다. 평균유속이 관 중심유속의 1/2이라 하면 이 관의 유량은 얼마인가?(단, 관 내경은 30cm, 피토관계수는 1.00으로 한다)",c:["43.455L/s","45.455L/s","47.455L/s","49.455L/s"],a:4,e:"관 중심유속 V=√(2gh)=√(2×9.8×0.1)=1.4m/s. 평균유속 V_m=V/2=0.7m/s. 유량 Q=A·V_m=(π×0.3²/4)×0.7=0.049455m³/s=49.455L/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:45,q:"수심 2m, 폭 4m인 콘크리트 직사각형 수로의 유량은?(단, 조도계수 n=0.012, 경사 I=0.0009임)",c:["15m³/s","20m³/s","25m³/s","30m³/s"],a:2,e:"Q=AV=A·(1/n)·R^(2/3)·I^(1/2)=2×4×(1/0.012)×((4×2)/(4+2×2))^(2/3)×0.0009^(1/2)=20m³/s"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:46,q:"면적 300m²인 여과지의 투수계수 K=0.1cm/s이고 경사 I=0.6일 때 여과량은?",c:["0.3m³/s","2.4m³/s","0.18m³/s","1.8m³/s"],a:3,e:"Q=A·V=K·I·A=0.001×0.6×300=0.18m³/s (다르시 법칙, K=0.1cm/s=0.001m/s)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:47,q:"Syphon과 동수경사선과의 수두차로 옳은 것은?",c:["이론상 760cm이다.","√(2gh)만큼 보는 것이 좋다.","4~5m 정도이다.","실제 상승높이는 8~9m가 한도이다."],a:4,e:"사이펀 내의 압력 P=Pa-wH에서 P=0이면 H=Pa/w=10.33m. 이론상 10.33m까지 가능하나 실제는 8~9m가 한계이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:48,q:"사이펀작용을 이용하여 고수조에서 저수조로 관로에 의해서 송수하고자 한다. 동수경사선보다 관로를 어느 정도까지 최고로 높일 수 있겠는가?",c:["15m","3m","8m","12m"],a:3,e:"에너지 손실을 고려하면 동수경사선보다 통상 7~8m 정도까지 사이펀 원리가 가능하다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:49,q:"수격작용의 ΔP=V₀√(ρE)에 관한 내용으로 틀린 것은?",c:["관의 크기에는 영향이 없다.","밸브 순간폐쇄로 인한 압력상승이다.","밸브폐쇄가 t시간 걸리면 ΔP는 감소한다.","관의 탄성을 고려하면 ΔP는 감소한다."],a:1,e:"① 식 ΔP=V₀√(ρE)에서 관의 탄성계수 E가 포함되므로 관의 재질·크기 등에 영향을 받는다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:50,q:"다음 중 수격작용에 의한 압력상승을 경감하는 방법과 관계가 적은 것은?",c:["느린 밸브폐쇄","서지완화 밸브 설치","한방향 조합수조(One-way Surge Tank) 설치","측관의 설치"],a:3,e:"③ 토출관쪽에 압력조절수조를 설치한다. (One-way Surge Tank가 아니라 일반 압력조절수조/조압수조)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:51,q:"펌프운전 중 발생하는 공동현상에 따른 피해현상이 아닌 것은?",c:["소음과 진동이 생긴다.","양정 곡선과 효율 곡선이 저하를 가져온다.","깃에 대한 침식이 생긴다.","압력이 상승한다."],a:4,e:"④ 발생거품이 반복해서 일어나므로 소음·진동이 생겨서 펌프의 성능이 저하되고 압력이 저하되면 양수가 불가능해진다. (압력은 저하됨)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:52,q:"하천의 평균유속 V를 구하는 방법으로 적절하지 못한 것은?(V_s는 표면유속, V_0.2, V_0.4, V_0.6, V_0.8은 수면으로부터 수심의 20%, 40%, 60%, 80%에 해당하는 수심)",c:["표면법 - V_m=0.85V_s","1점법 - V_m=V_0.6","3점법 - V=¼(V_0.2+V_0.4+V_0.6)","4점법 - V=⅕[(V_0.2+V_0.4+V_0.6+V_0.8)+½(V_0.2+V_0.8)]"],a:3,e:"③ 3점법은 V_m=(V_0.2+2V_0.6+V_0.8)/4이다."},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:53,q:"개수로 내의 흐름에서 평균유속을 구하는 방법에는 2점법이 있다. 수면하 어느 위치에서의 유속을 관측한 값인가?",c:["수면과 원수심의 50%에 위치","수면하 10%와 80%에 위치","수면하 20%와 80%에 위치","수면하 40%와 80%에 위치"],a:3,e:"2점법: V_m=½(V_0.2+V_0.8), 즉 수면하 20%와 80%에서의 유속 평균"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:54,q:"수심이 3m, 유속이 2m/s인 개수로의 비에너지값은?(단, 에너지 보정계수는 1.1이다)",c:["1.22m","2.22m","3.22m","4.22m"],a:3,e:"비에너지 H_e=h+α(V²/2g)=3+1.1×(2²/(2×9.8))=3.22m"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:55,q:"개수로의 수심을 h, 평균유속을 V, 에너지 보정계수를 α라 할 때 비에너지(H_e)를 옳게 표시한 식은?",c:["H_e=h+αV","H_e=h-√(αV)","H_e=h+αV³/2g","H_e=h+αV²/2g"],a:4,e:"④ H_e=h+αV²/2g (수심 + 속도수두)"},
{g:"b4c2",gt:"[2권] 4과목 2장 정수장 내 물의 흐름",s:"수리학",n:56,q:"개수로 내의 흐름에서 비에너지 H_e가 일정할 때, 최대 유량이 생기는 수심 h의 값이 옳은 것은?(단, 직사각형 단면(b·h)이고 α=1로 본다)",c:["H_e","H_e/2","2H_e/3","3H_e/4"],a:3,e:"최대유량이 생기는 수심은 한계수심이다. h=(2/3)H_e"},
