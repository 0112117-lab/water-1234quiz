{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:36,q:"물환경보전법상 점오염원에 해당하는 것은?",c:["축사","산지","농지","공사장"],a:1,e:"① 축사는 특정 배출구를 통해 오염물질을 배출하는 점오염원이다. 산지·농지·공사장은 비점오염원에 해당한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:37,q:"수도법령상 시설규모가 20,000m³/일 이상 50,000m³/일 미만인 경우 일반수도사업자가 배치해야 할 정수시설운영관리사 배치기준은?",c:["1급 1명 이상, 2급 1명 이상, 3급 2명 이상","1급 1명 이상, 2급 2명 이상, 3급 3명 이상","1급 1명 이상, 2급 3명 이상, 3급 4명 이상","1급 2명 이상, 2급 3명 이상, 3급 5명 이상"],a:1,e:"① 시설규모 20,000~50,000m³/일 미만은 1급 1명·2급 1명·3급 2명 이상을 배치한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:38,q:"수도법령상 지표수를 사용하는 일반수도사업자가 준수해야 할 정수처리기준 중 취수지점부터 정수지 유출지점까지 구간에서 바이러스의 제거 혹은 불활성화 기준은?",c:["9/10 이상","99/100 이상","999/1,000 이상","9,999/10,000 이상"],a:4,e:"④ 바이러스는 99.99%(4log) 이상, 즉 9,999/10,000 이상 제거 또는 불활성화하여야 한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:39,q:"수도법상 일반수도가 아닌 것은?",c:["광역상수도","지방상수도","전용상수도","마을상수도"],a:3,e:"③ 일반수도는 광역상수도·지방상수도·마을상수도이다. 전용상수도는 전용수도로 일반수도가 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수질분석및관리",n:40,q:"지하수법상 지하수보전구역으로 지정할 수 있는 지역에 해당하지 않는 것은?",c:["지하수의 개발·이용으로 주변 생태계에 심각한 악영향을 미치거나 미칠 우려가 있는 지역","지하수의 수량이나 수질을 보전하기 위하여 필요한 지역으로서 환경부령으로 정하는 지역","주된 용수공급원이 되는 지하수가 상당히 부존된 지층이 있는 지역","지하수개발·이용량이 기본계획 또는 지역관리계획상 개발 가능량에 비하여 현저하게 높다고 판단되는 지역"],a:2,e:"② 교재 정답표 기준 정답은 ②이다. 지하수보전구역 관련 세부사항은 지하수법 소관(국토교통부령)으로 정해지므로 '환경부령으로 정하는 지역'이라는 ②의 표현이 옳지 않다(세부 조항은 지하수법 확인 권장)."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:41,q:"습기가 있으면 밀착·고결되어 물에 녹지 않게 되므로 저장실을 완전한 방습구조로 하여야 하는 약품은?",c:["황산알루미늄","수산화나트륨","소다회","황산"],a:3,e:"③ 소다회(탄산나트륨)는 흡습성이 강해 습기를 흡수하면 고결되므로 저장실을 방습구조로 한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:42,q:"순간혼화가 어렵고 단락류가 많이 발생하며 Back-mixing이 발생할 수 있는 급속 혼화방식은?",c:["가압수확산식","인라인 고정식","수류식","기계식"],a:4,e:"④ 기계식(임펠러) 혼화는 혼화조 내 역혼합(Back-mixing)과 단락류가 발생하기 쉬워 순간혼화가 어렵다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:43,q:"침전지 슬러지의 배출 방식이 아닌 것은?",c:["자연유하식","기계적 제거방식","슬러지 흡입방식","침전지를 비우고 청소하는 방식"],a:1,e:"① 침전지 슬러지 배출방식에는 기계적 제거방식, 슬러지 흡입방식, 침전지를 비우고 청소하는 방식 등이 있다. '자연유하식'은 해당하지 않는다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:44,q:"필요에 따라 진동장치를 설치할 수 있는 슬러지 케이크 배출방법은?",c:["컨베이어벨트로 직접 트럭에 적재","호퍼에 저류 후 배출","케이크 저장소(평지)에 저류 후 배출","현장에 매립"],a:2,e:"② 호퍼에 저류 후 배출하는 방식은 케이크가 호퍼 벽에 부착·고착되는 것을 막기 위해 진동장치를 설치할 수 있다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:45,q:"역세척을 위한 세척탱크에 설치하는 설비로서 중심을 저수위로부터 관경의 2배 이상 떨어지게 하거나 벽을 설치하는 등의 방법으로 공기 혼입을 방지해야 하는 것은?",c:["유입관","유출관","월류관","배수관"],a:2,e:"② 세척탱크의 유출관은 역세척수에 공기가 혼입되지 않도록 관 중심을 저수위에서 관경의 2배 이상 떨어뜨리거나 칸막이벽을 설치한다."},

{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:48,q:"밸브를 선정할 때 고려해야 하는 사항이 아닌 것은?",c:["통과하는 액체나 기체의 부식성","통과하는 액체나 기체의 온도와 유량변동 범위","밸브 전후의 최대 차압치","통과하는 액체나 기체의 투명도"],a:4,e:"④ 밸브 선정 시 부식성·온도·유량변동·차압 등을 고려한다. 통과 유체의 '투명도'는 밸브 선정과 무관하다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:49,q:"구조가 견고하고 운전과 보수가 용이하여 상수도용 펌프에 주로 사용되는 전동기는?",c:["3상 유도전동기","동기전동기","직류전동기","차동복권전동기"],a:1,e:"① 3상 유도전동기는 구조가 견고하고 운전·보수가 용이하여 상수도용 펌프 구동에 주로 사용된다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:50,q:"수요 제계수에 있어서 수요 설비가 동시에 사용되는 정도를 나타내는 값으로 사용되는 계수는?",c:["부등률","부하율","수용률","설비평형률"],a:3,e:"③ 수용률(=최대수용전력/설비용량)은 설비가 동시에 사용되는 정도를 나타내는 계수이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:51,q:"전력설비 보호를 위해 단로기가 오조작에 의하여 개폐되지 않도록 설치하는 것은?",c:["자동부하절환개폐기","자동재폐로장치","인터록장치","구분개폐기"],a:3,e:"③ 인터록(interlock)장치는 차단기·단로기의 잘못된 순서 조작(오조작)을 기계·전기적으로 막아준다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:52,q:"한국전기설비규정상 전로에 시설하는 기계기구의 철대 및 금속제 외함에 접지공사를 하지 않아도 되는 예외규정이 아닌 것은?",c:["사용전압이 직류 150V 또는 교류 대지전압이 300V 이상인 기계기구를 건조한 곳에 시설하는 경우","저압용 기계기구를 건조한 목재 마루 등 절연성 물건 위에서 취급하도록 시설하는 경우","외함이 없는 계기용변성기가 고무·합성수지 등 절연물로 피복된 것일 경우","철대 또는 외함의 주위에 절연대를 설치하는 경우"],a:1,e:"① 접지 면제는 직류 300V 이하 또는 교류 대지전압 150V 이하 기계기구 등에 적용된다. '직류 150V 또는 교류 대지전압 300V 이상'은 면제 대상이 아니므로 ①은 예외규정이 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:53,q:"전력퓨즈에 관한 설명으로 옳지 않은 것은?",c:["릴레이나 변성기가 불필요하다.","소형 경량이고 구조가 간단하다.","차단용량이 크다.","동작시간-전류특성 조절이 가능하다."],a:4,e:"④ 전력퓨즈는 용단특성(동작시간-전류특성)이 고정되어 임의 조절이 불가능하다. '조절이 가능하다'는 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:54,q:"5A의 전류가 저항에 흐를 때 소비전력이 10kW일 경우, 저항(Ω)은?",c:["200","400","1,000","2,000"],a:2,e:"② P=I²R → R=P/I²=10,000/5²=10,000/25=400 Ω."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:55,q:"대기에 노출되어 있는 분말재료의 저류조 계면높이 측정에 적합한 측정기는?",c:["플로트식 측정기","차압식 측정기","정전용량식 측정기","초음파식 측정기"],a:4,e:"④ 분말(고체) 재료의 계면(레벨)은 비접촉식인 초음파식 측정기로 측정하는 것이 적합하다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:56,q:"취수장에 설치하여야 하는 기본계측기는?",c:["수온계","탁도계","pH계","알칼리도계"],a:2,e:"② 취수장에서는 원수 수질 감시를 위해 탁도계를 기본 계측기로 설치한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:57,q:"뇌(雷)에 의해 전송선로에 유기된 이상전압으로부터 발신기나 수신기를 보호하기 위한 피해방지기기는?",c:["제너배리어(Zener Barrier)","아이소레이터(Isolator)","피뢰기(Lightning Arrester)","절연변환기(Isolation Converter)"],a:3,e:"③ 낙뢰로 유기된 이상전압(서지)으로부터 기기를 보호하는 장치는 피뢰기(Lightning Arrester)이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:58,q:"와류 유량계에 관한 설명으로 옳은 것은?",c:["초음파 펄스가 흐름을 거슬러 대각선 방향으로 가로지르는 시간으로 유량을 측정한다.","액체 흐름이 장애물과 충돌하여 발생하는 소용돌이의 빈도가 유속에 비례하는 원리로 측정한다.","액체 흐름 속에 잠긴 프로펠러의 회전수가 유속에 비례하는 원리로 측정한다.","배관 주위 코일이 흐름과 직각으로 자장을 발생시키는 원리로 측정한다."],a:2,e:"② 와류(Vortex) 유량계는 장애물(소용돌이 발생체) 후방에 생기는 카르만 와열의 발생 빈도가 유속에 비례하는 원리로 유량을 측정한다. ①초음파, ③터빈, ④전자식 유량계 설명이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:59,q:"화학물질의 분류·표시 및 물질안전보건자료에 관한 기준상 물질안전보건자료(MSDS) 작성 시 포함되어야 할 항목이 아닌 것은?",c:["응급조치요령","노출방지 및 개인보호구","운송에 필요한 정보","유통사에 관한 정보"],a:4,e:"④ MSDS 16개 항목에는 응급조치요령·노출방지 및 개인보호구·운송정보·'공급자 정보' 등이 포함된다. '유통사에 관한 정보'는 별도 항목이 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"설비운영",n:60,q:"고압가스 안전관리법상 사업자 등과 특정고압가스 사용신고자가 그의 시설·제품과 관련하여 사람이 사망한 사고가 발생한 경우 즉시 통보하여야 하는 기관은?",c:["한국가스안전공사","가스 생산 및 판매기관","가스사고조사위원회","산업통상자원부"],a:1,e:"① 가스사고(사망 등) 발생 시 사업자 등은 한국가스안전공사(및 시장·군수·구청장)에 즉시 통보하여야 한다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:61,q:"유체의 동점성계수(ν), 점성계수(μ), 밀도(ρ)의 관계를 옳게 나타낸 것은?",c:["ν = μ/ρ","ν = ρ×μ","ν = ρ/μ","ν = 1/(ρμ)"],a:1,e:"① 동점성계수는 점성계수를 밀도로 나눈 값이다. ν=μ/ρ."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:62,q:"유선(Stream Line)에 관한 설명으로 옳은 것은?",c:["특정 입자가 이동해 간 경로를 추적하여 연결한 선이다.","일정 시간 동안 흐름 내의 특정 지점을 통과한 모든 유체입자들의 현재 위치를 연결한 선이다.","특정 시간·특정 단면에서 일직선을 이루는 유체입자들의 시간별 위치를 연결한 선이다.","특정 시간에 유체입자들의 유속벡터에 접하는 접선들을 연결한 선이다."],a:4,e:"④ 유선은 어느 순간 각 점에서의 유속벡터에 접하는 선이다. ①은 유적선, ②는 유맥선에 대한 설명이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:63,q:"개수로에서 직사각형 예연위어로 유량측정 시 월류수심 측정에 2%의 오차가 있다면 측정 유량에 발생하는 오차(%)는? (유량계수 상수, 단면수축 없음)",c:["1","2","3","4"],a:3,e:"③ 직사각형 위어 유량 Q∝H^(3/2)이므로 dQ/Q=(3/2)(dH/H)=1.5×2%=3%."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:64,q:"상류측 관경 400mm, 하류측 관경 200mm인 관로에서 상류측 단면평균유속이 2m/s라면 하류측 단면평균유속(m/s)은? (만관, 유량 일정)",c:["2","4","8","10"],a:3,e:"③ 연속방정식 A₁V₁=A₂V₂. V₂=V₁(D₁/D₂)²=2×(400/200)²=2×4=8 m/s."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:65,q:"관수로 내의 마찰로 인한 에너지손실을 산정할 수 있는 공식은?",c:["Francis 공식","Darcy 공식","Dupuit 공식","Darcy-Weisbach 공식"],a:4,e:"④ 관수로의 마찰손실수두는 Darcy-Weisbach 공식 hf=f(L/D)(V²/2g)으로 산정한다. (Francis는 위어, Dupuit는 지하수 공식)"},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:66,q:"물탱크에 설치된 작은 오리피스에서 단면수축계수(Ca), 유속계수(Cv), 유량계수(Cd)의 관계를 옳게 표현한 것은?",c:["Cd = Ca + Cv","Cd = Ca × Cv","Cd = Ca/Cv","Cd = Cv/Ca"],a:2,e:"② 유량계수는 단면수축계수와 유속계수의 곱이다. Cd=Ca×Cv."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:67,q:"[MLT]계로 나타낸 물리량의 차원 표시로 옳지 않은 것을 모두 고른 것은? ㄱ.밀도:[ML⁻³] ㄴ.가속도:[LT⁻¹] ㄷ.면적:[L²] ㄹ.유량:[MT⁻¹]",c:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄷ, ㄹ"],a:3,e:"③ ㄴ 가속도는 [LT⁻²], ㄹ 유량은 [L³T⁻¹]이 옳다. ㄱ(밀도 ML⁻³)·ㄷ(면적 L²)은 맞으므로 옳지 않은 것은 ㄴ·ㄹ이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:68,q:"관로길이 10m, 관경 0.1m인 관수로에 평균유속 1m/s로 물이 흐를 때 마찰손실수두(m)는 약 얼마인가? (마찰손실계수 0.01, g=9.8m/s²)",c:["0.015","0.051","0.12","0.55"],a:2,e:"② hf=f(L/D)(V²/2g)=0.01×(10/0.1)×(1²/(2×9.8))≈0.051 m."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:69,q:"계획 정수량 1,000m³/d인 여과지의 여과면적이 50m²일 때, 여과속도(m/d)는?",c:["2","5","10","20"],a:4,e:"④ 여과속도=Q/A=1,000/50=20 m/d."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:70,q:"폭 5m, 길이 10m, 유효수심 5m인 장방형 침전지의 표면부하율이 50m/d일 때 이 침전지의 유입유량(m³/d)은?",c:["500","1,500","2,500","3,500"],a:3,e:"③ 유입유량=표면부하율×표면적=50×(5×10)=2,500 m³/d. (유효수심은 무관)"},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:71,q:"직사각형 단면의 개수로에서 최적수리단면의 수심(h)과 수로폭(b)의 관계를 올바르게 나타낸 것은?",c:["h = √b","h = b/2","h = b","h = 2b"],a:2,e:"② 직사각형 단면의 최적(수리상 유리한) 단면은 b=2h이므로 h=b/2이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:72,q:"관수로에서 레이놀즈(Reynolds)수에 관한 설명으로 옳지 않은 것은?",c:["무차원 변수이다.","관성력과 점성력의 비로 나타낸다.","관성력과 중력의 비로 나타낸다.","층류·천이류·난류로 구분할 때 이용된다."],a:3,e:"③ 레이놀즈수는 관성력과 점성력의 비이다. 관성력과 중력의 비는 프루드수이므로 ③은 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:73,q:"관수로 흐름에서 발생하는 미소손실에 관한 설명으로 옳지 않은 것은?",c:["관내 마찰에 의한 손실이다.","체크밸브에 의한 손실이다.","단면의 급축소에 의한 손실이다.","단면의 급확대에 의한 손실이다."],a:1,e:"① 미소손실(부차적 손실)은 밸브·단면 급변(급축소·급확대) 등에서 생기는 손실이다. 관내 마찰에 의한 손실은 주손실로 미소손실이 아니다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:74,q:"개수로에서 프루드수(Froude Number)에 관한 설명으로 옳지 않은 것은?",c:["관성력과 점성력의 비로 나타낸다.","프루드수가 1이면 한계류이다.","프루드수가 1보다 크면 사류이다.","프루드수가 1보다 작으면 상류이다."],a:1,e:"① 프루드수는 관성력과 중력의 비이다. 관성력과 점성력의 비는 레이놀즈수이므로 ①은 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:75,q:"혼화지의 속도경사(G)에 관한 설명으로 옳지 않은 것은?",c:["교반강도를 나타내는 수치이다.","혼화지의 부피에 영향을 받는다.","물의 수온에 영향을 받는다.","물의 점성계수에 영향을 받지 않는다."],a:4,e:"④ G=√(P/(μV))로 물의 점성계수(μ)에 영향을 받는다(수온이 점성을 좌우). '점성계수에 영향을 받지 않는다'는 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:76,q:"수격현상을 경감시키는 방법이 아닌 것은?",c:["역지밸브를 설치한다.","Flywheel을 설치한다.","최저압력이 증기압보다 작아지도록 유지한다.","큰 관을 사용한다."],a:3,e:"③ 최저압력이 증기압보다 낮아지면 수주분리(공동)가 생겨 수격이 더 심해진다. 따라서 '증기압보다 작아지도록 유지'하는 것은 경감 방법이 아니다(증기압 이상으로 유지해야 함)."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:77,q:"11.5m의 전양정으로 0.5m³/s의 수량을 양수하려 한다. 펌프 효율이 80%라면 펌프에 필요한 동력(kW)은 약 얼마인가? (g=9.8m/s², 물 단위중량 1,000kgf/m³)",c:["39.2","45.1","61.3","70.4"],a:4,e:"④ P=9.8·Q·H/η=9.8×0.5×11.5/0.8≈70.4 kW."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:78,q:"펌프의 비속도(Ns)를 올바르게 나타낸 것은? (N:회전속도, Q:토출량, H:전양정)",c:["Ns = N·Q^(1/2)/H^(4/3)","Ns = N·H^(4/3)/Q^(1/2)","Ns = N·H^(3/4)/Q^(1/2)","Ns = N·Q^(1/2)/H^(3/4)"],a:4,e:"④ 비속도 Ns=N·Q^(1/2)/H^(3/4)이다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:79,q:"펌프에 사용되는 물리량인 동력에 관한 설명으로 옳지 않은 것은?",c:["차원은 [MLT⁻¹]이다.","단위로 kW를 사용한다.","단위시간에 사용하는 에너지의 양이다.","단위로 Hp(마력)을 사용한다."],a:1,e:"① 동력=에너지/시간=(ML²T⁻²)/T=[ML²T⁻³]이다. '[MLT⁻¹]'은 옳지 않다."},
{g:"ex35_3",gt:"제35회 3급 기출문제 (2024)",s:"수리학",n:80,q:"운전 중인 펌프의 토출량을 제어하기 위한 방법이 아닌 것은?",c:["펌프의 회전속도 제어","펌프의 압력 제어","펌프의 운전대수 제어","밸브의 개도 제어"],a:2,e:"② 토출량 제어는 회전속도 제어·운전대수 제어·밸브 개도 제어 등으로 한다. '펌프의 압력 제어'는 토출량을 직접 제어하는 방법이 아니다."},

{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:1,q:"계획정수량에 대한 설명 중 옳지 않은 것은?",c:["계획정수량은 계획 1일 최대급수량을 기준으로 하고 여기에 작업용수, 잡용수, 기타 손실수량을 고려한다.","작업용수는 침전지 배출오니, 여과지의 세척용수 또는 모래세척용수, 약품용해수, 염소주입용 압력수, 기기의 냉각수 및 시설의 청소용수 등이 있다.","잡용수는 정수장 내 급수, 청소용수 및 분수용수 등이 있다.","개량, 개체 시 정수능력을 확보하기 위하여 예비능력을 갖는 것은 불필요하다."],a:4,e:"④ 개량, 개체 시에도 정수능력을 확보하기 위하여 예비능력을 갖는 것이 바람직하다. 즉, 예비능력의 필요성은 변경 및 개량 시, 사고·고장 시, 대규모 장기적인 정수능력의 감소를 고려하여 설정한다."},
{g:"b3c1",gt:"[2권] 3과목 1장 정수시설운영",s:"설비운영",n:2,q:"다음 중 정수처리의 간이처리방식에 대한 설명으로 옳지 않은 것은?",c:["원수수질이 양호하고 대장균군 50(100mL, MPN) 이하일 경우 채택한다.","일반세균 100(1mL) 이하일 경우에 채택한다.","정수처리방법 중에서 가장 단순한 공정이다.","원수 → 착수정 → 염소주입점 → 정수지(배수지) → 송수"],a:2,e:"② 일반세균 500(1mL) 이하, 기타 항목이 정수수질기준 등에 상시 적합할 경우에 채택한다."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:17,q:"먹는물 수질감시항목에 대한 시료의 채취 및 관리에 대한 설명으로 틀린 것은?",c:["페놀류는 4시간 이내에 시험하지 못할 때에는 시료 1L에 대하여 황산동(5수염) 1g과 인산을 넣어 pH를 약 4로 하고, 냉암소에 보존하여 24시간 이내에 시험한다.","할로아세틱에시드는 미리 증류수로 잘 씻은 갈색유리병과 TFE 재질의 마개를 사용하고 채취 전에 염화암모늄을 100mg/L가 되도록 넣으며, 시료는 공간이 없도록 채취한다.","안티몬은 미리 질산 및 증류수로 씻은 폴리프로필렌, 폴리에틸렌 또는 폴리테트라플루오르에틸렌 용기에 시료를 채취하여 신속히 시험한다.","퍼클로레이트는 시료를 미리 정제수로 씻은 유리병이나 플라스틱병을 이용해 채취하고, 4℃ 이하에서 보관한다."],a:4,e:"퍼클로레이트는 시료를 미리 정제수로 씻은 유리병이나 플라스틱병을 이용해 채취하고, 6℃ 이하에서 보관한다(4℃가 아님) (고시 별표 3)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:18,q:"휘발성 유기화합물 검사에 사용되는 퍼지·트랩-기체크로마토그래피의 시약과 관련없는 것은?",c:["정제수","묽은염산(1+1)","에탄올","아비산나트륨용액"],a:3,e:"퍼지·트랩-기체크로마토그래피의 시약(고시 별표 3): 정제수, 묽은염산(1+1), 메탄올, 아비산나트륨용액, 아스코르빈산 등. 에탄올은 해당 없음."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:19,q:"페놀류 검사에 사용되는 기체크로마토그래프-전자포획검출법의 시약과 관련없는 것은?",c:["다이클로로메탄","메탄올","무수황산나트륨","아비산나트륨용액"],a:4,e:"기체크로마토그래프-전자포획검출법의 시약(고시 별표 3): 정제수, 다이클로로메탄, 메탄올, 무수황산나트륨, 염화나트륨, 인산이수소칼륨 등. 아비산나트륨용액은 해당 없음."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:20,q:"페놀류-기체크로마토그래프-전자포획검출법에서 추출조작으로 올바른 것은?",c:["2,000rpm으로 3분간 원심분리","2,500rpm으로 3분간 원심분리","2,500rpm으로 5분간 원심분리","2,500rpm으로 10분간 원심분리"],a:3,e:"다이클로로메탄층을 시험관에 옮기고 무수황산나트륨 2g을 넣고 잘 흔들어 섞은 다음 2,500rpm으로 5분간 원심분리하여 추출액을 다른 시험관에 옮긴다(고시 별표 3)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:21,q:"염소소독부산물 검사에 사용되는 기체크로마토그래프-전자포획검출법의 전처리의 내용으로 틀린 것은?",c:["시료와 표준용액을 냉장고에서 꺼내어 상온으로 한다.","시료 50mL를 취하여 100mL 분액깔때기에 넣는다.","염화나트륨 50g을 넣고 흔들어 녹인다.","메틸삼차-부틸에테르 25mL를 넣은 후 4분간 격렬하게 흔들어 추출한다."],a:2,e:"시료 200mL를 취하여 250mL 분액깔때기에 넣는다(50mL/100mL가 아님) (고시 별표 3)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:22,q:"염소소독부산물 검사에 사용되는 기체크로마토그래프-질량분석법의 조작조건으로 틀린 것은?",c:["분석기기 - 기체크로마토그래프 질량분석기","시료도입부 온도 - 200~280℃","칼럼 온도 - 각각의 표준물질이 최적조건으로 분리되도록 승온조작한다.","운반기체 - 부피백분율 99.999% 이상의 헬륨 또는 질소"],a:3,e:"칼럼 온도는 40~310℃로 승온조작하여 사용한다(고시 별표 3). ③은 '각각의 표준물질이 최적조건으로 분리되도록'이라는 모호한 표현으로 틀림."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:6,q:"Jar Test의 결과 폐수 500mL에 대하여 0.1%의 Alum용액 15mL를 첨가하였을 때 침전율이 가장 좋았다. 폐수에 몇 mg/L의 Alum을 주입하여야 되는가?",c:["50","30","15","10"],a:2,e:"주입량(mg/L) = (0.1%) × (10⁴mg/L / 1%) × (15/500) = 30mg/L"},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:7,q:"0.1mgN/mL 농도의 NH₃-N 표준원액을 1L 조제하고자 할 때 요구되는 NH₄Cl의 양은?(단, NH₄Cl의 M.W=53.5)",c:["314.70mg/L","382.14mg/L","464.14mg/L","492.14mg/L"],a:2,e:"NH₄Cl(53.5g) → N(14g)\nx(mg/L) : 0.1mg/mL × 1,000mL/L\n∴ x = (53.5 × 0.1 × 1,000)/14 = 382.14mg/L"},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:8,q:"10℃에서 DO 8mg/L인 물의 DO 포화도는 몇 %인가?[단, 대기의 화학적 조성 중 O₂는 21%(V/V), 10℃에서 순수한 물의 공기에 대한 용해도는 38.46mL/L이라 가정한다]",c:["약 65%","약 70%","약 80%","약 85%"],a:2,e:"DO 포화도 = 현재 DO/포화 DO × 100\n포화 DO = 38.46 × 21/100 × 32/22.4 = 11.538mg/L\n∴ DO 포화도 = 8/11.538 × 100 = 69.34%"},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:9,q:"어떤 시료에 메탄올(CH₃OH) 500mg/L가 함유되어 있다. 이 시료의 ThOD 및 BOD₅의 값을 바르게 나타낸 것은?(단, 메탄올의 BODᵤ=ThOD이며, 탈산소계수는 0.1/day이고 Base는 10이다)",c:["ThOD 850mg/L, BOD₅ 643mg/L","ThOD 850mg/L, BOD₅ 613mg/L","ThOD 750mg/L, BOD₅ 543mg/L","ThOD 750mg/L, BOD₅ 513mg/L"],a:4,e:"CH₃OH + (3/2)O₂ → CO₂ + 2H₂O\n32g : 1.5×32g = 500mg : x\n∴ ThOD = (1.5×32×500)/32 = 750mg/L\nBOD₅ = BODᵤ × (1-10^(-k·t)) = 750 × (1-10^(-0.1×5)) = 512.83mg/L ≒ 513mg/L"},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:10,q:"지하수의 수질을 분석한 결과가 다음과 같았다. 이 지하수의 이온강도(I)는?\nCa²⁺: 3×10⁻⁴mole/L, Na⁺: 5×10⁻⁴mole/L, Mg²⁺: 3×10⁻⁵mole/L, CO₃²⁻: 2×10⁻⁵mole/L",c:["1.9×10⁻⁴","6.5×10⁻⁴","7.5×10⁻⁴","9.5×10⁻⁴"],a:4,e:"I = ½ΣCᵢ·Zᵢ²\n= ½[3×10⁻⁴×2² + 5×10⁻⁴×1² + 3×10⁻⁵×2² + 2×10⁻⁵×(-2)²] = 9.5×10⁻⁴"},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:11,q:"먹는물 수질감시항목 운영 등에 관한 고시에 대한 내용 중 틀린 것은?",c:["먹는물 수질기준항목 이외에 먹는물 수질감시항목을 정하여 운영함에 따른 먹는물 감시항목의 지정대상·지정절차·먹는물 감시항목별 감시기준·검사주기 등을 규정함을 목적으로 한다.","수도법에 따른 상수원수 및 정수(수돗물에 한한다), 먹는물관리법에 따른 샘물·먹는샘물·염지하수·먹는염지하수에 적용한다.","감시기준이란 감시항목으로 설정한 물질의 인체 위해도를 근거로 평생 섭취하여도 건강에 위해를 끼치지 않는 수준으로 설정한 수질관리 목표값을 말한다.","감시항목이란 먹는물 수질기준이 설정되어 있어 감시가 필요한 물질을 말한다."],a:4,e:"감시항목(먹는물 수질감시항목 운영 등에 관한 고시 제2조): 먹는물 수질기준이 설정되어 있지 않으나 먹는물의 안전성 확보를 위하여 먹는물 중의 함유실태조사 등의 감시가 필요한 물질을 말한다."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:12,q:"감시항목을 지정할 때 포함되어야 할 사항과 거리가 먼 것은?",c:["검출빈도","검출농도","검사비용","시행시기"],a:3,e:"국립환경과학원장은 감시항목 지정을 환경부장관에게 요청하는 때에는 감시예정물질의 검출빈도·검출농도·검사주기·감시기준·검사대상·시행시기와 함께 그 물질에 대한 WHO 및 미국 등 선진국의 수질기준 등이 포함되어야 한다(고시 제4조). 검사비용은 해당 없음."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:13,q:"먹는물 수질감시항목 중 분기 1회 검사항목이 아닌 것은?",c:["Chloroethane","Bromochloroacetonitrile","Vinyl Chloride","Chlorate"],a:3,e:"Vinyl Chloride은 1년에 1회 검사한다(먹는물 수질감시항목 운영 등에 관한 고시 별표 1)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:14,q:"먹는물 수질감시항목 중 연 1회 검사항목이 아닌 것은?",c:["Styrene","Chlorophenol","Ethylendibromide","Radon"],a:4,e:"Radon은 반기 1회 검사한다(먹는물 수질감시항목 운영 등에 관한 고시 별표 1)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:15,q:"Geosmin 및 2-MIB의 분석방법이 아닌 것은?",c:["용매추출/기체크로마토그래프-질량분석법","고상추출/기체크로마토그래프-질량분석법","액상추출/기체크로마토그래프-질량분석법","HS-SPME/기체크로마토그래프-질량분석법"],a:3,e:"Geosmin 및 2-MIB 분석방법: 용매추출, 고상추출, HS-SPME/기체크로마토그래프-질량분석법(먹는물 수질감시항목 운영 등에 관한 고시 별표 3). 액상추출은 해당 없음."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:16,q:"휘발성 유기화합물에 대한 시료의 채취 및 관리와 관련없는 사항은?",c:["아스코르빈산","잔류염소를 제거","pH 12","티오황산나트륨"],a:3,e:"휘발성 유기화합물(고시 별표 3): 잔류염소를 제거하기 위해 유리병에 아스코르빈산 또는 티오황산나트륨 25mg 정도를 넣고 시료를 공간이 없도록 약 40mL를 채취하고 밀봉한다. pH 12 조절은 관련 없다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:83,q:"다음은 BOD측정용 시료의 전처리 조작에 관한 설명이다. 이중 옳지 않은 것은?",c:["산성인 시료는 NaOH(1M)로 중화시킨다.","알칼리성 시료는 염산(1M)으로 중화시킨다.","잔류염소를 함유한 시료는 일반적으로 BOD용 식종희석수로 희석하여 사용한다.","수온이 20℃ 이상인 시료는 10℃ 이하로 식힌 후 통기시켜 산소를 포화시켜 준다."],a:4,e:"수온이 20℃ 이하일 때의 용존산소가 과포화되어 있을 경우에는 수온을 23~25℃로 상승시킨 이후에 15분간 통기하고 방치하고 냉각하여 수온을 다시 20℃로 한다(ES 04305.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:84,q:"먹는물의 저온일반세균 수질검사 시 사용하는 시험방법은?",c:["시험관법","효소기질이용법","막여과법","평판집락법"],a:4,e:"저온일반세균은 평판집락법으로 시험한다(먹는물수질공정시험기준 ES 05701.1e)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:85,q:"먹는물수질공정시험기준의 정도관리 요소에 대한 설명으로 틀린 것은?",c:["검정곡선 - 분석물질의 농도변화에 따른 지시값을 나타낸 것","방법검출한계 - 시료와 비슷한 매질 중에서 시험분석 대상을 검출할 수 있는 최소한의 농도","정확도 - 시험분석 결과의 반복성을 나타내는 것","현장 이중시료 - 동일 위치에서 동일한 조건으로 중복 채취한 시료"],a:3,e:"정밀도(Precision): 시험분석 결과의 반복성을 나타내는 것. 정확도(Accuracy): 시험분석 결과가 참값에 얼마나 근접한가를 나타내는 것(ES 05001.a). ③은 정밀도의 정의이다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:86,q:"먹는물수질공정시험기준에서 페놀류 측정방법은?",c:["자외선/가시선 분광법","관능법","EDTA 적정법","이온크로마토그래피"],a:1,e:"먹는물 페놀류는 자외선/가시선 분광법으로 측정한다(ES 05311.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:87,q:"먹는물수질공정시험기준에서 크롬 분석방법이 아닌 것은?",c:["원자흡수분광광도법","유도결합플라스마-원자방출분광법","자외선/가시선 분광법","유도결합플라스마-질량분석법"],a:3,e:"먹는물수질공정시험기준의 크롬 분석방법(ES 05412): 원자흡수분광광도법, 유도결합플라스마-원자방출분광법, 유도결합플라스마-질량분석법. 자외선/가시선 분광법은 해당되지 않는다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:88,q:"100mL의 시료를 가지고 부유물질을 측정한 결과 다음과 같은 결과를 얻었다. 전체 부유물질(건조된 고형물기준) 중에서 휘발성 부유물질이 차지하는 %(무게기준)는?[단, 용기의 무게=18.4623g, 건조시킨 후(용기+건조된 고형물)무게=18.5112g, 휘발시킨 후(용기+재)의 무게=18.4838g]",c:["56.0%","63.8%","72.3%","83.8%"],a:1,e:"x(%) = 휘발성 부유물(g)/건조고형물(g) × 100 = (18.5112-18.4838)/(18.5112-18.4623) × 100 = 56.03%"},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:1,q:"수소이온농도 측정 시 사용되는 pH표준용액 중 pH 7에 가장 가까운 값을 나타내는 것은?",c:["프탈산염표준용액(0.05M)","붕산염표준용액(0.01M)","탄산염표준용액(0.025M)","인산염표준용액(0.025M)"],a:4,e:"인산염표준용액(0.025M): 20℃ pH 6.88로 pH 7에 가장 가깝다. 인산이수소칼륨 및 인산일수소나트륨을 110℃에서 1시간 건조한 다음 인산이수소칼륨 3.387g 및 인산일수소나트륨 3.533g을 정확하게 달아 정제수에 녹여 1L로 한다(ES 04306.1d)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:2,q:"pH를 20℃에서 4.00으로 유지하는 표준용액으로 가장 적절한 것은?",c:["인산염표준용액","옥살산염표준용액","프탈산염표준용액","탄산염표준용액"],a:3,e:"20℃ 표준용액 pH값: 수산염 1.68, 프탈산염 4.00, 인산염 6.88, 붕산염 9.22, 탄산염 10.07, 수산화칼슘 12.63 (ES 04306.1d)"},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:3,q:"pH표준용액의 pH값이 0℃에서 제일 작은(낮은) 값을 나타내는 표준용액은?",c:["프탈산염표준용액","수산염표준용액","탄산염표준용액","붕산염표준용액"],a:2,e:"0℃에서 표준용액의 pH값: 수산염 1.67, 프탈산염 4.01, 인산염 6.98, 붕산염 9.46, 탄산염 10.32, 수산화칼슘 13.43. 수산염이 가장 낮다(ES 04306.1d)."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:4,q:"유기물이 많은 공장폐수를 전처리하여 분해할 때 첨가되는 것으로 과염소산과 같이 공존하면 폭발현상을 감소시키는 것은?",c:["염산","질산","인","황산"],a:2,e:"과염소산을 넣을 경우 질산이 공존하지 않으면 폭발할 위험이 있으므로 반드시 질산을 먼저 넣어주어야 하며, 어떠한 경우에도 유기물을 함유한 뜨거운 용액에 과염소산을 넣어서는 안 된다."},
{g:"b2c2",gt:"[1권] 2과목 2장 수질항목별 측정방법",s:"수질분석",n:5,q:"수중의 중금속에 대한 정량을 원자흡수분광광도법에 의해 측정할 경우 대상 시료가 공존물질과 작용해서 해리되기 어려운 화합물이 생성되어 흡광에 관계하는 바닥상태의 원자수가 감소되는 간섭현상이 발생되었다. 다음 중 이 간섭을 피하기 위한 방법이 아닌 것은?",c:["과량의 간섭원소의 첨가","은폐제나 킬레이트제의 첨가","이온화 전압이 높은 원소의 첨가","목적원소의 용매추출"],a:3,e:"간섭을 피하는 방법: 이온교환이나 용매추출 등에 의한 방해물질의 제거, 과량의 간섭원소의 첨가, 간섭을 피하는 양이온(란타늄, 스트론튬, 알칼리 원소 등)/음이온 또는 은폐제·킬레이트제 등의 첨가, 목적원소의 용매추출, 표준첨가법의 이용. '이온화 전압이 높은 원소의 첨가'는 해당되지 않는다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:77,q:"염소이온(Cl⁻)이 2,500mg/L 들어 있는 어떤 공장폐수 20mL를 취해 다이크롬산칼륨법에 의한 화학적 산소요구량을 실험하였다. 황산제이수은은 몇 g을 넣는 것이 가장 적절한가?",c:["0.2g","0.3g","0.4g","0.5g"],a:4,e:"염소이온의 양이 40mg 이상 공존할 경우 HgSO₄:Cl⁻=10:1 비율로 황산제이수은의 첨가량을 늘리므로,\nHgCl₂(g) = Cl⁻(g) × 10 = (2,500mg/L × 20mL × 1L/1,000mL × 1g/1,000mg) × 10 = 0.5g"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:78,q:"BOD 식종보정을 할 때 가장 정확한 결과를 갖기 위해서는 DO감소율이 5일 후 어느 정도이어야 하는가?",c:["20~40%","40~70%","50~90%","60~90%"],a:2,e:"시료를 식종하여 BOD를 측정할 때는 배양 후의 산소소비량이 40~70% 범위 안에 있는 식종희석수를 선택하여 배양 전후의 용존산소량과 식종액 함유율을 구하고 시료의 BOD값을 보정한다(ES 04305.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:79,q:"BOD 측정에 관한 설명 중 틀린 것은?",c:["호기성 미생물의 작용에 의한 것이므로 충분한 용존산소가 필요하다.","희석수에 완충액으로써 MgSO₄, CaCl₂, FeCl₃를 첨가한다.","희석수를 식종하는 경우 5일 후의 산소소비율이 40~70% 되는 것이 적당하다.","시료가 산성 또는 알칼리성을 나타내거나 잔류염소를 함유하였거나 용존산소가 과포화되어 있을 경우에는 전처리를 실시한다."],a:2,e:"② 인산염완충용액, MgSO₄, CaCl₂, FeCl₃ 용액을 각각 첨가하지만, '완충액으로써'라는 표현은 부정확하다. MgSO₄·CaCl₂·FeCl₃는 영양염류이며 완충 기능은 인산염완충용액이 담당한다(ES 04305.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:80,q:"BOD값에 대한 사전 경험이 없을 때 시료용액을 희석하여 조제하는 기준으로 알맞은 것은?",c:["오염정도가 심한 공장폐수 - 0.01~0.1%","오염된 하천수 - 15~50%","처리하여 방류된 공장폐수 - 25~70%","처리하지 않은 공장폐수 - 1~5%"],a:4,e:"예상 BOD값에 대한 사전 경험이 없을 때: 오염정도가 심한 공장폐수 0.1~1.0%, 처리하지 않은 공장폐수와 침전된 하수 1~5%, 처리하여 방류된 공장폐수 5~25%, 오염된 하천수 25~100%의 시료가 함유되도록 희석·조제한다(ES 04305.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:81,q:"수질오염공정시험방법 중에서 BOD실험 시 BOD값에 대한 사전 경험이 없을 때 처리하여 방류된 공장폐수의 시료용액 희석비율로 옳은 것은?",c:["1~5%","5~25%","10~50%","25~100%"],a:2,e:"처리하여 방류된 공장폐수는 5~25%의 시료가 함유되도록 희석·조제한다(80번 해설 참고)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:82,q:"어떤 하수의 BOD를 측정하기 위하여 300mL BOD병에 하수를 15mL 주입하고 여기에 희석수를 가하여 BOD실험을 수행하였다. 희석시료의 초기 DO농도는 7.5mg/L, 20℃에서 5일 동안 배양한 후의 DO농도는 2.4mg/L였다. 이 하수의 최종 BOD는?",c:["약 50mg/L","약 100mg/L","약 150mg/L","약 200mg/L"],a:2,e:"희석배수 = 300mL/15mL = 20배이므로,\n∴ BOD = (DO₁ - DO₂) × P = (7.5-2.4) × 20 = 102mg/L ≒ 약 100mg/L"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:71,q:"산화성 물질이 함유된 시료나 착색된 시료에 적합하며 특히 윙클러-아자이드화나트륨 변법에 사용할 수 없는 폐·하수의 용존산소 측정에 유용하게 사용할 수 있는 측정법은?",c:["자외선/가시선 분광법","전극법","알칼리비색법","이온환원법"],a:2,e:"전극법(ES 04308.2d): 산화성 물질이 함유된 시료나 착색된 시료와 같이 윙클러-아자이드화나트륨 변법을 사용할 수 없는 폐·하수의 용존산소 측정에 유용하게 사용할 수 있다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:72,q:"산성 KMnO₄에 의한 COD 측정법의 시약만으로 묶인 것은?",c:["질산 - 질산은 - 과망간산칼륨 - 옥살산나트륨","질산 - 염산은 - 과망간산칼륨 - 수산나트륨","황산 - 황산은 - 과망간산칼륨 - 수산나트륨","황산 - 질산은 - 과망간산칼륨 - 옥살산나트륨"],a:4,e:"산성 과망간산칼륨법: 시료에 황산(1+2), 황산은(또는 질산은), 과망간산칼륨용액(0.005M)을 사용하여 가열한 후, 옥살산나트륨용액(0.0125M)으로 적정한다(ES 04315.1b)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:73,q:"다음 실험항목 중 가열반응 실험시간이 가장 짧은 것은?",c:["생물화학적 산소요구량(BOD)","다이크롬산칼륨법에 의한 COD","산성 과망간산칼륨법에 의한 COD","알칼리성 과망간산칼륨법에 의한 COD"],a:3,e:"산성 과망간산칼륨법에 의한 COD의 측정 시 30분간 수욕상에서 가열반응시킨다(가장 짧음). 다이크롬산칼륨법은 2시간 가열 (ES 04315.1b)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:74,q:"폐수처리 Process에서의 유입수 및 그 유출수의 COD를 측정하기 위해 유입수는 시료 5mL, 유출수는 시료 50mL에 각각 물을 가하여 100mL로서, COD를 측정했을 때 0.005M 과망간산칼륨용액의 적정치는 각각 5.2mL와 4.7mL였다. COD 제거율은 몇 %인가?(단, 0.005M 과망간산칼륨용액의 역가는 1.0이며 공시험치는 0.2mL이다)",c:["75","81","85","91"],a:4,e:"COD_i = (5.2-0.2) × 1.0 × 1,000/5 × 0.2 = 200mg/L\nCOD_e = (4.7-0.2) × 1.0 × 1,000/50 × 0.2 = 18mg/L\n∴ η = (1 - 18/200) × 100 = 91%"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:75,q:"Glucose로 COD 1,000mg/L 표준용액을 만들려고 한다. 증류수 1L에 함유하는 Glucose는 몇 g이 되겠는가?(단, Glucose 분자량=180)",c:["0.8875","0.9375","0.9875","0.9999"],a:2,e:"C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O\n180g : 192g = x(g/L) : 1,000mg/L × 10⁻³g/mg\n∴ x = 0.9375g/L"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:76,q:"다이크롬산칼륨에 의한 화학적 산소요구량(COD)측정법에 관한 설명 중 틀린 것은?",c:["시료량은 2시간 동안 끓인 다음 최초에 넣은 다이크롬산용액(0.025N)의 약 1/3이 남도록 취한다.","염소이온의 양이 40mg 이상 공존할 경우에는 HgSO₄:Cl⁻=10:1의 비율로 황산수은(Ⅱ)의 첨가량을 늘인다.","황산제일철암모늄용액(0.025N)을 사용하여 적정한다.","적정 시 액의 색이 청록색에서 적갈색으로 변할 때까지 적정한다."],a:1,e:"2시간 동안 끓인 다음 최초에 넣은 다이크롬산칼륨용액(0.025N)의 약 '반'이 남도록 취한다(1/3이 아님) (ES 04315.3d)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:65,q:"유도결합플라스마 발광광도법에 관한 기술로서 적합하지 아니한 것은?",c:["에어로졸 상태로 분무되는 시료는 가장 안쪽의 관을 통하여 도너츠 모양 플라스마의 가장자리로 도입된다.","장치는 시료도입부, 고주파전원부, 광원부, 분광부, 연산처리부 및 기록부로 구성되어 있다.","보통시료는 6,000~80,000K의 고온 플라스마에 도입되므로 거의 완전한 원자화가 이루어지게 된다.","플라스마는 그 자체가 광원으로도 이용되기 때문에 매우 넓은 범위에서의 시료를 측정할 수 있다."],a:1,e:"에어로졸 상태로 분무된 시료는 가장 안쪽의 관을 통하여 플라스마 도너츠 모양의 '중심부'에 도입된다(가장자리가 아님). 시료는 도너츠 내부의 좁은 부위에 한정되므로 광학적으로 발광되는 부위가 좁아져 강한 발광을 관측할 수 있으며 화학적으로 불활성인 위치에서 원자화가 이루어진다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:66,q:"유도결합플라스마 발광광도분석장치의 구성으로 알맞은 것은?",c:["시료도입부 - 시료원자화부 - 분광부 - 단색화부 - 연산처리부","시료도입부 - 파장선택부 - 단색화부 - 분광부 - 연산처리부","시료도입부 - 단색화부 - 시료원자화부 - 분광부 - 연산처리부","시료도입부 - 고주파전원부 - 광원부 - 분광부 - 연산처리부"],a:4,e:"ICP 발광광도 분석장치: 시료도입부, 고주파전원부, 광원부, 분광부, 연산처리부 및 기록부로 구성되어 있다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:67,q:"DO측정 시 End Point(종말점)에 있어서의 액의 색은?(단, 윙클러-아자이드화나트륨 변법 기준)",c:["무색","미홍색","황색","청남색"],a:1,e:"BOD병의 용액 200mL를 정확히 취하여 황색이 될 때까지 티오황산나트륨용액(0.025M)으로 적정한 다음, 전분용액 1mL를 넣고 액을 청색으로 만든다. 이후 다시 티오황산나트륨용액(0.025M)으로 무색이 될 때까지 적정한다(ES 04308.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:68,q:"용존산소량(DO)의 측정 시 시료에 활성슬러지 미생물 플록이 형성된 경우의 시료 전처리로 가장 옳은 것은?",c:["칼륨명반-암모니아용액 주입","황산구리-설퍼민산용액 주입","아이오딘화칼륨-아황산나트륨용액 주입","플루오린화칼륨-황산용액 주입"],a:2,e:"황산구리-설퍼민산법(미생물 플록이 형성된 경우): 시료를 1L 유리병에 채우고 황산구리-설퍼민산용액 10mL를 유리병의 위로부터 넣은 후 마개를 닫고 혼합하여 현탁물을 침강시킨다(ES 04308.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:69,q:"용존산소(DO)측정 시 시료가 착색 또는 현탁된 경우에 사용하는 전처리시약은?",c:["칼륨명반용액, 암모니아수","황산구리-설퍼민산용액","황산, 플루오린화칼륨용액","황산제이철용액, 과산화수소"],a:1,e:"시료가 착색 또는 현탁된 경우(ES 04308.1e): 칼륨명반용액 10mL와 암모니아수 1~2mL를 유리병의 위로부터 넣어 현탁물을 침강시킨다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:70,q:"윙클러-아자이드화나트륨 변법에 의한 용존산소의 측정 시 알칼리성 아이오딘화칼륨용액에 아자이드화나트륨을 가하는 이유로 옳은 것은?",c:["용존산소 고정반응인 과망간산의 생성을 촉진하기 위해","공존하는 아질산이온의 방해를 막기 위해","공존하는 질산이온의 방해를 막기 위해","아이오딘의 유리반응을 정량적으로 진행시키기 위해"],a:2,e:"아자이드화나트륨(NaN₃)은 공존하는 아질산이온(NO₂⁻)의 방해를 막기 위해 가한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:59,q:"기체크로마토그래프를 사용하여 정성분석을 할 때 적용되는 보유치에 관한 설명으로 틀린 것은?",c:["보유시간은 3회 측정하여 평균치를 구한다.","보유시간은 일반적으로 1~2분 정도 측정한다.","봉우리의 보유시간은 반복시험할 때 ±3% 오차범위 이내이어야 한다.","보유치의 표시는 무효부피의 보정 유무를 기록하여야 한다."],a:2,e:"일반적으로 5~30분 정도에서 측정하는 봉우리의 보유시간은 반복시험을 할 때 ±3% 오차범위 이내이어야 한다(1~2분이 아님)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:60,q:"기체크로마토그래프의 기본구성장치에 관한 설명으로 틀린 것은?",c:["운반가스유로는 유량조절부와 분리관유로로 구성된다.","가스시료도입부는 가스계량관과 유로변환기구로 구성된다.","분리관오븐의 온도정밀도는 ±1.0℃의 범위 이내, 전원·전압변동은 5% 이내를 유지할 수 있어야 한다.","분리관유로는 시료도입부, 분리관, 검출기배관으로 구성된다."],a:3,e:"분리관오븐의 온도조절 정밀도: ±0.5℃의 범위 이내, 전원·전압변동 10%에 대하여 온도변화 ±0.5℃ 범위 이내(오븐의 온도가 150℃ 부근일 때)이어야 한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:61,q:"이온크로마토그래피에 대한 설명 중 틀린 것은?",c:["액체시료를 이온교환 칼럼에 고압으로 전개시켜 분리되는 각 성분의 크로마토그램을 작성하여 분석하는 고속액체 크로마토그래피의 일종이다.","기본구성은 용리액조, 시료주입부, 액송펌프, 분리 칼럼, 검출기 및 기록계로 되어 있으며 제작회사에 따라 보호 칼럼과 써프레서를 부착하기도 한다.","시료 중 음이온과 양이온의 정성 및 정량분석에 이용된다.","일반적으로 미량의 시료를 사용하므로 시료주입량은 보통 50~100μL이다."],a:3,e:"③ 시료 중 음이온(F⁻, Cl⁻, NO₂⁻, NO₃⁻, PO₄³⁻, Br⁻ 및 SO₄²⁻)의 정성 및 정량분석에 이용된다(양이온은 아님)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:62,q:"다음 이온크로마토그래피에 관한 설명 중 틀린 것은?",c:["물 시료 중 음이온의 정성 및 정량분석에 이용된다.","기본구성은 용리액조, 시료주입부, 액송펌프, 분리 칼럼, 검출기 및 기록계로 되어있다.","시료의 주입량은 보통 50~100μL 정도이다.","일반적으로 음이온분석에는 열전도도 검출기를 사용한다."],a:4,e:"④ 일반적으로 음이온분석에는 전기전도도 검출기를 사용한다(열전도도가 아님)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:63,q:"유도결합플라스마 발광분석장치의 조작 시 플라스마를 점등 후 약 몇 분간 안정화시켜야 하는가?",c:["1분","2분","3분","4분"],a:1,e:"점등 후 약 1분간 플라스마를 안정화시킨다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:64,q:"ICP(유도결합플라스마 발광광도법)의 분석장치 설치조건으로 적절하지 않은 것은?",c:["실온 5~35℃, 상대습도 85% 이하를 일정하게 유지할 수 있는 곳","부식성 가스의 노출이 없는 곳","발광부로부터의 고주파가 다른 기기에 영향을 미치지 않는 곳","직사광선이 들어오지 않고 진동이 없는 곳"],a:1,e:"실온 15~27℃, 상대습도 70% 이하를 일정하게 유지할 수 있는 곳이어야 한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:53,q:"이온전극법에 대한 설명 중 틀린 것은?",c:["이온전극법에 사용하는 장치의 기본구성은 전위차계, 이온전극, 비교전극, 시료 용기 및 자석교반기로 되어 있다.","시료 중의 음이온 및 양이온의 분석에 이용된다.","이온전극은 측정대상이온에 감응하여 Nernst식에 따라 이온활량에 비례하는 전위차를 나타낸다.","이온전극은 액체막전극과 고체막전극으로 구분된다."],a:4,e:"이온전극은 유리막전극, 고체막전극, 격막형 전극으로 구분된다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:54,q:"이온전극법에서 유리막 전극을 이용하여 측정하는 이온과 거리가 먼 것은?\n㉠ Na⁺  ㉡ K⁺  ㉢ NH₄⁺  ㉣ Pb²⁺",c:["㉠, ㉡","㉡, ㉢","㉠, ㉢","㉣"],a:4,e:"유리막전극으로 측정하는 이온: Na⁺, K⁺, NH₄⁺(산화알루미늄 첨가 유리). Pb²⁺는 고체막전극(PbS+Ag₂S)으로 측정한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:55,q:"이온전극법에서 사용되는 이온전극인 격막형 전극으로 측정할 수 있는 이온으로 올바른 것은?",c:["NH₄⁺, CN⁻","K⁺, CN⁻","NO₃⁻, CN⁻","CN⁻, Cu²⁺"],a:1,e:"격막형 전극으로 측정할 수 있는 이온은 NH₄⁺, CN⁻, NO₂⁻가 있다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:56,q:"이온크로마토그래피를 이용하여 측정해야 하는 항목에 해당하지 않는 것은?",c:["황산이온","인산염인","유기인","질산성 질소"],a:3,e:"이온크로마토그래피는 음이온(F⁻, Cl⁻, NO₂⁻, NO₃⁻, PO₄³⁻, SO₄²⁻, Br⁻ 등)류 분석에 사용된다. 유기인은 기체크로마토그래피로 분석한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:57,q:"기체크로마토그래피에서 사용되는 검출기 중 순도 99.8% 이상의 질소 또는 헬륨을 사용해야 하는 것은?",c:["TCD","FID","ECD","FPD"],a:1,e:"일반적으로 열전도도 검출기(TCD)에서는 순도 99.8% 이상의 수소나 헬륨을, 불꽃이온화 검출기(FID)에서는 순도 99.8% 이상의 질소 또는 헬륨을 사용하며 기타 검출기에서는 각각 규정하는 가스를 사용한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:58,q:"기체크로마토그래피에서 사용되는 검출기의 종류와 특징을 알맞게 연결한 것은?",c:["FPD - 수소이온화 검출기로 나이트로기 등을 갖는 친전자성 성분에 감도가 좋다.","TCD - 인, 유황화합물을 선택적으로 검출한다.","ECD - 유기할로겐화합물, 나이트로화합물 및 유기금속화합물을 선택적으로 검출할 수 있다.","FID - 수소염이온화 검출기에 알칼리토류 금속염의 튜브를 부착한 것으로 유기질소화합물을 선택적으로 검출할 수 있다."],a:3,e:"전자포획 검출기(ECD): 유기할로겐화합물, 나이트로화합물 및 유기금속화합물을 선택적으로 검출할 수 있다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:47,q:"자외선/가시선 분광법 분석장치 측광부의 광전측광에 사용되는 광전도셀의 파장범위는?",c:["자외 파장","가시 파장","근적외 파장","근자외 파장"],a:3,e:"광전관, 광전자증배관은 주로 자외 내지 가시 파장 범위에서, 광전도셀은 근적외 파장범위에서, 광전지는 주로 가시 파장 범위에서의 광전측광에 사용한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:48,q:"원자흡광분석의 간섭에 관한 사항 중 틀린 것은?",c:["분석에 사용하는 스펙트럼선이 다른 인접선과 완전히 분리되지 않은 경우에는 표준시료와 분석시료의 조성을 더욱 비슷하게 하면 간섭의 영향을 피할 수 있다.","불꽃 중에서 원자가 이온화하는 경우는 이온화 전압이 낮은 알칼리 및 알칼리토류 금속원소의 경우에 많다.","물리적 간섭은 시료용액의 점성이나 표면장력 등 물리적 조건의 영향에 의하여 일어난다.","공존물질과 작용하여 해리하기 어려운 화합물이 생성되어 흡광에 관계하는 기저상태의 원자수가 감소하는 경우 공존하는 물질은 음이온쪽이 영향이 크다."],a:1,e:"분석에 사용하는 스펙트럼선이 다른 인접선과 완전히 분리되지 않은 경우 파장선택부의 분해능이 충분하지 않기 때문에 일어나며, 검정곡선의 직선영역이 좁고 구부러져 있어 분석감도와 정밀도도 저하된다. 이때는 다른 분석선을 사용하여 재분석하는 것이 좋다(조성을 비슷하게 한다고 피할 수 있는 것이 아님)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:49,q:"자외선/가시선 분광법에 관한 설명 중 옳지 않은 것은?",c:["측정 파장범위는 200~1,200nm이다.","흡광도는 용액의 농도에 비례한다.","자외부의 광원으로 텅스텐램프를 사용한다.","투과도 역수의 상용대수를 흡광도라 한다."],a:3,e:"가시부와 근적외부의 광원으로는 주로 텅스텐램프를 사용하고, 자외부의 광원으로는 주로 중수소방전관을 사용한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:50,q:"다음 ㉠, ㉡에 들어갈 말로 알맞은 것은?\n원자흡수분광광도법을 이용한 시험방법은 시료를 적당한 방법으로 해리시켜 중성원자로 증기화하여 생긴 ( ㉠ )가 이 ( ㉡ )을 투과하는 특유 파장의 빛을 흡수하는 현상을 이용한다.",c:["㉠ 여기상태의 원자 ㉡ 원자 이온층","㉠ 여기상태의 분자 ㉡ 분자 증기층","㉠ 기저상태의 분자 ㉡ 분자 이온층","㉠ 기저상태의 원자 ㉡ 원자 증기층"],a:4,e:"원자흡수분광광도법: 시료를 적당한 방법으로 해리시켜 중성원자로 증기화하여 생긴 기저상태(Ground State)의 원자가 이 원자 증기층을 투과하는 특유 파장의 빛을 흡수하는 현상을 이용하여, 시료 중의 원소 농도를 정량하는 방법이다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:51,q:"다음 중 자외선/가시선 분광법으로 정량하는 물질이 아닌 것은?",c:["총인","노말헥산추출물질","플루오린","페놀류"],a:2,e:"노말헥산추출물질(ES 04302.1b): 시료 pH 4 이하의 산성으로 하여 노말헥산층에 용해되는 물질을 노말헥산으로 추출하고 노말헥산을 증발시킨 잔류물의 무게로부터 구한다(중량법). 분광법이 아니다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:52,q:"이온전극법의 특징으로 알맞지 않은 것은?",c:["이온농도의 측정범위는 일반적으로 10⁻⁴~10⁻¹mol/L(또는 10⁻⁷mol/L)이다.","이온전극은 [이온전극 | 측정용액 | 비교전극]의 측정계에서 측정대상 이온에 감응하여 Nernst식에 따라 이온활량에 비례하는 전위차를 나타낸다.","이온전극의 종류나 구조에 따라 사용 가능한 pH 범위가 있다.","측정용액의 온도가 10℃ 상승하면 전위구배는 1가이온이 약 1mV, 2가이온이 약 2mV 변화한다."],a:4,e:"측정용액의 온도가 10℃ 상승하면 전위구배는 1가이온이 약 2mV, 2가이온이 약 1mV 변화한다(반대로 되어 있음)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:41,q:"자외선/가시선 분광법에 대한 설명 중 틀린 것은?",c:["자외부의 광원으로는 주로 중수소방전관을 사용한다.","장치의 구성은 광원부 - 파장선택부 - 시료부 - 측광부로 구성되어 있다.","흡수셀의 재질로 유리제는 가시 및 근자외부, 석영제는 자외부, 플라스틱제는 근적외부 파장범위를 측정할 때 사용한다.","파장의 선택에는 일반적으로 단색화장치(Monochrometer) 또는 필터(Filter)를 사용한다."],a:3,e:"흡수셀의 재질: 유리제는 주로 가시 및 근적외부 파장범위, 석영제는 자외부 파장범위, 플라스틱제는 근적외부 파장범위를 측정할 때 사용한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:42,q:"원자흡수분광광도법의 용어에 관한 설명으로 틀린 것은?",c:["공명선 - 원자가 외부로부터 빛을 흡수했다가 다시 먼저 상태로 돌아갈 때 방사하는 스펙트럼선","역화 - 불꽃의 연소속도가 크고 혼합기체의 분출속도가 작을 때 연소현상이 내부로 옮겨지는 것","중공음극램프 - 원자흡광분석의 광원이 되는 것으로 목적원소를 함유하는 중공음극에 고압의 네온을 채운 방전관","선프로파일 - 파장에 대한 스펙트럼선의 강도를 나타내는 곡선"],a:3,e:"중공음극램프(Hollow Cathode Lamp): 원자흡광분석의 광원이 되는 것으로 목적원소를 함유하는 중공음극 한 개 또는 그 이상을 저압의 네온과 함께 채운 방전관(고압이 아님)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:43,q:"원자흡수분광광도법에서 사용되는 용어에 관한 설명으로 알맞지 않은 것은?",c:["역화 - 불꽃의 연소속도가 작고 혼합기체의 분출속도가 클 때 연소현상이 내부로 옮겨지는 것","공명선 - 원자가 외부로부터 빛을 흡수했다가 다시 먼저 상태로 돌아갈 때 방사하는 스펙트럼선","다원소 중공음극램프 - 한 개의 중공음극에 두 종류 이상의 목적원소를 함유하는 중공음극램프","다연료불꽃 - 가연성 가스/조연성 가스의 값을 크게 한 불꽃"],a:1,e:"역화(Flame Back): 불꽃의 연소속도가 크고 혼합기체의 분출속도가 작을 때 연소현상이 내부로 옮겨지는 것(설명이 반대로 되어 있음)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:44,q:"원자흡광분석장치의 광원램프로 원자흡광스펙트럼선의 선폭보다 좁은 선폭을 갖고 휘도가 높은 스펙트럼을 방사하여 많이 사용되는 것은?",c:["열음극램프","중공음극램프","방전램프","텅스텐램프"],a:2,e:"원자흡광분석용 광원: 원자흡광스펙트럼선의 선폭보다 좁은 선폭을 갖고 휘도가 높은 스펙트럼을 방사하는 중공음극램프가 많이 사용된다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:45,q:"흡광도측정에서 입사광의 80%가 흡수되었을 때의 흡광도는?",c:["약 0.9","약 0.7","약 0.5","약 0.3"],a:2,e:"투과도 t = It/I₀ = (100-80)/100 = 0.2\n흡광도 A = log(1/t) = log(1/0.2) = 0.699"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:46,q:"원자흡광분석장치의 광원램프의 점등장치로서 갖추어야 할 구비조건과 거리가 먼 것은?",c:["전원회로는 전류가 일정한 것이어야 한다.","전원회로는 전압이 일정한 것이어야 한다.","램프의 전류값을 정밀하게 조정할 수 있는 것이어야 한다.","고주파 방전에 의한 램프의 출력 변화가 적어야 한다."],a:4,e:"광원램프 점등장치의 구비조건: 전원회로는 전류 또는 전압이 일정한 것, 램프의 전류값을 정밀히 조정할 수 있는 것, 램프의 수에 따라 필요한 만큼의 예비점등 회로를 갖는 것."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:35,q:"수질분석용 시료의 보존방법에 관한 설명 중 옳지 않은 것은?",c:["크롬분석용 시료는 HNO₃ 1mL/L를 넣어 보관한다.","페놀류분석용 시료는 인산을 넣어 pH 4 이하로 조정한 후, 황산구리(1g/L)를 첨가하여 4℃에서 보관한다.","시안분석용 시료는 수산화나트륨으로 pH 12 이상으로 하여 4℃에서 보관한다.","화학적 산소요구량 분석용 시료는 황산으로 pH 2 이하로 하여 4℃에서 보관한다."],a:1,e:"크롬분석용 시료는 시료 1L당 HNO₃ 2mL를 첨가하여 보관한다(1mL가 아님). ②·③·④ ES 04130.1f"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:36,q:"수질측정항목과 시료의 최대보존기간이 잘못 짝지어진 것은?",c:["생물화학적 산소요구량 - 48시간","수소이온농도 - 즉시 측정","6가크롬 - 6개월","대장균 - 24시간"],a:3,e:"6가크롬의 최대보존기간은 24시간이다(ES 04130.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:37,q:"시료의 보관방법에 관한 설명 중 틀린 것은?",c:["아연은 시료 1L당 질산 2mL를 가하고 최대보존기간은 6개월이다.","페놀류는 인산으로 pH 4 이하로 조정 후 CuSO₄를 시료 1L당 1g을 첨가하여 4℃에서 보관하며, 최대보존기간은 28일이다.","시안은 NaOH로 pH 12 이상으로 조정하여 4℃에서 보관하며 최대보존기간은 48시간이다.","유기인은 염산으로 pH를 5~9로 조정하여 4℃에서 보관하며 최대보존기간은 7일이다."],a:3,e:"시안은 NaOH로 pH 12 이상으로 조정하여 4℃에서 보관하며 최대보존기간은 14일이다(48시간이 아님) (ES 04130.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:38,q:"자동시료채취기로 시료를 채취할 경우 몇 시간 이내에 30분 이상 간격으로 2회 이상 채취하여 일정량을 단일시료로 하는가?(단, 복수시료채취방법)",c:["6시간","8시간","12시간","24시간"],a:1,e:"자동시료채취기로 시료를 채취할 경우 6시간 이내에 30분 이상 간격으로 2회 이상 채취한 일정량을 단일시료로 한다(ES 04130.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:39,q:"시료의 전처리에서 유기물 등을 많이 함유하고 있는 대부분의 시료에 적용하는 전처리방법은?",c:["질산에 의한 분해법","질산-염산에 의한 분해법","질산-황산에 의한 분해법","질산-과염소산에 의한 분해법"],a:3,e:"질산-황산법: 유기물 등을 많이 함유하고 있는 대부분의 시료에 적용된다. 그러나 칼슘, 바륨, 납 등을 다량 함유한 시료는 난용성의 황산염을 생성하여 다른 금속성분을 흡착하므로 주의한다(ES 04150.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:40,q:"유기물 함량이 비교적 높지 않고 금속의 수산화물, 산화물, 인산염 및 황화물을 함유하는 시료의 전처리방법으로 가장 알맞은 것은?",c:["질산-황산에 의한 분해","질산-과염소산에 의한 분해","질산-염산에 의한 분해","질산-플루오린화수소산에 의한 분해"],a:3,e:"질산-염산법: 유기물 함량이 비교적 높지 않고 금속의 수산화물, 산화물, 인산염 및 황화물을 함유하고 있는 시료에 적용된다(ES 04150.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:28,q:"시료의 보존방법이 다른 항목은?",c:["음이온 계면활성제","6가크롬","질산성 질소","클로로필 a"],a:4,e:"④ 클로로필 a는 -20℃ 이하 보관, ①·②·③은 4℃ 보관 (ES 04130.1f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:29,q:"다음 중 채취된 시료를 보관할 때 가장 높은 pH 상태로 유지하는 항목은?",c:["화학적 산소요구량","암모니아성 질소","페놀류","유기인"],a:4,e:"④ 유기인은 4℃ 보관, HCl로 pH 5~9로 조절한다. 보기 중 COD(pH 2 이하), 암모니아성 질소(pH 2 이하), 페놀류(pH 4 이하)보다 유기인의 pH 5~9가 가장 높다(ES 04130.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:30,q:"측정항목별 시료보존방법이 틀린 것은?",c:["부유물질-4℃ 보관","총인-황산으로 pH 2 이하, 4℃ 보관","색도-4℃ 보관","인산염인-염산으로 pH 2 이하, 4℃ 보관"],a:4,e:"④ 인산염인은 즉시 여과한 후 4℃ 보관한다(산처리하지 않음) (ES 04130.1f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:31,q:"시료보존에 있어서 즉시시험을 하지 못할 경우, 보존방법으로 '4℃ 보관'에 해당하지 않는 측정항목은?",c:["전기전도도","음이온 계면활성제","화학적 산소요구량","6가크롬"],a:3,e:"③ 화학적 산소요구량(COD)은 4℃ 보관, H₂SO₄로 pH 2 이하로 보존한다 (ES 04130.1f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:32,q:"다음 중 시료의 최대보존기간이 가장 긴 항목은?(단, 적절한 보존방법을 적용한 경우임)",c:["암모니아성 질소","아질산성 질소","질산성 질소","시안"],a:1,e:"① 암모니아성 질소 28일, ②·③ 48시간, ④ 시안 14일 (ES 04130.1f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:33,q:"시료의 최대보존기간이 가장 짧은 측정항목은?",c:["암모니아성 질소","총질소","총대장균군","페놀류"],a:3,e:"③ 총대장균군 24시간(환경기준 적용 시), ①·②·④ 28일 (ES 04130.1f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:34,q:"시료의 보존처리방법에 관한 설명 중 틀린 것은?",c:["시안화합물 검정용 시료는 수산화나트륨용액을 가하여 pH 12 이상으로 조절, 4℃에서 보관한다.","유기인 검정용 시료는 질산을 2mL/L로 가하여 4℃에서 보관한다.","6가크롬 검정용 시료는 4℃에서 보관하며 최대보존기간은 24시간이다.","PCB 검정용 시료는 염산으로 pH 5~9로 조절하여 4℃에서 보관한다."],a:2,e:"유기인 검정용 시료는 4℃에서 보관하며, HCl로 pH 5~9로 조절한다(질산이 아님) (ES 04130.1f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:22,q:"4각 위어에 의하여 유량을 측정하려고 한다. 위어의 수두가 0.5m, 절단폭이 4m이면 유량은?(단, 유량계수는 1.6이다)",c:["0.52m³/min","1.15m³/min","2.26m³/min","4.82m³/min"],a:3,e:"Q(m³/min) = Kbh^(3/2) = 1.6 × 4 × 0.5^(3/2) = 2.26m³/min (ES 04140.2b)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:23,q:"개수로에 의한 유량측정 시 평균유속은 케이지(Chezy)의 유속공식을 적용한다. 이때 경심에 대한 설명 중 옳은 것은?",c:["수로 중앙지점의 수심(H)을 말한다.","측정지점에서의 평균단면적(A)을 홈바닥의 구배(i)로 나눈 것을 말한다.","유수단면적(A)을 윤변(S)으로 나눈 것을 말한다.","홈바닥의 구배(i)를 수심(H)으로 나눈 것을 말한다."],a:3,e:"Q = 60·V·A에서 R(경심) = 유수단면적 A를 윤변 S로 나눈 것(m). V(평균유속) = C√(Ri)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:24,q:"개수로에 의한 유량측정 시 케이지(Chezy)의 유속공식이 적용된다. 경심이 0.653m, 홈바닥의 구배 i=1/1,500, 유속계수가 62.5일 때 평균유속은?",c:["약 1.31m/s","약 1.44m/s","약 1.54m/s","약 1.62m/s"],a:1,e:"V = C√(Ri) = 62.5 × √(0.653 × 1/1,500) = 1.304m/s"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:25,q:"위어(Weir)의 수두가 0.2m, 수로의 폭이 0.5m, 수로의 밑면에서 절단 하부점까지의 높이가 0.8m인 직각 삼각위어의 유량은?[단, 유량계수 K=81.2+0.24/h+(8.4+12/√d)×(h/B-0.09)²]",c:["약 60m³/h","약 70m³/h","약 80m³/h","약 90m³/h"],a:4,e:"K = 81.2 + 0.24/0.2 + (8.4+12/√0.8) × (0.2/0.5 - 0.09)² = 84.5\nQ = Kh^(5/2) = 84.5 × 0.2^(5/2) = 1.511m³/min = 90.66m³/h (ES 04140.2b)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:26,q:"피토관의 압력수두 차이는 5.1cm이다. 지시계 유체인 수은의 비중이 13.55일 때 물의 유속은?",c:["3.68m/s","4.12m/s","5.72m/s","6.86m/s"],a:1,e:"V = √(2gH)\nH = 5.1cmHg × 13.55cmH₂O/cmHg × 1m/100cm = 0.69mH₂O\n∴ V = √(2×9.8×0.69) = 3.68m/s (ES 04140.1c)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:27,q:"하천의 수심이 0.5m일 때 유속을 측정하기 위해 각 수심의 유속을 측정한 결과 수심 20% 지점은 1.7m/s, 수심 40% 지점은 1.5m/s, 수심 60% 지점은 1.3m/s, 80% 지점은 1.0m/s이었다. 평균유속(m/s, 소구간단면 기준)은?",c:["1.15","1.25","1.35","1.45"],a:3,e:"수심이 0.4m 이상이므로 V = (V₀.₂ + V₀.₈)/2 = (1.7+1.0)/2 = 1.35m/s (ES 04140.3b)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:16,q:"배출허용기준 적합 여부의 판정을 위한 시료채취 시 복수시료채취방법의 적용을 제외할 수 있는 경우가 아닌 것은?",c:["환경오염사고, 취약시간대의 환경오염감시 등 신속한 대응이 필요한 경우","부득이 복수시료채취방법으로 시료를 채취할 수 없을 경우","유량이 일정하며 연속적으로 발생되는 폐수가 방류되는 경우","사업장 내에서 발생하는 폐수를 회분식 등 간헐적으로 처리하여 방류하는 경우"],a:3,e:"복수시료채취방법 적용을 제외할 수 있는 경우(ES 04130.1f): 환경오염사고 또는 취약시간대 등 신속한 대응이 필요한 경우, 비정상적 행위를 할 경우, 회분식 등 간헐적으로 처리하여 방류하는 경우, 기타 부득이 복수시료채취가 불가능한 경우. ③은 제외 대상이 아니다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:17,q:"하천수 채수방법 중 옳지 않은 것은?",c:["하천수의 오염 및 용수의 목적에 따라 채수지점을 선정한다.","하천 합류지점에서는 합류가 처음 시작되는 지점과 합류가 끝난 지점에서 각각 채수한다.","채취된 시료를 현장에서 실험할 수 없을 때에는 따로 규정이 없는 한 보존방법에 따라 보존하고 어떠한 경우에도 보존기간 이내에 실험을 실시하여야 한다.","하천 단면에서 수심이 가장 깊은 수면의 지점과 그 지점을 중심으로 하여 좌우로 수면폭을 2등분한 각 지점의 수면으로부터 수심 2m 미만일 때에는 수심의 1/3에서 채수한다."],a:2,e:"하천본류와 하천지류가 합류하는 경우에는 합류 이전의 각 지점과 합류 이후 충분히 혼합된 지점에서 각각 채수한다(ES 04130.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:18,q:"시료채취 시 유의사항에 관한 내용과 거리가 먼 것은?",c:["유류 또는 부유물질 등이 함유된 시료는 침전물이 부상하여 혼입되어서는 안 된다.","환원성 물질, 수소이온, 유류를 측정하기 위한 시료는 시료용기에 가득 채워야 한다.","시료채취량은 시험항목 등에 따라 차이는 있으나 보통 3~5L 정도이어야 한다.","지하수 시료는 취수정 내에 고여 있는 물의 교란을 최소화하면서 채취하여야 한다."],a:4,e:"지하수 시료는 취수정 내에 고여 있는 물과 원래 지하수의 성상이 달라질 수 있으므로 고여 있는 물을 충분히 퍼낸 다음 새로 나온 물을 채취한다(ES 04130.1f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:19,q:"부유물질이 적은 대형 관 내에서 효율적인 유량측정기기로 왼쪽관은 정수압, 오른쪽관은 0인 상태인 정체압력을 마노미터에 나타나는 수두차에 의해 유속이 계산되는 관 내의 유량측정방법은?",c:["벤투리미터","유량측정용 노즐","오리피스","피토관"],a:4,e:"피토관의 유속은 마노미터에 나타나는 수두차에 의하여 계산한다. 왼쪽의 관은 정수압을 측정하고 오른쪽관은 유속이 0인 상태인 정체압력(Stagnation Pressure)을 측정한다(ES 04140.1c)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:20,q:"관 내 유량을 측정하는 피토관에 대한 설명 중 틀린 것은?",c:["피토관을 측정할 때는 반드시 일직선상의 관에서 이루어져야 한다.","설치장소는 엘보, 티 등 관이 변화하는 지점으로부터 최소한 관지름의 15~50배 정도 떨어진 지점이어야 한다.","부유물질이 적은 대형관에서 효율적인 유량측정기이다.","유량측정이 비교적 정확하고 관부분을 조절하여 유량을 조절할 수 있다."],a:4,e:"관부분을 조절하여 유량을 조절할 수 있는 유량계는 오리피스 등이다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:21,q:"수심 3m, 폭 7m인 장방형 개수로에 평균유속 1.0m/s로 폐수를 흘려보낼 때 이 폐수의 유량은?",c:["25m³/min","145m³/min","650m³/min","1,260m³/min"],a:4,e:"Q = A × 60 × V = (3×7)m² × 60 × 1.0m/s = 1,260m³/min (ES 04140.2b)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:10,q:"순수한 물 100mL에 에틸알코올(비중 0.79) 80mL를 혼합하였을 때 이 용액 중의 에틸알코올 농도(W/W%)는?",c:["70.4%","63.2%","38.7%","32.9%"],a:3,e:"x(%) = 에틸알코올(g)/[물(g)+에틸알코올(g)] × 100 = (80×0.79)/[100+(80×0.79)] × 100 = 38.73%"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:11,q:"95% 황산(비중 1.84)의 N농도는?",c:["10.7","25.5","35.7","40.5"],a:3,e:"x(eq/L) = 1.84g/mL × 1,000mL/L × 95/100 × 1eq/(98/2)g = 35.67N"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:12,q:"0.025N-KMnO₄ 500mL를 조제하기 위하여 소요되는 과망간산칼륨의 양은?(단, KMnO₄=158)",c:["0.329g","0.395g","0.985g","1.975g"],a:2,e:"0.025(eq/L) × 500mL × 1L/1,000mL = x g × 1eq/(158/5)g\n∴ x(KMnO₄) = 0.395g"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:13,q:"용액 중 CN⁻ 농도를 5.2mg/L로 만들려고 하면 물 1,000L에 NaCN 몇 g을 용해시키면 되는가?(단, Na 원자량=23)",c:["6.8g","7.8g","9.8g","11.8g"],a:3,e:"NaCN(49g) : CN(26g)\nx(g/1,000L) : 5.2(mg/L)(1g/1,000mg)\n∴ x = (49×5.2)/26 = 9.8g"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:14,q:"분석을 위해 시료를 채취할 때 유의할 사항으로 알맞지 않은 것은?",c:["시료채취량은 시험항목 및 시험횟수에 따라 차이가 있으나 보통 3~5L 정도이어야 한다.","채취용기는 시료를 채우기 전에 증류수로 3회 이상 씻은 다음 사용한다.","용존가스, 환원성 물질, 유류 및 수소이온농도 등을 측정하기 위한 시료는 운반 중 공기와의 접촉이 없도록 시료 용기에 가득 채워야 한다.","지하수 시료채취 시에는 취수정 내에 고여 있는 물의 4~5배 정도의 양을 퍼낸 후 취수하여야 한다."],a:2,e:"채취용기는 시료를 채우기 전에 시료로 3회 이상 씻은 다음 사용한다(증류수가 아님). (수질오염공정시험기준 ES 04130.1f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:15,q:"배출허용기준 적합 여부의 판정을 위한 시료채취 시 수소이온농도, 수온 등 현장에서 즉시 측정하여야 하는 항목인 경우의 측정분석치 산출방법 기준은?(단, 복수시료채취방법 기준)",c:["30분 이상 간격으로 4회 이상 측정한 후 산술평균하여 측정값을 산출한다.","30분 이상 간격으로 2회 이상 측정한 후 산술평균하여 측정값을 산출한다.","1시간 이상 간격으로 4회 이상 측정한 후 산술평균하여 측정값을 산출한다.","1시간 이상 간격으로 2회 이상 측정한 후 산술평균하여 측정값을 산출한다."],a:2,e:"수소이온농도(pH), 수온 등 현장에서 즉시 측정하여야 하는 항목인 경우에는 30분 이상 간격으로 2회 이상 측정한 후 산술평균하여 측정값을 산출한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:4,q:"다음 설명 중 옳은 것은?",c:["'항량으로 될 때까지 건조한다'라 함은 같은 조건에서 1시간 더 건조할 때 전후 차가 g당 0.1mg 이하일 때를 말한다.","백분율은 용액 100g 중 성분무게(g)를 표시할 때는 V/V%의 기호를 쓴다.","'수욕상 또는 수욕 중에서 가열한다'라 함은 따로 규정이 없는 한 수온 100℃에서 가열함을 뜻하고 약 100℃의 증기욕을 쓸 수 있다.","'방울수'라 함은 20℃에서 물 10방울을 적하할 때 그 부피가 약 1mL 되는 것을 뜻한다."],a:3,e:"① 전후 차가 g당 0.3mg 이하일 때를 말한다.\n② W/V%의 기호를 쓴다.\n④ 20방울을 적하할 때이다.\n※ 먹는물수질공정시험기준 ES 05000.f"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:5,q:"온도의 영향이 있는 것의 판정은 다음 중 어느 것을 기준으로 하는가?",c:["상온","실온","표준온도","찬 곳"],a:3,e:"온도의 영향이 있는 것의 판정은 표준온도(20℃)를 기준으로 한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:6,q:"먹는물수질공정시험기준에 따른 크롬 항목의 적용가능한 분석방법이 아닌 것은?",c:["원자흡수분광광도법","자외선/가시선 분광법","유도결합플라스마-원자방출분광법","유도결합플라스마-질량분석법"],a:2,e:"크롬 항목의 적용가능한 분석방법: 원자흡수분광광도법, 유도결합플라스마-원자방출분광법, 유도결합플라스마-질량분석법. 자외선/가시선 분광법은 6가크롬에만 적용된다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:7,q:"먹는물의 총대장균군 수질검사 시 사용하는 시험방법이 아닌 것은?",c:["시험관법","평판집락법","막여과법","효소기질이용법"],a:2,e:"총대장균군: 시험관법, 막여과법, 효소기질이용법. 평판집락법은 일반세균 검사법이다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:8,q:"다음 온도에 관한 정의 중 ( ) 안에 알맞은 것은?\n먹는물수질공정시험기준에서 ( ㉠ )은(는) 20℃로 하며, ( ㉡ )은(는) 15~25℃, ( ㉢ )은(는) 1~35℃, ( ㉣ )이라 함은 따로 규정이 없는 한 0~15℃의 장소를 뜻한다.",c:["㉠ 표준온도 ㉡ 실온 ㉢ 상온 ㉣ 찬 곳","㉠ 표준온도 ㉡ 상온 ㉢ 실온 ㉣ 찬 곳","㉠ 찬 곳 ㉡ 실온 ㉢ 표준온도 ㉣ 상온","㉠ 실온 ㉡ 상온 ㉢ 표준온도 ㉣ 찬 곳"],a:2,e:"표준온도 20℃, 상온 15~25℃, 실온 1~35℃, 찬 곳 0~15℃ (먹는물수질공정시험기준 ES 05000.f)"},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:9,q:"다음 설명 중 틀린 것은?",c:["항량이란 30분 더 건조하거나 강열할 때 전후 무게의 차가 매 g당 0.3mg 이하일 때를 말한다.","액의 농도를 (1→10)으로 표시한 것은 고체 1g을 용매에 녹여 전체 양을 10mL로 하는 비율을 표시한 것이다.","HCl(1+2)로 표시한 것은 HCl 1mL와 물 2mL를 혼합하여 조제한 것이다.","3% NaOH용액은 일반적으로 용액 100mL 중에 수산화나트륨이 3g 녹아 있는 것을 말한다."],a:1,e:"'항량으로 될 때까지 건조한다' 또는 '항량으로 될 때까지 강열한다'라 함은 같은 조건에서 1시간(30분이 아님) 더 건조하거나 또는 강열할 때 전후 차가 g당 0.3mg 이하일 때를 말한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:1,q:"먹는물수질공정시험기준의 실험에 관한 설명으로 틀린 것은?",c:["'항량으로 될 때까지 건조한다' 또는 '항량으로 될 때까지 강열한다'라 함은 같은 조건에서 1시간 더 건조하거나 또는 강열할 때 전후 차가 g당 0.3mg 이하일 때를 말한다.","시험에 쓰는 물은 따로 규정이 없는 한 증류수 또는 정제수로 한다.","'정밀히 단다'는 것은 규정된 양의 시료를 취하여 화학저울 또는 미량저울로 칭량하는 것을 말한다.","감압은 따로 규정이 없는 한 15mmH₂O 이하로 한다."],a:4,e:"감압은 따로 규정이 없는 한 15mmHg 이하로 한다(먹는물수질공정시험기준 ES 05000.f)."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:2,q:"먹는물수질공정시험기준 중 각 시험은 따로 규정이 없는 한 어느 온도범위에서 시험하는가?",c:["1~35℃","15~25℃","10~20℃","5~15℃"],a:2,e:"각각의 시험은 따로 규정이 없는 한 상온(15~25℃)에서 조작하고 조작 직후에 그 결과를 관찰한다. 단, 온도의 영향이 있는 것의 판정은 표준온도를 기준으로 한다."},
{g:"b2c1",gt:"[1권] 2과목 1장 시험분석 기초 및 기기분석법",s:"수질분석",n:3,q:"'항량으로 될 때까지 건조한다'라 함은 같은 조건에서 어느 정도 더 건조시켜 전후 무게차가 g당 0.3mg 이하일 때를 말하는가?",c:["30분","60분","90분","120분"],a:2,e:"'항량으로 될 때까지 건조한다' 또는 '항량으로 될 때까지 강열한다'라 함은 같은 조건에서 1시간(60분) 더 건조하거나 또는 강열할 때 전후 차가 g당 0.3mg 이하일 때를 말한다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:14,q:"미생물을 이용하여 폐수에 포함된 오염물질인 유기물, 질소, 인을 동시에 처리하는 공법은 대체로 혐기조(Anaerobic Tank), 무산소조(Anoxic Tank), 포기조(Oxic Tank)로 구성되어 있다. 이중 무산소조에서의 주된 생물학적 오염물질 제거 반응은?",c:["인의 방출","인의 과잉흡수","질산화","탈질화"],a:4,e:"· 혐기조: 유기물 제거, 인 방출\n· 무산소조: 탈질화\n· 호기조: 질산화, 인의 과잉흡수"},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:15,q:"다음 회전원판법(Rotating Biological Contactors)에 대한 설명으로 옳은 것은?",c:["수면에 일부가 잠겨있는 원판을 설치하여 원판에 부착·번식한 미생물군을 이용해서 하수를 정화한다.","보통 일차침전지를 설치하지 않고, 타원형 무한수로의 반응조를 이용하여 기계식 포기장치에 의해 포기를 행한다.","산기장치 및 상징수배출장치를 설치한 회분조로 구성된다.","여상에 살수되는 하수가 여재의 표면에 부착된 미생물군에 의해 유기물을 제거하는 방법이다."],a:1,e:"회전원판법: 하·폐수처리공법 중 여재를 이용한 고도처리공법의 하나이며 고체(Media) 표면에 미생물을 부착시키는 공법인 생물막공법으로 RBC(Rotating Biological Contactor)라 한다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:16,q:"무기수은계 화합물을 함유한 폐수의 처리방법으로 올바른 것은?\n㉠ 황화물침전법  ㉡ 활성탄흡착법  ㉢ 산화분해법  ㉣ 이온교환법",c:["㉠, ㉡","㉡, ㉢","㉠, ㉡, ㉣","㉠, ㉡, ㉢"],a:3,e:"무기수은계 폐수는 황화물응집침전법, 활성탄흡착법, 이온교환법으로 처리하며, 유기수은계 폐수는 흡착법, 산화분해법으로 처리한다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:17,q:"질소제거방법 중 생물학적 질화-탈질공정의 장점이라고 할 수 있는 것은?\n㉠ 잠재적 제거효율이 높다  ㉡ 공정의 안정성이 높다  ㉢ 소요 부지면적이 적다  ㉣ 유기탄소원이 불필요하다",c:["㉠, ㉡","㉡, ㉢","㉠, ㉡, ㉢","㉡, ㉢, ㉣"],a:1,e:"유기탄소원이 불필요한 질소제거공정은 물리화학적 처리공정이다. 생물학적 공정은 잠재적 제거효율과 공정 안정성이 높은 장점이 있다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:18,q:"회전원판법의 특징에 해당되지 않는 것은?",c:["질산화가 일어나기 쉽다.","처리수의 BOD가 낮아져, pH가 낮아지는 경우가 있다.","활성 슬러지법에 비해 이차침전지에서 미세한 SS(부유물질)가 유출되기 쉽고 처리수의 투명도가 나쁘다.","살수여상과 같이 파리는 발생하지 않으나 하루살이가 발생하는 경우가 있다."],a:2,e:"질산화가 일어나기 쉬우며 이로 인하여 처리수의 BOD가 높아진다(낮아지는 것이 아님)."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:19,q:"다음 중 유사경도(Pseudo-hardness)와 관련된 물질은?",c:["Cl⁻","H⁺","Na⁺","NO₃⁻"],a:3,e:"유사경도: 저농도에서 경도를 발생하지 않는 물질로서 1가 금속이온(Na⁺, K⁺) 등이 여기에 속한다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:7,q:"상수를 처리한 후에 치아의 충치를 예방하기 위해 주입할 수 있으며, 원수 중에 과량으로 존재하면 반상치(반점치) 등을 일으키므로 제거해야 하는 물질은?",c:["염소","플루오린","산소","비소"],a:2,e:"플루오린(F)은 치아의 무기질에 반응하여 산에 잘 녹지 않는 물질을 형성시킨다. 충치는 예방되지만 과량이면 반상치(반점치)를 일으키므로 자주 제거해야 한다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:8,q:"철의 제거를 목적으로 하는 처리방법이 아닌 것은?",c:["폭기","활성탄처리","전염소처리","망간접촉여과"],a:2,e:"철(Fe)의 제거방법: 폭기, 전염소처리법, pH값 조정법, 약품침전법, 망간접촉여과법, 이온교환법 등. 활성탄처리는 맛·냄새 제거용이다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:9,q:"혐기성 상태에서 탈질산화(Denitrification) 과정을 맞게 설명한 것은?",c:["암모니아성 질소 → 질산성 질소 → 아질산성 질소","아질산성 질소 → 질산성 질소 → 질소가스(N₂)","질산성 질소 → 아질산성 질소 → 질소가스(N₂)","암모니아성 질소 → 아질산성 질소 → 질산성 질소"],a:3,e:"탈질산화(Denitrification)는 질산성 질소(NO₃)가 미생물에 의해 아질산성 질소(NO₂), 다시 질소가스(N₂)로 환원되는 것을 말한다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:10,q:"경도가 높은 물을 보일러 용수로 사용할 때 발생되는 문제점은?",c:["Slime과 Scale 생성","Priming 생성","Foaming 생성","Cavitation"],a:1,e:"경도가 높으면 비누세정효과가 감소하고 보일러 용수로 사용할 경우 슬라임(Slime)과 스케일(Scale)이 생성된다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:11,q:"흡착능력을 이용하여 물의 불쾌한 냄새와 맛을 제거하는 데 이용되는 것은?",c:["염소","이산화염소","클로라민","활성탄"],a:4,e:"불쾌한 냄새와 맛의 발생이 단기적인 경우는 분말활성탄을 주로 사용하지만, 장기적으로 발생할 경우는 입상활성탄이나 다른 공정을 추가로 설치하여 제거하는 것이 오히려 경제적이고 수처리효율이 더 높을 수 있다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:12,q:"심하게 오염되어 보통의 정수법으로는 정수가 되지 않는 지표수의 처리방법으로 적당하지 않은 것은?",c:["조류처리","전염소처리","활성탄처리","슬러지처리"],a:4,e:"보통의 정수법으로는 정수가 되지 않는 지표수의 처리방법으로는 조류처리, 전염소처리, 활성탄처리 외에 오존처리 등이 있다. 슬러지처리는 배출수 처리이다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:13,q:"Side Stream을 적용하여 생물학적 방법과 화학적 방법으로 인을 제거하는 공정은?",c:["수정 Bardenpho공정","Phostrip공정","SBR공정","UCT공정"],a:2,e:"Phostrip공법은 Side Stream을 적용하여 생물학적 방법과 화학적 방법으로 인을 제거하는 공정이다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:1,q:"하수 중의 질소와 인을 동시에 제거하기 위해 이용될 수 있는 고도처리시스템은?",c:["Anaerobic Oxic법","3단 활성 슬러지법","Phostrip법","Anaerobic Anoxic Oxic법"],a:4,e:"Anaerobic Anoxic Oxic법(A²O법)은 생물학적 방법에 의해 질소, 인을 동시에 제거한다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:2,q:"수돗물에서 페놀류를 문제삼는 가장 큰 이유는?",c:["불쾌한 냄새를 내기 때문","경도가 높아서 물때가 생기기 때문","물거품을 일으키기 때문","물이 탁하게 되고 색을 띠기 때문"],a:1,e:"페놀은 불쾌한 냄새와 암을 유발하는 인자이므로 인체에 해롭다. 특히 염소와 반응하면 클로로페놀이 되어 악취가 강해진다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:3,q:"생물학적 처리방법으로 하수를 처리하고자 한다. 이를 위한 운영조건으로 틀린 것은?",c:["영양물질인 BOD:N:P의 농도비가 100:5:1이 되도록 조절한다.","폭기조 내 용존산소는 통상 2mg/L로 유지한다.","pH의 최적조건은 6.8~7.2로서 이때 미생물의 활동이 활발하다.","수온은 낮게 유지할수록 경제적이다."],a:4,e:"수온은 높을수록 경제적이다(미생물 활동 활발)."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:4,q:"활성 슬러지법과 비교할 때 생물막법에 대한 설명으로 틀린 것은?",c:["운전조작이 간단하다.","하수량 증가에 대응하기 쉽다.","반응조를 다단화하여 반응효율과 처리안정성의 향상이 도모된다.","생물종 분포가 단순하여 처리효율을 높일 수 있다."],a:4,e:"생물막법은 생물종 분포가 다양하여 처리효율을 높일 수 있다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:5,q:"일반상수에서 경도(Hardness)를 유발하는 주된 물질은?",c:["Ca²⁺, Mg²⁺","Al³⁺, Na⁺","SO₃²⁻, NO₃⁻","Mn²⁺, Zn²⁺"],a:1,e:"경도란 세기 정도를 나타내는 용어로서 물속에 용존하고 있는 Ca²⁺, Mg²⁺, Fe²⁺, Mn²⁺, Sr²⁺ 등 2가 양이온 금속의 함량을 이에 대응하는 CaCO₃ppm으로 환산표시한 값이며 일시경도와 영구경도가 있다."},
{g:"b1c7",gt:"[1권] 1과목 7장 미량 유·무기 물질제어",s:"수처리공정",n:6,q:"다음 중 수중 불순물의 분리조작에서 액체와 고체 간의 이동에 따른 상간이동에 의한 분리조작과 관련된 것은?\n㉠ 이온교환  ㉡ 증발과 증류  ㉢ 생물흡착  ㉣ 활성탄흡착",c:["㉠, ㉡","㉡, ㉢","㉡, ㉢, ㉣","㉠, ㉢, ㉣"],a:4,e:"수중 불순물의 분리조작에서 액체와 고체 간의 이동에 따른 상간이동에 의한 분리조작방법으로 이온교환, 활성탄흡착, 생물흡착 등의 방법이 있다."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:14,q:"1L의 매스실린더에 활성 슬러지를 채우고 30분간 침전시킨 후 침전된 슬러지의 부피가 180mL이었다. 이때 MLSS가 2,000mg/L이었다면 슬러지용적지수(SVI)는?",c:["90","100","180","190"],a:1,e:"SVI = SV(mg/L)/MLSS농도(mg/L) × 10³ = 180/2,000 × 10³ = 90"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:15,q:"5%의 고형물을 함유하는 3,200L의 1차 슬러지를 고형물의 농도가 8%되게 농축시키면 농축된 슬러지의 부피는?(단, 슬러지의 비중은 1.0으로 한다)",c:["1,500L","2,000L","2,500L","2,800L"],a:2,e:"V₁/V₂ = (100-W₂)/(100-W₁)\nV₂ = (100-95)/(100-92) × 3,200L = 2,000L (함수율 95%→92%)"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:16,q:"다음 중 활성 슬러지법의 변법이 아닌 것은?",c:["호기성 산화지","장시간폭기법","산화구법","계단식 폭기법"],a:1,e:"① 호기성 산화지는 인위적으로 폭기를 하지 않는 산화지법의 일종이다(활성 슬러지법의 변법이 아님)."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:17,q:"활성 슬러지법의 여러 가지 변법 중에서 잉여 슬러지량을 현저하게 감소시키고 슬러지처리를 용이하게 하기 위해 개발된 방법으로서 폭기시간이 16~24시간, F/M비가 0.03~0.05kgBOD/kgSS·Day 정도의 낮은 BOD-SS부하로 운전하는 방식은?",c:["계단식 폭기법","장시간폭기법","표준 활성 슬러지법","순산소폭기법"],a:2,e:"장시간폭기법은 산소소비량이 많고 폭기조 부피가 커져 에너지비와 초기시설비가 과대해지므로 소규모 하수처리장에 적합하다."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:18,q:"하수처리법 중 활성 슬러지법에 대한 설명으로 옳은 것은?",c:["호기성 미생물의 대사작용에 의하여 유기물을 제거한다.","부유물을 활성화시켜 침전·부착시킨다.","부유물을 이용하는 방법과 쇄석 등의 표면에 부착한 생물막을 이용하는 방법 등이 있다.","세균을 제거함으로써 슬러지를 정화한다."],a:1,e:"활성 슬러지법: 호기성 미생물의 산화, 흡착, 동화 등의 대사작용에 의해 유기물을 제거하는 생물학적 처리법"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:19,q:"혐기성 소화에 의한 슬러지처리법에서 발생되는 가스성분 중 가장 많은 것은?",c:["탄산가스","메탄가스","유화수소","황화수소"],a:2,e:"메탄생성단계에서는 메탄(CH₄)과 이산화탄소(CO₂)가 2:1의 비율로 생성된다(메탄이 가장 많음)."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:7,q:"표준 활성 슬러지법에서 수리학적 체류시간의 표준은?",c:["2~4h","4~6h","6~8h","8~10h"],a:3,e:"표준 활성 슬러지법에서 수리학적 체류시간은 6~8h이다."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:8,q:"일반적인 표준 활성 슬러지공정을 바르게 나타낸 것은?",c:["침사지 → 1차 침전지 → 폭기조 → 2차 침전지 → 소독조 → 방류","1차 침전지 → 침사지 → 폭기조 → 2차 침전지 → 방류","침사지 → 소독조 → 1차 침전지 → 폭기조 → 2차 침전지 → 방류","침사지 → 폭기조 → 1차 침전지 → 2차 침전지 → 소독조 → 방류"],a:1,e:"표준 활성 슬러지공정: 침사지 → 1차 침전지 → 폭기조 → 2차 침전지 → 소독 → 방류"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:9,q:"다음 슬러지 탈수방법 중 슬러지 케이크의 함수율이 55~70% 정도로 생산하는 탈수기는 어느 것인가?",c:["진공탈수기","가압탈수기","원심탈수기","여과탈수기"],a:2,e:"가압탈수기: 55~70%\n진공탈수기·원심탈수기: 60~80%"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:10,q:"하수슬러지 농축조에 대한 다음의 설명 중 틀린 것은?",c:["유효수심은 4m 이상으로 한다.","슬러지 스크레이퍼를 설치할 경우 탱크바닥면의 가운데는 5/100 이상이 좋다.","농축조의 용량은 계획 슬러지양의 18시간 분량 이상으로 한다.","슬러지 스크레이퍼가 없는 경우 탱크바닥의 중앙에 호퍼를 설치하되 호퍼측 벽의 기울기는 수평의 60° 이상으로 한다."],a:3,e:"농축조의 용량은 계획 슬러지양의 18시간 분량 이하로 한다."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:11,q:"다음의 괄호 안에 적당한 용어는 무엇인가?\n만약 콜로이드 물질이 고정되어 갇혀 있을 경우에 직류전위를 응용하면 입자가 보통 움직이는 방향과는 반대방향으로 액체를 흐르게 한다. 이 현상을 ( ㉠ )라고 하며 ( ㉡ )에 응용되고 있다.",c:["㉠ 전기침투현상, ㉡ 슬러지의 탈수","㉠ 전기침투현상, ㉡ 슬러지의 농축","㉠ 전기영동, ㉡ 슬러지의 탈수","㉠ 전기영동, ㉡ 슬러지의 농축"],a:1,e:"점성토에 전극을 삽입하여 직류를 흐르게 하면 전기침투현상에 의해 음극에 수분이 모이게 되는 원리를 이용하여 압밀배수를 도모하는 공법이다(슬러지의 탈수)."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:12,q:"함수율 98%인 슬러지를 농축하여 함수율을 95%로 낮추었다. 이때 슬러지의 부피감소율은?(단, 슬러지의 비중은 1.0으로 한다)",c:["40%","50%","60%","70%"],a:3,e:"V₂ = (100-98)/(100-95) × V₁ = 0.4V₁\n∴ 부피감소율 = (V₁-V₂)/V₁ = (V₁-0.4V₁)/V₁ × 100 = 60%"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:13,q:"함수율 99%의 슬러지 100m³가 있다. 이 슬러지를 탈수하여 함수율을 70%로 낮추었을 때 슬러지 케이크의 부피는?(단, 슬러지의 비중은 1.0으로 한다)",c:["3.3m³","5.5m³","7.7m³","8.9m³"],a:1,e:"V₁ = (100-99)/(100-70) × 100 = 3.3m³"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:1,q:"일반적인 하수 슬러지처리과정이 바르게 구성된 것은?",c:["슬러지 → 소화 → 농축 → 개량 → 탈수 → 건조 → 처분","슬러지 → 농축 → 개량 → 소화 → 탈수 → 건조 → 처분","슬러지 → 농축 → 소화 → 개량 → 탈수 → 건조 → 처분","슬러지 → 소화 → 개량 → 농축 → 탈수 → 건조 → 처분"],a:3,e:"일반적 하수 슬러지처리과정: 슬러지 → 농축 → 소화 → 개량 → 탈수 → 건조 → 처분"},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:2,q:"슬러지용적지수(SVI)에 관한 설명 중 옳지 않은 것은?",c:["폭기조 내 혼합물을 30분간 정치한 후 침강한 1g의 슬러지가 차지하는 부피(mL)로 나타낸다.","정상적으로 운전되는 폭기조의 SVI는 50~150 범위이다.","SVI는 슬러지밀도지수(SDI)에 100을 곱한 값을 의미한다.","SVI는 폭기시간, 수온에 영향을 받는다."],a:3,e:"SVI = 100/SDI (SDI에 100을 곱한 것이 아니라 나눈 값이다)."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:3,q:"슬러지의 혐기성 소화에 관한 설명 중 틀린 것은 어느 것인가?",c:["호기성 처리에 비해 산소공급을 위한 에너지가 절약된다.","실온에서는 분해속도가 대단히 느리다.","온도와 pH의 영향을 쉽게 받는다.","유입유량의 변화가 심한 경우에도 적응을 잘 할 수 있다."],a:4,e:"혐기성 소화는 유입유량의 변화가 심하지 않은 경우에 적합하다(변화에 민감)."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:4,q:"다음은 슬러지의 농축방법에 관한 설명이다. 틀린 것은?",c:["중력식 농축조는 조 내에 슬러지를 체류시켜 자연중력을 이용하여 농축하는 방법이다.","부상식 농축조의 고형물 부하는 80~150kg/m²·day 정도이다.","중력식 농축조의 고형물 부하는 100~200kg/m²·day 정도이다.","중력식 농축조의 용량은 계획 슬러지양의 18시간 분량 이하로 한다."],a:3,e:"중력식 농축조의 고형물 부하는 25~70kg/m²·day 정도이다."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:5,q:"활성 슬러지공법에서 슬러지 팽화(Bulking)의 원인으로 적절하지 못한 것은?",c:["MLSS의 농도 증가","슬러지배출량의 조절 불량","유입하수량 및 수질의 과도한 변동","부적절한 온도, 질소 혹은 인의 결핍"],a:1,e:"① 슬러지 팽화는 폭기조 내 부유물질(MLSS)의 농도가 저하될 경우이다(증가가 아님)."},
{g:"b1c6",gt:"[1권] 1과목 6장 배출수(슬러지)처리 및 관리",s:"수처리공정",n:6,q:"SVI(Sludge Volume Index)의 측정을 위한 시료는 어디에서 채취하는가?",c:["최초침전지의 배출 슬러지","최종침전지의 배출 슬러지","폭기조 혼합액","슬러지소화조 유출수"],a:3,e:"SVI(슬러지용적지수)는 슬러지의 침강농축성을 나타내는 지표로 측정시료는 폭기조의 혼합액에서 채취한다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:14,q:"처리수량이 6,000m³/day인 정수장에서 염소를 6mg/L의 농도로 주입할 때 잔류염소농도가 0.2mg/L이었다. 염소요구량은?(단, 염소의 순도는 75%)",c:["52.5kg/day","46.4kg/day","38.5kg/day","32.5kg/day"],a:2,e:"염소요구량 = 염소요구농도 × 유량 × 1/순도(%)\n= (6mg/L - 0.2mg/L) × 6,000m³/day × 1/0.75\n= 5.8g/m³ × 6,000m³/day × 1/10³kg × 1/0.75\n= 46.4kg/day"},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:15,q:"30,000m³/day 물을 염소소독하여 잔류염소농도를 0.2mg/L로 유지하고자 한다. 이 물에 1mg/L의 염소를 주입하였을 때 잔류염소가 0.5mg/L이었다면 이 경우 하루에 필요한 소요염소량은?",c:["7kg/day","14kg/day","21kg/day","28kg/day"],a:3,e:"염소주입량 = 주입염소농도 × 물공급량\n주입염소농도 = 염소요구량 + 잔류염소량 = 0.5mg/L + 0.2mg/L = 0.7mg/L(≒g/m³)\n∴ 염소주입량 = 0.7g/m³ × 30,000m³/day = 21,000g/day = 21kg/day"},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:16,q:"종말 침전지에서 유출되는 수량이 5,000m³/day이다. 여기에 염소처리를 하기 위해 유출수에 100kg/day의 염소를 주입한 후 잔류염소의 농도를 측정하였더니 0.5mg/L이었다. 염소요구량(농도)은?(단, 염소는 Cl₂ 기준)",c:["16.5mg/L","17.5mg/L","18.5mg/L","19.5mg/L"],a:4,e:"염소요구량 = 염소주입량 농도 - 잔류염소농도\n= (100kg/day ÷ 5,000m³/day) - 0.5mg/L\n= 0.02kg/m³ - 0.5mg/L = 20mg/L - 0.5mg/L = 19.5mg/L"},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:8,q:"염소살균의 장점이 아닌 것은?",c:["살균력이 뛰어나다.","설비 및 주입방법이 비교적 간단하다.","트라이할로메탄의 생성을 방지할 수 있다.","비용이 비교적 저렴하다."],a:3,e:"③ 염소살균은 발암물질인 트라이할로메탄(THM)을 생성시킬 가능성이 있다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:9,q:"다음 중 전염소처리법의 목적에 적합하지 않은 것은?",c:["원수 내의 철과 망간을 제거한다.","세균이나 NH₃-N 등을 제거한다.","적정 잔류염소를 유지한다.","이취의 원인인 유기물을 제거한다."],a:3,e:"전염소처리의 목적: 조류 및 세균번식 방지, NH₃-N·NO₂-N·황화수소·페놀류·유기물 산화 분해. 적정 잔류염소 유지는 후염소처리의 목적이다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:10,q:"전염소처리로 제거할 수 없는 것은?",c:["철(Fe)","망간","페놀류","트라이할로메탄"],a:4,e:"트라이할로메탄은 염소소독으로 인해 발생하는 발암성 물질이다(제거 대상이 아니라 생성물)."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:11,q:"다음 중 음용수 소독 시 클로라민을 이용한 소독방법이 유리염소보다 더 좋은 점은 어느 것인가?",c:["소독력이 강하다.","잘 휘발된다.","맛과 냄새가 강하다.","살균작용이 오래 지속된다."],a:4,e:"클로라민을 이용한 소독법은 살균 후 물에 맛과 냄새를 주지 않고 살균작용이 오래 지속된다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:12,q:"다음 중 염소소독에 대한 설명으로 적합하지 않은 것은?",c:["ClO₂소독에 비하여 바이러스 사멸효과가 나쁘다.","pH가 높아지면 살균력이 감소된다.","암모니아가 존재하는 경우 결합잔류염소로 존재한다.","처리수의 총용존고형물을 감소시키는 효과가 있다."],a:4,e:"④ 염소소독은 처리수의 총용존고형물을 오히려 증가시킨다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:13,q:"용수의 소독에 사용할 수 있는 소독제에 관한 설명으로 가장 거리가 먼 것은?",c:["이산화염소의 소독력은 강하나 페놀류화합물 처리 시에는 맛과 냄새의 유발로 사용을 제한한다.","아이오딘을 소독제로 사용하는 것을 제한하는 이유는 고가의 비용 때문이다.","태양광의 파장이 커질수록(길어질수록) 살균효과는 감소한다.","물을 멸균하기 위한 은(Ag)의 투여량은 1μg~0.5mg/L 정도로 알려져 있다."],a:1,e:"① 이산화염소의 소독력은 염소보다 강하고 페놀류화합물을 분해하며, 처리 시에는 맛과 냄새, 색도 제거에도 효과적이다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:1,q:"병원균 등의 세균을 완전히 제거하기 위하여 사용되는 정수방법은?",c:["응집","소독","여과","침전"],a:2,e:"소독(살균)은 병원균 등의 세균을 완전히 제거하기 위한 정수처리방법이다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:2,q:"수돗물의 염소처리에서 유리잔류염소의 농도를 0.4mg/L 이상으로 강화해야 할 경우에 해당되지 않는 것은?",c:["소화기 계통의 수인성 전염병이 유행할 때","정수작업에 이상이 있을 때","단수 후 급수를 다시 개시할 때","철, 망간의 성분이 함유되어 있을 때"],a:4,e:"①·②·③ 이외에도 홍수로 원수수질이 현저히 악화됐을 때, 수도전 계통을 통한 오염의 염려가 있을 때에는 유리잔류염소량은 0.4mg/L 이상, 결합잔류염소량은 1.8mg/L 이상 주입하여야 한다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:3,q:"염소소독을 위한 염소투입량 시험결과가 그림과 같다(A→B 상승, B→C 상승, C→D 하강, D→E 상승). 결합염소(클로라민)가 분해되는 구간과 파괴점(Break Point)으로 옳은 것은?",c:["AB구간, C","BC구간, D","CD구간, D","AB구간, D"],a:3,e:"염소주입과 잔류염소\n· AB구간: 환원성 무기·유기성분에 의해 염소가 소비되는 구간\n· BC구간: 결합잔류염소(클로라민)의 형성\n· CD구간: 결합잔류염소(클로라민)의 분해\n· DE구간: 유리잔류염소의 지속구간\n· D구간: 불연속점·파괴점(Break Point)"},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:4,q:"염소가 수중의 여러 가지 불순물과 작용한 후에도 HOCl이나 OCl⁻로 존재하는 염소를 무엇이라 하는가?",c:["유리잔류염소","결합잔류염소","결합유효염소","염소요구량"],a:1,e:"유리잔류염소: 물을 염소로 소독했을 때 하이포아염소산과 하이포아염소산이온의 형태로 존재하는 염소를 말한다. 클로라민(Chloramine)과 같은 결합잔류염소를 포함해서 말하는 경우도 있으며, 염소를 투입하여 30분 후에 잔류하는 염소의 양을 ppm으로 표시한다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:5,q:"염소의 살균능력을 순서대로 표시한 것으로 옳은 것은?",c:["HOCl > OCl⁻ > 클로라민","클로라민 > OCl⁻ > HOCl","클로라민 > HOCl > OCl⁻","OCl⁻ > 클로라민 > HOCl"],a:1,e:"살균력 순서: HOCl > OCl⁻ > 클로라민. 차아염소산(HOCl)의 살균력이 가장 강하다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:6,q:"염소소독 시 살균력이 증가되는 온도와 pH의 조건은?",c:["pH와 수온이 높을 때","pH는 낮고 수온이 높을 때","pH는 높고 수온이 낮을 때","pH와 수온이 낮을 때"],a:2,e:"염소의 살균력은 pH는 낮고 수온이 높을 때 증가한다."},
{g:"b1c5",gt:"[1권] 1과목 5장 미생물제어(소독)",s:"수처리공정",n:7,q:"다음 설명 중 정수처리 시 염소살균제의 주입에 관한 내용으로 옳지 않은 것은?",c:["주입량은 처리수량과 주입률로 산출한다.","주입률은 급수전수가 평상시 기준으로 유리잔류염소량이 1.0ppm 이상 되도록 한다.","주입률은 급수전수가 평상시 기준으로 결합잔류염소량이 1.5ppm 이상 되도록 한다.","물의 염소소비량을 측정하여 주입률 산정에 포함하도록 한다."],a:2,e:"② 주입률은 급수전수가 평상시 기준으로 유리잔류염소 0.2ppm 이상 되도록 한다."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:8,q:"정수처리를 위한 급속여과지에 관한 설명으로 틀린 것은?",c:["중력식을 표준으로 한다.","여과면적은 계획정수량을 여과속도로 나누어 계산한다.","1지의 여과면적은 250m² 이하로 한다.","여과속도는 120~150m/day를 표준으로 한다."],a:3,e:"1지의 여과면적은 150m² 이하로 한다."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:9,q:"정수처리를 위한 완속여과지의 표준 여과속도 범위는?",c:["3~4m/day","4~5m/day","5~6m/day","6~8m/day"],a:2,e:"완속여과지의 표준 여과속도 범위는 4~5m/day이다."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:10,q:"상수도에서 적용되는 급속여과지의 여과모래에 관한 설명으로 옳지 않은 것은?",c:["모래층 두께는 60~120cm의 범위로 한다.","여과모래의 유효경은 0.3~0.45mm이다.","여과모래의 최대경은 2mm 이내이다.","여과모래의 균등계수는 1.7 이하로 한다."],a:2,e:"급속여과지 여과모래의 유효경은 0.45~1.0mm이다."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:11,q:"정수를 위한 급속여과지에 관한 설명으로 틀린 것은?",c:["여과면적은 계획정수량을 여과속도로 나누어 계산한다.","1지의 여과면적은 100m² 이하로 한다.","여과사의 유효경은 0.45~0.7mm 범위 이내이어야 한다.","여과속도는 120~150m/day를 표준으로 한다."],a:2,e:"1지의 여과면적은 150m² 이하로 한다."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:12,q:"1일 처리수량이 30,000m³인 정수처리장의 급속여과시설을 120m/day의 여과속도로 5개의 여과지를 설치하고자 한다. 이때 급속여과지 1개의 소요면적은?",c:["50m²","62m²","83m²","100m²"],a:1,e:"Q=AV에서 A = Q/V = 30,000m³/day ÷ 120m/day = 250m² ÷ 5개 = 50m²/개"},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:13,q:"1일 60,000ton의 처리용량을 가진 정수처리장의 급속여과시설에 120m/day 여과속도 기준으로 10개의 여과지를 설치하고자 한다. 여과지 한 개당 소요면적은?(단, 여유 여과지를 2개 설치한다)",c:["42.5m²","50.0m²","62.5m²","75.0m²"],a:3,e:"여과지 면적 A = Q/V = 60,000/120 = 500m²\n여유 여과지 2개 제외 실여과지 8개 기준 ∴ 1개 면적 = 500/8 = 62.5m²"},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:14,q:"여과지의 수위가 일정하도록 유입 또는 유출밸브를 조절하는 정수위여과에서 여과시간과 여과수량의 관계를 나타낸 곡선은?(A: 수평 유지, B: 서서히 감소 후 급감, C: 일정하게 서서히 감소, D: 처음부터 급감)",c:["A곡선","B곡선","C곡선","D곡선"],a:3,e:"C: 정압여과(정수위여과) - 여과수량은 여층의 상류층 수위와 하류층 수위, 즉 여층에 걸리는 압력차를 일정하게 하는 방식으로 서서히 감소한다.\nA: 정속여과, B: 감쇄여과"},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:1,q:"침사지에서 제거되는 취수한 물 속에 포함된 모래입자의 일반적인 크기와 체류시간으로서 적당한 것은?",c:["입자크기: 0.1~0.2mm, 체류시간: 10~20초","입자크기: 0.1~0.2mm, 체류시간: 10~20분","입자크기: 0.04~0.05mm, 체류시간: 10~20초","입자크기: 0.04~0.05mm, 체류시간: 10~20분"],a:2,e:"침사지 기준 - 입자크기: 0.1~0.2mm, 체류시간: 10~20분"},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:2,q:"여과모래 선정 시 주요 고려사항이 아닌 것은?",c:["균등계수","유효경","마모율","인장강도"],a:4,e:"여과모래 선정 시 고려사항: 균등계수, 유효경, 마모율, 최대경, 최소경, 비중, 강열감량 등. 인장강도는 해당 없음."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:3,q:"급속여과방식의 정수방법에서는 전처리로서 응집제의 투입이 불가피하다. 다음 중 응집제로 적절하지 않은 것은?",c:["염화제2철","황산알루미늄","수산화나트륨","황산제1철"],a:3,e:"수산화나트륨(NaOH)은 pH 첨가제이다(응집제가 아님)."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:4,q:"정수의 완속여과에 대한 설명 중 틀린 것은?",c:["부유물질 외에 세균제거도 가능하다.","급속여과에 비해 넓은 부지면적을 필요로 한다.","여과속도는 4~5m/day를 표준으로 한다.","전처리로서 응집침전과 같은 약품처리가 필수적이다."],a:4,e:"전처리로서 응집침전과 같은 약품처리가 필수적인 공정은 급속여과이다."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:5,q:"급속여과지의 여과속도는 얼마를 표준으로 하는가?",c:["4~5m/day","30~50m/day","60~90m/day","120~150m/day"],a:4,e:"급속여과지의 여과속도는 120~150m/day를 표준으로 한다."},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:6,q:"급속여과에서 탁질누출현상이 일어나기까지의 순서로 옳은 것은?",c:["Air Binding → 부수압 → Scour → 탁질누출현상","Air Binding → Scour → 부수압 → 탁질누출현상","부수압 → Scour → Air Binding → 탁질누출현상","부수압 → Air Binding → Scour → 탁질누출현상"],a:4,e:"탁질누출현상: 공기장애(Air Binding)가 일어나면 모래층 내의 간극이 작아져 유속이 빨라지게 되고, 유속이 어느 한도 이상이 되면 여과층 중에 억류되어 있던 플록이 파괴되어 여과수와 같이 유출되는 현상. 순서: 부수압 → Air Binding → Scour → 탁질누출"},
{g:"b1c4",gt:"[1권] 1과목 4장 여과",s:"수처리공정",n:7,q:"다층여과에 대한 설명 중 옳지 않은 것은?",c:["전체 여층을 유효하게 사용한다.","여과저항의 상승을 크게 한다.","여과시간을 길게 지속시킨다.","입경이 크고 비중이 작은 여재를 상층부에 둔다."],a:2,e:"다층여과는 여과층 전체에서 여과되므로 여과저항의 상승을 '작게' 한다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:13,q:"이상적인 침전지에서 유량 Q=12,000m³/day, 침전속도 Vs=0.1cm/s, 표면적 A=80m², 수심 h=5m일 때 침전효율은?",c:["50.4%","57.4%","66.0%","73.5%"],a:2,e:"침전효율 E = Vs/Vo × 100\n표면부하율 Vo = Q/A = 12,000m³/day ÷ 80m² = 150m/day = 0.174cm/s\n∴ E = 0.1/0.174 × 100 ≒ 57.4%"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:14,q:"유효수심이 3.2m, 체류시간이 2.7시간인 침전지의 수면적 부하는 얼마인가?",c:["20.25m/day","28.44m/day","11.19m/day","31.22m/day"],a:2,e:"Q/A = H/t = 3.2m/2.7h = 1.185m/h = 28.44m/day"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:15,q:"침전지의 수심이 4m이고, 체류시간이 2시간일 때 이 침전지의 표면부하율은?",c:["12m³/m²·day","24m³/m²·day","36m³/m²·day","48m³/m²·day"],a:4,e:"표면부하율 = Q/A = H/t = 4/(2/24) = 48m³/m²·day"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:16,q:"침전지의 유효수심이 4m, 침전시간 8시간, 1일 최대사용 수량이 600m³일 때 침전지의 소요 표면적은 얼마인가?",c:["33m²","42m²","50m²","62m²"],a:3,e:"침전지 면적 A = Q/V\nQ = 600/24 = 25m³/h\nV = H/t = 4/8 = 0.5m/h\n∴ A = 25/0.5 = 50m²"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:17,q:"깊이 3m, 표면적 500m²인 어떤 수도용 침전지에서 1,000m³/h의 유량이 유입된다. 독립침전임을 가정할 때 100% 제거할 수 있는 침전지의 최소 침강속도는?",c:["0.5m/h","1.0m/h","1.5m/h","2.0m/h"],a:4,e:"침전지의 침강속도 Vo = Q/A = 1,000m³/h ÷ 500m² = 2.0m/h"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:18,q:"하수처리장의 1차 처리시설인 침전지에서 BOD 부하의 30%가 처리되고, 2차 처리시설에서 90%가 처리된다면 전체 BOD제거율은?",c:["82%","86%","89%","93%"],a:4,e:"1차 침전지의 제거율이 30%이므로 미제거된 BOD = 1.0 - 0.3 = 0.7\n2차 침전지에서 제거율이 90%이므로 0.7 × 0.9 = 0.63(=63%)\n∴ 전체 BOD제거율 = 0.3 + 0.63 = 0.93(=93%)"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:7,q:"정수 시 보통침전지의 용량은 계획정수량에 대하여 몇 시간분을 표준으로 하는가?",c:["3시간","5시간","8시간","10시간"],a:3,e:"정수 시 보통침전지의 용량은 계획정수량에 대하여 8시간분을, 약품침전지의 경우에는 3~5시간분을 표준으로 한다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:8,q:"침전지의 효율을 높이기 위한 사항으로 틀린 것은?",c:["침전지의 표면적을 크게 한다.","침전지 내 유속을 크게 한다.","유입부에 정류벽을 설치한다.","지(池)의 길이에 비하여 폭을 좁게 한다."],a:2,e:"침전지 내 유속과 침전속도를 작게 해야 침전효율이 높아진다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:9,q:"다음 중 다른 입자들의 영향을 받지 않고 독립적으로 침전하는 유형은?",c:["Ⅰ형 침전","Ⅱ형 침전","Ⅲ형 침전","Ⅳ형 침전"],a:1,e:"Ⅰ형 침전: 독립침전 / Ⅱ형 침전: 응결침전 / Ⅲ형 침전: 지역(간섭)침전 / Ⅳ형 침전: 압축침전"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:10,q:"입자의 침강속도에 대한 설명 중 틀린 것은?",c:["수온이 높을수록 침강속도는 느리다.","침강속도는 입자직경의 제곱에 비례한다.","입자의 밀도가 클수록 침강속도는 빨라진다.","점성계수가 작을수록 침강속도는 빨라진다."],a:1,e:"수온이 높으면 점성계수가 작아지므로 침강속도는 빨라지게 된다(Stokes 법칙)."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:11,q:"정수장에서 혼화, 플록형성, 침전이 하나의 반응조 내에서 이루어지는 침전지는?",c:["보통침전지","약품침전지","경사판침전지","고속응집침전지"],a:4,e:"고속응집침전설비는 플록 형성을 기존 플록의 존재하에서 하며, 침전조작을 하나의 장치 안에 넣어 짧은 체류시간 내에 수행하는 장치이다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:12,q:"1일 22,000m³를 정수처리하는 정수장에서 고형 황산알루미늄을 평균 25mg/L씩 주입할 때 필요한 응집제의 양은 얼마인가?",c:["250kg/day","320kg/day","480kg/day","550kg/day"],a:4,e:"적정응집제의 양 = 황산알루미늄의 평균주입량농도 × 1일 처리수량 = 0.025kg/m³ × 22,000m³/day = 550kg/day"},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:1,q:"스토크스법칙이 가장 잘 적용되는 침전형태는?",c:["단독침전","응집침전","지역침전","압축침전"],a:1,e:"① 스토크스법칙은 독립(단독)침전형태에서 적용한다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:2,q:"스토크스법칙을 이용하여 설계하는 시설은 다음 중 어느 것인가?",c:["혼화지","응집지","여과지","침전지"],a:4,e:"스토크스법칙은 보통 침전지의 설계공식으로 사용된다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:3,q:"침전에 관한 스토크스의 법칙에 대한 설명으로 잘못된 것은?",c:["침강속도는 입자와 액체의 밀도차에 비례한다.","침강속도는 겨울철이 여름철보다 크다.","침강속도는 입자의 크기가 클수록 크다.","침강속도는 중력가속도에 비례한다."],a:2,e:"침강속도는 온도에 비례하므로(수온↑ → 점성↓ → 침강속도↑) 여름철이 겨울철에 비해 크다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:4,q:"스토크스의 침강속도를 구하는 식은?(단, vs는 침강속도, ρs 및 ρ는 토립자 및 물의 밀도, g는 중력가속도, μ는 점성계수, d는 토립자의 입경)",c:["vs = ((ρs-ρ)/18μ)gd³","vs = ((ρs-ρ)/18μ)gd^1.5","vs = ((ρs-ρ)/18μ)gd^2.5","vs = ((ρs-ρ)/18μ)gd²"],a:4,e:"스토크스의 침강속도식: vs = ((ρs-ρ)/18μ)gd² — 입경의 제곱에 비례한다."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:5,q:"다음 중 스토크스법칙의 기본 가정이 아닌 것은?",c:["입자의 크기가 일정하다.","입자가 구형이다.","물의 흐름은 층류상태이다.","입자 간 응집성을 고려한다."],a:4,e:"스토크스법칙은 입자의 속도, 크기, 밀도, 비중 등을 전제로 하며, 입자 간 응집은 고려하지 않는다(독립침전 가정)."},
{g:"b1c3",gt:"[1권] 1과목 3장 침전",s:"수처리공정",n:6,q:"다음 약품침전지의 구조에 관한 설명 중 틀린 것은?",c:["침전지의 수는 원칙적으로 2지 이상으로 한다.","각 침전지마다 독립적으로 사용 가능한 구조로 한다.","직사각형 침전지의 경우 폭은 길이의 3~5배를 표준으로 한다.","유효수심 외에 30cm 이상의 퇴적 공간을 둔다."],a:3,e:"직사각형 침전지의 경우 '길이가 폭의' 3~8배 정도로 한다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:19,q:"급속교반조나 혼화지 등의 설계 시 필요한 G값(속도구배)을 구할 때, 직접적으로 고려되는 것을 모두 고르면?(단, 기계식 교반을 위한 속도경사식 기준)\n㉠ 소요동력  ㉡ 혼합조 부피  ㉢ 물의 점성  ㉣ 체류시간",c:["㉠, ㉡","㉡, ㉢","㉠, ㉡, ㉢","㉡, ㉣"],a:3,e:"G = √(P/μV)\n· P: 소요동력\n· μ: 물의 절대점성계수\n· V: 혼합조의 용적\n따라서 소요동력, 혼합조 부피, 물의 점성이 직접 고려된다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:20,q:"다음 응집제 중 알칼리도를 가장 크게 감소시키는 것은?(단, 응집제 1mg/L 주입 기준)",c:["황산알루미늄(액체 Al₂O₃ 8%)","황산알루미늄(고형 Al₂O₃ 15%)","폴리염화알루미늄(Al₂O₃ 염기도 30%)","폴리염화알루미늄(Al₂O₃ 염기도 40%)"],a:2,e:"폴리염화알루미늄(PAC)보다 황산알루미늄이, 액체보다 고체 황산알루미늄이 알칼리도를 크게 감소시킨다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:21,q:"응집제의 특성으로 바르지 않은 것은?",c:["황산알루미늄 - 형성된 플록이 비교적 가볍고 적정 pH폭이 매우 넓어 광범위하게 적용되고 있다.","염화제2철 - 형성 플록이 무겁고 침강이 빠르며 부식성이 강하다.","황산제1철 - pH와 알칼리도가 높은 물에서 주로 사용하며 부식성이 강하다.","PAC - 플록형성속도가 빠르며 저온 열화(劣化)하지 않는다."],a:1,e:"황산알루미늄은 형성된 플록이 비교적 가볍고 적정 pH폭이 '좁은' 단점이 있다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:22,q:"국내 혼화지의 설계기준은 대부분 상수도 시설기준에 의하는데, 다음 중 틀린 것은?",c:["혼화지에는 응집제를 주입한 후 즉시 급속교반을 할 수 있는 혼화장치를 설치하여야 한다.","혼화장치는 혼화효과와 유지관리의 방침 등에 입각하여 적절한 방법으로 작동할 수 있도록 하여야 한다.","응집제의 혼화시간은 신속·균일한 혼화 시 계획정수량에 대하여 10분 내외가 바람직하다.","혼화지는 수류 전체가 동시에 회전하거나 단락류를 발생하는 일이 없도록 구조에 유의하여야 한다."],a:3,e:"응집제의 혼화시간은 신속·균일한 혼화 시 계획정수량에 대하여 1분 내외가 바람직하다. 단, 수질 및 현장조건에 따라 pH 조절제의 혼화와 연관하여 조절할 수 있다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:13,q:"다음 중 응집에 관한 내용으로 틀린 것은?",c:["응집제를 가하는 목적은 콜로이드의 반발력을 감소시키고자 함이다.","제타전위는 반대전하의 이온이나 콜로이드를 가하면 감소된다.","반대전하의 2가 이온은 1가 이온보다 적어도 50배, 그리고 3가 이온은 1,000배나 더 효과적이다.","친수성 콜로이드의 부착수는 고농도인 염류에 의해 증가되어 염석효과를 일으키며, 염석의 효과도는 음이온보다 양이온의 성질에 의존한다."],a:4,e:"친수성 콜로이드는 물과 강하게 결합하는 것으로 비누, 가용성 녹말, 가용성 단백질, 단백질 분해생성물, 혈청, 우뭇가사리, 아라비아 고무, 펙틴 및 합성세제 등이다. 물에 쉽게 분산되며 안정도는 콜로이드가 가지고 있는 약한 전하량보다 용매에 대한 친화성에 의존하여 수용액으로부터 이들을 제거하기 곤란해진다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:14,q:"수용액상의 전기전도도에 대한 설명으로 알맞지 않은 것은?",c:["수용액의 전기전도도는 수중에 녹아 있는 이온의 양과 각 이온의 전기를 운반하는 속도에 의해 지배된다.","전기전도도는 수용액의 비저항을 의미한다.","같은 물질이라도 측정온도가 다르면 전기전도도가 다르다.","전하를 띠지 않는 물질은 물에 많이 녹아 있어도 전기전도도에 영향을 주지 않는다."],a:2,e:"전기전도도는 용액이 전류를 운반할 수 있는 정도를 말한다(비저항의 역수 개념)."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:15,q:"소량의 전해질에서도 쉽게 응집이 일어나는 것으로, 주로 무기물질의 콜로이드인 것은?",c:["서스펜션 콜로이드","에멀션 콜로이드","친수성 콜로이드","소수성 콜로이드"],a:4,e:"주로 무기물질의 콜로이드인 소수성 콜로이드는 소량의 전해질에서도 쉽게 응집이 일어나는데, 이는 전하를 갖는 콜로이드입자가 반대부호의 이온을 가진 전해질을 흡착하여 전기적으로 중성이 되기 때문이다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:16,q:"상수처리를 위한 약품침전지의 구조로 옳지 않은 것은?",c:["슬러지의 퇴적심도로 30cm 이상을 고려한다.","유효수심은 3~5.5m로 한다.","각 지마다 독립하여 사용 가능한 구조로 하여야 한다.","고수위에서 침전지 벽체 상단까지의 여유고는 60cm 정도로 하여야 한다."],a:4,e:"고수위에서 침전지 벽체 상단까지의 여유고는 30cm 이상으로 한다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:17,q:"친수성 콜로이드에 관한 설명으로 알맞지 않은 것은?",c:["수막 또는 수화수를 형성시킨다.","물속에 서스펜션(Suspension)으로 존재한다.","매우 큰 분자 또는 이온상태로 존재한다.","물과 쉽게 반응한다."],a:2,e:"친수성 콜로이드는 물속에서 에멀션 상태로 존재한다(서스펜션은 소수성)."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:18,q:"조류제거를 위하여 살포하는 황산구리의 투입량 결정 시 고려되는 인자와 관련이 없는 것은?\n㉠ pH  ㉡ 수온  ㉢ 용존산소  ㉣ 알칼리도",c:["㉠","㉡","㉢","㉣"],a:3,e:"황산구리의 투입량 결정 시 고려되는 인자는 pH, 수온, 알칼리도 등이다. 용존산소는 해당되지 않는다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:7,q:"정수시설에서 사용되는 응집약품에 대한 설명으로 틀린 것은?",c:["응집제로는 명반이 있다.","알칼리제로는 소다회가 있다.","보조제로는 활성규산이 있다.","첨가제로는 소금이 있다."],a:4,e:"응집용 약품은 응집제, 응집보조제, 알칼리제(pH조절제) 등이 있으며 첨가제는 포함되지 않는다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:8,q:"공장폐수에 무기응집제를 넣어 반응시킬 때 콜로이드의 안정도는 Zeta전위에 따라 결정되는데, 이를 나타내는 식은?(단, δ = 전하가 영향을 미치는 전단표면 주위의 층의 두께, q = 단위면적당 전하, D = 매개체의 도전상수)",c:["± δqD/4π","± δq/4πD","± 4πδq/D","± 4πqD/δ"],a:3,e:"Zeta전위 = ± 4πδq/D. 제타전위는 콜로이드 입자의 안정도를 나타내며, 응집은 제타전위를 감소시켜 입자를 불안정화하는 과정이다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:9,q:"응집지(정수시설) 내 급속혼화시설의 급속혼화방식으로 바르게 묶인 것은?\n㉠ 공기식  ㉡ 수류식  ㉢ 기계식  ㉣ 펌프확산에 의한 방법",c:["㉠, ㉡","㉠, ㉢","㉡, ㉢","㉡, ㉢, ㉣"],a:4,e:"급속혼화시설의 급속혼화방식에는 수류식, 기계식, 펌프확산방법 등이 있다. 공기식은 해당되지 않는다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:10,q:"침사지에 관한 설명으로 틀린 것은?",c:["표면부하율은 200~500mm/min을 표준으로 한다.","지내 평균유속은 2~7cm/s를 표준으로 한다.","지의 상단높이는 지내 월류설비가 없을 때 고수위보다 30cm 정도의 여유고를 둔다.","지의 유효수심은 3~4m를 표준으로 하고, 퇴사심도를 0.5~1m로 한다."],a:3,e:"③ 지의 상단높이는 고수위보다 0.6~1m의 여유고를 둔다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:11,q:"콜로이드(Colloid)용액이 갖는 일반적인 특성이 아닌 것은?",c:["광선을 통과시키면 입자가 빛을 산란하여 빛의 진로를 볼 수 없게 된다.","콜로이드입자가 분산매 및 다른 입자와 충돌하여 불규칙한 운동을 하게 된다.","콜로이드입자는 질량에 비해서 표면적이 크므로 용액 속에 있는 다른 입자를 흡착하는 힘이 크다.","콜로이드용액의 콜로이드입자는 양이온 또는 음이온을 띠고 있다."],a:1,e:"광선을 통과시키면 입자가 빛을 산란하여 빛의 진로를 볼 수 '있게' 된다(틴들현상)."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:12,q:"상수취수시설 중 침사지 내 평균유속의 표준범위로 적절한 것은?",c:["2~7cm/s","7~15cm/s","15~20cm/s","20~30cm/s"],a:1,e:"상수취수시설 중 침사지 내 평균유속은 2~7cm/s를 표준으로 한다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:1,q:"침사지는 하수 중의 직경 0.2mm 이상의 비부패성 무기물 및 입자가 큰 부유물을 제거하기 위한 시설이다. 효율적인 침사지 설계를 위한 내용으로 적절하지 않은 것은?",c:["침사지의 평균유속은 3m/s를 표준으로 한다.","침사지의 체류시간은 30~60초를 표준으로 한다.","침사지의 형상은 직사각형, 정사각형 등으로 한다.","오수 침사지의 경우 표면부하율은 1,800m³/m²·day 정도로 한다."],a:1,e:"침사지의 평균유속은 0.3m/s를 표준으로 한다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:2,q:"침사지에 대한 설명 중 틀린 것은?",c:["일반적으로 하수 중의 지름 0.2mm 이상의 비부패성 무기물 및 입자가 큰 부유물질을 제거하기 위한 것이다.","침사지의 지수는 단일지수를 원칙으로 한다.","펌프 및 처리시설의 파손방지를 위해 펌프 및 처리시설의 앞에 설치한다.","합류식에서 우천 시 계획하수량을 처리할 수 있는 용량이 확보되어야 한다."],a:2,e:"침사지의 지수는 2지 이상으로 한다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:3,q:"응집제의 하나인 황산알루미늄의 장점이 아닌 것은?",c:["다른 응집제에 비해 가격이 저렴하다.","독성이 없어 다량으로 주입할 수 있다.","결정은 부식성이 없어 취급이 용이하다.","플록생성 시 적정 pH폭이 넓다."],a:4,e:"황산알루미늄은 플록생성 시 적정 pH폭이 좁은 단점이 있다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:4,q:"탁질을 제거하기 위한 응집제로서, 정수처리공정에서 사용되지 않는 약품은?",c:["PAC(폴리염화알루미늄)","황산반토","황산철","활성탄"],a:4,e:"활성탄은 응집제가 아니라 맛과 냄새가 발생할 경우 사용하는 약품(흡착제)이다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:5,q:"정수에 주입되는 약품 중 응집제가 아닌 것은?",c:["소석회","PAC","액체황산알루미늄","고형황산알루미늄"],a:1,e:"응집제의 종류: 황산알루미늄[Al₂(SO₄)₃], 폴리염화알루미늄(PAC), PSO(Poly Sulfate Organic), PASS, PAHCS, 염화제1철(FeCl₂), 염화제2철(FeCl₃), 황산제2철[Fe₂(SO₄)₃], 폴리머. 소석회는 pH 조정제(알칼리제)이다."},
{g:"b1c2",gt:"[1권] 1과목 2장 혼화·응집",s:"수처리공정",n:6,q:"플록형성지 내에서 플록형성시간은 계획정수량에 대하여 몇 분간을 표준으로 하는가?",c:["10~30분","20~40분","40~50분","50~60분"],a:2,e:"플록형성지 내에서 플록형성시간은 계획정수량에 대하여 20~40분간을 표준으로 한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:1,q:"다음 용어의 해설 중 옳지 않은 것은?",c:["도수 - 지표수 또는 지하수를 배출시키는 것","송수시설 - 정수시설로부터 배수구역 시점까지 정수를 보내는 시설","배수시설 - 배수지 또는 배수펌프를 기점으로 하여 급수장치까지의 시설","급수 - 소비자에게 직접 물을 공급하는 것"],a:1,e:"도수는 수원에서 취수한 원수를 정화하기 위해 정수시설(정수장)에 보내는 과정이다. '배출'이 아니라 '보내는(이송)' 개념이다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:2,q:"다음 중 도수(Conveyance of Water)시설에 대한 설명으로 알맞은 것은?",c:["상수원으로부터 원수를 취수하는 시설이다.","원수를 음용 가능하도록 처리하는 시설이다.","배수지로부터 급수관까지 정수를 수송하는 시설이다.","취수원으로부터 원수를 정수시설까지 보내는 시설이다."],a:4,e:"④ 수원에서 취수한 원수를 정수시설까지 수송하는 시설을 말한다.\n① 취수시설, ② 정수시설, ③ 배수시설에 해당한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:3,q:"저수지의 수(水)에 대한 특징을 설명한 것으로 거리가 가장 먼 것은?",c:["수량변동이 크다.","수질이 하천수에 비해 균일하다.","조류의 발생우려가 있다.","장래 오염의 위험성이 있다."],a:1,e:"저수지는 물을 저류하므로 계절적으로 수량변동이 적다. 따라서 '수량변동이 크다'는 설명이 틀렸다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:4,q:"수원(水源)에 관한 설명 중 틀린 것은?",c:["용천수는 지하수가 자연적으로 지표로 솟아나온 것으로 그 성질은 대개 지표수와 비슷하다.","심층수는 대지의 정화작용으로 인해 무균 또는 이에 가까운 것이 보통이다.","복류수는 어느 정도 여과된 것이므로 지표수에 비해 수질이 양호하며, 대개의 경우 침전지를 생략할 수 있다.","천층수는 지표면에서 깊지 않은 곳에 위치함으로써 공기의 투과가 양호하여 산화작용이 활발하게 진행된다."],a:1,e:"용천수는 피압지하수면이 지표면 상부에 있을 경우 지하수가 자연적으로 지표로 솟아나온 것으로, 성질이 지하수와 비슷하며(지표수가 아님) 청정하고 세균도 적다. 다만 많은 수량을 얻을 수 없어 상수도 수원으로 이용하는 일은 드물다(제주도에서 많이 볼 수 있음)."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:5,q:"다음 중 성층화의 원인과 가장 밀접한 요소는?",c:["경도","온도","녹조현상","미생물"],a:2,e:"호수나 저수지의 성층화는 수심에 따른 온도변화로 발생되는 물의 밀도 차이에 의해 발생한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:6,q:"다음 중 호수의 부영양화를 일으키는 주된 물질은?",c:["산소","수은","인","카드뮴"],a:3,e:"부영양화의 원인물질은 주로 질소(N)와 인(P)이다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:7,q:"다음은 수원선정 시의 고려사항이다. 잘못된 것은?",c:["수질이 좋아야 한다.","수량이 풍부하여야 한다.","가능한 한 낮은 곳에 위치하여야 한다.","유속이 빠르지 않고 계절별 수량변동이 적어야 한다."],a:3,e:"수원은 가능한 한 높은 곳에 위치하여야 한다(자연유하로 도수 가능 → 동력비 절감)."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:8,q:"BOD값이 크다는 것은 무엇을 의미하는가?",c:["미생물 분해가 가능한 물질이 많다.","영양염류가 풍부하다.","용존산소가 풍부하다.","무기물질이 충분하다."],a:1,e:"생물화학적 산소요구량(BOD)은 수중 유기물질이 20℃에서 호기성 미생물의 작용으로 5일간 분해될 때 소비되는 산소량으로, 수중에 포함된 유기물질의 함유 정도를 나타내는 지표로 활용된다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:9,q:"하천에 오수(汚水)가 유입될 때 하천의 자정작용 중 최초의 분해지대에서 BOD가 감소하는 주원인은?",c:["유기물의 침전","미생물의 번식","온도의 변화","탁도의 증가"],a:2,e:"분해지대에서는 호기성 미생물의 번식에 의해 BOD가 감소하게 된다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:10,q:"호수 내에 조류(Algae)가 많이 있을 때 pH의 변화는?",c:["하강한다.","상승한다.","하강하다가 상승한다.","상승하다가 하강한다."],a:2,e:"호수 내 조류는 광합성으로 이산화탄소를 흡수하여 pH를 9~10까지 상승시킨다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:11,q:"저수지의 수원에서 부영양화를 방지하기 위한 대책으로 잘못된 것은?",c:["영양염류의 공급","황산구리의 투여","N, P의 유입 방지","고도하수처리의 도입"],a:1,e:"부영양화는 영양염류의 과다공급 때문에 일어난다. 따라서 영양염류를 공급하는 것은 부영양화를 오히려 촉진한다. (황산구리는 조류 제거용 약품)"},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:12,q:"다음 오염물질과 인체에 관한 영향을 설명한 것 중 옳지 않은 것은?",c:["페놀 - 설사, 구토","인 - 구토, 마비","수은 - 미나마타병","포스겐 - 간염"],a:4,e:"포스겐(Phosgene)은 무색의 질식성 유독가스로 재채기, 호흡곤란의 증상이 나타난다. 간염과는 관련이 없다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:13,q:"다음 중 투수계수가 가장 낮은 토양은 어느 것인가?",c:["자갈(Gravel)","모래(Sand)","미사(Silt)","점토(Clay)"],a:4,e:"자연 상태의 토양은 토양입자+물+공기로 구성된다. 토양입자가 작고 공기량이 많으면 물이 잘 통과하는, 즉 투수계수가 높은 토양이다. 지하수의 흐름에 대한 저항 정도를 나타내는 투수계수는 입자가 가장 작은 점토가 가장 낮다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:15,q:"호소(湖沼)의 부영양화에 관한 다음 설명 중 틀린 것은?",c:["부영양화의 주원인물질은 질소와 인 성분이다.","부영양화를 판단할 수 있는 가장 일반적인 지표기준은 투명도이다.","조류의 영향으로 물에 맛과 냄새가 발생된다.","부영양화된 호소에서는 조류의 성장이 왕성하여 수심이 깊은 곳까지 용존산소농도가 높다."],a:4,e:"④ 수심이 깊은 곳은 조류의 사체 등으로 인한 침전물로 용존산소의 농도가 감소한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:16,q:"대장균군(Coliform Group)이 수질지표로 이용되는 이유로 적합하지 않은 것은?",c:["소화기 계통의 전염병균이 대장균군과 같이 존재하기 때문에 적합하다.","병원균보다 검출이 용이하다.","검출속도가 빠르기 때문에 적합하다.","소화기 계통의 전염병균보다 저항력이 약하므로 적합하다."],a:4,e:"대장균은 소화기 계통의 전염병균보다 살균에 대한 저항력이 크므로, 대장균의 유무에 의해 다른 병원균의 유무를 판단하는 간접지표로 사용된다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:17,q:"오염된 호수의 심층수에 대한 설명으로 옳은 것은?",c:["수온 및 수질의 일변화가 심하다.","플랑크톤 농도가 높다.","낮은 용존산소로 인해 수중생물의 서식에 좋지 않다.","재폭기가 활발하다."],a:3,e:"심층수에는 용존산소가 부족하여 혐기성 상태를 유지한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:18,q:"다음 중 부영양화된 호수나 저수지에서 나타나는 현상은?",c:["각종 조류의 광합성 증가로 인하여 호수 심층의 용존산소가 증가한다.","조류사멸에 의해 물이 맑아진다.","바닥에 인, 질소 등 영양염류의 증가로 송어, 연어 등 어종이 증가한다.","냄새, 맛을 유발하는 물질이 증가한다."],a:4,e:"조류가 과도하게 번식되어 맛·냄새가 발생한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:19,q:"급수방식에 대한 다음 설명 중 옳지 않은 것은?",c:["급수방식은 직결식과 저수조식으로 나누며 이를 병행하기도 한다.","배수관의 관경과 수압이 충분할 경우는 직결식을 사용한다.","수압은 충분하나 수량이 부족할 경우는 직결식을 사용하는 것이 좋다.","배수관의 수압이 부족할 경우 저수조식을 사용하는 것이 좋다."],a:3,e:"직결식은 배수관의 관경과 수압, 사용수량이 충분할 경우 사용한다. 수량이 부족하면 저수조식이 적합하다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:20,q:"용존산소 부족곡선(DO Sag Curve)에서 산소의 복귀율(회복속도)이 최대로 되었다가 감소하기 시작하는 점은?",c:["임계점","변곡점","파괴점","오염 직후"],a:2,e:"용존산소 부족곡선(DO Sag Curve)에서 산소의 복귀율(회복속도)이 최대로 되었다가 감소하기 시작하는 점은 변곡점이다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:21,q:"다음 중 일반적인 정수과정으로서 가장 타당한 것은?",c:["스크린 → 혼화 → 응집침전 → 여과 → 살균","이온교환 → 응집침전 → 스크린 → 혼화 → 살균","응집침전 → 이온교환 → 혼화 → 살균 → 스크린","스크린 → 살균 → 혼화 → 이온교환 → 응집침전"],a:1,e:"일반적인 정수과정: 스크린 → 혼화 → 응집침전 → 여과 → 소독(살균)"},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:22,q:"다음 상수의 도수 및 송수에 관한 설명 중 틀린 것은?",c:["도수 및 송수방식은 에너지의 공급원 및 지형에 따라 자연유하식과 펌프가압식으로 나눌 수 있다.","도수는 수원에서 취수한 원수를 정수처리하기 위하여 정수장으로 이송하는 단계를 말한다.","펌프가압식은 수원이 급수구역과 가까울 때와 지하수를 수원으로 할 때 적당하다.","자연유하식은 평탄한 지형에서 유리한 방식이다."],a:4,e:"자연유하식은 수원의 위가 높고, 도수로가 길 때 유리한 방식이다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:23,q:"다음 중 정수장에서 매일 1회 이상 검사하여야 하는 항목은?(단, 광역상수도 및 지방상수도의 경우)",c:["탁도","일반세균","질산성 질소","과망간산칼륨 소비량"],a:1,e:"수질검사의 횟수(먹는물 수질기준 및 검사 등에 관한 규칙 제4조)\n광역상수도 및 지방상수도의 경우 - 정수장에서의 검사\n냄새, 맛, 색도, 탁도, 수소이온농도, 잔류염소는 매일 1회 이상 검사를 하여야 한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:24,q:"부영양화에 대한 특징을 설명한 것으로 알맞지 않은 것은?",c:["사멸된 조류의 분해작용에 의해 표수층에서부터 용존산소가 줄어든다.","조류합성에 의한 유기물의 증가로 COD가 증가한다.","일단 부영양화가 발생되면 회복되기 어렵다.","주로 수심이 낮은 곳에서 잘 나타난다."],a:1,e:"사멸된 조류의 분해작용에 의해 심층수에서부터 용존산소가 줄어든다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:25,q:"다음의 상수도시설 배치에서 순서가 잘못된 것은?",c:["수원 → 취수 → 침사 → 침전 → 여과 → 소독 → 배수","수원 → 취수 → 정수 → 배수","침사지 → 약품혼합 → 침전 → 급속여과지 → 염소소독조 → 배수지","수원 → 취수 → 배수 → 소독 → 정수"],a:4,e:"올바른 순서: 수원 → 취수 → 소독(정수) → 정수 → 배수. ④는 배수가 정수보다 앞에 있어 잘못되었다."},
