{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:26,q:"다음 중 수원지에서부터 각 과정까지의 상수계통도를 옳게 나타낸 것은?",c:["수원 → 취수 → 도수 → 배수 → 정수 → 송수 → 급수","수원 → 취수 → 배수 → 정수 → 도수 → 송수 → 급수","수원 → 취수 → 도수 → 송수 → 정수 → 배수 → 급수","수원 → 취수 → 도수 → 정수 → 송수 → 배수 → 급수"],a:4,e:"상수계통도: 수원 → 취수 → 도수 → 정수 → 송수 → 배수 → 급수"},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:27,q:"정수장시설의 착수정에 관한 설명으로 옳지 않은 것은?",c:["2지 이상 분할하는 것이 원칙이다.","체류시간은 1.5분 이상으로 한다.","수심은 3~5m 정도로 한다.","고수위와 주변 벽체 상단 간에는 30cm 이상의 여유를 두어야 한다."],a:4,e:"고수위와 주변 벽체 상단 간에는 60cm 이상의 여유를 두어야 한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:28,q:"다음 중 지하수의 취수시설이 아닌 것은?",c:["집수매거","취수틀","얕은 우물","깊은 우물"],a:2,e:"취수틀은 하천수, 호소 및 저수지의 취수시설이다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:29,q:"호수의 부영양화에 대한 설명으로 옳지 않은 것은?",c:["부영양화는 정체성 수역의 상층에서 발생하기 쉽다.","부영양화된 수원의 상수는 냄새로 인하여 먹는물로 부적당하다.","부영양화로 식물성 플랑크톤의 번식이 증가되어 투명도가 저하된다.","부영양화로 생물활동이 활발하여 깊은 곳의 용존산소가 풍부해진다."],a:4,e:"④ 수심이 깊은 곳은 혐기성 분해로 인해 용존산소가 부족해진다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:30,q:"하천에서의 수질개선의 일환으로 용존산소량을 증대시키기 위한 방법으로 옳지 않은 것은?",c:["희석을 위한 저수지 방류량 증대","하상퇴적물의 준설","유량확보를 위한 위어(보)의 설치","수중에 폭기시설 설치"],a:3,e:"용존산소량을 증대시키기 위한 방법: 하천의 유량 증가, 수중에 폭기시설 설치, 하상퇴적물 준설, 하천의 유속 증대, 비점오염원의 감소. 위어(보) 설치는 물을 정체시켜 DO 증대에 불리하다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:31,q:"호수나 저수지에 대한 설명으로 옳지 않은 것은?",c:["봄에는 순환을 이룬다.","여름에는 성층을 이룬다.","성층을 이룰 때는 DO구배와 수온구배가 서로 다른 모양을 나타낸다.","성층현상은 제일 윗층에 순환대, 변천대, 정체대의 순으로 형성된다."],a:3,e:"성층을 이룰 때는 DO구배와 수온구배가 동일한 모양을 나타낸다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:32,q:"도·송수관로 내 최대유속을 정하는 이유로 옳지 않은 것은?",c:["관로 내면의 마모를 방지하기 위하여","관로 내 침전물의 퇴적을 방지하기 위하여","양정에 소모되는 전력비를 절감하기 위하여","수격작용이 발생할 가능성을 낮추기 위하여"],a:2,e:"관로 내 침전물의 퇴적을 방지하기 위해서는 관로 내 '최소'유속을 제한해야 한다. 이때 최소유속은 0.6m/s이다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:33,q:"다음 중 적조현상에 직접적으로 영향을 주는 요인과 가장 거리가 먼 것은?",c:["수온의 상승","플랑크톤농도의 증가","정체수역의 염분농도 상승","하천유입수의 오염도 증가"],a:3,e:"적조는 정체수역의 염분농도 '저하' 시 발생하기 쉽다. 염분농도 상승은 직접 요인이 아니다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:34,q:"정수장에서 송수를 받아 해당 배수구역으로 배수하기 위한 배수지에 대한 설명(기준)으로 틀린 것은?",c:["유효용량은 시간변동조정용량과 비상대처용량을 합한 것으로 한다.","유효용량은 급수구역의 계획 1일 최대급수량의 6시간분 이상을 표준으로 한다.","배수지의 유효수심은 3~6m 정도를 표준으로 한다.","고수위로부터 배수지 상부 슬래브까지는 30cm 이상의 여유고를 가져야 한다."],a:2,e:"유효용량은 급수구역의 계획 1일 최대급수량의 최소 12시간분 이상을 표준으로 한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:35,q:"수질성분이 '부식'에 미치는 영향을 잘못 기술한 것은?",c:["높은 알칼리도는 착염의 형성으로 구리와 납의 부식을 감소시킨다.","암모니아는 착화물 형성을 통해 구리, 납 등의 금속용해도를 증가시킬 수 있다.","Ca는 CaCO₃로 침전하여 부식을 보호하고 부식속도를 감소시켜 준다.","높은 총용존고형물은 전도도와 부식속도를 증가시킨다."],a:1,e:"① 높은 알칼리도는 착염의 형성으로 구리와 납의 부식을 '증가'시킨다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:36,q:"다음 수질오염방지시설 중 화학적 처리시설에 해당하는 것은?",c:["응집시설","증류시설","농축시설","살균시설"],a:4,e:"수질오염방지시설(물환경보전법 시행규칙 별표 5)\n①, ②, ③은 물리적 처리시설에 해당한다.\n화학적 처리시설: 화학적 침강시설, 중화시설, 흡착시설, 살균시설, 이온교환시설, 소각시설, 산화시설, 환원시설, 침전물 개량시설"},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:37,q:"특정수질유해물질에 해당되지 않는 것은?",c:["1,1-다이클로로에틸렌","셀레늄과 그 화합물","트라이클로로메탄","구리와 그 화합물"],a:3,e:"특정수질유해물질(물환경보전법 시행규칙 별표 3)에 트라이클로로메탄은 포함되지 않는다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:14,q:"다음 중 먹는물의 수질기준에 부적합한 것은?",c:["납은 0.01mg/L를 넘지 아니할 것","페놀은 0.005mg/L를 넘지 아니할 것","경도는 100mg/L를 넘지 아니할 것","황산이온은 200mg/L를 넘지 아니할 것"],a:3,e:"③ 경도는 1,000mg/L(수돗물의 경우 300mg/L, 먹는염지하수 및 먹는해양심층수의 경우 1,200mg/L)를 넘지 아니할 것. 다만, 샘물 및 염지하수의 경우에는 적용하지 아니한다(먹는물 수질기준 및 검사 등에 관한 규칙 별표 1)."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:38,q:"무성생식의 하나인 출아에 의해서 번식하는 곰팡이로 넓은 범위의 온도 및 pH에 적응 가능한 것은?",c:["조상균류","불완전균류","담자균류","효모"],a:4,e:"효모는 출아에 의해 증식하는 타원형·구형인 단세포 균류이다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:39,q:"지구상에 분포하는 담수수량 중 빙하(만년설 포함) 다음으로 많은 비율을 차지하고 있는 것은?",c:["하천수","지하수","대기수분","토양수"],a:2,e:"지구상의 물의 분포(담수): 빙하 > 지하수 > 호수 > 토양수분 > 대기수분 > 습지 > 하천"},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:40,q:"상수도 취수관거의 취수구에 관한 설명으로 틀린 것은?",c:["유사시설(Sand Pit)은 갈수수위보다 높게 부설하여 모래유입을 방지한다.","원칙적으로 관거의 상류부에 제수문 또는 제수밸브를 설치한다.","전면에 수위조절판이나 스크린을 설치한다.","철근 콘크리트구조로 한다."],a:1,e:"최대갈수위 때에도 계획취수량을 확보할 수 있도록 취수관거의 유입구 상단이 갈수위 때보다 30cm 낮게 취수구를 위치시켜야 한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:41,q:"하천의 생물화학적 산소요구량(mg/L)에 대한 환경수질기준으로 적절한 것은?(단, 이용목적별 적용대상: 생활환경기준, 나쁨등급)",c:["3mg/L 이하","6mg/L 이하","8mg/L 이하","10mg/L 이하"],a:4,e:"환경수질기준(나쁨등급): pH 6.0~8.5, BOD 10mg/L 이하, DO 2mg/L 이상, SS 쓰레기 등이 떠있지 않을 것"},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:42,q:"지하수 취수시설(복류수 포함)인 집수매거에 관한 설명 중 틀린 것은?",c:["집수매거의 단면은 원형 또는 장방형으로 한다.","집수공에서의 유입속도가 3m/min 이하가 되어야 한다.","집수매거의 매설깊이는 5m 기준이다.","집수매관의 유출끝에서의 유속은 1m/s 이하가 되어야 한다."],a:2,e:"집수공에서의 유입속도가 3cm/s 이하가 되어야 한다(3m/min이 아님)."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:43,q:"미생물 중 세균(Bacteria)에 관한 특징과 가장 거리가 먼 것은?",c:["원시적 엽록소를 이용하여 부분적인 탄소동화작용을 한다.","용해된 유기물을 섭취하며 주로 세포분열로 번식한다.","곰팡이와 함께 수중생태계의 1차 분해자이다.","환경인자(pH, 온도)에 민감하며 열보다 낮은 온도에서 저항성이 높다."],a:1,e:"① 세균은 엽록소가 없어 탄소동화작용을 하지 못한다."},
{g:"b1c1",gt:"[1권] 1과목 1장 수처리공정 일반",s:"수처리공정",n:44,q:"다음 중 해수의 특성이라고 볼 수 없는 것은?",c:["pH는 약 8.2 정도이며 Bicarbonate의 완충용액이다.","해수의 주요성분 농도비는 일정하다.","해수의 Mg/Ca비는 담수보다 높다.","80% 이상의 질소는 유기질소의 형태를 갖는다."],a:4,e:"④ 해수 중 질소의 대부분은 무기질소의 형태로 존재한다."},
];
/* =================================================== */
const $=s=>document.querySelector(s);
const CIRC=['①','②','③','④','⑤'];
const store={
  load(){try{return JSON.parse(localStorage.getItem('jsq_v1'))||{}}catch(e){return{}}},
  save(d){localStorage.setItem('jsq_v1',JSON.stringify(d))}
};
let S=store.load();
S.exams=S.exams||{}; S.marks=S.marks||[]; S.wrongHist=S.wrongHist||{};
function persist(){store.save(S)}
function qid(q){return q.g+'-'+q.n}
function examKey(q){return q.g}
function examsList(){
  const m={};const order=[];
  QUESTIONS.forEach(q=>{const k=examKey(q);if(!m[k]){m[k]={key:k,gt:q.gt,qs:[]};order.push(k)}m[k].qs.push(q)});
  order.sort();
  order.forEach(k=>m[k].qs.sort((a,b)=>a.n-b.n));
  return order.map(k=>m[k]);
}
function examTitle(e){return e.gt}
let view={};
function togglePart(k){S.openParts=S.openParts||{};S.openParts[k]=!S.openParts[k];persist();goHome();}

function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1900)}

/* ---------- 홈 ---------- */
const OK_MSG=['정답! 🎯 천재인데요?','완벽해요! ✨','물 흐르듯 정확! 💧','오늘 컨디션 최고! 🔥','캬~ 바로 맞히네요 😎','합격각 보인다! 🏆'];
const NO_MSG=['아깝다! 해설 보고 가요 📖','틀려야 오래 남아요 💪','오답노트에 쏙 넣었어요 ✍️','한 번 더 보면 내 것! 🌱'];
function goHome(){
  view={};
  $('#hBack').style.display='none';
  $('#hTitle').textContent='💧 정수퀴즈';
  const exams=examsList();
  const totalDone=QUESTIONS.filter(q=>{const st=S.exams[examKey(q)];return st&&st.answers&&st.answers[q.n]!==undefined}).length;
  let h=`<div class="card hero"><span class="drop">💧</span>
  <div class="hi">${totalDone?'어서와요, 오늘도 가보자! 🚀':'반가워요! 첫 문제 풀어볼까요? 🌟'}</div>
  <div class="sub">전체 ${QUESTIONS.length}문제 중 ${totalDone}문제 완료 · 최고 연속정답 ${S.best||0}🔥</div></div>`;
  // 이어풀기
  if(S.last && S.exams[S.last.key] && exams.find(e=>e.key===S.last.key)){
    const ex=exams.find(e=>e.key===S.last.key);
    const st=S.exams[S.last.key];
    const done=Object.keys(st.answers||{}).length;
    // startQuiz('resume')와 동일한 로직: 첫 미응답 문제로 이동(없으면 1번). 라벨을 실제 동작과 일치시킴
    let rIdx=ex.qs.findIndex(q=>st.answers[q.n]===undefined);
    const allDone=rIdx<0;
    if(rIdx<0)rIdx=0;
    const resumeN=ex.qs[rIdx].n;
    const btnTxt=allDone?`다시 보기 (1번부터) 🔁`:`이어서 풀기 (${resumeN}번부터) 🚀`;
    h+=`<div class="card"><h2>⏯️ 이어풀기</h2><div class="muted">${examTitle(ex)} · ${done}/${ex.qs.length}문제 진행${allDone?' · ✅ 완료':''}</div>
    <button class="btn" onclick="startQuiz('${ex.key}','resume')">${btnTxt}</button></div>`;
  }
  // 파트별 시험 목록 (1권 / 2권 / 3권 → 과년도 기출 맨 아래)
  const PARTS=[
    {key:'b1',label:'📘 1권 · 적중예상문제 (과목1·2)',match:e=>/^\[1권\]/.test(e.gt)},
    {key:'b2',label:'📗 2권 · 적중예상문제 (3과목 설비운영)',match:e=>/^\[2권\]/.test(e.gt)},
    {key:'b3',label:'📙 3권 · 적중예상문제',match:e=>/^\[3권\]/.test(e.gt)},
    {key:'gichul',label:'📝 과년도 기출문제',match:e=>!/^\[\d+권\]/.test(e.gt)}
  ];
  S.openParts=S.openParts||{};
  PARTS.forEach(part=>{
    const list=exams.filter(part.match);
    if(!list.length) return;
    const pq=list.reduce((s,e)=>s+e.qs.length,0);
    const open=!!S.openParts[part.key]; // 기본 접힘(탭하면 펼침)
    h+=`<div class="card"><div class="exam-item" style="border-bottom:${open?'1px solid var(--line)':'0'};padding-top:4px" onclick="togglePart('${part.key}')">
      <div><div class="nm" style="font-size:16px">${part.label}</div>
      <div class="pct">${list.length}세트 · 총 ${pq}문제</div></div><div>${open?'▾':'▸'}</div></div>`;
    if(open){
      list.forEach(ex=>{
        const st=S.exams[ex.key]||{answers:{}};
        const done=Object.keys(st.answers).length;
        const total=ex.qs.length;
        const ok=ex.qs.filter(q=>st.answers[q.n]!==undefined&&st.answers[q.n]===q.a).length;
        const complete=total>0&&done>=total;
        const icon=complete?'✅':(done>0?'🔵':'⚪');
        const tail=complete?`<span class="statlabel done">완료</span>`:(done>0?`<span class="statlabel prog">${Math.round(done/total*100)}%</span>`:'');
        h+=`<div class="exam-item${complete?' is-done':''}" onclick="examMenu('${ex.key}')">
        <span class="stat">${icon}</span>
        <div style="flex:1;min-width:0"><div class="nm">${examTitle(ex)}${tail}</div>
        <div class="pct">${total}문제 · 푼 문제 ${done}/${total} · 정답률 ${done?Math.round(ok/done*100)+'%':'-'}</div></div><div>›</div></div>`;
      });
    }
    h+='</div>';
  });
  if(!exams.length) h+='<div class="card"><div class="muted">아직 수록된 문제가 없습니다.</div></div>';
  // 오답/북마크/통계/설정
  const wrongs=allWrong();
  h+=`<div class="card"><div class="row">
  <button class="btn sec" onclick="startWrong()">📕 오답노트 (${wrongs.length})</button>
  <button class="btn sec" onclick="startMarked()">⭐ 북마크 (${S.marks.length})</button></div>
  <div class="row"><button class="btn sec" onclick="showStats()">📊 통계</button>
  <button class="btn sec" onclick="showSettings()">⚙️ 백업/설정</button></div></div>`;
  $('#main').innerHTML=h;
  window.scrollTo(0,0);
}
function allWrong(){
  return QUESTIONS.filter(q=>{
    const st=S.exams[examKey(q)];
    return st&&st.answers&&st.answers[q.n]!==undefined&&st.answers[q.n]!==q.a;
  });
}
/* ---------- 시험 메뉴 ---------- */
function examMenu(key){
  const ex=examsList().find(e=>e.key===key);
  const st=S.exams[key]||{answers:{}};
  const done=Object.keys(st.answers).length;
  const subjects=[...new Set(ex.qs.map(q=>q.s))];
  let h=`<div class="card"><h2>${examTitle(ex)}</h2><div class="muted">${ex.qs.length}문제 · 진행 ${done}</div>
  <button class="btn" onclick="startQuiz('${key}','resume')">${done?'이어서 풀기':'처음부터 풀기'}</button>
  <button class="btn sec" onclick="startQuiz('${key}','restart')">기록 지우고 처음부터</button>
  <button class="btn sec" onclick="startQuiz('${key}','shuffle')">랜덤 순서로 풀기</button></div>`;
  h+='<div class="card"><h2>과목만 골라 풀기</h2>';
  subjects.forEach((s,i)=>{h+=`<button class="btn sec" onclick="startQuiz('${key}','subject',${i})">${s} (${ex.qs.filter(q=>q.s===s).length}문제)</button>`});
  h+='</div>';
  setView(h,examTitle(ex));
}
function setView(html,title){
  $('#main').innerHTML=html;
  $('#hBack').style.display='block';
  $('#hTitle').textContent=title;
  window.scrollTo(0,0);
}
/* ---------- 퀴즈 시작 ---------- */
function startQuiz(key,mode,subjIdx){
  const ex=examsList().find(e=>e.key===key);
  let qs=[...ex.qs];
  if(mode==='restart'){S.exams[key]={answers:{}};persist()}
  if(mode==='subject'){
    const s=[...new Set(ex.qs.map(q=>q.s))][subjIdx];
    qs=qs.filter(q=>q.s===s);
  }
  if(mode==='shuffle'){qs.sort(()=>Math.random()-.5)}
  S.exams[key]=S.exams[key]||{answers:{}};
  let idx=0;
  if(mode==='resume'){
    const st=S.exams[key];
    idx=qs.findIndex(q=>st.answers[q.n]===undefined);
    if(idx<0)idx=0;
  }
  view={type:'quiz',key,qs,idx,title:examTitle(ex)};
  S.last={key};persist();
  renderQ();
}
function startWrong(){
  const qs=allWrong();
  if(!qs.length)return toast('오답이 없습니다');
  view={type:'wrong',qs,idx:0,title:'오답노트',temp:{}};
  renderQ();
}
function startMarked(){
  const qs=QUESTIONS.filter(q=>S.marks.includes(qid(q)));
  if(!qs.length)return toast('북마크가 없습니다');
  view={type:'marked',qs,idx:0,title:'북마크',temp:{}};
  renderQ();
}
/* ---------- 문제 렌더 ---------- */
function getAns(q){
  if(view.type==='quiz')return S.exams[view.key].answers[q.n];
  return view.temp[qid(q)];
}
function setAns(q,v){
  if(view.type==='quiz'){S.exams[view.key].answers[q.n]=v;}
  else view.temp[qid(q)]=v;
  if(v!==q.a)S.wrongHist[qid(q)]=(S.wrongHist[qid(q)]||0)+1;
  persist();
}
function renderQ(){
  const q=view.qs[view.idx];
  const ans=getAns(q);
  const answered=ans!==undefined;
  const marked=S.marks.includes(qid(q));
  let h=`<div class="progress"><i style="width:${(view.idx+1)/view.qs.length*100}%"></i></div>
  <div class="card"><div class="qhead"><span class="qnum"><span class="tag">${q.s}</span>${q.n}번</span>
  <span class="streak">🔥 ${S.streak||0}연속</span>
  <button class="star ${marked?'on':''}" onclick="toggleMark()">★</button></div>
  <div class="qtext">${esc(q.q)}</div>`;
  q.c.forEach((c,i)=>{
    let cls='choice';
    if(answered){
      if(i+1===q.a)cls+=' right';
      else if(i+1===ans)cls+=' wrong';
    }
    h+=`<div class="${cls}" onclick="pick(${i+1})"><span class="no">${CIRC[i]}</span><span>${esc(c)}</span></div>`;
  });
  if(answered){
    const msg=ans===q.a?OK_MSG[(q.n+view.idx)%OK_MSG.length]:NO_MSG[(q.n+view.idx)%NO_MSG.length]+' · 정답은 '+CIRC[q.a-1]+'번';
    h+=`<div class="verdict ${ans===q.a?'ok':'bad'}">${msg}</div>`;
    if(q.e)h+=`<div class="exp"><b>해설</b><br>${esc(q.e)}</div>`;
    h+=`<div class="aiBox"><button class="btn sec" onclick="askAI()">🤖 AI에게 자세히 물어보기</button>
    <div class="muted" style="margin-top:6px">질문 내용이 복사됩니다 → 열린 AI 채팅창에 붙여넣기 하세요</div></div>`;
  }
  h+='</div>';
  h+=`<div class="row">
  <button class="btn sec" ${view.idx===0?'disabled':''} onclick="nav(-1)">◀ 이전</button>
  <button class="btn" onclick="nav(1)">${view.idx===view.qs.length-1?'결과 보기':'다음 ▶'}</button></div>`;
  // 번호 그리드
  h+='<div class="card"><div class="muted">문제 이동</div><div class="grid">';
  view.qs.forEach((qq,i)=>{
    const a=getAns(qq);let cls='';
    if(a!==undefined)cls=a===qq.a?'done-ok':'done-bad';
    if(i===view.idx)cls+=' cur';
    h+=`<button class="${cls}" onclick="jump(${i})">${qq.n}</button>`;
  });
  h+='</div></div>';
  setView(h,view.title+' ('+(view.idx+1)+'/'+view.qs.length+')');
}
function pick(v){
  const q=view.qs[view.idx];
  if(getAns(q)!==undefined)return;
  setAns(q,v);
  if(v===q.a){
    S.streak=(S.streak||0)+1;
    if(S.streak>(S.best||0))S.best=S.streak;
    burst();
    if(S.streak>0&&S.streak%5===0)setTimeout(()=>toast('🔥 '+S.streak+'연속 정답! 미쳤다!'),350);
  }else{S.streak=0}
  persist();
  renderQ();
}
function burst(){
  const EMO=['🎉','✨','💧','⭐','💜','🩵'];
  const cx=window.innerWidth/2, cy=window.innerHeight*0.4;
  for(let i=0;i<14;i++){
    const s=document.createElement('span');
    s.className='party';s.textContent=EMO[i%EMO.length];
    s.style.left=cx+'px';s.style.top=cy+'px';
    document.body.appendChild(s);
    const ang=Math.random()*Math.PI*2, d=70+Math.random()*130;
    const tx=Math.cos(ang)*d, ty=Math.sin(ang)*d-60;
    s.animate([
      {transform:'translate(0,0) scale(1) rotate(0deg)',opacity:1},
      {transform:`translate(${tx}px,${ty+120}px) scale(.5) rotate(${Math.random()*360}deg)`,opacity:0}
    ],{duration:750+Math.random()*450,easing:'cubic-bezier(.2,.7,.4,1)'}).onfinish=()=>s.remove();
  }
}
function nav(d){
  if(view.idx+d>=view.qs.length)return showResult();
  view.idx=Math.max(0,view.idx+d);
  renderQ();
}
function jump(i){view.idx=i;renderQ()}
function toggleMark(){
  const id=qid(view.qs[view.idx]);
  const i=S.marks.indexOf(id);
  if(i<0)S.marks.push(id);else S.marks.splice(i,1);
  persist();renderQ();
}
/* ---------- 결과 ---------- */
function showResult(){
  const qs=view.qs;
  const done=qs.filter(q=>getAns(q)!==undefined);
  const ok=done.filter(q=>getAns(q)===q.a);
  const bySubj={};
  done.forEach(q=>{const b=bySubj[q.s]=bySubj[q.s]||{t:0,o:0};b.t++;if(getAns(q)===q.a)b.o++});
  const pct=done.length?Math.round(ok.length/done.length*100):0;
  const emo=pct>=90?'🏆 합격각!':pct>=70?'😎 꽤 하는데요?':pct>=50?'💪 절반 돌파!':'🌱 시작이 반!';
  let h=`<div class="card" style="text-align:center"><h2>결과</h2>
  <div class="bigscore">${pct}점</div>
  <div style="font-size:18px;font-weight:800;margin:4px 0">${emo}</div>
  <div class="muted">${done.length}문제 중 ${ok.length}개 정답</div></div>`;
  if(pct>=70)burst();
  h+='<div class="card"><h2>과목별</h2>';
  Object.entries(bySubj).forEach(([s,b])=>{h+=`<div class="statline"><span>${s}</span><b>${b.o}/${b.t} (${Math.round(b.o/b.t*100)}%)</b></div>`});
  h+='</div>';
  h+=`<button class="btn" onclick="goHome()">홈으로 🏠</button>`;
  setView(h,'결과');
}
/* ---------- 통계 ---------- */
function showStats(){
  const bySubj={},byExam={};
  QUESTIONS.forEach(q=>{
    const st=S.exams[examKey(q)];if(!st)return;
    const a=st.answers[q.n];if(a===undefined)return;
    const b=bySubj[q.s]=bySubj[q.s]||{t:0,o:0};b.t++;if(a===q.a)b.o++;
    const e=byExam[examKey(q)]=byExam[examKey(q)]||{t:0,o:0,gt:q.gt};e.t++;if(a===q.a)e.o++;
  });
  let h='<div class="card"><h2>📊 과목별 정답률 (전체 누적)</h2>';
  const ks=Object.keys(bySubj);
  if(!ks.length)h+='<div class="muted">아직 푼 문제가 없습니다.</div>';
  ks.forEach(s=>{const b=bySubj[s];h+=`<div class="statline"><span>${s}</span><b>${b.o}/${b.t} (${Math.round(b.o/b.t*100)}%)</b></div>`});
  h+='</div><div class="card"><h2>세트별</h2>';
  Object.values(byExam).forEach(e=>{h+=`<div class="statline"><span>${e.gt}</span><b>${e.o}/${e.t} (${Math.round(e.o/e.t*100)}%)</b></div>`});
  h+='</div>';
  h+='<div class="muted" style="padding:0 4px">정답률이 낮은 과목을 "과목만 골라 풀기"로 집중 공략하세요. 💪</div>';
  setView(h,'통계');
}
/* ---------- 설정/백업 ---------- */
function showSettings(){
  let h=`<div class="card"><h2>💾 학습기록 백업</h2>
  <div class="muted">브라우저 데이터를 지우면 기록이 사라질 수 있습니다. 가끔 백업해 두세요.</div>
  <button class="btn sec" onclick="exportData()">기록 복사하기 (백업)</button>
  <div style="margin-top:12px"><div class="muted">복원: 백업 텍스트를 붙여넣고 버튼을 누르세요</div>
  <textarea id="impBox" placeholder='{"exams":...}'></textarea>
  <button class="btn sec" onclick="importData()">기록 복원하기</button></div></div>
  <div class="card"><h2>📱 홈 화면에 추가 (앱처럼 쓰기)</h2>
  <div class="muted">Chrome: 메뉴(⋮) → "홈 화면에 추가"<br>iPhone Safari: 공유버튼 → "홈 화면에 추가"</div></div>
  <div class="card"><h2>초기화</h2><button class="btn warn" onclick="resetAll()">모든 학습기록 삭제</button></div>`;
  setView(h,'백업/설정');
}
function exportData(){
  copyText(JSON.stringify(S)).then(()=>toast('복사되었습니다. 메모장 등에 저장해두세요'));
}
function importData(){
  try{
    const d=JSON.parse($('#impBox').value);
    if(!d.exams)throw 0;
    S=d;persist();toast('복원 완료 ✨');goHome();
  }catch(e){toast('형식이 올바르지 않습니다')}
}
function resetAll(){
  if(confirm('모든 학습기록을 삭제할까요?')){S={exams:{},marks:[],wrongHist:{}};persist();goHome()}
}
/* ---------- AI 질문 ---------- */
function askAI(){
  const q=view.qs[view.idx];
  const ans=getAns(q);
  let p=`[정수시설운영관리사 ${q.gt} / ${q.s} ${q.n}번]\n문제: ${q.q}\n`;
  q.c.forEach((c,i)=>p+=`${CIRC[i]} ${c}\n`);
  p+=`정답: ${CIRC[q.a-1]}\n내가 고른 답: ${ans?CIRC[ans-1]:'(없음)'}\n\n정답인 이유와 나머지 보기가 틀린 이유를 수험생이 이해하기 쉽게 설명해줘. 관련 핵심 개념도 같이 정리해줘.`;
  copyText(p).then(()=>{
    toast('질문이 복사되었습니다 🤖');
    setTimeout(()=>{
      if(confirm('질문이 복사되었습니다.\nAI 채팅을 열까요?\n(확인=Claude / 취소=ChatGPT)'))
        window.open('https://claude.ai/new','_blank');
      else window.open('https://chatgpt.com/','_blank');
    },300);
  });
}
function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t));
  return Promise.resolve(fallbackCopy(t));
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(ta);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
goHome();
</script>
